散治自汗盜汗五倍子為末用津唾調填滿臍中以絹帛繫縛一宿即止加白枯礬末尤妙又方用何首烏末津唾調填臍中即止心汗者心孔有汗別處無也名曰心汗因憂思悲恐驚勞傷鬱結而成茯苓補心湯治心汗症茯苓人參白朮當歸生地黃酸棗仁白芍麥門冬陳皮黃連炒各等分辰砂研末臨服調入五分甘草三分上銼一劑棗二枚烏梅一個浮小麥一撮水煎食遠服頭汗者邪搏諸陽之首也其症渴飲漿水小便不利此溫熱也必發黃用茵陳湯或五苓散二藥之分為有虛實故也大汗發潤喘而不止者死也黃汗者汗出染衣黃如柏汁是也問曰黃汗之為病身體腫發熱汗出而渴狀如風水汗染衣色正黃如柏汁脈沉何從得之師曰以汗出時入水中浴水從汗孔入得之宜服二仙酒二仙酒黃耆蜜炒白芍酒炒各五錢桂枝三錢上銼一劑水煎溫服原病式曰心熱則汗出亦有火氣上蒸胃中之濕亦作汗涼膈散主之方見火證一自汗不休因內傷及一切虛損之症所得者用補中益氣湯柴胡升麻俱用蜜水炒少加製附子麻黃根浮小麥方見補益若陽盛陰虛盜汗者用當歸六黃湯方見前若陽氣虛弱汗出不止肢體倦怠用參附湯方見眩暈若上熱喘急盜汗氣短頭暈者用參附湯方見眩暈若腎氣虛弱盜汗發熱者用六味丸方見補益若腎氣虛乏盜汗惡寒者用八味丸方見補益若氣血俱虛而盜汗者用十全大補湯方見補益治腳汗方白礬五錢乾葛五錢為末水煎逐日洗連五日自然無汗眩暈脈風寒暑濕氣鬱生涎下虛上實皆頭暈眩風浮寒緊濕細暑虛痰弦而滑瘀芤而澀數大火邪虛大久極先理氣痰次隨症脈眩者言其黑運旋轉其狀目閉眼暗身轉耳聾如立舟車之上起則欲倒蓋虛極乘寒得之亦不可一途而取軌也大凡頭眩者痰也清暈化痰湯治頭目眩暈陳皮去白半夏薑汁炒茯苓去皮各一錢半甘草三分川芎八分白芷羌活各七分枳實麩炒一錢南星薑汁炒防風細辛各六分黃芩酒炒八分氣虛加人參七分白朮有熱加黃連六分血虛加川芎當歸各一錢上銼一劑生薑三片水煎溫服以此作丸亦可肥人頭眩者屬氣虛濕痰也四君子湯治氣虛濕痰頭眩人參去蘆白朮去蘆茯苓去皮黃耆蜜炒川芎陳皮半夏薑製天麻桔梗去蘆白芷當歸各等分甘草減半上銼一劑生薑三片棗一枚水煎溫服瘦人頭眩者屬血虛痰火也四物湯加減治血虛痰火頭眩當歸川芎白芍酒炒熟地人參減半陳皮片芩山梔茯苓去皮天麻各等分甘草減半上銼一劑生薑三片棗一枚水煎溫服忽時眩暈倒者是風痰脈浮滑也二陳湯加減茯苓陳皮羌活防風人參當歸白朮去蘆枳實麩炒南星薑製川芎桔梗瓜蔞仁各等分甘草少許上銼一劑水煎入竹瀝薑汁同服勞役之人飢寒眩暈者脈虛弱也補中益氣湯加減方見內傷依本方加半夏熟地黃白芍天麻陰虛火動眩暈者脈必數也滋陰降火湯加減方見虛勞依本方加川芎天麻山梔竹瀝少許虛極欲倒如坐舟車手足冷者脈沉細也參附湯治真陽不足上氣喘急氣短自汗眩暈人參五錢大附子炮三錢上銼一劑生薑十片水煎溫服若泄瀉多而眩暈時時自冒者難治也頭旋眼黑如在風雲中者乃胃氣虛停痰而致也半夏白朮天麻湯方見頭痛頭目昏眩者乃風熱上攻也防風通聖散治風熱上攻頭目昏眩悶痛痰喘咳嗽依本方去麻黃芒硝加菊花人參砂仁寒水石方見中風上治臨事不寧眩暈嘈雜者此心脾虛怯也滋陰健脾湯此治氣血虛損有痰作眩暈之仙劑也當歸酒洗一錢川芎五分白芍生地黃酒洗八分人參七分白朮一錢五分白茯苓去皮一錢陳皮鹽水洗去白一錢半夏薑製白茯神去皮木麥門冬去心遠志去心各七分甘草炙四分上銼一劑薑棗水煎早晚服大學士中玄高公患頭目眩暈耳鳴眼黑如在風雲中目中溜火一醫以清火化痰一醫以滋補氣血俱罔效余診六脈洪數此火動生痰以酒蒸大黃末三錢茶下一服而愈蓋火降則痰自消矣一熊槐二官年六十餘身體胖大余診其脈下手即得五至一止余乃驚曰君休矣渠曰連日微覺頭暈別無恙也何故出此願實教焉豫曰越十日用藥相哂而退少頃間中痰求救於余見其必不可治令以香油灌之即醒逾十日果卒麻木脈脈浮而濡屬氣血虛關前得之麻在上體關後得之麻在下也麻是渾身氣虛也加味益氣湯黃耆蜜炒人參白朮去蘆陳皮當歸各一錢升麻柴胡木香各五分香附青皮去穰川芎各八分桂枝少許甘草三分上銼一劑薑棗煎服治十指盡麻並面目皆麻此亦氣虛也以補中益氣湯加木香麥門冬香附羌活防風烏藥立愈加味八仙湯治手足麻木當歸酒浸川芎七分白芍八分熟地酒浸七分人參六分白朮酒浸四錢茯苓去皮一錢陳皮八分半夏薑製七分桂枝三分柴胡四分羌活五分防風五分秦艽六分牛膝六分甘草炙四分上銼一劑薑棗煎食遠服木是濕痰死血也雙合湯當歸川芎白芍生地黃陳皮半夏薑汁炒茯苓去皮各一錢桃仁去皮八分紅花三分白芥子一錢甘草三分上銼一劑生薑三片水煎熟入竹瀝薑汁同服凡人遍身麻痹謂之不仁皆因氣虛受風濕所致也祛風散生川烏白朮白芷各三錢甘草三錢上為末酒調吞下五補丸五補丸黃耆一兩蜜炒人參白芍酒炒各五錢當歸二錢大附子一個麵包裹煨去皮臍上為末煉蜜為丸用祛風散送下婦人手足麻痹者七情六鬱滯經絡也開結舒經湯紫蘇陳皮香附烏藥川芎蒼朮米泔制羌活南星薑製半夏當歸各八分桂枝甘草各四分上銼一劑生薑三片水煎臨服入竹瀝薑汁少許同服麻骨方自頭麻至心窩而死者或自足心麻至膝蓋而死者用人糞燒灰用豆腐漿調飲即止又方治症同前用楝子燒灰研細末每服三五錢黃酒調下即止加減天麻湯治頭目四肢麻木飲食少用不時眼黑半夏薑湯泡七次八分白朮用腿白色不油者微炒七分天麻用堅實者紙包水濕煨熟五分神麯炒五分南川芎七分西芎不用澤瀉五分陳皮一錢防風一分茯苓五分蒼朮米泔制三分白芷二分黃耆三分人參去蘆三分甘草炙三分上銼一劑生薑三片黑棗二枚煎至八分食遠服癲狂脈癲癇之脈陽浮陰沉數熱滑痰狂發於心驚風肝癇弦急可尋浮病腑淺沉病臟深癲脈搏大滑者生沉小緊急者不治熱狂脈實大者生沉小者死癲脈虛可治實則死狂者大開目與人語所未嘗見之事為狂也譫語者合目自言日用常行之事為譫語又蓄血證則重復語之鄭聲者聲顫無力不相接續造字出於喉中為鄭聲也陰附陽則狂陽附陰則癲脫陽者見鬼脫陰者目盲癲者心血不足也又云癲者喜笑不常顛倒錯亂之謂也養血清心湯人參去蘆白朮去蘆茯苓去皮遠志去心酸棗仁炒川芎生地黃石菖蒲各一錢當歸一錢半甘草五分上銼一劑水煎服遂心丹治癲癇風疾婦人心風血邪甘遂一錢堅實者為末用豬血心取管血三條和遂末將心刀批作兩邊以遂末入在內將線縛定外用綿紙裹濕慢火煨熟不可焦了取末研細入辰砂末一錢和勻分作四丸每服一丸將煨豬心煎湯化下大便下出惡物取效狂者痰火實盛也又云狂者狂亂而無正定也防風通聖散治一切大風癲狂之疾方見中風依本方加牡丹皮生地黃桃仁清心丸治心受邪熱精神恍惚狂言叫呼睡臥不寧膽星全蠍稍天麻人參鬱金生地黃各等分上為末湯泡蒸為丸如梧桐子大每服三十丸人參湯下喜笑不休者心火之盛也以食鹽二兩火燒令紅赤研細以河水一大碗煎至三五沸待溫分三次啜之以叉探於喉中吐出熱痰次服黃連解毒湯方見傷寒依本方加半夏竹瀝竹葉薑汁少許而笑即止婦人癲疾歌唱無時逾牆上屋者乃營血迷於心包所致也加味逍遙散當歸白芍炒白朮去蘆茯苓去皮柴胡生地遠志去心桃仁去皮尖蘇木紅花甘草上銼一劑煨姜一片水煎溫服有熱者加入小柴胡湯生地辰砂用水煎服牛黃膏治婦人熱入血室發狂不認人者牛黃二錢半硃砂鬱金各三錢腦子甘草各一錢牡丹皮三錢上為細末煉蜜為丸如皂子大每服一丸新水化下治失心風用紫河車煮爛雜於豬牛肚內吃神效河車不必拘首生但無病婦人者佳邪崇之症似癲而非癲有時明有時昏但心者一身之主清淨之府外有包絡以羅之其中精華之聚萃者名之曰神通陰陽察纖毫無所紊亂稍有濁痰沉入其中以主宰故昧其明言語交錯或精氣赤汁流通逐去濁物其言猶復舊也此名為痰迷心竅之患非邪崇也若以符水治邪崇用密其膚以客其外不治此乃上膈之痰理宜先用吐法後當清痰順氣安神之藥調之病即安矣痰多者口有聲有沫火者有熱面赤脈數是也癇乃痰疾病似馬羊雞犬豬故有五癇應五臟不必多配大率主痰也重陽者狂罵詈不避親疏重陰者癲語言交錯不常二病雖分陰陽多主於熱與痰耳一婦人發狂棄衣而走逾屋上垣不識親疏狂言妄語人拿不住諸醫措手余令家人將涼水亂潑不記其數須臾倒僕診其脈六部俱弦數有力此乃熱極則生風也用防風通聖散加生地黃黃連桃仁紅花牡丹皮三劑而安後服祛風至寶丹痊愈癇證脈脈虛弦為驚為風癇癇病者卒時暈倒身軟咬牙吐涎沫遂不省人事隨後醒者是癇病也有羊癇豬癇牛癇馬癇犬癇皆驚風熱痰俱用二陳湯加減安神丸又有癲病者狂叫奔走而不知人也專主於痰治在痰症二陳湯加減諸癇者痰涎壅並然也二陳湯治一切癇病茯苓去皮南星薑製陳皮各一錢栝蔞仁枳實麩炒桔梗梔子半夏黃芩各一錢甘草三分木香五分研辰砂為末五分上銼一劑姜三片水煎臨服入竹瀝薑汁磨木香調辰砂末調服癇屬氣血虛而兼痰火者宜攻補兼施也清心抑膽湯平肝解鬱清火化痰除眩暈諸癇之疾當歸酒浸白芍酒浸白朮去蘆炒茯苓去皮黃連薑汁炒香附炒半夏薑汁炒枳實麩炒竹茹石菖蒲陳皮各一錢麥門冬去心川芎人參遠志去心甘草四分上銼劑水煎服安神丸治癇病常服當歸酒洗人參去蘆茯苓去皮酸棗仁炒生地黃酒洗黃連酒炒陳皮去白南星薑製各一兩天竺黃五錢牛黃二錢珍珠二錢琥珀二錢硃砂五錢為衣上為極細末煉蜜為丸如梧桐子大每服五十丸清米湯下忌母豬肉牛羊犬馬等肉胡椒蔥蒜癇屬風痰者宜追風祛痰也追風祛痰丸治諸風癇暗風世之患此病者甚多余用此得效者甚廣幸試之防風去蘆天麻殭蠶洗去絲炒白附子麵包煨各一兩全蠍去毒微炒木香各五錢牙皂炒一兩白礬枯五錢南星三兩一半白礬水浸一半皂角水浸皆浸一宿半夏湯泡七次研為細末稱六兩分作二分一分用皂角浸漿作曲一分用生薑汁作曲上為細末薑汁打稀糊為丸如梧桐子大硃砂為衣每服七八十丸食遠臨臥用淡薑湯送下或薄荷湯下病人氣血虛者加人參當歸胃虛加白朮有火加薑汁炒黃連各一兩癇屬痰者宜化痰清火也清心滾痰丸治癲癇驚狂一切怪症神效大黃酒蒸四兩黃芩四兩青礞石硝煅五錢沉香二錢半犀角五錢皂角五錢麝香五分硃砂五錢上為細末水丸如梧桐子大硃砂為衣每服七十丸溫水下虎睛丸治癇疾發作涎潮搐搦精神恍惚將作譫語犀角挫屑一兩虎睛一對微炒大黃一兩梔子五錢遠志甘草水泡去心一兩上為細末煉蜜為丸緑豆大每服二十丸食後溫酒送下癇屬風熱者宜祛風清熱也祛風至寶丹治癲癇防風薄荷荊芥羌活獨活連翹黃芩黃柏黃連梔子全蠍天麻細辛枳實桔梗大黃芒硝生地石膏甘草各一兩鹽梅五十個去核乾葛赤芍細茶各一兩半麻黃三錢臨症詳審或用或不用上藥均用溫水洗火焙乾為末煉蜜為丸彈子大硃砂為衣每服二丸不時細嚼並臥時茶酒任下如血虛加芎歸各一兩氣虛加人參白朮各一兩一小兒周歲從桌上仆地良久復蘇發搐吐痰沫服定驚化痰等藥遇驚即復作畢姻後不時發而難愈形氣俱虛面色痿黃服十全大補補中益氣二湯而愈方見補益王大參嗣君年十八歲患癇每發即仆地吐涎不省人事少頃復蘇或一月一發或兩月發四五次者七年遍醫弗效余診六脈滑數人迎緊盛此氣血虛而有風痰壅並也以追風祛痰丸加人參當歸黃連各一兩安神丸二藥兼服未及半年而痊後有數人俱同此治皆愈一小兒十五歲御女後復勞役考試失意患癇症三年矣遇勞則發用十全大補湯加味歸脾湯之類更以紫河車生研如膏入蒸糯米飯為丸如梧桐子大每服百丸日三五服而痊後患遺精盜汗發熱仍用前藥及六味丸而愈此方治癇不拘男女老幼皆效健忘健忘者為事有始無終言發不知首尾此是病名也非比生成愚頑也精神短少者多至於痰有因心氣不足恍惚多忘事者有因思慮過度勞傷心脾忘事者用醒脾湯加減若痰迷心竅忘事者用瓜蔞枳實湯加減治之方見痰飲健忘者思慮傷心脾也又云健忘者陡然而忘其事也歸脾湯治脾經失血少寐發熱盜汗或思慮傷脾不能攝血以致妄行或健忘怔忡驚悸不寐或心脾傷痛嗜臥少食或憂思傷脾血虛發熱或肢體作痛大便不調或經候不準晡熱內熱或瘰癧流注不能消散潰斂人參白朮黃耆炒白茯苓去皮龍眼肉當歸遠志甘草泡去心酸棗仁炒各一錢木香甘草炙各五分上銼一劑生薑三片棗一枚水煎服本方加柴胡山梔名加味歸脾湯狀元丸專補心生血寧神定志清火化痰臺閣勤政勞心燈窗讀書辛苦並健忘怔忡不寐及不善記而多忘者服之能日誦千言胸藏萬卷神效人參二錢白茯神去皮木當歸酒洗酸棗仁炒各三錢麥門冬去心遠志去心龍眼肉生地黃酒洗玄參硃砂石菖蒲去毛一寸九節者佳各三錢柏子仁去油二錢上為細末獖豬心血為丸如緑豆大金箔為衣每服二三十丸糯米湯送下天王補心丹寧心保神益血固精壯力強志令人不忘除怔忡定驚悸清三焦化痰涎祛煩熱療咽乾養育精神人參五錢五味子當歸酒洗天門冬去心麥門冬去心柏子仁酸棗仁炒玄參白茯神去皮丹參桔梗去蘆遠志去心各五錢黃連去毛酒炒二兩生地黃酒洗四兩石菖蒲一兩上為細末煉蜜為丸如梧桐子大硃砂為衣每服三十丸臨臥時服燈心竹葉煎湯送下一方有熟地黃百部牛膝杜仲茯神甘草各等分金箔為衣煉蜜為丸如彈子大臨臥服一丸細嚼燈心紅棗煎湯送下無麥冬黃連生地黃孔子大聖枕中方龜甲即龜板自敗者佳龍骨煅遠志去心石菖蒲去毛上四味等分為末酒調方寸匕日三服令人聰明人若多忘事用遠志石菖蒲每日煎湯服心通萬卷書癲狂健忘怔忡失志及恍惚驚怖人心神不守舍多言不定一切真氣虛損用紫河車入補藥內服之大能安心養血寧神一健忘驚悸怔忡不寐用六味丸加遠志石菖蒲人參白茯神當歸酸棗仁炒同為丸服怔忡怔忡者心無血養如魚無水心中惕惕然而跳動也如人將捕捉之貌若思慮即心跳者是血虛也四物安神湯治心中無血養故作怔忡兼服辰砂安神丸當歸酒洗白芍酒炒生地黃酒洗熟地黃人參去蘆白朮去蘆茯神去皮木酸棗仁炒黃連姜炒梔子炒麥門冬去心竹茹辰砂研末臨服調入烏梅一個上銼一劑棗二枚炒米一撮水煎食遠服心若時跳時止者是痰因火動也二陳湯治痰因火動作怔忡方見痰症依本方加枳實麥冬竹茹炒黃連炒山梔人參白朮當歸辰砂烏梅竹瀝姜三片棗一枚水煎用辰砂末調服心慌神亂者血虛火動也硃砂安神丸治血虛心煩懊憹驚悸怔忡胸中氣亂硃砂另研末水飛過二錢當歸酒洗淨二錢半生地黃酒洗一錢五分黃連酒洗炒六錢甘草炙二錢半一方加人參白朮去蘆茯苓去皮酸棗仁炒麥門冬去心各等分上為末煉蜜為丸如黍米大每服五十丸食遠空心米湯送下養血清火湯治心慌神亂煩躁不寧當歸川芎七分白芍酒炒生地黃酒洗黃連酒炒各一錢片芩去朽八分梔子炒八分酸棗仁炒麥門冬去心各一兩遠志去心辰砂五分另研調服甘草三分上銼一劑生薑三片水煎溫服驚悸脈驚悸怔忡寸動而弱寸緊胃浮悸病乃作飲食痰火伏動滑搏浮微弦濡憂驚過怯健忘神虧心虛浮薄驚悸者忽然驚惕而不安也驚悸屬血虛火動者宜養心以清火也養血安神湯當歸身五分酒洗川芎五分白芍炒五分生地黃酒洗一錢陳皮五分白朮七分茯神一錢酸棗仁七分炒柏子仁五分炒黃連五分酒炒甘草炙三分上銼一劑水煎服安神鎮驚丸治血虛心神不安驚悸怔忡不寐等症當歸酒洗一兩白芍煨一兩川芎七錢生地酒洗兩半白茯苓去皮木七錢貝母去心二兩遠志去心七錢酸棗仁炒五錢麥門冬去心二兩黃連薑汁炒五錢陳皮去白一兩甘草二錢硃砂一兩研末飛過上為細末煉蜜丸如緑豆大每服五十丸食遠棗湯送下驚悸屬痰火而兼氣虛者宜清痰火以補虛也溫膽湯治痰火而驚惕不眠人參白朮去蘆茯神去皮木當歸酒洗生地黃酒洗酸棗仁炒麥門冬半夏薑汁炒枳實麩炒黃連酒炒竹茹山梔炒各等分甘草三分辰砂五分臨服研末調入上銼一劑姜一片棗一枚烏梅一個竹瀝調辰砂末服金箔鎮心丸治一切驚悸硃砂琥珀天竺黃各五錢膽星一兩牛黃雄黃珍珠各二錢麝香心經有熱加炒黃連當歸生地黃各二兩炙甘草五錢人參一兩去雄黃膽星麝香上為細末煉蜜為丸如皂角子大金箔為衣每服一丸用薄荷湯送下驚悸屬心虛氣虛而有痰者宜安神補虛以化痰也益氣安神湯治七情六淫相感而心虛夜多夢寐睡臥不寧恍惚驚怖痰瘈當歸一錢二分茯神去皮木二錢一分黃連八分麥門冬去心酸棗仁炒遠志去心人參黃耆蜜炙膽星淡竹葉各一錢小草六分生地黃一錢上銼一劑生薑一片棗一枚水煎服琥珀定志丸專補心生血定魄安魂扶肝壯膽管轄神魂驚戰虛弱氣乏疾並治南星半斤先將地作一坑用炭火十八斤在坑內燒紅去炭淨好酒十餘斤傾入在坑內大瓦盆蓋覆周圍以炭火擁定勿令泄氣次日取出為末真琥珀一兩皂角水洗去油大辰砂二兩公豬心割開入內用線縛住懸胎煮酒二碗人乳用薑汁製楝參三兩白茯苓三兩去皮白茯神去皮木三兩石菖蒲二兩豬膽汁炒遠志水泡去心二兩豬膽汁煮過曬乾用薑汁製上為極細末煉蜜為丸如梧桐子大每夜臥時鹽湯送下五七十丸曬乾人乳法用人乳數碗入瓦盆內莫攪動四圍曬乾刮一處干則再刮乳干以薑汁拌曬用辰砂寧志丸治勞神過度致傷心血驚悸怔忡夢寐不寧若有人來捕捉漸成心疾甚至癲狂者辰砂二兩用無灰酒三升煮酒將盡留二盞用之遠志去心石菖蒲去毛酸棗仁炒乳香炙當歸身酒洗各七錢人參五分白茯神去皮木七錢白茯苓去皮七錢共搗細末用豬心一個研如泥入前藥末並煮辰砂酒攪勻丸如緑豆大每服六七十丸臨臥以棗湯送下虛煩巢氏病源曰心煩不得眠者心熱也但虛煩不得眠者膽寒也虛煩者心胸煩擾而不寧也加味溫膽湯治病後虛煩不得臥及心膽虛怯觸事易驚短氣悸乏半夏泡七次三錢半竹茹枳實麩炒各一錢半陳皮二錢二分茯苓甘草各一錢一分酸棗仁炒遠志去心五味子人參熟地黃各一錢上銼一劑薑棗煎服竹葉石膏湯治大病後表裡俱虛內無津液煩渴心躁及諸虛煩熱與傷寒相似但不惡寒身不疼痛不可汗下宜服之方見傷寒不寐健忘驚悸怔忡失志不寐心風皆從痰涎沃心以致心氣不足若用涼劑太過則心火愈微痰涎愈盛而病益深宜理痰氣高枕無憂散治心膽虛怯晝夜不睡陳皮半夏薑製白茯苓去皮枳實麩炒竹茹麥門冬去心龍眼肉石膏各一錢半人參五錢甘草一錢半上銼一劑水煎服酸棗仁湯治多睡及不睡酸棗仁和皮微炒人參去蘆白茯苓去皮各等分上銼一劑水煎如不要睡即熱服如要睡即冷服膽虛不眠寒也用酸棗仁炒為末竹葉煎湯調服膽實多睡熱也用酸棗仁生為末茶薑汁調服一小兒十五歲因用心太過少寐驚悸怔忡惡寒先用補中益氣湯茯苓酸棗遠志惡寒漸止又用加味歸脾湯驚悸少安又用養心湯而痊邪祟脈乍疏乍數乍大乍小或促或結皆邪脈也脈緊而急者遁尸丹溪曰俗云沖惡者謂沖斥邪惡鬼崇而病也如此病者未有不因氣血先虧而致者焉血氣者心之神也神既衰乏邪因而入理或有之按此恐指山谷狐魅而言若夫氣血兩虛痰滯心胸妨礙升降不得運行以致十二官各失其職視聽言動皆為虛妄以邪治之其人必死可不審乎秦承祖灸鬼法治一切驚狂譫妄逾垣上屋罵詈不避親疏等症以病者兩手大拇指用細麻繩扎縛定以大艾炷置於其中兩介甲及兩指角肉四處著火一處不著即無效灸七壯神效辟邪丹治沖惡怪疾及山谷間九尾狐貍精為患人參茯苓遠志鬼箭九節菖蒲白朮蒼朮當歸各一兩桃奴即桃樹上不落者十二月收者焙乾五錢雄黃另研辰砂另研各三錢牛黃另研一錢金箔二十片或加麝香一錢上並以桃奴已上諸藥為細末入雄黃辰砂牛黃三味末子和勻以酒調米粉打糊為丸如龍眼大金箔為衣臨臥以木香湯化下一丸諸邪不敢近體更以絳紗囊盛五七丸懸床帳中尤妙有人得病之初便譫言或發狂六部無脈然切大指之下寸口之上卻有動脈者此謂之鬼脈乃邪崇為之也不用服藥但宜符咒治之或從俗送鬼神亦可厥證脈陽厥脈滑而沉實陰厥脈細而沉伏厥者其脈短也逆者手足厥冷也其症不一散之方書者甚多今始撮其大概且如寒熱厥逆者而為陰陽二厥也陽厥者是熱深則厥深蓋陽極則發厥也急宜六一順氣湯治之陰厥者始得之身冷脈沉四肢厥逆足踡臥唇口青或自利不渴小便色白此其候也治以四逆理中之類仍速灸關元百壯鼻尖有汗為度凡初得病身熱頭痛大小便閉或畏熱或飲水或揚手擲足煩躁不得安臥譫語昏憒而厥此陽厥也宜大柴胡六一順氣湯治之渴者白虎湯主之如得病後四肢厥冷脈沉而細足攣臥而惡寒引衣蓋覆不欲水或下利清穀而厥者陰逆也四逆湯厥逆脈不至者通脈四逆湯手足指頭微寒者謂之清理中湯無熱症而厥當歸四逆湯加吳茱萸生薑湯喘促脈伏而厥五味子湯吐利手足厥冷煩躁欲死吳茱萸湯六一順氣湯大柴胡湯白虎湯已上三方俱見傷寒四逆湯理中湯已上二方俱見中寒濁證脈兩尺脈洪數必便濁遺精心脈短小因心虛所致必遺精便濁濁者小便去濁也有赤濁有白濁其狀漩面如油光彩不定漩腳澄下凝如膏糊小便如米泔者如粉糊者如赤膿者皆是濕熱內傷又腎經虛損而成濁也瘦人是虛火肥人是濕痰流下滲入膀胱猶如天氣寒則水澄清天氣熱則水混濁濁之為病濕熱之本明矣赤濁者心虛有熱也清心蓮子飲治心中煩躁思慮憂愁抑鬱小便赤濁或有沙漠夜夢遺精遺瀝澀痛便赤如或酒色過度上盛下虛心火上炎肺金受克故口苦咽乾漸成消渴四肢倦怠男子五淋婦人帶下赤白五心煩熱此藥溫平清火養神祕精大有奇效石蓮肉人參各二錢半黃耆蜜炙赤茯苓各二錢麥門冬去心地骨皮黃芩車前子各一錢半甘草上盛下虛加酒炒黃柏知母各一錢又方治心經伏暑小便赤濁人參去蘆減半白朮去蘆赤茯苓去皮豬苓澤瀉香薷石蓮肉麥門冬去心各等分上銼一劑水煎空心溫服白濁者腎虛有寒也萆薢飲川萆薢益智仁石菖蒲烏藥各等分一方加茯苓甘草上銼一劑水煎入鹽一捻空心服滋腎散治白濁初起或半月者極效川萆薢麥門冬去心遠志去心黃柏酒炒菟絲子酒炒五味子酒炒各等分上銼一劑竹葉三個燈草一團水煎空心服赤白濁者水火之不分也水火分清飲治赤白濁益智萆薢石菖蒲赤茯苓車前子豬苓澤瀉白朮去蘆陳皮枳殼麩炒麻黃各等分甘草三分上銼一劑半酒半水煎空心溫服久病去麻黃易升麻瘦人赤白濁者是虛火也滋陰降火湯治瘦人虛火患赤白濁方見虛勞依本方加白朮萆薢牛膝山梔萹蓄去芍藥肥人赤白濁者是濕痰也二陳湯治肥人濕痰赤白濁方見痰症依本方加蒼朮白朮人參當歸生地麥冬山梔黃柏萆薢牛膝萹蓄一白濁足三陰經主之屬厚味濕熱所致者用加味清胃散方見牙齒若肝腎虛熱者用六味丸為主方見補益佐以逍遙散方見婦人虛勞若脾腎虛熱者用六味丸佐以六君子湯方見補益脾肝鬱滯者六味丸佐以歸脾湯方見健忘脾肺氣虛者六味丸佐以補中益氣湯方見補益濕痰下注者補中益氣湯佐以六味丸方見補益汪少宰頭暈白濁余用補中益氣加茯苓半夏愈而後患腰痛用山藥山茱萸五味萆薢遠志頓愈又因心勞盜汗白濁以歸脾湯加五味而愈後不時眩暈用八味丸痊愈遺精脈遺精白濁當驗於尺結芤動緊二症之的微澀精傷洪數火逼亦有心虛左寸短小脈遲可生急疾便夭邪客於陰神不守舍故心有所感夢而後泄也其後有三年少氣盛鰥曠矜持強制情欲不自覺知此泄如瓶之滿溢者也人或有之是為無病勿藥可矣心家氣虛不能主宰或心受熱陽氣不收此泄如瓶之側而出者也人多有之其病尤輕合用和平之劑臟腑積弱真元久虧心不攝念腎不攝精一泄如瓶之罅而漏者也人少有之其病最重須當大作補湯或謂夢泄尤甚於房勞此世俗習聞其說也獨不觀候之有輕重乎外此又有一輩神氣消磨怪異橫生風邪乘其虛鬼氣干其正往往與鬼魅交通是又厄運之不可曉者也法藥相助誠哉是言久無色欲而精神滿者不必慮也心有所慕而夢遺者君火動相火隨也夜夢與人交感而精泄者謂之夢遺俱用後方清心湯黃連生地黃當歸石蓮肉遠志甘草水泡去心茯神去皮木酸棗仁炒人參去蘆各等分甘草減半上銼一劑水煎服有不因夢而精自出者此精道滑也因心腎內虛不能固守皆相火動養心湯辰砂另研末調入服遠志去心酸棗仁石蓮肉芡實蓮蕊天門冬桔梗去蘆車前子龍骨各等分甘草減半麥門冬去心上銼一劑燈心二十寸水煎服治陰虛火動而遺精者宜滋陰降火也保精湯治陰虛火動夜夢遺精或虛勞發熱當歸酒洗川芎白芍酒炒生地黃薑汁炒黃柏酒炒知母蜜炒黃連薑汁炒梔子童便炒沙參麥門冬去心乾薑炒黑減半牡蠣火煅山茱萸酒蒸去核各等分上銼一劑水煎空心溫服有夢遺日久氣下陷者宜升提腎氣以歸原也歸元散人參去蘆白朮去蘆茯苓去皮遠志去心酸棗仁炒麥門冬去心黃柏童便炒知母童便炒芡實蓮花須枸杞子陳皮川芎各等分升麻減半甘草減半上銼一劑蓮肉三個棗子一枚水煎空心服固精丸當歸酒洗熟地黃山藥炒人參去蘆白朮去蘆茯苓去皮鎖陽牡蠣蛤粉黃柏酒炒知母酒炒杜仲酒和薑汁炒椿根皮破故紙酒炒各一兩上為細末煉蜜為丸辰砂為衣如梧桐子大每服五十丸空心酒吞下有濕熱而遺精者宜健脾除濕熱也豬肚丸治遺精夢泄不思飲食健肢體及治肌瘦氣弱咳嗽漸成勞嗽並宜服之白朮去蘆炒五兩苦參去紅皮色白者三兩牡蠣左顧者煅另為末四兩上為末用獖豬肚一具洗淨砂罐內煮得極爛石臼內搗半日丸如小豆大每服四十丸半湯送下日進三次或四次久服自覺身強體健而夢遺立止虛弱人患夢遺精滑者宜補心腎也辰砂既濟丸治元陽虛憊精氣不固夜夢遺精盜汗遺精者服此藥大補元氣澀精固陽神效黃耆鹽水炒人參當歸酒洗山藥枸杞子鎖陽敗龜板酥炙牡蠣酒浸一宿煅各二兩熟地酒洗四兩牛膝去蘆酒洗知母酒炒各一兩半破故紙鹽水炒一兩二錢黃柏酒炒一兩上為末用白朮八兩水八碗煎至一半取渣再易水煎漉淨合煎至二碗成膏和丸如梧桐子大辰砂為衣空心鹽湯下或酒下七十丸用乾物壓之夢遺精滑屬肝腎虛熱者用四物湯加柴胡山梔山茱萸山藥方見補益脾胃氣虛者用補中益氣湯加山茱萸山藥思慮傷脾者兼用歸脾湯加山茱萸山藥方見補益心腎不交者用水火分清飲方見濁症心氣虛熱者用清心蓮子飲方見濁症氣血虛損者用十全大補湯加山茱山藥五味麥門方見補益補遺方止遺精盜汗法用短床或蒲羅內側身曲腿而臥不許伸腳病自安保生丹治夜夢遺精旬無虛夕或經宿而再者嫩烏藥益智仁硃砂另研水飛過留一半為衣以上各一兩乾山藥二兩上各另為末將山藥打糊為丸如不成再加些酒糊丸如梧桐子大每服百丸空心淡鹽湯送下倒陽法夜半子時分陽正興時仰臥瞑目閉口舌頂上齶將腰拱起用左手中指頂住尾閭穴用右手大指頂住無名指根拳著又將兩腿俱伸兩腳十趾俱摳提起一口氣心中存想脊背腦後上貫至頂門慢慢直至丹田方將腰腿手腳從容放下如再行照前而陽衰矣如陽未衰再行兩三遍如初行時陽未興勉強興之方可行矣夫人之所有虛實者因年少欲心大盛房事過多水火不能相濟以致此疾若能行此法不唯速去泄精之病久而腎水上升心火下降則水火既濟永無疾病矣陳桂林秀才患夜夢遺精每月一二次或三五次遺後神思昏沉身體困倦豫診六脈微澀無力此陰虛火動之症以辰砂既濟丸加紫河車龍骨服之數月奏效奈其數患於不能謹守因口占俚語一章以戒之曰培養精元貴節房更祛塵纍最為良食唯半飽宜清淡酒止三分勿過傷藥餌隨時應勉進功名有分不須忙幾行俚語君能味便是長生不老方朱工部勞則遺精齒牙即痛用補中益氣加半夏茯苓芍藥並六味地黃丸漸愈更以十全大補加麥門五味而痊方見補益一男子遺精白濁口乾作渴大便閉澀午後熱甚用補中益氣加芍藥玄參並加減八味丸而愈方見補益淋證脈淋病之脈細數何妨少陰微者氣閉膀胱女人見之陰中生瘡大實易愈虛澀其亡氣淋者小便澀常有餘瀝也沙淋者莖中痛努力如沙石也血淋者尿血結熱莖痛也膏淋者尿出似膏也勞淋者勞倦即發也五淋者皆膀胱蓄熱也五淋散治肺氣不足膀胱有熱水道不通淋瀝不出或尿如豆汁或如沙石或冷淋如膏或熱淋尿血皆效赤茯苓六兩赤芍十兩山梔十兩當歸去蘆五兩條芩三兩生甘草五兩上銼水煎空心服一方有生地澤瀉木通滑石車前子八正散治心經蘊熱臟腑閉結小便赤澀癃閉不通及熱淋血淋如酒後恣欲而得者則小便將出而痛既出而痛以此藥主之大黃瞿麥木通滑石萹蓄梔子車前子甘草各等分上銼一劑燈心水煎空心服五淋者因酒色勞力傷腎虛中有熱也必效散治一切淋症隨症加減當歸生地黃酒洗赤茯苓去皮滑石牛膝去蘆山梔麥門冬去心枳殼黃柏酒炒知母酒炒萹蓄木通各等分甘草減生上銼一劑燈草一團水煎空心服血淋加菖蒲茅根汁膏淋加萆薢氣淋加青皮勞淋加人參熱淋加黃連肉淋加連翹石淋加石葦尿淋加車前死血淋加桃仁牡丹皮玄胡索琥珀去黃柏知母老人氣虛作淋加人參黃耆升麻少許去黃柏知母滑石萹蓄海金沙散治五淋一服如神當歸酒洗大黃酒浸川牛膝酒洗木香雄黃海金沙各等分上為細末每服一錢半臨臥好酒調服兩服痊愈酒欲過傷而成淋者宜升補真氣也補中益氣湯治五淋有效然淋症多是膀胱之氣虛損不能運用水道固滯不通而成諸淋也此方補元氣故有效焉方見內傷益元固真湯治縱欲強留不泄淫精滲下而作淋者人參白茯苓蓮蕊巴戟升麻益智仁黃柏酒炒各二錢山藥澤瀉各一錢半甘草稍二錢上銼一劑水煎空心服補遺方治淋兼紅淋當歸生地黃熟地黃各二錢黃柏知母黃芩各一錢黃連炒木通桑白皮各一錢半上銼一劑水煎空心服治小便淋瀝不通用六味丸倍茯苓澤瀉方見補益若小便澀滯或莖中作痛屬肝經濕熱者用龍膽瀉肝湯方見下疳李司馬莖中作痛小便如淋口乾唾痰此思色精降而火敗用補中益氣湯六味地黃丸而愈方見補益男子莖中痛出白津小便閉時作癢用小柴胡方見傷寒加山梔澤瀉炒黃連木通膽草茯苓又兼六味丸而痊方見補益關格關格病者膈中覺有所礙欲升不升欲降不降升降不通飲食不下此因氣之橫格也乃是痰格中焦用枳縮二陳湯加減治之痰出為要此病多死寒在上而熱在下也又曰關者不得小便格者吐逆上下俱病者也關者甚熱之氣無出之由也熱在下焦填塞不便格者甚寒之氣無入之理也寒在胸中遏絶不入枳縮二陳湯治關格上下不通枳實麩炒一錢砂仁七分白茯苓去皮貝母去心陳皮蘇子炒瓜蔞仁厚朴薑汁炒香附童便炒各七分撫芎八分木香五分沉香五分甘草三分上銼一劑生薑三片水煎入竹瀝磨沉木香服遺溺經云膀胱不約為遺溺小便不禁常常出而不覺也人之漩溺賴心腎二氣之所傳送蓋心與小腸為表裡腎與膀胱為表裡若心腎氣虧傳送失度故有此症小便自遺失禁者溺出而不知也遺溺失禁者屬氣虛用參耆湯加減老人溺多者是虛寒用參附湯加減壯人溺多者是虛熱用滋陰降火湯加減夏月因伏暑熱溺必遺也用人參白虎湯加減中風症遺尿失禁者難治也參耆湯治氣虛遺溺失禁人參去蘆黃耆蜜水炒茯苓去皮當歸酒洗熟地黃白朮去蘆陳皮各一錢升麻肉桂各五分益智仁八分甘草三分上銼一劑姜三片棗一枚水煎空心服年老之人虛寒遺溺者多加附子名參附湯治身體虛瘦夜啼遺溺失禁人參八分白朮麩炒山茱酒蒸去核黃耆蜜水炒白芍酒炒各一錢山藥炒酸棗仁炒各七分甘草炙四分上銼一劑水煎溫服治小水頻數此症皆下元氣虛所致人參五錢黃柏五錢酒浸益智仁六錢甘草一錢上為細末煉蜜為丸梧桐子大五更臨臥每服五十丸滾水下酒亦可滋陰降火湯治虛熱尿多方見虛勞依本方加炒山梔子去五味子人參白虎湯治夏月因伏暑熱遺尿者方見暑症依本方加黃柏知母去香薷若小便頻數或勞而益甚屬脾氣虛弱用補中益氣湯加山藥五味子方見補益若小便無度或淋瀝不禁乃陰挺痿痹也用六味丸去澤瀉用益智仁方見補益小便閉脈小便不通浮弦而澀芤則便紅數則黃赤便難為癃實見左尺小便不通者多是熱結也豬苓湯治熱結小便不通木通豬苓澤瀉滑石枳殼炒黃柏酒浸牛膝去蘆麥門冬去心瞿麥車前子各等分甘草稍減半萹蓄葉十片上銼一劑燈心一團水煎空心服不渴而小便閉者熱在下焦血分也通關丸治不渴而小便閉熱在下焦血分兼治淋癃神效黃柏酒洗焙乾知母酒洗焙乾一兩肉桂一錢上俱為細末熟水和丸如梧桐子大每服百丸空心白滾湯下服後須頓兩足令藥易下行也如小便已利莖中如刀刺痛當有惡物下為驗若渴而小便閉者熱在上焦氣分也清肺飲子治渴而小便不利者是熱邪在上焦肺之分故不利也肺者金也金合生水若肺中有熱不能生水是絶其水源治宜淡滲之劑以清肺之氣泄其火邪滋水之上源也赤茯苓去皮錢半豬苓二錢澤瀉一錢通草二錢燈草一錢車前子炒另研一錢琥珀另研五分萹蓄七分木通七分瞿麥七分上銼一劑水煎空心稍熱服虛寒小便不通者是寒結也加味五苓散治虛寒小便不通豬苓澤瀉白朮去蘆赤茯苓去皮肉桂當歸枳殼牛膝去蘆木通各等分甘草稍減半上銼一劑燈心一團水煎空心服虛熱小便不通者是熱結也參歸升麻湯治虛人小便不通人參去蘆當歸生地黃赤茯苓去皮豬苓澤瀉山梔枳殼去穰牛膝去蘆酒洗黃柏酒炒知母酒炒各等分升麻少許甘草減半上銼一劑燈心一團水煎空心服年老之人小便不通者多是氣短血虛也四物湯加黃耆煎湯送下通關丸空心服咳喘小便不通者是痰氣塞也二陳湯治痰氣閉塞小便不通陳皮半夏薑汁炒茯苓枳殼麩炒牛膝去蘆豬苓木通山梔麥門冬去心車前子黃柏酒炒各等分甘草減半上銼一劑燈心一團水煎空心服元氣虛而不能輸化者宜補中益氣湯方見補益陰虛而小便不通者是火盛也滋陰降火湯治虛怯人陰虛火動小便不通方見虛勞六味丸尤效依本方加豬苓澤瀉木通牛膝大抵小便不通用利水藥不效者此積痰在肺肺為上焦膀胱為下焦上焦閉則下焦塞如滴水之器上竅通而下竅之水出焉若瀉痢小便不通者因後去多而前去少瀉止後而尿自長也若嘔噦小便不通者難治也若中滿臌脹病小便不通者亦難治也治老人下元虛冷轉胞不得小便膨急切痛四五日困篤欲死者六味丸倍澤瀉效方見補益補遺祕方治小便不通麝香半夏末填臍中上用蔥白螺螄二味搗成餅封臍上用布帛縛定下用皂角煙入陰中自通女人用皂角煎湯洗陰戶內導赤湯治溺如米泔色不過二服即愈木通滑石甘草稍黃柏茯苓生地黃枳殼白朮梔子水煎空心服治小便下墜好麻三兩扯碎火焙用新盆一個蓋在上升作灰黃酒調下被蓋出汗即愈治小便不通用皮硝一合連須蔥一根搗為一處用青布攤在上似膏藥樣用熱瓦尉之即出大便閉脈燥結之脈沉伏勿疑熱結沉數虛結沉遲若是風燥右尺浮肥身熱煩渴大便不通者是熱閉也久病人虛大便不通者是虛閉也因汗出多大便不通者精液枯竭而閉也風證大便不通者是風閉也老人大便不通者是血氣枯燥而閉也虛弱併産婦及失血大便不通者血虛而閉也多食辛熱之物大便不通者實熱也並宜後方潤腸湯治大便閉結不通當歸熟地生地麻仁去殼桃仁去皮杏仁去皮枳殼厚朴去粗皮黃芩大黃各等分甘草減半上銼一劑水煎空心熱服大便通即止藥不能多服如修合潤腸丸將藥加減各為末煉蜜為丸如梧桐子大每服五十丸空心白湯吞下切忌辛熱之物實熱燥閉依本方發熱加柴胡腹痛加木香血虛枯燥加當歸熟地桃仁紅花風燥閉郁李仁皂角羌活氣虛而閉加人參郁李仁氣實而閉加檳榔木香痰火而閉加瓜萎竹瀝因汗多或小便去多津液枯竭而閉加人參麥門冬老人氣血枯燥而閉加人參鎖陽麥門冬郁李仁倍加當歸熟地生地少用桃仁産婦去血多枯燥而閉加人參紅花倍加當歸熟地去黃芩桃仁此方加檳榔即通幽湯蜜導法用火煉蜜稠厚黃色傾入水中急捻如指大隨用皂角末麝香共為衣將油塗抹大便潤濕放入穀道大便即通豬膽汁導法治自汗小便利而大便燥硬不可攻以此法導之豬膽一枚傾去一小半仍入醋在內用竹管相接套入穀道中以手指捻之令膽汁直射入內少時即通蓋酸苦益陰以潤燥也香油導法治大便不通腹脹死在須臾用竹管蘸蔥汁深入大便內以香油一半溫水一半同入豬尿胞內捻入竹管將病人倒放腳向上半時即順立通一大便閉結若大腸血虛火熾者用四物湯送下潤腸丸或以豬膽汁導之若腎虛火燥者用六味丸若腸胃氣虛用補中益氣湯二方俱見補益一男子年六十七歲因氣惱左邊上中下有三塊時動而脹痛喜揉揉即散去心痞作嘈食下胃口覺澀夜臥不寧小便澀大便八日不通一醫以大承氣湯一醫以化滯丸一用豬膽導法一用蜜導法俱不效余診六脈弦數有力此血不足氣有餘積熱壅實以大黃末三錢皮硝五錢熱燒酒調服打下黑糞其硬如石數十條如前又一服又打下糞彈盆許遂安後以四物湯加桃仁紅花酒蒸大黃黃連梔子三稜莪朮枳殼青皮木通甘草十數劑而愈大小便閉大小便俱不通者前後熱結也顛倒散治臟腑實熱或小便不通或大便不通或大小便俱不通大黃六錢滑石三錢皂角三錢上為末黃酒送下如大便不通依前分兩服如小便不通大黃三錢滑石六錢皂角如前如大小便俱不通黃石均分皂角如前蜣螂散治大小便不通六七月間尋牛糞中大蜣螂不拘多少用線串起陰乾收貯用時取一個要完全者放淨磚上四面以灰火煨乾以刀從腰切斷如大便閉用上半截如小便閉用下半截各為末新汲水調服二便俱閉則全用之八正散方見淋症鐵腳丸治大小便不通皂角去皮子炙不拘多少為末酒攪麵糊為丸如梧桐子大每服三十丸酒下蝸牛膏治大小便不通用蝸牛三枚連殼研為泥再加麝香少許貼臍中以手揉按之立通若用田螺搗爛填臍中亦妙余用此方治大小便不通及熱閉者殊效掩臍法治大小便不通連須蔥一根不洗帶土生薑一塊淡豆豉二十粒鹽二匙同研爛捏餅烘熱掩臍以帛扎定良久透氣自通不然再易一方治大小便不通用蜜一鍾入皮硝二錢滾白湯一鍾空心調下大小便不通木通為末黃酒送下大人多用小人少用丁香散治大小便不通如神苦丁香五錢川烏炮草烏香白芷牙皂炮細辛各三錢胡椒一錢麝香少許上為細末用竹筒將藥吹入肛門內即通痔漏腸澼為痔如大澤中有小山突出為痔凡人於九竅中但有小肉突起皆曰痔不特於肛門邊生者名之亦有鼻痔眼痔牙痔等其狀不一方分五種曰牡曰牝曰脈曰腸曰氣牝痔者肛門邊生瘡腫突出一日數枚膿潰即散牡痔者肛門邊發露肉珠狀如鼠奶時時滴漬膿血脈痔者腸口顆顆發㿔且痛且癢血出淋瀝腸痔者肛門內結核有血寒熱往來登溷脫肛氣痔者遇恐怒則發肛門腫痛氣散則愈又有酒痔每遇飲酒發動瘡即腫痛而流血血痔者每遇大便則血出而不止宜解熱調血順氣為主若久而不愈必至穿穴為漏矣痔瘡成㿔不破也當歸連翹湯治痔漏當歸連翹防風黃芩荊芥白芷芍藥生地山梔白朮人參阿膠地榆各等分甘草減半上銼一劑烏梅一個棗一枚水煎食前服黑白散黑牽牛白牽牛各一錢半上二味各取頭末各一錢半用公豬腰子一個竹刀破開去筋膜入藥末在內線扎紙裹水濕灰火內煨熟去紙空心嚼吃至已時腹中打下先膿後血毒氣出盡永不再發必須忌半日飲食消毒百應丸治痔漏瘡並臟毒神效大梁孫都督傳方蒼朮黃柏槐花金銀花當歸皂角各四兩上六味切片分作四分每分用水七碗煎至四碗去渣留藥汁浸大黃片一斤浸一宿次日取出安篩內曬乾如此將四次水浸曬盡為度將大黃為細末麵糊為丸如梧桐子大每一次六十四丸空心熟白水送忌厚味胡椒燒酒之類釣腸丸治新久諸痔肛邊腫痛或生瘡癢時有膿血又治腸風下血及脫肛瓜萎二個燒灰存性刺蝟二個刺罐內燒灰存性白雞冠花五兩銼微炒白礬枯緑礬枯胡桃仁十五個不油者燒存性白附子生天南星生枳殼去穰麩炒大附子生去皮臍訶子煨半夏各二兩上為末麵糊為丸如梧桐子大每服二十丸空心臨臥溫酒送下遠年不愈者十日見效久服永除根並治腸風等疾二三年者連服十餘貼永不再發臟連固本丸凡膏梁富貴之人患痔甚多必干於飲食色欲所致及有火酒犯房若要除根必須服此兼戒醇酒厚味寡欲方可痊矣懷生地六兩乾山藥四兩茯苓三兩去皮牡丹皮三兩澤瀉二兩山茱萸四兩去核黃連四兩黃柏三兩知母去毛二兩人參二兩當歸二兩皂角二兩槐角三兩天花粉二兩上為末用獖豬大腸頭一段去油灌入藥末兩頭線扎住用糯米一升煮飯將半熟撈起入甑內將藥腸盤藏於飯之中如蒸飯之熟待冷些時取出去兩頭無藥之腸將藥腸搗爛為丸如硬加些飯搗丸如梧桐子大每服百丸空心白湯送下洗痔漏神方花椒艾葉蔥白五倍子皮硝馬齒莧茄根上各等分銼碎水煎先熏後洗當時痛止指日可愈又方神效用隨河柳條根上須一把花椒芥菜子三味不拘多少煎水先熏後洗其蟲頭黑身白俱從痔瘡而出立愈敷洗藥皮硝炒燥五倍子炒黃柏豬膽汁炒黃連滑石各二錢血竭乳香沒藥蜜陀僧荊芥各三錢先將皮硝五倍子煎湯洗患處後將藥為細末燥滲無水出芝油調敷漏者潰出膿血也神雷丸治漏蕪荑仁五分雷丸白者五分鶴蝨一錢木賊黃芩防風茄子各五分當歸酒洗龜板酒洗鱉甲酒洗蟬退蠶退各三分小枳實酒洗三分大黃少許皂角刺二十個用黃蠟三錢炒上共作一服水一大鐘烏梅一個竹葉七片無灰酒半鍾煎至八分空心溫服用干煎精豬肉壓之服至八服筋根出蟲後去皂角刺蟬退不用外用生肌藥白龍骨五分赤石脂五分二味用雞胚胵皮包入豬蹄角內火煅過去胵角不用將二味為末入前湯藥內每帖加二味藥一錢再服四帖除根忌酸辣雞魚麵筋發毒動風之物其餘不忌酒亦少用忌燒酒節欲色戒惱怒濟生蓮蕊散蓮蕊一兩錦紋大黃黑牽牛取頭末各二兩二錢當歸五倍子礬紅各一錢黃連三錢乳香沒藥各一錢上為細末欲服藥先一日勿吃晚飯次日空心用淡豬肉汁一鍾好酒一鍾半和豬肉汁稱前藥末一錢二分調服午後於淨黃土上疏宣時見出毒物為驗或如爛杏五色相雜亦為驗矣如散藥難服用酒糊丸如緑豆大每服一錢五分此方神效不可輕忽切忌燒酒色欲惱怒及羊魚大肉發物千金不易治漏仙方芫花根川烏草烏南星半夏血竭乳香沒藥各三錢將上八味藥用水數碗煮至二碗於後麝香四釐黃蠟一錢孩兒茶二錢片腦二釐用黃絲線合過街蜘蛛絲用篾作圈網之合絲搓成線入藥水煮為度用豬鬃引線穿入漏內俟大便後帶出線來扎緊一日緊三遍待八九日線落而肉平矣如孔多者醫好一孔外用此方內服後平臟丸除根平臟丸治漏瘡旬日見效黃連酒炒枳殼麩炒地榆槐角各一兩蓮蕊當歸各三錢側柏葉一錢京墨燒存性五錢乳香沒藥各二錢上為末水丸每服百丸空心白湯送下漸減至六十丸止若加黑醜頭末五錢共丸尤效白銀錠子治漏止有一孔者用此藥不過十日痊愈又不作痛神效白芷三兩白礬一兩上二味共研為細末鐵杓熔成餅再入炭火煅令淨煙取出去火毒為末用麵糊和為錠子成條插入漏內直透里痛處為止每一日上三次至七日為止至九日瘡結痂而愈如漏未痊用後生肌藥生肌藥乳香沒藥輕粉海螵蛸用三黃湯煮過寒水石煅龍骨煅各等分上為細末摻患處止用太平膏太平膏防風荊芥梔子連翹黃芩大黃羌活獨活當歸生地赤芍甘草金銀花五倍子兩頭尖頭髮各二錢白芨白蘞山慈菰各一兩香油一斤上銼細入油內浸一晝夜用文火熬焦去渣滓再熬滴水不散用上好黃丹水飛過炒黑用半斤入內再熬滴水成珠為度待溫冷再入乳香沒藥輕粉血竭各二錢為末於內攪勻如藥色嫩再入官粉五錢亦佳務要看其火色不老不嫩得所為妙隔礬灸法治痔漏神效皂礬一斤用瓦一片兩頭用泥作一壩再用香油制瓦上焙乾再著皂礬瓦上煅枯去砂為末川山甲一錢入紫粉罐煅存性取出為末木鱉子去殼火煅二錢半淨為末乳香沒藥各錢半為末臨灸時加服上藥和勻一處以冷水調量瘡大小作餅子貼瘡上將艾炷灸三四壯灸畢就用熏洗藥先熏後洗日六度三五日如前法灸妙以瘥為度熏洗方前法灸畢以此方熏洗皂礬製法如前為末約手塊二把知母四兩焙乾為末取一兩貝母四兩為末取三兩淨蔥七莖另煎湯上件先將蔥用水煎三四沸傾入瓶內再入前藥令患者坐於上瓶口熏之待水溫傾一半洗瘡留一半候再灸再熏洗以瘥為度攻毒丸治痔漏用有子蜂房焙乾存性為末麵糊為丸如豌豆大每服二十丸空心黃酒送下補遺祕方治痔漏祕方當歸八分川芎五分芍藥八分生地黃一錢荊芥七分烏梅一個防風條芩枳殼去穰槐角黃連升麻各五分上銼一劑水煎空心溫服治痔漏效方用極嫩木耳溫水略煮取出曬乾為細末初服一錢五分用蜜水調服一日加一分加至三錢每服倒退一分服至一月通好要忌口若穿臀漏極痛者用魚鰾搗為泥貼之其痛即止祕傳神應膏治痔漏如神片腦熊膽血竭牛黃乳香沒藥各五分上為細末用蝸牛取肉搗成稀膏每夜洗淨拭乾將此膏搽上患處數遍即愈若蝸牛無鮮者用乾的放水碗內泡一宿去殼內自然成肉將前六味藥要極細末以蝸牛肉共搗不要乾了要稀稠得所用磁罐收貯固封勿使風塵在內則不效矣熏洗痔漏卻毒湯五倍子花椒防風側柏葉枳殼蔥白蒼朮各三錢瓦松馬齒莧甘草各五錢皮硝一兩上用水五碗煎至三碗先熏後洗一日三次牛黃金花散黃連黃芩黃柏各一錢為細末真牛黃三分上共研細如痔瘡用蜜水調搽上不過四五次如是捻成錠子曬乾量瘡眼大小納入不過二七即好一男子患痔膿血淋漓口乾作渴晡熱便血自汗盜汗余謂此腎肝陰虛也不信仍服四物湯柏知母之類食少瀉嘔余先用補中益氣湯加茯苓半夏炮姜脾胃漸醒後用六味丸朝夕而服兩月餘諸症悉愈二方俱見補益懸癰懸癰者此瘡生於穀道外腎之間初發甚癢狀如松子四十日赤腫如桃遲治則破而大小便皆從此出不可治矣國老湯用橫紋大甘草一兩截作三寸許取出山澗東流水一碗不可用井水河水以甘草蘸水文武火慢炙不可急性須用三時久水盡為度劈看草中潤透卻以無灰酒二碗煮至一碗溫服半月消盡為度將軍散大黃煨貝母去心白芷甘草節各等分上為細末酒調二錢空心服虛弱加當歸減半體氣祕傳奇方治體氣大田螺一個生者巴豆去殼膽礬一兩麝香少許上將螺用水養三日去泥土揭起螺靨入礬豆麝在內以線拴定於瓷器內次日化成水須五更時將藥水抹在腋下不住手抹藥直候腹中覺響臟腑欲行住手先要揀空地內去大便黑糞極臭是其驗也以厚土蓋之不可令人知之如不盡再以藥水抹之又去大便以日用後藥擦之永拔病根枯礬蛤粉五錢章腦一錢為末每以少許擦之烏龍丸治腋氣當歸酒洗生地黃各一兩白茯苓去皮二錢枸杞子炒石蓮肉焙各一兩蓮蕊焙五錢丁香三錢木香青木香乳香京墨各五錢冰片一分如婦人加烏藥醋炒香附童便炒各三錢上為末陳米飯荷葉包燒過搗爛入藥為丸如黃豆大麝香一分黃酒化為衣每服三四十丸臨臥半飢半飽用砂仁炒入黃酒內送下收功後藥人參當歸生耆乳香沒藥官桂木香麝香已上八味酒浸過青皮陳皮白芷良薑麻黃米殼甘草各一錢上銼一劑水煎服出汗外用川椒枯礬各一兩為末擦腋下終身忌鱖魚羊肉去大小便不可與女人同廁治腋臭用自己小便洗一次米泔洗二次自然薑汁每日擦十次一月之後可以斷根治腋氣香白芷枯礬花椒減半黃丹各等分上共為末擦之不臭治腋氣五更時用精豬肉二大片以甘遂末一兩拌之挾腋下至天明以生甘草一兩煎湯飲之良久瀉出穢物須在荒野之處則可恐穢氣傳人故也依法三五次即愈虛弱者間日為之其他蜜陀僧胡粉之類皆塞竅以治其末耳治狐臭方麝香巴豆去殼木通去皮上為末每服一錢重醉子酒熬膏為丸金箔為衣空心水酒調化一丸服之以淨桶盛腹內打下穢物急蓋閉勿聞神效脫肛脫肛者肺臟蘊熱肛門閉結肺臟虛寒肛門脫出用參耆湯加減凡瀉痢久虛或老人氣血虛憊或産婦用力過度俱有脫肛也小兒亦有脫肛症者脫肛症者肛門翻出虛寒脫出參耆湯人參黃耆蜜水炒當歸生地黃白朮去蘆芍藥炒茯苓去皮各一錢升麻桔梗陳皮各五分甘草炙五分肺臟虛寒加乾薑炒五分上銼一劑薑棗煎食前服大凡脫出肛門不收用熱尿洗後用烘熱鞋底揉進恐遲則冷燥難進或用冰片點上亦收浮萍散於秋暮取霜露打過浮萍不拘多少以淨瓦攤開陰乾其瓦一日一易不可見日務要陰乾用紙包起凡有前疾者臨時研為細末先取井中新汲水洗淨脫出肛次以藥末摻上其肛徐徐即進一時即愈不拘男婦大小兒並治脫肛方五倍子炒黃為末放熱鞋底上抵之即收一春元素有痔每勞役便脫肛腫痛出水中氣下陷用補中益氣湯加茯苓芍藥十餘劑中氣復而愈後復脫作痛誤用大黃丸腹鳴惡食幾危余用前湯加炮薑芍藥諸症漸愈後去姜加熟地五味三十餘劑而愈諸蟲脈脈沉實者生虛大者死夫脈沉而滑者為寸白蟲慝蝕陰痛脈虛小者生徑急者死外臺云蟲脈當沉弱而弦今反洪大即知蛔蟲甚也古云濕熱生蟲正如今人俗驗禾苗雨灑日照禾節生蟲此說明矣人患蟲積或飢餓調攝失宜或過腥鱠白酒或炙食牛羊或啖鱉莧中脘氣虛濕氣少運故生寸白蛔厥諸蟲形如蚯蚓相似團魚曰血鱉小兒最多大人間有為患嘈雜腹痛嘔吐涎沫面色痿黃眼眶鼻下青黑以致飲食少進肌肉不生沉黑寒熱蟲不早治相生不已古云蟲長一尺則能殺人蟲若貫心殺人甚急治宜選方而用諸蟲者腸胃中濕熱所生也追蟲丸木香檳榔蕪荑錫灰各一錢史君子肉二錢大黃二錢牽牛末一兩先將皂角與楝樹根皮二味濃煎二大碗煎熬成膏和前藥末為丸如梧桐子大將沉香末為衣後又將雷丸末為衣子每服五十丸空心砂糖湯送下追取蟲積即愈追蟲取積散檳榔末二錢黑醜頭未二錢陳皮末八分木香末五分上為末共研勻每服五錢小者三錢砂糖湯送下五更服三四次以米湯補之忌魚腥油膩之物三五日五仙方治諸蟲如神大黃四兩皂角雷丸苦楝根各一兩木香上為末酒糊丸每服三四十丸茶下治蛔蟲方用苦楝根刮去外粗皮取內白二兩以水三碗煮取一碗半去渣用晚粳米三合煮粥空心先以炒肉一二片吃引蟲向上然後進藥粥一二口少頃又吃一二口漸漸加一碗或二碗其蟲盡下而愈治腹中有寸白蟲棐子一斤陸續去殼用不拘男婦大人小兒如有此疾者用此果去殼陸續吃用盡一斤其蟲從大便中出用淨桶接著是雄者自一條是雌者大小不等或三五條或六七條不止只是還要吃一斤此蟲方絶出盡若蟲出後其人宜好酒飲食調理不半月精神顏色身胖如初也治蟲方使君子火煨十個去熱水送下其蟲盡出
