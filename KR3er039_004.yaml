body:
  text: 卷之四補益脈平脈弦大勞損而虛大而無力陽衰易扶數而無力陰火難除寸弱上損浮大里枯尺寸俱微五勞之軀血羸左濡氣怯右推左右微小血氣無餘勞瘵脈數或澀細如潮汗咳血肉脫者殂內經曰久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋若夫七情五心之火飛越男女聲色之欲過淫是皆虛損之所由也機要曰虛損之疾寒熱因虛而感也感寒則損陽陽虛則陰盛凡損自上而下一損損於肺皮聚而毛落二損損於心血脈虛少不能榮於臟腑婦人則月水不通三損損於胃飲食不為肌膚治宜以辛甘淡過於胃則不可治矣感熱則損於陰陰虛則陽盛若損自下而上一損損於腎骨痿不能起於床二損損於肝筋緩不能自收持三損損於脾飲食不能消克治宜以苦酸鹹過於脾則不可治矣又曰心肺損而色憊腎肝損而形痿難經曰治損之法損其肺者益其氣損其心者補其榮血損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精皆是虛損病因治法之大要也四君子湯治脾胃虛弱飲食少思或大便不實體瘦面黃或胸膈虛痞痰嗽吞酸或脾胃虛弱善患瘧痢等症人參去蘆白朮去蘆茯苓去皮各二錢甘草炙一錢上銼一劑生薑三片棗一枚水煎溫服加陳皮名異功散六君子湯治脾胃虛弱飲食少思或久患瘧痢若覺內熱或飲食難化作酸屬虛火須加炮姜其功甚速即前方加半夏陳皮香砂六君子湯即六君子加香附藿香砂仁四物湯治血虛發熱或寒熱往來或日晡發熱頭目不清或煩燥不寐胸膈作脹或脅作痛尤當服之當歸酒浸熟地黃各三錢白芍二錢川芎一錢五分上銼一劑水煎溫服加味四物湯即前方加山梔柴胡牡丹皮八珍湯治肝脾傷損血氣虛弱惡寒發熱或煩躁作渴或寒熱昏憒或胸膈不利大便不實或飲食少思小腹脹滿等症人參白朮茯苓當歸川芎白芍熟地黃各一錢甘草炙五分上銼一劑薑棗煎服加黃耆肉桂各一錢名十全大補湯十全大補湯治氣血俱虛發熱惡寒自汗盜汗肢體倦怠或頭痛眩暈口乾作渴又治久病虛損口乾少食咳而下利驚悸發熱或寒熱往來盜汗自汗晡熱內熱遺精白濁或二便見血小腹作痛小便短少大便乾澀或大便滑泄肛門下墜小便頻數陰莖癢痛等症補中益氣湯治中氣不足或誤服克伐四肢倦怠口乾發熱飲食無味或飲食失節勞倦身熱脈洪大而無力或頭痛惡寒自汗或氣高而喘身熱而煩脈微細軟弱自汗體倦少食或中氣虛弱而不能攝血或飲食勞倦而患瘧痢等症因脾胃虛而不能愈者或元氣虛弱感冒風寒不勝發表宜用此代之或入房而後勞役感冒或勞役感冒而後入房者急加附子愚謂人之一身以脾胃為主脾胃氣實則肺得其所養肺氣既盛水自生焉水升則火降水火既濟而令天地交泰之會矣脾胃既虛四臟俱無生氣故東垣先生著脾胃內外傷等論諄諄然皆以固脾胃為本所制補中益氣湯又冠諸方之首觀其立方本旨可知矣故曰補腎不若補脾正此謂也前所言治症概舉其略余當仿此而類推之是方之妙並注以表明之人參黃耆蜜炒白朮炒甘草炙各一錢半當歸一錢陳皮五分柴胡升麻各二分上銼一劑薑棗水煎空心午前服六味丸一名地黃丸一名腎氣丸治腎虛作渴小便淋閉氣壅痰涎頭目眩暈眼花耳聾咽燥舌痛腰腿痿軟等症及腎虛發熱自汗盜汗便血諸血失喑水泛為痰之聖藥血虛發熱之神劑又治腎陰虛弱津液不降敗濁為痿或治咳逆又治小便不禁收精氣之虛脫為養血滋腎制火導水使機關利而脾土健實熟地黃八兩杵膏忌鐵器山茱萸酒蒸去核乾山藥各四兩牡丹皮白茯苓去皮澤瀉各三兩上各另為末和地黃膏加煉蜜為丸如梧桐子大每服一百丸空心滾水送下八味丸治命門火衰不能生土以致脾胃虛寒飲食少思大便不實或下元冷憊臍腹疼痛夜多漩溺即前方加肉桂附子各一兩而經云益火之源以消陰翳即此藥也加減八味丸治腎水不足虛火上炎發熱作渴口舌生瘡或牙齦潰蝕咽喉作痛或身體憔悴寢汗發汗五臟齊損即六味丸加肉桂一兩五味子四兩加減金匱腎氣丸治脾腎虛腰重腳腫小便不利或肚腹脹痛四肢浮腫或喘急痰盛已成蠱症其效如神此症多因脾胃虛弱治失其宜元氣復傷而變症者非此藥不能救白茯苓三兩川牛膝酒洗去蘆肉桂澤瀉車前子山茱萸酒蒸去核山藥牡丹皮附子制五錢熟地黃四兩拍碎酒浸杵膏上為細末和地黃加煉蜜為丸如梧桐子大每服七八十丸空心米飲送下加味八珍丸大補血氣壯脾胃益虛損當歸酒洗二兩南芎一兩二錢白芍酒炒一兩半熟地黃酒蒸曬乾二兩人參去蘆二兩白朮去蘆炒二兩白茯苓去皮二兩粉草蜜炙七錢陳皮二兩驚悸怔忡加遠志甘草水泡去骨二兩酸棗仁炒一兩陰虛火動屬虛勞者去人參一兩加黃柏知母俱酒炒各一兩上為細末用首男胎衣一具長流水洗淨次入麝香二三分再揉洗用布絞乾以好酒二升煮極爛如泥和前藥如干再入酒糊為丸如梧桐子大每服百丸空心鹽湯送下或酒亦可晚上米湯下天真丸治一切虛損形容枯槁四肢羸弱飲食不進腸胃溏瀉津液枯竭久服生血補氣暖胃和脾駐顏延壽羊肉二斤五兩四錢去筋膜皮用竹刀劈開肉蓯蓉三兩四錢鮮山藥三兩四錢當歸酒洗四兩天門冬去心三兩四錢無灰好酒十壺上四味為末入放羊肉內裹定線縛入酒內煮令肉爛如泥取出再入嫩黃耆蜜炒為末一兩六錢四分人參末一兩白朮末六錢四分糯米炒熟為末三兩四錢共一處搗勻為丸如梧桐子大每服百餘丸溫酒送下鹽湯亦可早晚各進一服並治一切亡血過多虛弱等疾大有其功效補天大造丸滋養元氣延年益壽壯陽元滋坎水為天地交泰若虛煩之人房室過度五心煩熱服之神效平常之人年過四十以來服之接補以躋期頤仙地紫河車一具此乃渾沌皮也取男胎首生者佳如無得壯盛婦人産者亦好先用米泔水將紫河車浸輕輕擺開換洗令淨不動筋膜此乃初結之真氣也將竹器全盛長流水浸一刻以生氣提回以小瓦盆全盛木甑內蒸文武火蒸極熟如糊取出先傾自然汁在藥末內略和勻此天元正氣汁也將河車放石臼內木杵擂千餘下如糊樣通將藥汁同和勻搗千餘杵集衆手為丸此全天元真氣以人補人最妙世所少知醫用火焙酒煮及去筋膜又入龜板大誤故特出之懷生地黃酒浸一兩五錢懷熟地黃酒蒸二兩麥門冬泡去心一兩五錢天門冬泡去心一兩五錢牛膝去蘆酒洗一兩枸杞子七錢五味子七錢當歸酒洗一兩杜仲去皮酥炙一兩半小茴香酒炒一兩川黃柏去皮酒炒一兩白朮去蘆炒一兩陳皮去白八錢乾薑泡二錢側柏葉採向東嫩枝條隔紙焙乾二兩如血虛加當歸地黃倍之如氣虛加人參黃耆蜜炙各一兩如腎虛加覆盆子炒小茴香巴戟去心山茱萸去核如腰痛加蒼朮鹽水炒萆薢瑣陽酥炙續斷酒洗如有骨蒸加地骨皮知母酒炒如婦人去黃柏加川芎香附條芩俱酒炒各一兩上為細末用蒸紫河車汁並河車共搗為末丸如梧桐子大凡藥必稱淨末忌鐵器俱用石臼椿杵或石磨磨之不耗散為妙且遠鐵器若河車肥大量加些藥末不必用蜜每日空心米湯送下一百丸有病者一日二服延齡固本丹治五勞七傷諸虛百損顏色衰朽形體羸瘦中年陽事不舉精神短少未至五旬鬚髮先白並左癱右瘓步履艱辛腳膝疼痛小腸疝氣婦人久無子息下元虛冷天門冬水泡去心麥門冬水泡去心生地黃酒洗熟地黃酒蒸山藥牛膝去蘆酒洗杜仲去皮姜酒炒巴戟酒浸去心五味子枸杞子山茱萸酒蒸去核白茯苓去皮人參木香柏子仁各二兩老川椒石菖蒲遠志甘草水泡去心澤瀉各一兩肉蓯蓉酒洗四兩覆盆子車前子菟絲子酒炒爛搗成餅焙乾地骨皮各一兩半婦人加當歸酒洗赤石脂煨各一兩上為細末好酒打稀麵糊為丸如梧桐子大每服八十丸空心溫酒送下服至半月陽事雄壯至一月顏如童子目視十里小便清滑服至三月白髮返黑久服神氣不衰身輕體健可升仙位祕傳經驗藥酒方八珍酒和氣血養臟腑調脾胃解宿酲強精神悅顏色助勞倦補諸虛久服百病消除比他香燥藥酒大不同也當歸全用酒洗三兩南芎一兩白芍煨二兩生地黃酒洗四兩人參去蘆一兩白朮去蘆炒三兩白茯苓去皮二兩粉草炙一兩半五加皮酒洗曬乾八兩小肥紅棗去核四兩核桃肉四兩上藥咀片共裝入絹袋內用好糯米酒四十斤煮二炷香埋淨土中五日夜取出過三七日每晨午夕溫飲一二小盞神仙延壽酒一治症同前虛人有熱者宜此生地黃二兩熟地黃二兩天門冬去心二兩麥門冬去心二兩當歸二兩牛膝去蘆酒洗二兩杜仲去皮酒和薑汁沙二兩小茴鹽酒炒二兩巴戟水泡去心二兩枸杞子二兩肉蓯蓉二兩破故紙炒一兩木香五錢砂仁一兩南芎二兩白芍煨二兩人參五錢白朮去蘆油一兩白茯苓去皮二兩黃柏酒炒三兩知母去毛酒炒二兩石菖蒲五錢柏子仁五錢遠志甘草水泡去心一兩上銼用絹袋盛藥入壇內用酒六十斤煮三炷香為度取出埋土中三日夜去火毒每隨量飲之固本遐令酒治症同前虛人無熱者宜此當歸酒洗巴戟酒浸去心肉蓯蓉酒洗杜仲酒炒去絲人參去蘆沉香小茴酒炒破故紙酒炒石菖蒲去毛青鹽木通山茱萸酒蒸去核石斛天門冬去心熟地黃陳皮狗脊菟絲子酒浸蒸牛膝去蘆酸棗仁炒覆盆子炒各一兩枸杞子二兩川椒去子七錢神麯炒二兩白豆蔻木香各三錢砂仁大茴益智去殼乳香各五錢虎脛骨酥炙二兩淫羊藿四兩要新者糯米一升大棗一升生薑二兩搗汁遠志甘草水泡去心一兩新山藥四兩搗汁用小黃米明流燒酒七十斤上各依製為末糯米棗肉黏飯同薑汁山藥汁煉蜜四兩和成塊分為四塊四絹袋盛之入酒罈內浸二十一日取出熱服早晚各飲一二盞數日見效仙酒方一用小麥六十四斤一半炒熟入新布口袋內懸井中浸七日取出曬乾再入生麥一半磨面聽用一用黃精九蒸九曬八兩為末聽用一用懷慶熟地黃八兩生地黃八兩枸杞子八兩同為末聽用一用淡秋石八兩聽用一用紅鉛六錢四分為末聽用一用精壯女子乳汁十六碗同面藥末添長流水調合成塊或五月五日六月六日用紙包裹緊密另放在冷靜空房陰乾七日造仙酒每用百花蕊一十六斤即蜂蜜同河水十六斤井水十六斤此陰陽水一同入銀鍋內煎熟好淨鐵鍋亦可待冷聽用亦用酒娘三斤即新酒糟未入水者同面二斤打爛同入瓷缸內用香椿枝攪二三遍用紙封口三四日開口用椿枝每日攪二三遍前後十日酒熟細袋濾過澄清名為仙酒扶衰仙鳳酒治男婦小兒諸虛百損五勞七傷瘦怯無力及婦人赤白帶下神效用肥線雞一隻將繩吊死退去毛屎不用將雞切四大塊再切入生薑四兩膠棗半斤用好酒五六壺共三味裝入一大壇內將泥封固壇口重湯煮一日涼水拔出火毒每服以空心將雞酒連薑棗隨意食之其效如神徐國公仙酒方張尚書傳於龔預源頭釅好燒酒一罈龍眼去殼二三斤入酒內浸之日久則顏色嬌紅滋味香美專補心血善壯元陽療怔忡驚悸不寐等症早晚各隨量飲數杯悅顏色助精神大有補益故名仙酒紅顏酒一名不老湯胡桃仁泡去皮四兩小紅棗四兩白蜜四兩酥油二兩杏仁泡去皮尖不用雙仁煮四五沸曬乾一兩上用自造好燒酒一金華壇先以蜜油溶開入酒隨將三藥入酒內浸三七日每早服二三杯甚妙仙茅酒仙茅四兩出四川用米泔水浸去赤水盡日曬淫羊藿洗盡四兩南五加皮四兩酒洗淨上銼劑用黃絹袋盛懸入無灰酒一中壇內三七日後取早晚飲一二杯殊效駐世珍饈常用補虛當歸酒洗南芎白芍酒炒熟地黃菟絲子酒製巴戟酒浸去心肉蓯蓉酒洗益智仁酒炒牛膝去蘆酒洗杜仲姜酒炒去絲山藥青鹽大茴山茱萸酒蒸去核枸杞子酒洗川椒炒乾薑甘草炙上各等分為細末用獖豬肉不拘多少切片酒炒熟入藥再炒不可用水磁器收貯空心食之好酒送下忌生冷取龍虎水法龍屬水虎屬金即童男童女取之時謹擇有五種不用男五種者生逮半變瀆也生者外腎不舉逮者聲雄皮粗變者腥膻狐臭半者黃肥多病瀆者疥癩瘡疽女五種者羅紋服交脈也羅者陰戶上有橫骨紋者狐臭體氣服者實女也交者聲雄發粗皮膚粗糙無顏色脈者瘡痍病患殘疾二鼎器務宜擇眉清目秀滿月之相三停相等唇紅齒白發黑聲清膚肥細膩年方十三四十五六未破者用黍稷稻梁紅豆紅棗犽豬肉鯽魚等味與彼食之忌蔥蒜韭薤五葷三厭穢汗二水戒喧譁手舞足蹈耗散精華未取之時先調百日十月起三月止置瓷缸磁壇於僻處收貯以蓋之積至二三石聽候煉用陰煉龍虎石將前積二水置瓷缸三四口或五六口於靜僻通溝去處每缸置於五六分龍虎水加井水五分下白礬白朮各二兩松柏葉各二兩取楊柳根三四莖一扎順攪千餘下蓋之勿動看待水澄清去蓋逼去清水又加井水滿缸以絹濾去渣又攪二三百轉蓋之澄清又盡逼去清水仍加井水又攪又逼又濾如此十餘次直待水香為止逼去盡用米篩三四個內鋪白綿紙將渾龍虎石取入篩內候水乾移在日色內處以竹刀劃成骨牌路曬乾如粉之白即是陰煉龍虎石瓷盒收貯合藥用此藥能補心生精養血之至藥也陽煉龍虎石擇露天空地砌灶二眼坐東朝西安三尺二寸二尺四寸大鍋兩口鍋近處安缸四口先積下龍虎水二缸或三缸方洗淨鍋鏽先於大鍋內入五瓢慢火熬至起沫以罩濾去滓撤去油末直待熬至不起沫方起鍋於小鍋內細火熬大鍋內仍添二三瓢又熬去沫又起小鍋內如此少少漸添漸起以盡為度大鍋住火小鍋慢慢火熬用鏟子不住手鏟待水乾成膏上用一小盆合住鍋口周圍用泥封固嚴密止留一孔出水氣看水氣盡孔內飛出金星青氣急以泥封孔眼缸底用濕布一方不可水大多隻以水潤之小火燒至鍋底紫色退火冷定至第二日先去口上泥淨揭開升在缸上的已汞靈藥紅黑白各色另收聽候用另打黃芽將鍋底內黑膏子剷起另入一小鍋內磚支起大火燒待黑煙盡連鍋通紅退火晾冷酌量下井水或露水尤妙燒滾先置淨缸一口於室內上安竹篩內鋪綿紙濾瀝清水入缸篩內黑滓不用將濾下清水看如水清碧就磁盆煎出淨石來如略有些黃色還用前小鍋煎乾再煅一火晾冷仍下水煎滾照前濾入缸內直看濾下水如井水一般清碧以瓷盆用磚去支起徐徐添炭火煎前淋瀝的清水滾以竹鏟不住手鏟只待煎鏟焙乾略待潮取出傾在紙上移於日色處曬乾似雪之白即是陽煉龍虎石取紅鉛法擇十三四歲美鼎謹防他五種破敗不用五種者羅紋服交脈也羅者陰戶上有大橫骨不便採擇一也紋者體氣發黃癸水腥羶不堪制用二也服者實女無經三也交者聲雄皮粗氣血不清四也脈者多病瘡疽經中帶毒五也有此五種非為補益之妙丹務擇眉清目秀齒白唇紅發黑面光肌膚細膩不瘦不肥三停相等好鼎算他生年月日起約至五千四十八日之先後先看他兩腮如桃紅花額上有光身熱氣喘腰膝痠痛困倦呻吟即是癸將降矣先預備絹帛兒槌洗或羊胞做橐籥或用金銀打就的偃月器或候他花開與他系合陰門令他於椅凳上平坐不可斜倚如覺有紅取下再換一付多餘處用絹帛來展更換收入瓷盆內待經盡同制上法五千四十八日近有十三歲而來十六七而至何也皆因稟受父精母血厚薄不同亦有長成因受乳食致令氣血各有不平故難以期定惟在觀他動靜察他形色是其期也如得年月應期乃是真正首經至寶實為接命上品之藥如前後不等只作首鉛初至金鉛二次紅鉛三次以後皆屬後天紅鉛只堪制配合藥不宜單作服食既明採取之法聽後製服三腥五膻濁氣必須仔細修煉方成至藥者焉制紅鉛法先將烏梅一斤煎水一桶去梅核冷定如取得有紅鉛或器或帛俱入梅缸內洗下用烏梅水時先看紅鉛有一個止用梅水三碗或多或少隨意加減不可太過不及梅水洗下來鉛再加井水或河水用大瓷盆令滿以木棍攪數十轉用蓋蓋之勿動待水清輕輕逼去清水將澄下鉛仍加水又打又攪又澄如此七次或九次數足逼去水盡止剩得紅漿一碗或半碗取淨灰用盆盛貯中剮一孔量容多少以軟絹鋪紙把鉛漿傾入紙上蔭水盡方取於日色處曬乾此即制服腥膻穢垢之法方合入藥配合服專主助血養神其功甚大收貯聽用制金乳粉法擇美鼎先看嬰童肥白有精神者即是氣血盛而乳可用矣亦用頭生二八三七才可摘取過期血弱不可用也取下一碗或半碗對露水均平攪百遭過夜其乳自分逼去水將乳入瓷盆內曬乾碾細成粉漸取漸制積得半斤四兩聽候配紅鉛成丹也三元丹治諸虛百損補氣生精安魂定魄益壽延年紅鉛嬌乳各一兩辰砂乳香各一錢虛無秋石一錢用便盆或新磚自生者方可上俱為細末用雞子一個磕一孔將青黃傾出用紙展浮裝前藥入內紙糊嚴密放群蛋內與雞抱之三七取出乳和為丸如梧桐子大每服三丸五更時人乳送下稍有汗出不可見風神仙小聖藥紅鉛半盞真女首經更佳二三次出者次之其色紅黃為上純紅者為中紫黑者不用硃砂五錢用辰州豆片者佳有精神為最先將紅鉛取來拌入硃砂放瓷盆內日曬月照四十九日畢飛仙池文武火升三炷香其藥透蔑過一邊冷定開看與金箔相似用雞翎掃下約一分八釐為上等其次一分二釐以烏金紙包入小眼藥罐內以黃蠟封口外尿胞皮通身包裹仍放大瓶內以綿絮塞緊仍用竹葉尿脬緊扎用絡以長繩引入井中去火毒四十九日取出擇吉日將藥置於桌上南向香紙供獻俱南向用好乳香末半分研細末以人乳二三滴將聖藥和勻作三丸服者對天南向跪拜祝畢舉藥入口將人乳送下即歸室中靜養三七日然後方許出門動作鬚髮如銀俱皆變黑服藥一度可延壽一紀彭祖小接命熏臍祕方夫人稟天地之靈氣賴精血而化生陰陽交媾胚胎始凝如太極之未判似混沌之未分男子之左腎先具外精裹血而陰焉中處女子之右腎先具外血裹精而陽焉內存腎乃生脾脾次生乎肝肝乃生肺肺復生乎其心凡在其內四門皆閉九竅不通唯有其臍則與母氣相通母呼則呼母吸則吸十月胎定百神具備而與母分離剪臍落地猶恐臍竅不閉有傷嬰兒之真氣隨用艾火熏蒸外固臍蒂之堅牢內保真氣而不漏漸長成人四門皆開九竅俱啓因七情六欲之牽誘五味五音之感通真元喪失真氣破傾人之幼年血氣衰敗精神羸弱漸覺有患或生冷厚味傷其六腑喜怒哀樂損於五臟致使心腎不交陰陽偏盛五勞七傷漸進著體七癥八瘕陸續沾身染患日久殞軀喪命良可嘆也譬諸草木皆稟天地而生根壯枝盛本弱木衰若水灌土培根潤而復生矣人至中年氣血漸衰疾病易起止知療患不知壯根固本之法人生塵世返不如草木而能回生也凡人生育之時臍帶一落用艾火以熏蒸即得堅固人之中年以後患臨其身如草木復其澆培以法熏蒸其臍豈不去惡除疾而保生也余哀憫後人不終天年而夭喪特傳濟世之方普授延年之妙藥壯固根蒂保護形軀熏蒸本原卻除百病蠲五臟之痛患保一身之康寧其中藥品稟性忠良採陰陽之正氣配君臣之輔佐其效如神其應如響復有回生濟世之功保命延年之妙此方遇高尚賢士可傳勿示匪人恐遭天遣保而敬之每年中秋日熏蒸一次卻疾延年徹上部之火邪去心腸之宿疾婦人月信不調赤白帶下男子下元虧損遺精白濁陽事不舉並皆熏之如熏蒸之時令人飽食舒身仰臥用蓧麥面水和捏一圈徑過寸余如臍大者三二寸內入藥末用槐皮一塊去粗皮止用半分厚覆圈藥之上如豆大艾壯灸之百脈和暢毛竅皆通上至泥丸下至湧泉冷汗如雨久之覺飢再食再灸不可令痛痛則反泄真氣灸至行年數歲為止無病者連日灸之有病者三日一次灸至腹內作聲作痛大便有涎沫等物出為止只服米湯兼食白肉黃酒以助藥力若患風氣有鬱熱在腠理者加女子紅鉛拌藥則易汗出而疾隨愈槐皮如覺焦色即易新的凡灸之後容顏不同效應可驗今將製藥品味開列於後乳香沒藥豭鼠糞一頭有尖者是青鹽兩頭尖川續斷各一錢麝香二分上共為細末用益壽比天膏此藥最能添精補髓保固真精不泄善助元陽滋潤皮膚壯筋骨理腰膝下元虛冷五勞七傷半身不遂或下部虛冷膀胱病症腳膝痠麻陽事不舉男子貼之行步康健氣力倍添奔走如飛女子貼之能除赤白帶下沙淋血崩兼下生瘡癤能通二十四道血脈堅固身體返老還童專治喘戶遇鼎氣不泄真精大臻靈驗非至仁不可輕泄其妙如神鹿茸附子去皮臍牛膝去蘆虎脛骨酥炙蛇床子菟絲子川續斷遠志肉肉蓯蓉天門冬去心麥門冬去心杏仁生地熟地官桂川楝子去核山茱萸去核巴載去心破故紙杜仲去皮木鱉子去殼肉豆蔻紫稍花穀精草穿山甲大麻子去殼各一兩甘草二兩淨末看衆藥焦枯方下桑槐柳枝各七寸上銼細用真香油一斤四兩浸一晝夜慢火熬至黑色用飛過好黃丹八兩黃香四兩入內柳棍攪不住手再下雄黃倭硫龍骨赤石脂各二兩將銅匙挑藥滴水成珠不散為度又下母丁香沉香木香乳香沒藥陽起石煅蟾酥啞芙蓉各二錢麝香一錢為末共攪入內又下黃蠟五錢將膏貯磁罐內封口嚴密入水中浸五日去火毒每一個重七錢紅絹攤開貼臍上或兩腰眼上每一個貼六十日方換其功不可盡述九天靈應散治男子陰濕陽痿每逢不舉黑附子蛇床子紫稍花遠志菖蒲海螵蛸木鱉子丁香各二錢朝腦一錢五分上為末每用五錢水三碗煎至一碗半溫洗陰囊並濕處日洗二次留水溫洗多洗更好虛勞脈骨蒸勞熱脈數而虛熱而澀小必殞其軀加汗加嗽非藥可除虛怯症者皆因元氣不足心腎有虧或勞傷氣血或酒色過度漸至真陰虧損相火隨旺火旺則消灼真陰而為嗽為喘為痰為熱為吐血衄血為盜汗遺精為上盛下虛腳手心熱皮焦午後怕寒夜間發熱或日夜不退或嘈雜怔忡嘔噦煩躁胸腹作痛飽悶作瀉痞塊虛驚面白唇紅頭目眩暈腰背痠疼四肢困倦無力小水赤色脈來數大或虛細弦急怪症多端犯此難治虛勞不受補者難治咽喉聲啞生瘡者難治久臥生眠瘡者難治皆是陰虛火動俱用滋陰降火湯加減或清離滋坎湯後服滋陰清化膏六味地黃丸之類愈後用坎離既濟丸乃收功保後之藥也勞症者元是虛損之極痰與血病先起於陰怯已後成勞治藥一同勞脈數大而虛又有傳尸勞瘵之症乃臟中有蟲嚼心肺者名曰瘵此是傳尸疰骨勞疰者注也自上疰下骨肉相傳乃至滅門者亦有之矣虛勞者陰虛而相火動也陰虛火動者難治虛勞不受補者難治滋陰降火湯治陰虛火動發熱咳嗽吐痰喘急盜汗口乾此方與六味地黃丸相兼服之大補虛勞神效當歸酒洗一錢二分白芍酒洗二錢三分生地黃八分熟地黃薑汁炒天門冬去心麥門冬去心白朮去蘆各一錢陳皮七分黃柏去皮蜜水炒知母各五分甘草炙五分上銼一劑生薑三片大棗一枚水煎臨服入竹瀝童便薑汁少許同服骨蒸勞熱者陰虛火動也加地骨皮柴胡如服藥數劑熱不退加炒黑乾薑三分盜汗不止者氣血衰也加黃耆酸棗仁炒痰火咳嗽氣急生痰加桑白皮紫菀片芩竹瀝咳嗽痰中帶血者難治也加片芩牡丹皮阿膠梔子紫菀犀角竹瀝乾咳嗽無痰及喉痛生瘡聲啞者難治也加片芩瓜萎仁貝母五味子杏仁桑白皮紫菀梔子咳嗽痰多津液生痰不生血也加貝母款冬花桑白皮喉痛生瘡聲音不清或咽乾燥虛火盛也用山豆根磨水噙之再用吹喉散噙化丸若見咽喉痰火壅喉熱腫下者同治痰火作熱煩躁不安氣隨火升也並痰火怔忡嘈雜加酸棗仁黃芩炒黃連竹茹辰砂竹瀝痰火驚惕同治血虛腰痛加牛膝杜仲血虛腳腿枯細無力痿弱加黃耆牛膝防己杜仲去天門冬夢遺泄精者虛火動也加山藥牡蠣杜仲故紙牛膝去天門冬小便淋濁加車前瞿麥萆解萹蓄牛膝山梔去芍藥陰虛火動小腹痛者加茴香木香少許去麥門冬論陰虛火盛脾虛者宜滋陰降火健脾也清離滋坎湯治陰虛火動咳嗽發熱盜汗痰喘心慌腎虛脾弱等症生地黃熟地黃天門冬麥門冬俱去心當歸酒洗白芍酒炒乾山藥山茱萸酒蒸去核白茯苓去皮牡丹皮白朮去蘆澤瀉黃柏知母甘草炙盜汗加酸棗仁牡蠣嗽盛加五味子款冬花痰盛加貝母瓜萎仁熱盛加地骨皮玄參心慌加遠志酸棗仁遺精加龍骨牡蠣煅胸中不快加陳皮泄瀉加蓮肉陳皮去知母黃柏上銼劑水一碗半煎至一碗空心溫服痰盛加竹瀝一盞薑汁一二匙熱加童便一盞入藥同服如吐血咳血加鮮生地黃搗汁一盞同服此病陰血太虛每日五更飲人乳汁一鍾甚妙與湯藥相間服之久久奏效陰虛火動為諸症者宜丸藥兼而濟之也六味地黃丸治形骸瘦弱無力多困腎氣久虛寢汗發熱五臟齊損遺精便血消渴淋濁等症此藥不燥不溫專補左尺腎水兼理脾胃少年水虧火旺陰虛之症最宜服之懷熟地黃薑汁浸焙乾八兩乾山藥四兩山茱萸酒浸去核四兩白茯苓去皮三兩牡丹皮三兩澤瀉三兩治心腎不交消渴引飲加五味子二兩麥門冬三兩名腎氣八味丸虛勞加紫河車一具兼補右尺相火加附子官桂各二兩名八味丸如遇傷於陰致相火盛者加黃柏酒炒三兩知母鹽水炒三兩上為細末煉蜜為丸如梧桐子大每服七八十九空心淡鹽湯下腎水不能攝脾土多吐痰唾薑湯下凡年幼被誘欲太早者根本受傷及稟賦薄者又斫喪之過隱諱不敢實告以致元氣虛憊或遺精盜汗神疲力怯飲食不生肌肉面白五心發熱夏先畏熱冬先怕寒腰疼膝重頭暈目眩故曰水一虧則火必勝火旺則肺金受克而痰嗽矣或勞汗當風面出粉刺已上症見虛損成矣宜以此藥服之可保無虞矣咳嗽痰喘不絶聲者急則治其標也玄霜雪梨膏生津止渴除咯血吐血嗽血久不止及治勞心動火勞嗽久不愈消痰止嗽清血歸經雪梨六十個去心皮取汁二十鍾酸者不用藕汁十鍾鮮生地黃搗取汁十鍾麥門冬搗爛煎汁五鍾蘿蔔汁五鍾茅根汁十鍾上六汁再重濾去滓將清汁再入火熬煉入蜜十六兩飴糖八兩薑汁半酒盞入火再熬如稀糊則成膏矣如血不止咳嗽加側柏葉搗汁一鍾韭白汁半鍾茜根汁半鍾俱去滓入前汁內煎成膏服之陰虛火動而後嗽者緩則治其本也滋陰清化膏清痰火滋化源肺腎乃人身之化源生地黃酒洗熟地黃酒浸天門冬去心麥門冬去心各一兩白茯苓去皮一兩山藥炒一兩枸杞子白芍藥酒炒各一兩五味子七錢黃柏鹽酒炒一兩知母鹽水炒玄參薏苡仁炒各一兩甘草生五錢上為細末煉蜜為丸如彈子大每服一丸空心津液噙化咽下有盜汗加黃耆蜜炙七錢痰嗽甚加陳皮貝母各一兩陰虛發熱嗽血大便結者此虛火盛也坎離膏治勞瘵發熱陰虛火動咳嗽吐血唾血咯血咳血衄血心慌喘急盜汗黃柏知母四兩生地黃熟地黃天門冬去心麥門冬去心各二兩杏仁去皮七錢胡桃仁去皮尖淨仁四兩蜂蜜四兩先將黃柏知母童便三碗側柏葉一把煎至四碗去渣又將天麥門冬生熟地黃入汁內添水二碗煎汁去渣再搗爛如泥另用水一二碗熬熟絞汁入前汁將杏仁桃仁用水擂爛再濾勿留渣同蜜入前汁內用文武火熬成膏瓷罐收貯封口入水內去火毒每服三五匙側柏葉湯調空心服忌銅鐵器咳嗽吐血喘急不能食者脾肺虛損也寧嗽膏治陰虛咳嗽火動發熱咯血吐血大斂肺氣天門冬去心八兩杏仁去皮貝母去心百部百合各四兩款冬花蕊五兩紫菀三兩雪白朮去蘆油八兩上俱為粗末長流水煎三次取汁三次去渣入飴糖八兩蜜十六兩再熬又入阿膠四兩白茯苓四兩為末水飛過曬乾三味入前汁內和勻如糊成膏每服三五匙痰嗽喘熱而泄瀉者此脾憊也參苓白朮散主之方見泄瀉瑞蓮丸治元氣大虛脾胃怯弱泄瀉不止不思飲食乾山藥炒蓮肉去心皮白朮去蘆油土炒芡實去殼各二兩楝參去蘆五錢白茯苓去皮橘紅白芍酒炒各一兩甘草炙五錢上為末用豭豬肚一個洗令淨煮爛搗和藥末為丸如梧桐子大每服百丸空心米湯送下再兼服白雪膏方見內傷咳嗽喘熱而痢疾者脾腎俱憊也和中湯治虛勞赤白痢疾或腹痛裡急後重當歸身酒洗上白芍酒炒上白朮去蘆上茯苓去皮中陳皮中黃連有紅多者加黃芩炒中甘草木香少許紅痢加阿膠炒上白痢加乾薑炒黑下上銼一劑水煎食前溫服如久不止再兼服實腸散方見痢疾駐車丸治下利赤白腹痛甚者及休息痢駐者止也言藥止痢如車之駐也豫每用此治陰虛勞嗽而為痢者殊效川黃連炒三兩真阿膠蛤粉炒一兩半當歸一兩半乾薑炒黑一兩赤茯苓去皮一兩上為細末醋打稀麵糊為丸如梧桐子大每服三五十丸米湯送下痰嗽喘熱脾虛飽悶發腫者難治也分消湯主之方見臌脹病後調理者乃收功保後之劑也坎離既濟丸治陰虛火動勞瘵之疾當歸酒洗六兩南川芎一兩白芍酒炒三兩熟地黃酒蒸生地黃酒洗天門冬去心麥門冬去心各四兩五味子三兩山藥二兩山茱萸酒蒸去核四兩牛膝去蘆酒洗四兩黃柏去粗皮九兩酒炒三兩蜜水炒三兩鹽水炒三兩知母去毛酒浸二兩鹽水浸二兩龜版去邊酥炙脆微黃色三兩用卜者鑽過多上為末忌鐵器煉蜜為丸如梧桐子大每服五六十丸空心鹽湯送下補遺方噙化仙方治五勞七傷吐膿吐血吐痰咳嗽喘急甜梨汁白蘿蔔汁生薑汁白糖各二兩遼五味子去梗一兩款冬花二兩紫菀二兩桔梗二兩上共熬成膏後入人參一錢為末入前汁內和勻為丸如彈子大至晚噙化一丸不過十丸其病可痊世人唯知百病生於心而不知百病生於腎飲酒食肉醉飽入房不節欲恣意妄為傷其精腎水空虛不能平其心火心火縱炎傷其肺金是絶腎水之源金水衰虧不能勝其肝木肝木盛則克脾土而反生火火獨旺而不生化故陽有餘而陰不足其病獨熱而不久矣警世二絶酒色財氣傷人賊多少英雄被他惑若能擺脫這塵凡便是九霄雲外客浮生何事多偏性酷貪花酒傷生命一朝臥病悔噬臍使盡黃金藥不應太學劉誠庵乃郎年十八歲患虛勞熱嗽痰喘面赤自汗晝夜不能倒臥痰不絶口如此旬日命在須臾一家傍徨諸醫措手召豫診視六脈微數乃陰虛火動之症豫令其五更將壯盛婦人乳汁一鍾重湯煮溫作三四十口服之至天明服河車地黃丸一服少頃將大小米入山藥蓮肉紅棗核桃仁數個煮稀粥食之半晌又煎清離滋坎湯二劑加竹瀝童便薑汁少許頻頻服之服至午又進前粥碗許加白雪糕食之過半晌又照前藥二劑頻服至盡將晚又進前粥碗許又煎前藥二劑夜間睡則藥止醒則即服如此三晝夜藥不住口火乃漸息方得臥倒以後減卻前藥一半過半月病減十之六七每日止服湯藥一劑調理數月而愈此症危急至甚非豫用此法救之若照尋常日服一二劑者幾乎不起夫一杯之水不能救輿薪之火正此之謂也令後患此症者當照此服藥醫者當照此治之未有不愈者也其有脾胃弱而作瀉者不在此限失血脈諸症見血皆見芤脈隨其上下以驗所出大凡失血脈貴沉細設見洪大後必難治吐血衄血咳血咯血唾血溺血便血腸風臟毒血症者人身之血血為榮氣為衛心主血肝藏血脾為總管血隨氣行氣逆則血逆髒得血而能津腑得血而能潤目得血而能視舌得血而能言手得血而能握足得血而能攝榮衛晝夜循環運行不息若是勞傷火動皆令失血一切血症皆屬於熱藥用清涼俱是陽盛陰虛火載血上錯經妄行而為逆也用犀角地黃湯隨症加減鮮血者新血也用止之紫黑成塊者瘀血也宜去之已後俱用補榮湯加減調理失血脈沉細和緩不宜浮大實大血得熱則行得冷則凝赤屬火而黑屬水也見黑必止理之自然如或暴吐紫血多者無事是平昔熱傷死血在胃口吐出為好若止早吐不盡後成血結塊痛難治用活血湯加減方見腹痛若先吐血後見痰者是陰虛火動用滋陰降火湯加減若先痰後見血者是積熱清肺湯加減治之吐血者出於胃吐出全是血也犀角地黃湯治一切吐血衄血咳血咯血唾血並皆治之犀角一錢鎊牡丹皮一錢半生地黃二錢赤芍藥一錢半當歸一錢黃連一錢黃芩一錢上銼一劑水煎熟入茅根汁磨京墨調服吐血加天門冬山梔子阿膠蛤粉炒衄血加山梔阿膠咯血加山梔麥門冬黃柏知母熟地唾血加山梔麥門冬黃柏知母熟地凡吐紫黑血塊胸中氣塞加桃仁大黃治諸血上攻不問男女並治皮硝二錢為末用童便一鍾好酒一鍾燉熱化硝調勻溫服治吐血不止方將本人血聞不臭可治若臭不可治也將本人吐的血取來用砂鍋焙乾為細末每服一錢或一錢二分麥門冬去心煎湯調服七生湯治血向口鼻中出如湧泉者諸藥止之不效生地黃生荷葉生藕汁生韭葉生茅根各一兩生薑五錢俱搗自然汁一碗磨京墨與汁同服貫仲湯治吐血成鬥命在須臾貫仲二錢淨末血餘五錢燒灰側柏葉搗汁一碗上將藥末二味入柏汁內攪勻於大碗內盛之重湯煮一炷香時取出待溫入童便一小鐘黃酒少許頻頻溫服先吐痰而後見血者是積熱也清肺湯茯苓去皮陳皮當歸生地黃芍藥天門冬去心麥門冬去心黃芩山梔紫菀阿膠蛤粉炒桑白皮各等分甘草減半烏梅一個上銼一劑棗二枚水煎溫服喘急加蘇子去天門冬先吐血而後見痰者是陰虛也滋陰降火湯治吐血後見痰乃是陰虛火動方見虛勞清火滋陰湯治吐血咳血嗽血唾血嘔血天門冬去心麥門冬去心生地黃牡丹皮赤芍梔子仁黃連去毛山藥山茱萸酒蒸去核澤瀉赤茯苓去皮甘草上銼水煎入童便同服若吐血衄血咳血唾血用六味丸加犀角阿膠炒各二兩方見補益一人氣上奔吐血心膈痛枳殼三錢青皮二錢桔梗生地黃木通牡丹皮各二錢半桃仁二十八個川芎黃芩黃連各一錢甘草少許生乾薑分四劑水煎服一暴吐紫血一碗者無事吐出好此熱傷血死肝中宜服四物湯解毒之類不宜早止一吐血覺胸中氣塞吐紫血桃仁承氣湯下之方見傷寒一男子吐血遇勞即作余以為勞傷肺氣血不歸元與補中益氣湯加麥門五味山藥熟地茯神遠志服之而愈方見補益一男子咳嗽吐血熱渴痰盛盜汗遺精余以為腎水虧損用六味丸料加麥門五味以壯水而愈後因勞怒忽紫血成塊上湧先用花蕊石火煅存性為末三錢童便黃酒溫熱調服以化之又用獨參湯以補之仍用前藥調理遂愈後每勞則咳嗽有痰吐血脾肺腎三脈皆洪數用補中益氣湯加貝母茯苓山茱萸山藥麥門冬五味子與前藥間服之而愈方見補益衄血者出於肺鼻中出血也清衄湯當歸芍藥生地香附炒黃芩各一錢梔子炒一錢黃連七分赤芍桔梗各五分生甘草柏葉七枚藕節五個上銼一劑水煎入童便共服一方用人乳一半好酒童便一半合一碗重湯煮溫隨服隨止