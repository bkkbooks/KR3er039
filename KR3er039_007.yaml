body:
  text: 卷之七小兒科小兒神色總斷凡小兒病宜先觀形症神色然後察脈假如肝之為病則面青心之為病則面赤脾之為病則面黃肺之為病則面白腎之為病則面黑先要分別五臟形症次看稟受盈虧胎氣虛實明其標本而治之無不可者入門審候歌觀形察色辨因由陰弱陽強發硬柔若是傷寒雙足冷要知有熱肚皮求鼻冷便知是瘡疹耳冷應知風熱症渾身皆熱是傷寒上熱下冷傷食病五指稍頭冷驚來不可當若逢中指熱必定是傷寒中指獨自冷麻痘症相傳女右男分左分明仔細看觀面部五色面赤為風熱面青驚可詳心肝形此見脈症辨溫涼脾怯黃疳積虛寒㿠白光若逢生黑氣腎敗命須亡面部觀形察色下頦屬腎水北左腮屬肝木東額上屬心火南鼻準屬脾土中右腮屬肺金西小兒三歲以下有病須看男左女右手虎口三關從第二指側看第一節名風關第二節名氣關第三節名命關辨其紋色紫者屬熱紅者屬寒青者驚風白者疳病黑者中惡黃者脾之困也若現於風關為輕氣關為重過於命關則難治矣三關脈紋主病歌紫黑紅傷寒青驚白是疳黑時因中惡黃即困脾端又青色大小曲人驚並四足赤色大小曲水火飛禽撲紫色大小曲傷米麵魚肉黑色大小曲脾風微作搐手指脈紋八段錦魚刺形主驚風痰熱懸針形主傷風泄瀉積熱水字形主驚疳食積咳嗽乙字形主肝病驚風蟲形主肝蟲大腸穢積環形主疳積吐逆亂紋主蟲珠形主死虎口三關脈紋圖風關第一節寅位氣關第二節卯位命關第三節辰位虎口叉手處是也凡小兒至三歲以上乃用一指按寸關尺三部常以六七至為率添則為熱減則為寒浮洪風盛數則多驚沉遲為虛沉實為積小兒脈法總歌小兒有病須憑脈一指三關定息數遲冷數熱古今傳浮風沉積當先識左手人迎主外證右手氣口主內疾外候風寒暑濕侵內候乳食痰積致洪緊無汗是傷寒浮緩傷風有汗液浮洪多是風熱盛沉細原因乳食積沉緊腹中痛不休弦緊喉間作氣急緊促之時疹痘生緊數之際驚風至虛軟慢驚作瘛瘲緊實風癇發搐搦軟而細者為疳蟲牢而實者因便閉脈芤大小便中血虛濡有氣兼驚悸滑主露濕冷所傷弦急客忤君須記大小不勻為惡候二至為危三至卒五至為虛四至損六至平和曰無疾七至八至病尤輕九至十至病熱極十一二至死無疑此訣萬中無一失小兒死候歌眼生赤脈貫瞳人囟門腫起又作坑指甲黑色鼻乾燥鴉聲忽作肚青筋虛舌出口咬牙齒目多直視不轉睛魚口氣急啼不得蛔蟲既出死形真手足擲搖驚過節靈丹十救一無生魚目定睛夜死面青唇黑晝亡啼而不哭是痛哭而不啼是驚咨煎不安是煩咨啀不定是燥急驚急驚風症牙關緊急壯熱涎潮竄視反張搐搦顫動唇口眉眼牽引口中熱氣頰赤唇紅二便閉結脈浮洪數緊此內有實熱外挾風邪當截風定搐若痰熱尚作仍微下之痰熱既泄急宜調養胃氣搐定而痰熱少退即宜調補脾氣此大法也急驚屬肝風邪痰熱有餘之症也急驚者陽症也治宜解表敗毒散主之若急驚肚腹脹痛靈砂丸萬億丸之類敗毒散治急驚風初起發熱手足搐搦上宮天吊角弓反張並一切感冒風寒頭疼發熱咳嗽喘急鼻塞聲重及瘡疹欲出發搐並宜服之人參羌活獨活柴胡前胡茯苓去皮桔梗去蘆川芎枳殼去瓤炒天麻全蠍去毒姜蠶炒白附子煨地骨皮各等分甘草減半上銼一劑生薑三片水煎服靈砂丸治小兒風痰驚積至危篤者如神南星泡半夏泡巴豆去殼酒煮乾二次各五錢全蠍硃砂一半入藥一半為衣各三錢姜蠶炒七分輕粉少許上為末水和丸如黍米大每一次三丸如驚風金銀湯下其餘薑湯下龍腦安神丸專治大人小兒驚風癲癇男婦骨蒸勞熱咳嗽語澀舌強久不瘥者及傷寒大熱不解久無汗者大人服一丸井花水調雄黃四五分送下或細嚼或研下小兒一歲以下者四之一二三歲三之一四五歲以上者二之一極神效牛黃五分片腦三分烏犀角二錢硃砂飛過二錢人參去蘆二錢白茯神去皮三錢地骨皮二錢麥門冬去心二錢桑白皮二錢麝香三分馬牙硝三分甘草二錢上各為末分兩稱停合為一處煉蜜為丸每兩作十丸金箔四大張為衣陰乾瓷器內放用黃蠟作蓋恐泄腦麝之氣此方百發百中其功不能盡述千金散治小兒一切痰喘急慢驚風雖至死但能開口灌下無不活者全蠍炙姜蠶各三分硃砂四分牛黃六釐冰片黃連天麻各四分膽星甘草各二分上為末每用五七釐薄荷燈芯金銀煎湯不拘時調下保生錠治小兒急慢驚風痰涎壅盛胎驚內吊多啼夜間恍惚不寧久患癲癇咳嗽發熱夏月中暑發搐皆治常服鎮驚安神寧心牛黃三錢天竺黃辰砂各一兩雄黃三錢麝香五分片腦五分琥珀一兩珍珠五錢大赭石三錢火煅七次蛇含石三錢火煅七次金銀箔四帖天麻防風甘草茯苓去皮人參各三錢姜蠶血竭各五錢遠志去心三錢陳皮牛膽南星各一兩上為細末用米粉糊為錠辰砂為衣用薄荷湯化下大聖奪命金丹治小兒急慢驚風癲癇天吊客忤物忤中惡及初生臍風撮口著噤胎驚胎癇牙關緊急驚風痰熱搐搦掣顫反躬竄視昏悶不醒但是一切驚風危惡緊急之症並皆治之其效如神其他驚藥俱不及此真起死回生之良劑也楊繩雨傳天麻泡全蠍去毒姜蠶炒膽星防風去蘆羌活白附子炮茯神去皮木川芎遠志泡去心桔梗去蘆炒石菖蒲半夏薑製人參去蘆白朮去蘆茯苓去皮酸棗仁炒荊穗細辛各五錢川烏炮去皮臍一個烏蛇尾酒浸炙五錢甘草大赤頭蜈蚣一條薄荷汁浸焙沉香犀角羚羊角辰砂水飛珍珠琥珀各一錢天竺黃一兩牛黃一錢五分雄黃麝香各一錢金箔三十片銀箔四十片上為末薑汁打糊為丸如芡實大硃砂為衣每服一丸用金銀同薄荷煎湯研化不拘時服一小兒潮熱發搐痰涎上壅手足指冷申酉時左腮青色隱白用補中益氣湯調補脾肺六味丸滋養肝腎而痊二方俱見補益一小兒三歲因驚搐搦發熱痰盛久服抱龍丸等藥面色或赤或青此心肝二經血虛風熱生痰也用六味丸滋腎生血用六君柴胡升麻調補脾胃而安三方俱見補益慢驚慢驚症因病後或吐瀉或藥餌傷損脾胃肢體逆冷口鼻氣微手足瘛瘲昏睡露睛此脾虛生風無陽之症也慢驚屬脾中氣虛損不足之病也慢驚者陰症也治宜固里醒脾散主之醒脾散治小兒吐瀉不止作慢驚風脾困昏沉默默不食人參去蘆白朮去蘆白茯苓去皮木香全蠍去毒天麻白附子煨姜蠶炒各等分甘草炙減半上銼生薑三片棗一枚水煎溫服一方去天麻姜蠶加南星泡半夏泡陳倉米二百粒煎服纍效黃耆湯治小兒慢驚風之神藥也黃耆二錢蜜水炒人參三錢炙甘草五分加白芍炒一錢上銼一劑水煎食遠服治小兒吐瀉脾驚一二歲可服硃砂五釐二歲以上一分三歲以上四五分全蠍一個去足翅毒一歲一個三歲兩個上為細末乳汁調服凡慢驚元氣虛損而致昏憒者急灸百會穴若待下痰不愈而後灸之則元氣脫散而不救矣此乃臟腑傳變已極總歸虛處唯脾受之無風可逐無驚可療此因脾虛不能攝涎而似痰也紫金錠子治急慢驚風涎潮發搐或吐或瀉不思飲食神疲氣弱人參去蘆白朮去蘆白茯苓去皮白茯神去皮木山藥炒乳香赤石脂醋煅七次辰砂各三錢麝香一錢上為末以糕一兩為丸如彈子大金箔為衣每一粒薄荷湯研化服一小兒傷食發丹服發表之劑手足搐搦服抱龍丸目潤痰盛余謂脾胃虧損而變慢驚也無風可祛無痰可逐只宜溫補胃氣遂用六君子加附子一劑而愈方見補益一小兒搐搦痰涎自流或用驚風之藥益甚視其面色黃白余用六君子補中益氣二湯補脾氣而愈二方俱見補益混元丹治小兒急慢驚風痰嗽喘熱吐瀉腹脹小兒百病大有功效方見通治驚後調治牛黃鎮驚丸治驚後調理安心神養氣血和平預防之劑天竺黃另研麥門冬去心當歸身酒洗生地黃酒洗赤芍藥煨薄荷木通去皮黃連薑汁炒山梔仁炒辰砂另研水飛牛黃另研龍骨火煅各二錢青黛另研一錢上為末煉蜜為丸如緑豆大每服二三十丸淡薑湯送下一小兒五歲因看會見妝鬼臉被驚嚇兩眼黑睛翻向里白睛翻向外視物微覺一線諸醫不能治求治於余余曰此子曾出痘疹否對曰未俟出痘疹可治逾月痘疹盛行其子發熱似有將出之幾其家果召余治以綿胭脂將水泡出汁慢火熬成膏塗兒兩眼泡上下一日塗兩次直至痘疹收靨後其眼復舊疳疾夫小兒疳病由乳母寒熱失理動止乖違飲食無節甘肥過度喜怒氣亂醉飽勞傷使乳兒者故成疳病又因久吐之後久瀉之後久痢之後以致久渴久汗久熱久瘧久嗽下血久瘡之後皆能亡失津液併成疳病錢氏云疳皆脾胃傷亡津液之所作也凡養小兒宜戒敬酒肉油膩偏生病生冷硬物涼水漿不與自無疳癖病消疳湯治小兒大便色疳白小便渾濁或澄之如米泔此疳病也山楂肉白芍炒黃連薑汁炒白茯苓去皮白朮去蘆澤瀉各一錢青皮四分甘草生三分上銼一劑薑棗水煎消疳丸治五疳皮黃肌瘦髮直尿白肚大青筋好食泥炭茶米之物或吐或瀉腹內積塊諸蟲作痛蒼朮米泔浸炒陳皮厚朴薑汁炒枳殼麵炒檳榔神麯炒山楂去子麥芽炒三稜煨莪朮煨砂仁茯苓去皮黃連炒胡黃連蕪荑仁蘆薈使君子去殼上各等分為末使君子殼煎湯泡蒸餅為丸如彈子大每服一丸清米湯化下肥兒丸消疳化積磨癖清熱伐肝補脾進食殺蟲潤肌膚養元氣人參三錢半白朮去蘆茯苓各三錢黃連姜炒三錢半胡黃連五錢使君子去殼四錢神麯炒麥芽炒山楂肉各三錢半甘草炙二錢蘆薈三錢半碗盛泥封固置坑中四面煨透用上為末黃米糊為丸米湯化下或作丸黍米大每服二三十丸米湯下看兒大小加減快活丸治小兒下痢疳病皮膚瘦削骨露如柴肚大青筋小便濁睡臥躁亂神氣昏沉常服健脾化積進食肥肌其效如神蒸餅面一斤作餅子十六個每一個重一兩豫開一竅取出餅屑入青礬五分仍以餅屑填緊外以濕紙包固炭火內煅透干取出候冷用之上為細末別以肥小棗用米泔水浸經一宿飯上蒸熟去核皮爛杵如糊同前餅末杵勻為丸如黍子大每服三五十丸不拘時清米湯送下或研化米湯調服亦可蘆連消疳丸治小兒生疳痞塊發熱肚脹壯脾胃消飲食清肝火磨積塊蘆薈胡黃連宣黃連酒炒各五錢白朮米泔浸焙白茯苓去皮當歸全身用酒洗各一兩白芍酒炒八錢人參神麯炒各六錢使君子去殼曬乾山楂肉各七錢蕪荑炒檳榔各五錢大甘草節去粗皮主用四兩上為細末湯泡蒸餅打糊為丸緑豆大每服五六十丸臨晚米湯送下或煉蜜為丸如龍眼大每晚噙化一丸或米湯下或酒亦可一小兒肝疳白膜遮睛筋疳瀉血腎疳身瘦瘡疳骨疳喜臥冷地又治胃怯不言解顱並年長不能行者用六味丸各等分煉蜜丸久服神效方見補益一小兒四肢消瘦肚腹脹大行步不能頗能飲食作渴發熱去後臭穢此脾臟傷也用異功散方見補益肥兒丸調理而安一小兒面色痿黃眼泡微腫作渴腹脹飲食少思腹中一塊或移動小便澄白大便不實此脾疳之患用四君子方見補益加山梔蕪荑肥兒丸而愈一小兒尿濁如米泔余以江南做酒小曲炒為末酒調下三服愈癖疾錢仲陽云癖塊者僻於兩脅痞結者否於中脘此因乳哺失調飲食停滯邪氣相搏而成或乳母六淫七情所致古人多用克伐痞癖既久飲食減少脾氣必虛久而不愈必先以固胃氣為主使養正則積自除若欲直攻其結不唯不能善消抑且損其脾土凡脾土虧損必變症百出矣當參各類及隨兒症而主治之若癖塊日久元氣脾胃俱虛宜朝服補中益氣湯夕服千金消癖丸間與混元丹兼服治之獲效者多矣癖者生於皮裡膜外也淨腑湯治小兒一切癖塊發熱口乾小便赤或泄瀉柴胡白茯苓去皮豬苓澤瀉三稜醋炒莪朮醋炒山楂去核各一錢黃芩白朮去蘆半夏薑製人參各八分胡黃連甘草各三分上銼一劑薑棗煎服肥兒丸治癖如神方見疳疾千金消癖丸治小兒癖疾積塊有殊效蘆薈阿魏另為糊青黛木香厚朴姜炒檳榔陳皮去白穰各一錢麥芽炒四錢使君子去殼胡黃連山楂肉香附水浸三稜醋炒莪朮煨醋炒各二錢水紅花子微炒神麯炒各四錢人參去蘆茯苓去皮白朮去蘆各三錢甘草炙一錢上為末將阿魏一錢白水和麵打糊為丸緑豆大每服四五十丸米飲白湯吞下益兒餅治小兒癖疾水紅花子使君子去殼山楂肉各五錢白朮去蘆四錢檳榔一錢半木香一錢神麯炒二錢半上為末入黃蠟面水和作煎餅吃至寶丸真阿魏二錢蘆薈天竺黃胡黃連雄黃穿山甲炒沉香白草烏泡硇砂沒藥各二分上為極細末用好酒和成一塊入銅鍋內再入酒半茶鍾熬成膏勿令火大恐傷藥方量可丸取出丸如豌豆大每丸黃酒送下十歲以上服二丸臨臥時服待其自然汗出三日服一次重者五七服輕者二三服熱即退塊亦消須要忌口如服後熱不止可後服金花丸如羸弱不進食者可先服平胃散癖疾方麝香二分全蠍去毒斑蝥去頭翅足紅娘子去頭尾足翅女人用男子去阿魏蠓蟲去足翅血竭雄黃硇砂蘆薈木香當歸尾酒浸三稜醋煮莪朮醋煮香附米炒白豆蔻去皮蘿蔔子炒各一錢上為細末醋糊丸如梧桐子大每服三五十丸或酒或溫水下壯盛者可服癖疾方蘆薈五分阿魏五分急性子即小桃紅子水紅花子一錢黑白牽牛共一錢猴燒灰一錢上為細末每服三分黃酒送下三帖全好癖疾方牛黃四分雄膽四分血竭一錢蘆薈四分爐甘石五分天竺黃五錢黃蠟五錢淨皮硝一兩蜂蜜四兩上將蠟化開與蜂蜜一處滾熟住火傾入細瓷碗內涼冷後將群藥為細末方入蜜蠟內攪勻每日常服先服用箸頭蘸吃後多服不怕十日全消忌醋冷油膩之物又方核桃仁一斤檳榔二十個硇砂一錢大黃一兩上三味為細末入桃仁水煮一炷香水滾時陸續入皮硝半斤香盡硝亦盡止食桃仁亦好清香散治癖疾生牙疳潰爛臭穢乳香沒藥孩兒茶輕粉炒象皮炒灰象牙焙黃紅褐炒灰珍珠焙黃海巴焙乾各等分上為細末搽患處立時痛止生肌如神桃花散治癖氣上攻牙腮腐爛桃花信一塊桑柴火內燒紅淬入細茶濃滷內如此七次去信將茶滷入雄黃一塊研末入滷內用雞翎頻掃患處止痛生肌立時見效克堅膏專治小兒癖塊發熱羸瘦木鱉子穿山甲川烏甘遂甘草當歸上各八錢先用真香油一斤入鍋內將前藥熬成灰濾去渣再慢火熬滴水不散方下黃丹八兩熬滴水成珠方下細藥入內再不見火蘆薈阿魏硼砂皮硝水紅花子各五錢硇砂三錢麝香一錢上為細末入內攪勻不熬攤為膏藥貼時先用皮硝水洗皮膚以膏貼癖二三日後覺肚內疾作疼四五日發癢糞後有膿血之物是其驗也抓癖膏李滄溪傳香油半斤桐油半斤生豬腦子半斤男子血餘灰水洗淨不拘多少桃仁四兩白蠟四錢上俱下鍋內文武火熬的腦子盡用布絹濾去渣次下飛過黃丹十四兩熬成膏待溫下胡黃連香白芷蘇木紅花三稜莪朮各三錢當歸尾硇砂各五錢麝香一錢半各為細末照分兩重羅入前膏內攪勻收貯勿令泄氣如有積塊先用皮硝煎水洗患處令淨次用生薑擦之方用絹帛攤藥貼上貼後用熱鞋底炙熱尉之五七十遍覺內熱方可如貼後癖即消縮如神灸法穴在小兒背脊中自尾骶骨將手揣摸脊骨兩傍有血筋發動處兩穴每一穴用銅錢三文壓在穴上用艾炷安孔中各灸七壯此是癖之根貫血之所灸之瘡即發即可見效灸不著血筋則瘡不發而不效矣化癖如神散治痞塊積聚蟾酥黃蠟各二錢羚羊角牛黃各五分麝香三分巴豆肉一錢硇砂冰片各一分上為末丸如菜子大每用一丸用扁頭針或患處刺破皮入之用膏藥貼上一伏時揭起其癖化膿血出盡服調理脾胃藥一小兒患痞癖服檳榔蓬朮枳實黃連之類痞益甚余曰此脾經血虛痞也不可克伐遂用六君子加當歸數劑胃氣漸復諸症漸愈乃朝用五味異功散加升麻柴胡夕用異功散加當歸芍藥而愈方見補益諸熱小兒諸熱辨例傷寒熱手足梢冷發熱惡寒而無汗面色青慘而不舒左額有青紋傷風熱手足梢微溫自汗面赤而光傷食熱目泡腫右額有青紋身熱而頭額腹肚尤甚夜熱晝涼面黃或吐痢腹疼驚風熱面色青紅額正中有青紋手心有汗時作驚惕手脈絡微動而發熱風熱身熱倍能食唇紅頰赤大小便祕潮熱如水之潮依時而至變蒸熱身體上下而蒸熱上氣虛驚耳熱微汗唇上下有白泡狀如珠子重者身熱脈亂腹痛啼叫不能乳食或吐哯周歲以後無此症也潮熱發渴有時驚熱顛叫恍惚夜熱夕發且止餘熱寒邪未盡食熱肚背先熱疳熱骨蒸盜汗背熱一向不止煩熱心躁不安積熱頰赤口瘡風熱汗出身熱虛熱困倦少力客熱來去不定癖熱涎嗽飲水寒熱發如瘧狀血熱辰巳時發疹熱耳鼻尖冷諸熱得之各有所歸其間有三兩症交互者宜隨其輕重而治之諸熱為病者宜清熱也大連翹飲治小兒傷風感冒發熱痰壅風熱丹毒腫痛頸項有核腮赤癰癤眼目赤腫口舌生瘡咽喉疼痛小便淋瀝胎毒痘疹餘毒一切熱毒並治連翹瞿麥滑石車前子牛蒡子赤芍梔子木通當歸防風各四分柴胡黃芩荊芥各一錢二分蟬蛻五分甘草一錢六分上銼竹葉十個燈芯十莖水煎不拘時溫服風痰熱變蒸加麥冬實熱丹熱加大黃胎熱瘡疹餘毒加薄荷葉癰癤熱毒加大黃芒硝五福化毒丹治小兒壅積熱毒唇口腫破生瘡牙根出血口臭頰赤咽乾煩躁或痘疹餘毒未解或頭目身體多生瘡癤犀角桔梗去蘆生地黃酒洗赤茯苓去皮牛蒡子微炒各五錢朴硝連翹玄參黑者粉草各六錢青黛二錢研極細上為末煉蜜丸如龍眼大每服一丸薄荷湯化下兼有驚加硃砂為衣感冒感冒者宜發散也惺惺散治外感風寒鼻塞痰嗽發熱人參白朮白茯苓桔梗栝蔞根細辛甘草薄荷上銼水煎服羌活膏治小兒風寒外感驚風內積發熱喘促咳嗽痰涎潮熱搐溺並痘疹初作人參白朮獨活前胡川芎桔梗羌活天麻各五錢薄荷各三錢地骨皮二錢甘草二錢上為細末煉蜜為丸如芡實大每服一丸薑湯研化下一小兒八歲患傷寒頭疼身痛發熱口乾面赤無汗諸醫以傷寒治之百藥罔效已經旬日袖手待斃余以龍腦安神丸一服其汗如雨即瘥一小兒外感風邪服表散之劑汗出作喘此邪氣去而脾肺虛也用異功散而汗喘止再劑而乳食進一小兒沉默昏倦肢冷驚悸其紋如弓之向里此屬胃氣虛而外感寒邪也先用惺惺散以解外邪調胃氣諸症頓愈但手足逆冷又用六君子湯調補元氣而安異功散六君子湯俱見補益傷食傷食者宜消導也萬億丸治小兒乳食生冷所傷發熱肚脹諸症方見通治消食丸治小兒宿食不消又名消乳丸砂仁陳皮三稜炒神麯炒麥芽炒各五錢香附炒一兩加白朮炒五錢上為末麵糊為丸如麻子大食後白湯送下大小加減消食餅治小兒時常傷食皮黃肌瘦肚大腹脹用此焦餅令常服之蓮肉去皮山藥炒白茯苓去皮神麯炒麥芽炒扁豆炒上各等分為末每四兩入面一斤水同和烙焦餅用一小兒傷寒嘔吐發熱面赤服消導清熱之劑飲食已消熱亦未退余以為胃經虛血用六君升麻柴胡四劑而痊一小兒十四歲傷食發熱服消導丸胸腹膨脹發熱作渴此脾氣復傷也先用四君升麻柴胡飲食漸進用補中益氣湯而愈後因勞心發熱少食用四物升麻柴胡而愈一小兒傷食發熱抽搐嘔吐喘嗽屬脾肺虛氣虛有熱用六君炒黑黃連梔子而愈上方俱見補益腹脹腹脹者脾胃氣虛也消脹散治小兒腹脹蘿蔔子炒蘇梗乾葛陳皮枳殼各等分甘草少許上銼水煎服食少者加白朮一小兒傷食腹脹胸滿有痰余用異功散而痊後復傷食腹脹作痛或用藥下之痛雖止而脹益甚更加喘粗此脾氣傷而及於肺也用六君加桔梗調補而痊一小兒停食服通利之劑作嘔腹脹此脾胃復傷也用補中益氣湯而愈上方俱見補益嘔吐嘔吐者乳食傷胃也定吐飲治吐逆投諸藥不止服此神效半夏湯泡透切片焙乾為末二兩生薑洗淨和皮一兩薄桂去粗皮銼三錢上姜切作小方塊如緑豆大同前半夏和勻入小鐺內慢火順手炒令香熟帶干方下桂再炒勻微有香氣以紙攤開地上去火毒候冷略播去黑焦末每服二錢水一盞姜三片煎七分空心少與緩服定吐紫金核治嘔吐丁香木香藿香半夏薑湯泡七次人參去蘆白朮去蘆各一錢上為末薑汁打糊為丸如棗核大用沉香硃砂各一錢為衣陰乾每用一丸用棗一枚去核放藥丸在內薑片夾濕紙裹灰火內煨熟去姜紙嚼吃用米飲壓之一小兒傷食發熱面赤抽搐嘔吐氣喘吐痰此飲食傷脾肺氣虛弱所致用六君子湯炒黑黃連山梔各二分一劑而愈方見補益泄瀉泄瀉者乳食傷脾也參苓白朮散治脾胃虛弱飲食不進多困少力中滿痞噎心中氣喘嘔吐泄瀉此藥中和不熱久服養氣育神醒脾悅色順正辟邪人參白朮炒茯苓去皮山藥炒甘草炙各二錢蓮肉去心白扁豆一錢半薑汁浸炒薏苡仁炒砂仁桔梗去蘆各一錢上為細末每服二錢棗湯調下量兒歲數加減啓脾丸消食止瀉止吐消疳消黃消脹定腹痛益脾健胃人參白朮去蘆炒白茯苓山藥炒蓮肉各一兩去心山楂肉陳皮澤瀉甘草炙各五錢上為末煉蜜為丸梧桐子大每服二三十丸空心米湯下或米湯研下服亦可小兒常患傷食服之立愈一方益元散加白朮末一兩每服一二錢米湯調下止小兒泄瀉殊效一方止治溏瀉用柿餅燒熟食之即止治小兒水瀉不止五倍子為細末陳醋調稀熬成膏貼臍上即止水瀉痢疾方生薑四兩真香油四兩黃丹二兩熬成膏藥貼臍立效一小兒飲食後即瀉先用六君子升麻神麯山楂而止又用五味異功散加升麻而痊後吐瀉腹痛用保和丸二服又用異功散調補脾氣而安一小兒傷食作瀉腹脹四肢浮腫小便不利先用五苓散方見中暑加木香旬余諸症漸退又用五味異功散為主佐以加減腎氣丸又旬日二便調和飲食漸進浮腫旋消乃用異功散調理而安一小兒因驚久瀉面色青黃余謂肝木勝脾土也朝用補中益氣湯夕用五味異功散加木香子母俱服而愈一小兒久瀉兼脫肛小腹重墜四肢浮腫面色痿黃時或兼青諸藥到口即嘔吐審乳母憂鬱傷脾大便不實先用補中益氣湯五味異功散及四神丸調治其母不兩月子母俱愈上方俱見補益吐瀉上吐下瀉者脾胃俱傷也白朮散治吐瀉或病後津液不足口乾作渴和胃生津止瀉痢將欲成慢驚風者人參去蘆白朮去蘆茯苓去皮藿香木香乾葛甘草炙各等分上銼劑水煎服若小兒頻頻瀉痢將成慢驚加山藥扁豆肉豆蔻煨各一錢姜一片水煎服若慢驚已作加細辛天麻各一錢全蠍三個白附子八分煨若冬月小兒吐蛔多是胃寒胃虛所致加丁香三粒如胃虛不能食而大渴不止者不可用淡滲之藥乃胃中元氣少故也以此湯補之加天花粉若能食而渴者白虎湯加人參如中氣虛熱口舌生瘡不喜飲冷服之即效燒針丸治小兒吐瀉黃丹硃砂白礬枯過上為末棗肉為丸如黃豆大每服三四丸戳針尖上燈焰上燒過涼米泔研爛調服瀉者食前吐者無拘時外用緑豆粉以雞子清作膏如吐塗兩腳心如瀉塗囟門上止則去之又方治吐瀉四君子湯加藿香陳皮一劑而愈助胃膏治元氣脾胃虛弱吐瀉不止不思飲食及久瀉虛寒人參白朮去蘆茯苓去皮甘草炙各一錢半白豆蔻去殼木香山藥炒五錢肉豆蔻麵包煨捶去油二個砂仁炒二十個丁香官桂藿香各三錢陳皮五錢上為細末煉蜜為丸彈子大每服一丸米湯化下祕方治小兒水瀉白礬黃丹各五錢用蔥白搗爛塗臍上即止治小兒吐瀉小丁香陳皮各等分水煎溫服一小兒數歲間每停食輒服峻利之藥後肚腹膨脹嘔吐泄瀉先用六君子湯諸症漸愈又用補中益氣湯而安一小兒腹脹飲食後即瀉手足逆冷此脾氣虛寒也先用人參理中丸後用六君子湯而愈一小兒吐瀉乳食色白不化露睛氣喘此脾肺不足形病俱虛也先用異功散加桔梗柴胡頓愈再用補中益氣湯而安一小兒因驚吐瀉腹脹先用六君木香柴胡治之稍可又以五味異功散而愈後因驚搐痰甚或用鎮驚化痰之藥倦怠不食而泄益甚先用異功加木香鉤藤四劑而愈方俱見補益一小兒面黃肌瘦泄瀉無度腹脹如鼓不思飲食百藥不效余教用好生白朮酒磨濃汁以溫酒調空心服二三日即愈痢疾東垣云白者濕熱傷氣分赤者濕熱傷血分赤白相雜氣血俱傷也痢疾者腹中實積也萬億丸方見通治治小兒下痢赤白腹痛初起者一服即愈一方治小兒痢用雞子一個冷水下鍋煮一沸取出去白用黃研碎以生薑汁小鐘半鍾和勻與兒食忌茶薑茶煎治痢疾腹痛不問赤白冷熱皆可用之老生薑切片三錢細茶三錢用新汲水煎服一方用生薑細茶連根韭菜三味同薑汁酒調立止仙梅丸治痢疾發熱發渴者細茶烏梅水洗則去核曬上為末用生蜜揭作丸彈子大每一丸水冷熱隨意化下鐵門拴治赤白痢疾五種泄瀉文蛤炒黃色一兩白礬半生半煅共三錢黃丹二錢上為細末黃蠟一兩熔化為丸如緑豆大每服大人十五丸小兒五七丸茶一錢姜二錢煎湯下瀉痢方五倍子炒黃色為末烏梅肉水浸為丸如彈子大每服一丸白痢冷米湯下赤痢薑湯下水瀉冷水下水瀉痢疾方飛白礬一錢丁香五分共為末水瀉白水下痢疾黃酒下石蓮散治小兒禁口痢嘔逆不食神效石蓮肉炒去心上為末每服一二錢陳倉米飲調下如嘔加生薑汁二匙同服一方山藥末半生半炒米飲調下香連丸黃連十兩用吳茱萸五兩水拌濕入瓷器頓滾湯中半日炒焦黑木香二兩上為末醋糊丸如赤豆大每服二三丸白湯下固腸丸治紅白痢日久不止黃蠟一兩黃丹一兩水飛共化一處為丸如黃豆大每服三丸紅痢甘草白痢乾薑紅白痢甘草乾薑湯下空心服治水瀉痢疾用鳳眼草蜜水炒為細末每服一錢水煎空心服立止一小兒患痢脫肛色赤或痛用補中益氣湯送香連丸而愈後傷食作瀉復脫肛不入仍用前湯更以萆麻仁研塗頂門而愈一小兒患痢口乾發熱用白朮散煎與恣飲時與白朮散送下香連丸而安一小兒久痢裡急後重欲去不去手足並冷此胃氣虛寒下陷也用補中益氣湯加木香補骨脂倍升麻柴胡而愈瘧疾瘧者膈上痰結也萬億丸方見通治芫花散治小兒瘧疾芫花根為末每用一二分三歲兒用三分以雞子一個去頂入末攪勻紙糊頂口外用濕紙裹灰火煨熟嚼吃天靈散天靈蓋燒存性為細末每服五匣黃酒調下立止消癖丸治瘧母停水結癖腹脅堅痛芫花炒硃砂各等分上為細末煉蜜為丸如小豆大每十丸棗湯送下祝由科治瘧疾不愈咒曰吾從東方來路逢一池水水裡一條龍九頭十八尾問伊食甚的只吃瘧疾鬼上念一遍吹在果子上念七遍在上令病人於五更雞犬不聞時面東而立食訖於靜室中安睡忌食瓜果葷肉熱物此法十治八九無藥處可以救人果者謂桃杏棗栗之類一小兒先因停食腹痛服峻厲之劑後患瘧日晡而作余以為元氣下陷欲治以補中益氣湯不信泛行清熱消導前症益甚食少作瀉余朝用前湯夕用異功散加當歸月餘而愈一小兒每午前先寒後熱不久愈用六君子加炮姜丸如芡實大每服一丸旬余而安方見補益咳嗽咳嗽者肺傷風也參蘇飲治小兒四時感冒發熱頭痛咳嗽喘急痰涎壅盛鼻塞聲重涕唾稠黏及內傷外感一切發熱喘嗽紫蘇陳皮前胡桔梗半夏薑汁炒白茯苓去皮乾葛枳殼麩炒各等分甘草人參二味減半木香少許上銼生薑三片水煎食後服若肺實有邪去人參加黃芩桑白皮杏仁參花散治咳嗽發熱氣喘吐血人參天花粉各等分為末每服五分蜜水調下蜜梨噙治咳嗽喘急甜梨一個刀切勿斷入蜜於內麵裹灰火煨熟去面吃梨愈一方治小兒喉中痰壅喘急用巴豆一枚去殼搗爛作一丸以棉花包裹男左女右塞鼻中痰即墜下而愈一方治傷寒潮熱痰咳男婦小兒皆可用鬱金三錢石膏一兩煅過上共為末每服二三匙清茶送下一小兒傷風咳嗽發熱服解表之劑加喘促出汗余謂脾肺氣虛欲用補中益氣湯加五味子補之不信乃自服二陳桑皮枳殼而發搐痰壅仍用前藥加鉤藤鉤而痊喘急喘急者痰氣盛也一捻金治小兒風痰吐沫氣喘咳嗽肚腹膨脹不思飲食小兒肺脹喘嗽多人看作風喉大黃檳榔二牽牛人參分兩等求五味研成細末蜜水調量稀稠每將一字下咽喉不用神針法灸上其症肺脹喘滿胸高氣急兩脅搖動陷下作坑兩鼻竅張悶亂嗽渴聲嘎不鳴痰涎湧塞俗云馬脾風若不急治死於旦夕也治小兒喉中痰壅喘甚用巴豆一粒搗爛作一丸以棉花包裹男左女右塞鼻痰即墜下效一小兒患喘服發汗之劑汗出而喘益甚用異功散頓愈又用六君子湯而痊愈方見補益一小兒有哮病其母遇勞即發兒飲其乳亦嗽用六君子桔梗桑皮杏仁治之母子並愈方見補益小兒初生雜病小兒初生宜先濃煎黃連甘草湯急用軟絹或絲綿包指蘸藥摳出口中惡血倘或不及即以藥湯灌之待吐出惡沫方與乳吃令出痘亦稀諸毒瘡亦少一初生三五月宜繃縛令臥勿豎頭抱出免致驚癇一乳與食宜相遠不宜一時混吃令兒生疳癖痞積一宜用七八十歲老人舊裙舊襖改作小兒衣衫真氣相滋令兒有壽富貴之家切不宜新制紵絲綾羅氈絨之類與小兒穿不唯生病抑且折福必致夭殤一小兒生四五個月止與乳吃六個月以後方與稀粥哺之周歲以前切不可吃葷腥並生冷之物令兒多疾若待二三歲後臟腑稍壯才與葷腥方好延生第一方小兒初生臍帶脫落收置新瓦上用炭火四圍燒至煙將盡放土地上用瓦盞之類蓋之存性研為細末預將硃砂透明者為極細末水飛過臍帶若有五分重硃砂用二分五釐生地黃當歸身煎濃汁一二蜆殼調和前兩味抹兒上齶間及乳母乳頭上一日之內晚至盡次日大便遺下穢汙濁垢之物終身永無瘡疹及諸疾生一子則得一子十分妙法也滌穢免痘湯用練樹子一升至正月初一日子時父母只令一人知將練子煎湯待溫洗兒全身頭面上下以去胎毒洗後不出痘疹如出亦輕或只三五顆而已一方用五六月間收絲瓜小小蔓藤陰乾約重二兩半收起煎湯洗一方用葫蘆上藤蔓如前法亦可稀痘萬金丹治嬰兒未出痘時胎毒在臟腑因時氣而發也如在春秋二分每服一丸使痘毒漸消出時稀少如遇出痘時氣身一發熱即磨服一丸毒從大便而出若有黑陷倒靨化下一丸即起死回生如痘出至七日若服恐泄元氣修合者不可加減以取不效麻黃根升麻各一兩半羌活樺皮茜草根栝蔞根鼠黏子炒天麻連翹各一兩當歸芍藥川芎各七錢上銼作片用水五升煎至半升去渣入銀器內以湯頓成膏入煉蜜少許調勻入後藥硃砂五錢冰片雄黃各五分蝦蟆灰一錢半麝香七分全蠍十四個炙上為末入前藥和勻分作十丸以蠟封之如彈子大臨時用豬心血或兔血調勻熱酒調下溫服凡初生小兒口齶並牙根生白點名馬牙不能食乳此與鵝口不同少緩即不能救多致夭傷急用針縛箸頭上將白點挑破出血用好京墨磨薄荷湯以手指捻母油頭髮蘸墨遍口齶擦之勿令乳食待睡一時醒方與乳食再擦之小兒不時變蒸變者異常也蒸者發熱也所以變換五臟蒸養六腑須要變蒸多變氣血方榮骨脈始長情性有異則後來出痘輕可凡變蒸不宜服藥或因傷食因傷風因驚嚇等項夾雜相值而發令人疑感亦須守候一二日俟病勢真的是食則消食是風則行痰是驚則安神若變蒸而妄投藥餌則為藥引入各經症遂難識而且纏綿不脫反藥有所誤也一小兒月內發搐鼻塞乃風邪所傷以六君子湯加桔梗細辛子母俱服更以蔥頭七莖生薑一片細擂攤紙上合置掌中令熱急貼囟門少頃鼻利搐止一小兒未滿月發搐嘔乳腹脹作瀉此乳傷脾胃用五味異功散加漏蘆令母服之兒亦服匙許遂愈小兒雜病胎熱胎寒者稟受有虧也胎熱小兒生下面赤眼間口中氣熱焦啼煩躁甘草一錢黑豆二錢淡竹葉五個上銼一劑燈草七莖水煎頻頻少進令乳母多服胎寒母孕時受寒兒生下面色青白四肢厥冷大便青黑口冷腹痛身起寒栗當歸炒黃耆蜜炒桂心黃芩炒細辛龍骨細研白芍煨各等分上為細末每服一匙以乳汁調下臍風撮口者胎元有毒也臍風多因斷臍之時被風濕所乘或者胎元稟有熱毒則兒下胎時視按其臍必硬直定有臍風必自臍發出一道青筋行肚則分兩岔行至心者必死於青筋初發急用燈芯點油燃於燈上自青筋頭並岔行盡處燎之以截住不致攻心更以外灸中脘三壯內服萬億丸一二粒以泄其胎毒也五通膏治小兒臍風撮口生地黃生薑蔥白蘿蔔子田螺肉各等分上件共搗爛搭臍四圍一指厚抱住一時有屁下泄而愈治小兒斷臍不如法七日內有風出用直殭蠶二三條炒去絲為末蜜調敷口或乳頭上帶下亦可香螺膏治臍風腫硬如盤田螺三個入麝少許搗爛搭臍上須臾再易腫痛立消宣風散初生小兒臍風撮口多啼不乳口出白沫全蠍二十八個頭尾全者去毒用酒炙為末麝香一字另研上同和勻細末每用半字金銀煎湯調服撮口由胎氣挾熱風邪入臍毒流心脾之經故令舌強唇青聚口啼哭不得當視其齒根之上有小泡子如粟米狀急以溫水蘸青綿布裹指輕輕擦破即開口便安甚者用牛黃二分將竹瀝調滴入口即愈胎驚夜啼者邪熱乘心也胎驚宜鎮驚散治小兒在胎受驚故生下來滿月而驚也硃砂研細入牛黃少許取豬乳汁調稀抹入口中加麝香少許尤效夜啼宜花火膏治邪熱相乘焦躁夜啼燈火三顆以乳汁調抹兒口或抹母乳上令兒吮之一方用燈芯燒灰敷乳上令兒吮之一方加硃砂共研末用白蜜調待兒睡抹兒口內蟬花散治小兒夜啼不止狀若鬼祟蟬蛻七個下半截為細末用薄荷湯調入好酒少許食後服或者不信將上半截為末依前法服復啼如初古人立法莫知其妙小兒觸犯禁忌而夜啼者宜醋炭熏服蘇合香丸一方用火柴頭一個長四五寸削平面用硃砂寫云撥火杖撥火杖將來作神將捉著夜啼鬼打殺不要放急急如律令小兒夜啼不止將硃砂書甲寅二字貼床頭即止中惡天吊者冒犯邪氣也中惡宜辟邪膏治小兒卒中惡毒心腹刺痛悶亂欲死等症降真香白膠香沉香虎頭骨鬼臼龍膽草人參白茯苓各五錢上為細末入雄黃半兩麝香一錢煉蜜為丸乳香湯下天吊宜鉤藤散治小兒天吊潮熱鉤藤人參犀角各五錢全蠍天麻各二錢半甘草炙一錢半上銼一劑水煎服鵝口口瘡者胃中濕熱也牛黃散治小兒口中百病鵝口口瘡重齶不能吮乳及咽喉腫塞一切熱毒牛黃冰片硼砂辰砂研各一分雄黃青黛各二分牙硝一分半黃連末八分黃柏末八分上共入乳鉢內研勻每用少許敷入口內瀉心湯治小兒口瘡淨黃連為細末蜜水調服一方治小兒白口瘡用黃丹巴豆仁同炒焦去豆用丹摻口瘡上立愈重舌木舌者脾經實火也附弄舌重舌乃舌下生舌也宜當歸連翹湯治小兒心脾有熱舌下有形如舌而小者名曰重舌及唇口兩傍生瘡歸尾連翹白芷各三錢大黃煨甘草炙各一錢上銼劑水煎食後頻服千金方治重舌竹瀝青黃柏末二味和勻無時點舌上即退又方用蒲黃塗之即瘥又方用膽礬研細敷之又方用百草霜芒硝滑石共為末酒調敷之木舌乃腫硬不柔和也宜雪硝散治木舌朴硝五錢真紫雪二分鹽半分上為末入竹瀝二三點用白湯調敷咽津無妨瀉黃散治小兒木舌弄舌藿香葉七分山梔一錢軟石膏五分防風四分甘草七分上銼一劑水煎不拘時服走馬牙疳者氣虛濕熱也立效散治走馬牙疳青黛黃柏枯礬棓子末各一錢上研細末用米泔水先漱口內摻貼患處清胃升麻湯治小兒牙腫流涎腮腫走馬牙疳主陽明之熱升麻川芎白芍半夏湯泡各七分乾葛防風黃連酒炒二次生甘草各五分軟石膏煨一錢白朮七分白芷三分上銼一劑水煎食後熱服能漱即含漱而吐之漱藥不用白朮半夏愛吃泥土者脾臟生疳也清胃養脾湯治小兒愛吃泥土乃脾虛胃熱所致此藥主之黃芩軟石膏陳皮白朮去蘆甘草上各等分水煎服砂糖丸膩粉一錢和砂糖為丸如麻子大米飲送下瀉出其土立愈黃金餅治小兒好吃泥土干黃土為末濃煎黃連汁和為餅食之立愈丹毒者火行於外也赤腫者遊走遍體也犀角消毒飲治風毒赤紫丹瘤壯熱狂躁睡臥不安胸膈滿悶咽喉腫痛九道有血妄行遍身赤毒及痘疹已出未出不能決透或已出熱不解急服此牛蒡子四錢微炒荊芥穗防風黃芩各一錢犀角鎊甘草各五分上銼一劑水煎不拘時服無犀角以升麻代之冰黃散治赤遊丹毒土硝大黃末各一錢上合一處新汲水調勻用雞翎蘸藥頻頻塗掃又方用伏龍肝不拘多少用雞子清調敷患處專治赤毒赤腫火毒走注泥金膏治一切無名腫硬焮赤但是諸般丹瘤熱瘰濕爛大人亦同此治陰地上蚯蚓糞熟皮硝蚯蚓糞三分之二共一處研細新汲水井水濃調厚敷患處干則再上喉痹者熱毒也會厭兩旁腫者為雙乳鵝是易治一旁腫者為單乳鵝是難治乳鵝差小者為喉痹熱結於咽喉且麻且癢腫繞於外高咽喉風喉痹暴發暴死者名走馬喉風是也甘桔湯治小兒咽喉腫痛風熱等毒桔梗二錢防風荊芥薄荷黃黃芩甘草各一錢上銼一劑水煎食後頻頻溫服碧雪治心肺積熱上攻咽喉腫痛閉塞水漿不下或生瘡癤重舌木舌並治碧雪真青黛硼砂與焰硝蒲黃甘草末等分摻咽喉眼痛者火盛也拔毒膏治嬰兒患眼腫痛用熟地黃一兩以新汲水浸透搗爛貼腳心布裹住有效通天散治赤眼暴發腫痛芒硝五錢雄黃三錢共為細末吹入兩鼻內流水雙目流淚即效膿耳者腎氣熱沖也羽澤散治耳中出膿或痛或疼或出水枯礬少許為細末吹入耳中即愈一方用五倍子燒灰存性為末吹入耳亦效一方用抱出雞卵皮炒黃色為細末香油調灌耳內即時止疼黃龍散治停耳小兒因沐浴水入耳中水濕停留搏於血氣醞釀成膿耳枯礬龍骨煨黃丹水飛胭脂燒灰麝香少許海螵蛸煨上為細末先將紙條拭乾膿水後以藥摻入勿令入風治停耳膿耳不問新久痛不止用黃蠟如皂角子大搓成條外用好綿艾捶熟裹蠟條燒著煙燻患處痛止住熏鼻瘡者風濕氣攻也鼻瘡熱壅傷肺肺主氣通於鼻風濕之氣乘虛客於皮毛入於血脈故鼻下兩傍瘡濕癢爛是名鼻慝其瘡不痛但所流處即又成瘡澤瀉散主之澤瀉散治鼻瘡澤瀉鬱金山梔仁甘草炙各一錢上為細末用甘草煎湯食後調服頭瘡者熱毒也一掃光治小兒頭上肥瘡或多生蝨子搔癢成瘡膿水出不止細茶三錢口嚼爛水銀入茶內研一錢牙皂花椒各二錢上為細末香油調搽蠟油膏治小兒頭瘡臘豬油半生半熟雄黃水銀各等分上研三味和勻先將水洗淨膿汁後敷藥臍瘡者風濕也枯礬散治小兒因剪臍外傷於風邪以致臍瘡不幹枯礬龍骨煨各五分共為細末每用少許乾摻臍上一小兒臍中汁出並痛用枯礬末干敷或黃柏末敷之又蠶繭空燒灰存性摻之亦可諸蟲痛者胃氣傷也追蟲散治小兒蟲積痛凡腹痛口中出清水者蟲積也使君子用肉二錢用殼五分檳榔一錢上銼一劑水煎食遠服一方用使君子一錢檳榔一錢雄黃五分上為細末每服一錢苦楝根煎湯調下靈礬散治小兒蟲咬心痛欲絶五靈脂末二錢枯礬五分上為細末每服二錢水煎不拘時服當吐出蟲即愈練陽湯治小兒蛔蟲歌曰蛔蟲出口有三般口鼻中來大不堪如或白蟲兼黑色靈丹縱服病難安苦楝根皮二錢陳皮半夏茯苓各一錢甘草五分上銼一劑生薑煎服錢氏白朮散治小兒冬月吐蛔多是胃寒胃虛所致人參去蘆白朮去蘆茯苓去皮藿香甘草各二錢木香二錢丁香二粒乾葛二錢上銼每劑一二錢水煎溫服尾骨痛者陰虛痰也小兒尾骨痛乃是陰虛痰火所致若陰虛而痛者宜補陰降火湯主之痰火作痛者宜化痰降火湯主之補陰降火湯治陰虛尾骨節痛當歸酒洗川芎白芍酒炒熟地黃酒蒸黃柏炒知母酒炒各等分上銼少用官桂為引或以前胡木香為引如痛不止加乳香沒藥化痰降火湯治痰火尾骨節痛陳皮去白半夏薑汁製茯苓去皮澤瀉黃柏酒炒知母酒炒甘草各等分上銼必用前胡木香為引蓋陰虛故痰盛也若痛不止加乳香沒藥陰腫疝氣者寒所郁也祕方治小兒偏墜氣痛五倍子燒灰存性為末以好酒調服出汗立愈又方治小兒外腎腫大牡蠣不拘多少為末用雞子清調塗即消又方治陰囊忽腫或坐地多時或風邪或蟲蟻吹者蟬蛻五錢水一大碗煎湯洗腫處其痛立止若不消再煎再洗後服五苓散燈草煎服又方用蔥園內蚯蚓糞以甘草汁調塗腫處或薄荷汁調亦可仙傳方治風熱外腎焮赤腫痛日夜啼叫不數日退皮如雞卵殼愈而復作用老杉木燒灰入膩粉清油調敷患處即效盤腸氣痛者風冷所搏也小兒盤腸氣痛者則腰曲乾啼額有汗是小兒為冷氣所搏而然其口閉腳冷或大便青色不實上唇乾者是也此多因生下洗遲感受風冷而致也急用蔥湯淋洗其腹揉蔥尉臍腹間良久尿自湧出其痛自止宜服乳香散乳香散治盤腸氣痛乳香沒藥各等分共為細末以木香煎湯調服脫肛者大腸虛滑也小兒脫肛皆因久患瀉痢所致大腸頭自糞門出而不收宜用蔥湯熏洗令軟送上或以五倍子為末敷而頻托入又以五倍子煎湯洗亦可又以鱉頭燒灰存性香油調敷一法以此物燒灰熏之久自收又以東壁土泡湯先熏後洗亦效提肛散小兒大腸氣虛肛門脫出龍骨一錢半訶子煅去核沒石子赤石脂罌粟殼去蒂穰醋炙各等分上為末用米飲調食前服仍將蔥湯熏洗令軟款款托上一方用萆麻子搗爛貼頂上腸收即去之脫肛洗藥苦參五倍子陳壁土上等分水煎湯洗次用木賊末搽上遺尿者膀胱冷弱也雞膍胵散治小兒遺尿雞膍胵一具雞腸一具燒存性豬泡炙焦上為末每服一錢黃酒調服男用雌女用雄破故紙散破故紙一兩炒為末每服一錢熱湯調下桂肝丸治小兒睡中遺尿不自去者官桂為末雄雞膽一具等分搗丸如小豆大溫水送下每日進三服尿濁者濕滯脾胃也澄清散治小兒大便白小便濁或澄之如米泔白朮茯苓白芍炒黃連薑汁炒澤瀉山楂去子各一錢青皮四分甘草生二分上銼一劑水煎空心服便血者熱傳心肺也凡初生嬰兒七日之內大小便有血出者此由胎氣熱盛之所致也因母食酒面炙爆熱毒等物流入心肺兒在胎內受之熱毒傳入心肺且女子熱入心故小便有之男子熱入於肺故大便有之治法以生地黃取自汁入蜜少許和勻溫服男女皆效或甘露飲兼服尤妙甘露飲治小兒胃中客熱牙宣口臭齒齦腫爛時出膿血飢煩不欲飲食及目赤腫痛不任涼藥口舌生瘡咽喉腫痛及身面皆黃肢體微腫大便不調小便赤澀並治熟地黃生地黃酒洗天門冬去心麥門冬去心枳殼酒炒茵陳黃芩酒炒枇杷葉石斛甘草各等分上銼一劑水煎食後臨臥服一方用生蒲黃油頭髮燒灰各一錢為末生地黃汁或米飲乳汁調同服下淋者膀胱鬱熱也五淋散治膀胱有熱水道不通淋瀝不出或尿如豆汁或如沙石或冷淋如膏或熱拂便熱赤茯苓六錢赤芍藥山梔仁各二錢條黃芩三錢當歸甘草各五分上銼一劑每服三錢燈芯一團水煎服一方用生地黃澤瀉木通滑石車前各二錢吐血者榮衛氣逆也黃金丸治小兒吐血衄血下血黃芩不拘多少為末煉蜜為丸如雞頭實大三歲兒每一丸鹽湯化下柏枝散治小兒衄血吐血柏枝曬乾藕節曬乾各等分為末三歲者服半錢藕汁和蜜一匙調白湯下一方用山梔子炒黑每用三錢生薑煎又方治咯血吐血衄血用白芍藥為末磨犀角汁調服愈祕方治小兒吐血不止用黃連末一錢豆豉二十粒水煎溫服小便不通者膀胱火也通神散治小便緊急不通或去血小便閉塞不堪言唯用兒茶末一錢萹蓄煎湯來送下霎時溲便湧如泉五苓散豬苓澤瀉茯苓白朮各等分官桂減半上銼一劑水煎食前服加車前子燈草尤效大便不通者臟腑熱也萬億丸治大便不通如神方見通治沒藥散治小兒風與熱滯留蓄上焦胸膈高起大便不通沒藥大黃枳殼炒桔梗各二錢木香甘草各一錢炙上銼每劑一錢姜三片水煎服治新生小兒二三日不大小便用蔥汁人乳各半調勻抹在口中同乳帶下即通掩臍法治小兒大小便不通取連根蔥白一莖生薑一塊淡豆豉二十粒鹽一小匙同研爛捏作餅子貼臍中烘熱貼之用絹帛扎定良久氣透自通不通再易一餅二妙散治小兒大小便不通六七月間尋牛糞中有蜣螂不拘多少用線串起陰乾收貯用時取一個要全者放淨磚上四面以炭火烘乾以刀從腰切斷如大便閉用上半截小便閉用下半截二便俱閉全用為細末新汲水調服水腫者土虧水旺也加味五皮飲治小兒四肢腫滿陽水陰水皆可服五加皮地骨皮生薑皮大腹皮茯苓皮各一錢加薑黃木瓜各一錢上銼一劑水煎服一方去五加皮加陳皮桑白皮牽牛散治小兒諸般腫脹黑牽牛半生半炒取頭細末每服一二匙桑白皮煎湯磨木香汁調服黃疸者脾胃濕熱也茯苓滲濕湯治小兒黃疸寒熱嘔吐而渴欲飲冷水身體面目俱黃小水不利不得安臥不思飲食茯苓茵陳山梔黃連黃芩防己白朮蒼朮陳皮青皮枳殼豬苓各一錢澤瀉三分上銼水煎徐徐溫服如小便不通加木通如傷食不思食加砂仁神麯炒麥芽炒汗者陰陽偏勝也團參湯治小兒虛汗或心血液盛亦發為汗此藥收斂心氣新羅人參川當歸各三錢上細銼用雄豬心一個切二片每服二錢豬心一片井水一盞半煎食前作兩次服止汗散治小兒腫而自汗故蒲扇灰如無扇只將舊蒲燒灰為末溫酒調服牡蠣散治小兒盜汗因食生冷之物過度或熱水淘飯大能損土為水之所傷不能制其津液故汗自出也牡蠣煅二錢黃耆蜜炙生地黃各一兩上銼一劑水煎服斑者陰陽毒氣也治小兒身常發熱風斑及腳指常紅腫此脾經風熱也用防風通聖散去硝黃加鼠黏子酒炒黃連為末亦用防風白芷薄荷黃連黃芩黃耆黃柏煎湯浴之宜避風解顱鶴節者胎元不全也解顱宜八物湯有熱加酒炒黃連黃耆甘草水煎服外絹帛緊束及以白芨末敷之人參地黃丸治小兒顱囟開解頭縫不合此乃腎氣不成胝主腎髓而腦髓海腎氣不盛所以腦髓不足故不能食人參二錢懷熟地四錢嫩鹿茸乾山藥白茯苓去皮牡丹皮山茱萸去核各二錢上為細末煉蜜為丸如芡實大用人參煎湯研化食遠服鶴節宜當歸地黃丸治小兒血氣不充故肌瘦薄骨節呈露如鶴之膝懷熟地酒蒸八錢山茱萸酒蒸去核山藥蒸澤瀉去毛牡丹皮去梗白茯苓去皮當歸酒洗各三錢一方加鹿茸酥炙牛膝酒洗各四錢去蘆上為細末煉蜜丸如芡實大每用熱水研化食前服仍以大南星炮去皮臍研細末入米醋調敷絹帛上烘熱貼之亦良法也行遲發遲者血氣不充也行遲宜調元散治小兒稟受元氣不足顱囟開解肌肉消瘦腹大而脹語遲行遲手足如筒神色昏慢齒生遲乾山藥五錢白芍炒茯苓去皮茯神去皮木各二錢白朮二錢半石菖蒲一錢人參去蘆熟地當歸川芎黃耆蜜炙各二錢半甘草炙一錢半上銼生薑三片棗一枚同煎不拘時服嬰兒乳母同服錢氏地黃丸治肝腎虛弱骨髓不充不能行依本方加酒炙鹿茸牛膝五加皮同服自然髓生而骨強即能漸漸行也語遲者邪乘心也菖蒲丸治小兒語遲石菖蒲人參麥門冬炒去心川芎乳香當歸遠志甘草水泡去心硃砂上為末煉蜜丸黍米大每服十丸食遠粳米湯飲下齒遲者腎不足也芎歸散治小兒齒遲川芎乾山藥當歸白芍炒甘草炙各二錢半上為細末每服二錢白湯調下食後服將此干藥末擦牙齦即生龜胸者肺熱脹滿也龜胸丸治小兒龜胸高如覆掌川大黃煨六錢天門冬去心百合杏仁去皮尖麩炒木通去節枳殼麩炒桑白皮蜜炙甜葶藶隔紙炒軟石膏各一錢上為細末煉蜜為丸如緑豆大每服五丸溫水化下食後臨臥服仍宜灸兩乳前各一寸半上兩行三骨間六處各灸三壯春夏從下灸起秋冬從上灸起依法灸之龜背者風邪入脊也龜背丸治小兒龜背枳殼麩炒防風去蘆獨活大黃煨前胡去蘆當歸麻黃去節各三錢上為細末麵糊丸黍米大每服十五六丸看兒大小以米飲下食後服仍灸肺俞穴在三椎下兩旁各一寸半心俞穴在五椎下各一寸半膈俞穴在七椎下兩旁各一寸六處穴各灸三壯以小兒中指節為一寸艾炷以小麥大但灸三壯而已小兒行遲齒遲解顱囟填五軟鶴膝腎疳齒豁睛白多愁凡此皆因稟受腎氣不足當以六味丸加鹿茸補之若因精氣未滿而御女以通多致頭目眩暈口渴吐痰或發熱足熱腰腿痠軟或自汗盜汗二便澀痛變生諸疾難以名狀余常用六味八味二丸及補中益氣之劑加減用之無不奏效方見補益小兒五歲不能言咸以為廢人也但其形色悉屬肺腎不足遂用六味丸加鹿茸及補中益氣湯加五味兩月餘形氣漸健將五月半載能發一二言至年許始聲音明白方見補益痘瘡小兒痘瘡何以知腮赤眼泡亦赤時呵缺噴嚏及驚怖耳尖手指冰如之證作三日瘡不見升發之藥不可遲敗毒葛根堪選用解熱表汗最為宜寒涼之劑慎勿用臟腑一動致災危小兒患痘瘡臟腑虛寒者見證忌服寒涼藥惡寒寒熱往來自汗惡風手足厥冷面青面色㿠白目睛青色糞色青白體淨怠惰嗜臥二便清利吐瀉不渴昏睡口鼻氣冷飲食不進乳食不化腹脹聲音微弱足脛冰冷精神慢弱懶言吐乳瀉清脈浮細而虛乃表虛脈沉細而遲乃里虛小兒痘瘡臟腑實熱者見證忌服溫熱藥面赤大便閉身體壯熱毛焦膚燥唇紫小便赤手足熱極驚悸譫語眼黃口氣熱吐痢而渴狂亂叫哭鼻塞流清涕大便焦黃腹脹不食頭痛身皆痛煩躁痰壅胸膈痞滿嗆喉咽乾燥咳嗽喘促上下失血脈浮數而實大表脈沉實而數里痘有十候發熱初出出齊起泛行漿漿足回水收靨結痂還元初發熱宜加味敗毒散初起發熱即服此藥神效柴胡前胡羌活獨活防風荊芥薄荷枳殼桔梗川芎天麻地骨皮上古方除參苓恐補早助火也宜加紫草蟬蛻蘇葉麻黃姜蠶蔥白帶根解熱泄瀉加豬苓澤瀉去紫草水煎熱服出汗為佳升麻葛根湯發熱之初未分麻痘傷寒傷食等症宜此解散庶無誤事升麻葛根白芍各三錢甘草一錢上銼一劑生薑三片水煎熱服寒月加蘇葉八分四肢逆冷加桂枝一錢半腰痛當知是痘加桂枝錢半時氣酷烈發熱太甚乃是毒氣盛加牛蒡子一錢半只服前敗毒散尤妙痘初出宜神功散治痘出毒氣太盛血紅一片不分地界如紋蠶種或諸失血嘔吐瀉七日以前諸症可服解毒黃耆人參白芍紫草生地紅花牛蒡子各等分前胡甘草減半上銼水煎不拘時服熱甚加黃連黃芩各一錢未退者再加大黃研入有驚者加蟬蛻一個去翅足若頭粒淡黑者有寒乘之加官桂一錢胡荽酒痘初出時宜用此酒遍噴四面床壁及與患者服役人皆飲能闢穢毒又以淨胭脂點兩眼角防痘入眼胡荽一束銅錢大細切用好酒熱和與服須臾渾身通暢過一二時以紙蘸麻油點照於無痘處又出如珍珠光亮數十顆矣如無胡荽即用胡荽子研亦可痘出齊宜保元湯人參二錢黃耆嫩者二錢甘草一錢上銼一劑生薑一片水煎服四日以前有寒症其色黑慘宜用保元湯加官桂五日以後有寒中里者用附子理中湯不甚只宜保元湯加官桂腹痛者毒盛也神功散主之面紅不退地界不分者神功散倍前胡吐者毒盛乘火炎而宣也神功散主之泄瀉者火盛而奔越也服神功散即止卻用升麻以升提之不可用止澀之藥唯解其毒則自止矣渴者紅花子湯加牛蒡子雖口中如煙起即解發渴者或用人參麥門冬湯飲之亦可切不可用棗湯大渴者取真黃土百沸湯碗蓋泡取水少加砂糖調飲立止汗不止者而身已涼乃血隨氣溢也用當歸五錢黃耆三錢酸棗一錢共銼一劑水煎溫服立止痰用白附子水磨服效不可用二陳湯使燥陽明經使孤陽無陰不能施化也嗽用杏仁煎湯磨白附子服三日內頂陷者非虛也乃火盛陽極反為陰降如當午樹枝向下宜用九味神功散退其火三四日色慘不陰宜用神功散活血退火使其瑩滿光明或有失治不知解毒五六日間以燈照之生氣未戕其毒太盛作熱地界紅燥宜用神功散治之觀隨其變而施治猶或可救一二過此則不能施其神功矣認痘法故曰氣尊血分者生謂火靖而後出氣得其令頭粒尖而白根顆紅而不散譬如一顆珍珠放在胭脂上也頭粒白於上見氣升而尊根紅於下見血附而安其分也故生故曰毒參陽位者死謂帶火而出氣不得令頭粒紅紫地界不分譬如衃血豬肝勢極而不返故死若硃砂胭脂包者生息之氣猶存可治也痘不治法初出湧壯者不治出如蠶種者不治隨出隨沒者不治如蚊蟲咬者不治氣血相失者不治倒出者不治飲水如促鼻者不治與肺氣不能疏理也大凡七日以前為裡實不可投溫燥之劑能助毒也八日以後為裡虛不可投寒涼之劑能伐生氣也起泛宜當起泛而不起用川山甲炒成珠研二錢溫酒調服血弱不起根底淡薄用保元湯加丁香三粒肉桂一錢當歸二錢川芎一錢水煎服凡痘不起脹灰白色頂陷者氣血不足虛寒症也宜托裡散加丁香凡痘紫紅不起脹者火盛血熱宜服內托散去桂加紫草紅花熱盛加黃芩若紫黑陷伏用此藥調川山甲炒成珠為末五分同服內托散治血氣虛損或風邪穢毒沖觸使瘡毒內陷伏而不出或出而不勻用此藥活血勻氣調出補虛內托瘡毒使之盡出易收黃耆蜜炙人參當歸各二錢川芎防風桔梗白芷厚朴薑汁炒甘草各一錢木香官桂各三分上方於紅紫黑陷屬熱毒者去桂加紫草紅花黃芩若淡白灰黑陷伏屬虛寒者加丁香救里官桂救表當貫膿而不貫膿者倍參耆當歸煎熱臨服入人乳汁好酒同參溫服此貫膿之巧法也泄瀉加丁香乾薑肉蔻行漿宜八日漿不行其根虛薄血少故耳蓋以初起時毒載血妄行未免躥進其血虧矣至此不能成漿急以歸茸湯益之歸茸湯鹿茸酥炙一兩當歸五錢銼酒煎服凡痘屬虛寒八九日色光白如水泡頂陷根白癢塌寒戰等症回陽酒鹿茸酥炙焙大附子麵包煨去臍皮嫩黃耆當歸酒洗上銼好酒煎服兼有痰嗽加牛膽南星灰陷黑陷嘔吐白沫為表虛用木香散嘔甚用木香散加白豆蔻此正治也若未曾解毒另有法寒戰咬牙癢塌泄瀉為裡虛用異功散泄瀉甚用異功散加肉豆蔻乾嘔屬胃虛里熱用異功散木香散木香磨前胡黃耆白茯苓去皮白朮厚朴薑汁炒訶子煨取肉陳皮各一錢肉桂八分人參丁香雄者五粒上銼一劑水一鍾煎八分溫服異功散當歸川芎人參減半黃耆白朮去蘆白茯苓去皮訶子煨取肉大附子麵包煨去皮臍半夏薑汁炒各一錢厚朴薑汁炒肉桂各八分小丁香七枚上銼一劑水一鍾煎至八分溫服漿行而作癢此內熱而外為風寒所束用荊芥穗紙裹緊搓糊黏指頭令不散燈上燒過卻於桌上吹去灰快放手指定癢痘頭用荊芥穗火點癢處一下即放退患者自以為妙每癢痘悉點之立止行漿行足而發疔認定是黑疔痘或黑而硬或有紅絲或為大紫泡未曾解毒者仍以神功散加雄黃黃芩黃連大黃煎服卻用點法雄黃一錢研胭脂重浸水合濃調雄黃末點疔痘頂上立時即出紅活亦神法也蓋雄黃能拔毒胭脂能活血水漿足宜此時有咳逆胃氣上越欲絶也以真黃土鼻邊聞之立止九日而寒者異功散甚者宜九日寒戰大附子半個麵裹煨熱七錢乾薑炒黑五錢白朮五錢人參三錢水煎溫服此時漿滿或為寒所薄一時痘俱紫黑即如紫葡萄樣不必驚恐急以肉桂磨湯服之立見如舊回水宜九日十日回水之時元氣熏蒸真陽運化其水自然消燥此循環之妙理也其有未曾解毒至此時水不能化反歸於胃與所伏之毒伏於陽明則脾胃受戕宜以定中湯治之定中湯用真黃土能鎮安胃氣收斂中土取真正黃色不雜者用一塊在碗內百沸湯泡即以碗蓋少傾出用如冷傾入盞內外以熱水頓熱用兩酒盞和藥硃砂研細五分能鎮心胞絡使小腸不奔也雄黃研細一錢能解毒使胃氣寧也二味同和勻以黃土湯少加砂糖溫服二服立效煩躁悶亂發渴定中湯加片腦半分牛蒡子湯二盞和服有寒戰咬牙等症宜用附子理中湯有擦破周身不能回水急以新瓦椿作粉摻在破處立收此妙法也收靨宜若解毒不盡或未經解毒到當靨而不靨發熱蒸蒸者用甘露回天飲砂糖半酒盞百沸湯調一大碗溫服立時退熱痘即靨萬發萬中回天之力也若痘靨時濕靨乃外潰之痘淋漓黏沾者宜以甄陶散敷之新瓦不拘多少為細末篩過絹袋包撲患處若干痂堆積不落內又窨膿即以瓦粉用鴨蛋清調敷立收而落痂矣當靨時腹痛不靨其痛著在中脘乃熱毒凝滯瘀血作痛也手捻散牛蒡子白芍桃仁大黃各一錢紅花八分桂枝五分上銼一劑水煎溫服一服立愈若將靨時其痘一時盡黑非靨也乃火極攻裡即凶矣結痂宜外潰不結痂者甄陶散敷之結痂而誤犯風寒惡寒發熱者以補中益氣湯主之補中益氣湯當歸黃耆各一錢人參五分白朮八分柴胡升麻乾葛各一錢甘草五分上銼一劑生薑一片水煎服結痂後虛煩者宜加味保元湯加味保元湯黃耆二錢人參一錢麥門冬去心二錢半知母一錢半梔子炒一錢半甘草五分上銼一劑水煎溫服結痂後有餘熱者以前藥加牛蒡子一錢半白附子一錢還元宜痂落血氣尚虛無力者宜調理八物湯主之或十全大補湯還元痂落有餘毒覺其聚於臟腑時復作熱腹內疼痛宜牛蒡子飲主之牛蒡子飲牛蒡子前胡黃連黃芩連翹白附子玄參赤芍各一錢羌活防風甘草各五分上銼一劑水煎服五福化毒丹治痘疹後餘毒神效方見前諸熱祖傳經驗祕方凡痘後不問癰毒發於何經初起紅腫時用黑緑赤三豆以酸醋浸研漿時時以鵝翎刷之隨手退去效補遺祕方治小兒痘疹不起發用李樹上津膠每用些須熬水飲之即起復生丸治小兒痘疹不起發紫黑陷伏並痘疹初作已發未發服之其毒即解五日以前可服其效如神大梁鍾雲山傳當歸白芍西芎升麻葛根甘草各五錢嫩紫草茸一兩辰砂一兩一錢上為末煉蜜為丸如梧桐子大每服一丸冰雪雨三水送下如無河水亦可或糯米湯入酒一匙送下亦可桃紅痘疔方雄黃一錢紫草三錢上為細末胭脂汁調將銀簪挑破黑疔將藥點入內即效發痘方穿山甲用錢鋪炒焦黃色麝香少許上為細末六七歲者熱酒調下三分不可多用蓋被片時通身汗出牛黃散治痘黑陷虛弱而不起發硃砂一分牛黃三釐上為細末蜂蜜打濕胭脂汁取蜜調藥用銀簪刺黑陷上為之三次一日塗一次去黑麻疹麻疹乃六腑腸胃之熱蒸於肺外感內傷併發與痘疹表似同裡實異初熱三日出脹共三日出而又沒沒而又出一周時許重者遍身繃脹眼亦封閉有赤白微黃不同仍要紅活最嫌黑陷及面目胸腹稠密咽喉攢纏者逆發不出而喘者即死與大科癮疹相似又與發斑相似如錦紋有空缺處如雲頭狀麻即如麻遍身無空但疏密不同耳仍有夾斑夾丹夾瘡同出者初起呵缺發熱惡寒咳嗽噴嚏流涕頭眩宜升麻葛根湯加紫蘇蔥白以解肌切忌大汗斑不紅者亦宜乃麻痘初起之神方潮熱甚加芩連地骨皮譫語調辰砂六一散咳嗽加麻黃杏仁麥冬石膏咳甚另用涼膈散加桔梗地骨皮泄瀉宜四苓散便血合犀角地黃湯吐衄血加炒山梔不便赤加木通寒熱似瘧小柴胡湯初起全類傷寒但面赤中指冷為異耳已出煩躁作渴者解毒湯合白虎湯喘便閉者前胡枳殼湯加赤茯苓大黃甘草五味水煎服便閉三四日者小承氣湯防風通聖散譫語尿閉者導赤散如泔者四苓散加車前木通諺語如狂者解毒湯調辰砂六一散大便血小便亦見血者犀角地黃湯合解毒湯吐血衄血解毒湯加炒山梔童便泄瀉解毒湯合四苓散喘兼泄瀉溺澀者柴苓湯煩渴吐作瀉者白虎湯加蒼朮豬苓湯熱盛乾嘔解毒湯傷食嘔吐四君子湯夏月因暑作嘔四苓散加人參忌用豆蔻木香薑桂熱藥麻症初起已出已沒及一切雜症與痘毒大同但始終藥宜清涼雖麻喜清涼痘愛溫暖不易常道虛則補實則瀉醫家活法故治麻亦有血虛而用四物湯氣虛用四君子湯天寒傷冷則溫中理中之藥一時之權變用也麻症沒後餘熱內攻循衣摸床譫言妄語神昏喪志者死如熱輕餘毒未除必先見諸氣色雖預防之始終以升麻葛根湯為主或消毒飲解毒湯隨症選用仍忌魚腥蔥蒜之物升麻葛根湯方見痘瘡辰砂六一散即益元散方見中暑涼膈散方見火證四苓散即五苓散方見中暑犀角地黃湯方見吐血小柴胡湯方見傷寒解毒湯方見傷寒白虎湯方見傷寒小承氣湯即大黃枳實厚朴水煎服防風通聖散方見中風導赤散即生地木通甘草淡竹葉七個水煎服柴苓湯即小柴胡湯合五苓四君子湯方見補益四物湯方見補益理中湯方見中寒清毒飲牛蒡子防風荊芥甘草水煎服
