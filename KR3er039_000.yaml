front:
  text: 後序嘉靖丙辰歲六月十有一日世宗肅皇帝遣平江伯陳王謨偕諸司持節授册襲封余為王時值溽暑祗乃事罔恤勞瘁症中痰火頭眩喘嗽膝趾腫痛不能動履四時疾作苦楚莫禁余嫡長子朝升遍延諸醫治皆罔效誠墮痼病也萬曆丙戌五月復熾殆岌岌矣長子晝夜驚怖籲天身代皇皇無措天假良緣適金溪龔生雲林以應撫臺洪溪衷公之聘即汴邪獲與荊識叩其學術印乃父西園公家傳儒醫奕業鳴世久矣余欣然景慕遂隆禮市延生為入幕上賓生感其誠乃曰司鼎鼎者務為良相佐聖主成雍熙之世專方脈者務為良醫躋生民登仁壽之域余弗類不克為良相以光輔太平願以良醫濟世保王躬享遐齡增上壽以永國祚復沉潛診視植方投劑獲效如響不旬日而漸離榻又旬日而能履地又旬日而康復如初三十餘祀沉疴一旦起而痊愈之噫亦神矣哉生其聖於醫者乎因悉叩其生平蘊藉出古今醫鑑種杏仙方二帙已刊行於世覽之者人人擊節歎賞如醉春風矣然尤以為未展盡其底蘊又括百家奧旨成萬病回春一集其精微玄炒諸名公已序其首矣夫復何言顧余感其惠深嘉其用心之仁敢僣一言以續於後夫集以萬病回春名之者數總於萬也病而曰萬則無不該括時和於春也春而曰回則無不發生如萬物當嚴凝肅殺之餘挽之以陽春太和之盛天之造化生斡旋之矣行且大有補於世道醫國醫民何忝於良相乎是以售諸梓以廣其傳云萬曆十六年歲次戊子孟秋之吉周藩海陽王崑湖勤炵撰
