body:
  text: 雲林暇筆凡十二條一醫家十要一存仁心乃是良針博施濟衆惠澤斯深二通儒道儒醫世寶道理貴明群書當考三精脈理宜分表裡指下既明沉疴可起四識病原生死敢言醫家至此始至專門五知氣運以明歲序補瀉溫涼按時處治六明經絡認病不錯臟腑洞然今之扁鵲七識藥性立方應病不辨溫涼恐傷性命八會炮製火候詳細太過不及安危所繫九莫嫉妒因人好惡天理昭然速當悔晤十匆重利當存仁義貧富雖殊藥施無二一病家十要一擇明醫於病有裨不可不慎生死相隨二肯服藥諸病可卻有等愚人自家擔擱三宜早治始則容易履霜不謹堅冰即至四絶空房自然無疾倘若犯之神醫無術五戒惱怒必須省悟怒則火起難以救獲六息妄想須當靜養念慮一除精神自爽七節飲食調理有則過則傷神太飽難克八慎起居交際當祛稍若勞役元氣愈虛九莫信邪信之則差異端誑誘惑亂人家十勿惜費惜之何謂請問君家命財孰貴一醫家病家通病一南方人有患病者每延醫至家診視後止索一方命人購藥於市不論藥之真偽有無炮製輒用服之不效不責己之非唯責醫之庸明日遂易一醫如是者數致使病症愈增而醫人亦惑亂莫知其所以誤也籲此由病家之過歟亦醫家之不明歟一北方人有患病者每延醫至家不論病之輕重乃授一二金而索一二劑刻時奏效否則即復他求朝秦暮楚殊不知人稟有虛實病感有淺深且夫感冒腠理之疾一二劑可愈至於內傷勞痛瘵之症豈可一二劑可愈哉此習俗之弊誤於人者多矣唯智者辨之一醫道古稱仙道也原為活人今世之醫多不知此義每於富者用心貧者忽略此非醫者之恆情殆非仁術也以餘論之醫乃生死所寄責任匪輕豈可因其貧富而我之厚薄哉告我同志者當以太上好生之德為心慎勿論貧富均是活人是亦陰功也一凡病家延醫乃寄之以生死禮當敬重慎勿輕藐貧富不在論財自盡其誠稍褻之則非重命者耳更有等背義之徒本得醫人之力病愈思財假言昨作何福易於某人之藥所為吝財之計不歸功於一人籲使不得其利又不得其名此輩之心亦不仁之甚矣一常見今時之人每求醫治令患者臥於暗室帷幕之中並不告以所患止令切脈至於婦人多不之見豈能察其聲色更以錦帕之類護其手而醫者又不屑於問縱使問之亦不説此非所以求其愈病將欲難其醫乎殊不知古之神醫尚且以望聞問切四者缺一不可識病況今之醫未必如古之神安得以一切脈而洞知臟腑也耶余書此奉告世之患病者延醫至家罄告其所患令醫者對症切脈瞭然無疑則用藥無不效矣昔東坡云吾求愈疾而已豈以困醫為事哉一吾道中有等無行之徒專一誇己之長形人之短每至病家不問疾疴唯毀前醫之過以駭患者設使前醫用藥盡是何復他求蓋為一時或有所偏未能奏效豈可概將前藥為庸耶夫醫為仁道況授受相傳原系一體同道雖有毫末之差彼此亦當護疪慎勿訾毀斯不失忠厚之心也戒之戒之一人道至要存心以仁為主修己以敬為主慎獨以誠為主克欲以剛為主出語以確為主制行以清為主接物以恭為主處事以義為主容貌以壯為主衣冠以正為主飲食以節為主滋味以淡為主起居以早為主步履以安為主坐臥以常為主遊覽以適為主讀書以勤為主作文以精為主窮經以理為主觀史以斷為主吟詩以情為主立言以訓為主學術以儒為主異端以關為主日用以儉為主交際以稱為主辭受以禮為主事君以忠為主事親以孝為主兄弟以讓為主子孫以教為主妻妾以分為主男女以別為主宗黨以睦為主朋友以信為主故舊以厚為主食之以濟為主爭鬥以釋為主祀先以思為主祭神以齊為主御下以恩為主奉上以謹為主處常以經為主處變以權為主守官以廉為主御衆以恕為主行政以德為主教民以倫為主斷獄以哭為主使民以時為主稅斂以薄為主形罪以省為主良善以旌為主姦宄以懲為主民財以惜為主民力以寬為主田上以墾為主蠶桑以植為主城廓以完為主闤闠以寧為主盜賊以息為主流移以還為主兵甲以繕為主士卒以練為主馬政以孳為主鹽鐵以均為主商賈以通為主交易以平為主器皿以備為主材木以儲為主魚鱉以蕃為主雞豕以育為主橋梁以葺為主道路以平為主關市以積為主河漕以疏為主邊塞以防為主夷犯以霸為主一間評世病常見人家子弟在於父母之前有因分財産而怨父母不均者有聽妒妻言而怨父母不慈者有托實己過而怨父母不道者有放肆奢侈而怨父母拘管者有飲酒嫖賭而怨父母鈐束者有私其妻而不顧父母衣食者有厚於外戚而薄於父母用度者有兄弟執定輪養而致父母飢寒者有父勞於耕收母勞於井臼夫妻間過而還説父母不是者有父母患病不請醫藥而借言老疾難治者有父母衰老不行扶勞而輒言應該作蠱者若此之類難以備述鳴呼父母在日不行孝敬視如路人及至歿後卻乃披麻帶孝揚聲號哭請僧供佛修齋追薦盛張鼓樂唱戲暖伴置備佳肴美饌異果醇漿侍奉賓客恐不盡情扎造樓碑做紙馬人等物炫目壯觀徒有千金之費全無一毫之益語云生事之以禮死葬之以禮祭之以禮不遵大聖之成言且悖文公之家禮不唯取譏於達者抑且貽笑於大邦端書茲數句謹白世人一覽有則改之無則加勉暗室虧心神會搜檢禍福報應不錯半點言雖不文意思浮淺世病可革古風可遷慎之戒之愚言可覘一放肆訓嘗見世人負少年豪氣胸襟高傲言語剛強將謂無人唯知有己眼空四海欺侮一方好儀人之醜態不責己之過失口勝魚腸利劍舌賽吹毛快刀尤善於拒諫飾非難逃乎鄉間輿論一日時衰運去禍起蕭牆常抱造次之驚恆懷顛沛之厄陷入重典淹禁縲紲浪費萬貫難求一生蓋為不仁之所召也嗚呼豈若遵禮懼法屈己右人存心恭敬安分修德使鄉黨稱為端人乎一鬥訟訓竊見今人偶因一言之忿不忍或錙銖之利不均則然鬥毆構訟夫我欲求勝於彼則彼欲求勝於我矣仇讎相結怨怨相報遭官刑考訊身罹重罪久禁囹圄苦不堪言以致父母憂泣兄弟愁悲妻子驚哭朋友嘆息損千金而身命不保盡百計而無隙可脫破家蕩産禍貽兒孫尚未已也鳴呼豈若念忍一時後退一步饒讓一著庶幾安家樂業得享康福使鄉里稱為善人乎敘雲林志行紀志行紀何紀雲林生平之志素履之行也志行何紀之昔余先君令扶構恙幾危余請告就省當時皇皇驚怖賴雲林診攝救藥先君得以康復余為先君而戴雲林誠通家而骨肉者也稔知其為人之實因歷舉其志行而為之紀重嘉善也雲林世為金溪人姓龔氏名廷賢字子才生而岐嶷仁孝天畀襟度汪洋卓乎為昭代人豪早歲業舉子飽經術操觚染翰發為文詞雲錦天葩燦然立就將有志南溟效用廊廟以大究厥施緣數奇不第遂纘父業精於醫謂達則為良相不達則為良醫均之有補於世道也始遊許昌如扶溝詣都下即受知於太學士中玄高公定西侯文益蔣公大司寇三川劉公聲名燁燁播京師隨被命拜官榮歸既而由金陵復抵大梁在在馳聲起死回生活人無算王侯公卿賓禮敬慕迎候接踵贈以詩章旌以扁額絡繹不絶而周藩海陽王崑湖安昌王靜觀大宗正西亭及當道撫臺洪溪衷公翰林玉陽張公學憲一申楊公尤加毖焉然賦性廉介樂於施濟而不責報諸元老薦紳先生酬以金幣而不可卻者雖受之亦不私己遺歸以賑宗族鄉黨之貧困者事乃父西園公純孝溫清定省聚百順以養志如父志在仁天下即推所傳之祕集古今醫鑑種杏仙方萬病回春三書刊行於世使人人按書而察其病得以終天年而登壽域大有功於天下後世父志在鍾愛庶母所生二幼子即以其所愛者而加愛焉視之猶父然也凡家業悉推讓之又且另贈之以田使安享其逸以承父歡可謂善繼善述而恪守義方者也至於讓祖産於叔父貽厚資於仲弟建祠堂以承先立家訓以啓後創大門以華宗置義田以贍族此皆仁人義士之所為也又嘗輸谷粟賑飢民而不忍其顛連施棺木瘞旅襯而不忍其暴露解衣裘救寒士而不望其後償崇禮節友賢良而不爽其信行還鬻女返賣僮而不索其聘財憐鰥寡恤孤獨而不吝其厚費志行卓犖奇偉不可枚舉此特其彰明較著可紀而傳之以風世教也行將懿行上聞徵書疊下垂名竹帛端有在耳且陰德動天天心福善胤祚永昌食厚報於無窮寧非理之必然也哉不佞嘉其善而紀之以俟太史觀風者採焉夫何諛是為紀時萬曆十六年強圉大淵獻之歲陬月之吉賜進士第亞中大夫浙江布政使司參政臨川敬吾徐汝陽撰
