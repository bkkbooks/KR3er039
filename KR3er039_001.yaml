夾也兩旁稱也亦取挾斂飲食物也舌泄也舒泄所當言也齒始也少長之別始乎此也以齒食多者長也食少者幼也頤養也動於下止於上上下咀物以養人也牙攄牙也隨形言之也輔車其骨強所以輔持口也或曰牙車牙所載也或曰頷頷含也口含物之車也或曰頰車亦所以載物也或曰鼸車鼸鼠之食積於頰人食似之故取名也凡繫於車皆取在下載上物也耳耐也耳有一體屬著兩邊耐耐然也唇緣也口之緣也吻免也入之則碎出之則免也又取收也漱唾所出恆加收拭因以為名也舌卷也可以養制食物使不落也鼻下曰立人取立於鼻下狹而長似人立也口上曰髭髭姿也為姿容之美也下曰承漿漿水也頤下曰須須秀也物成乃秀人成而須生也亦取須體干長而復生也在頰耳旁曰髯隨口動搖髯髯然也其上連發曰鬢鬢濱也濱崖也為面額之崖岸也鬢曲頭曰距距拒也言其曲似拒也項確也堅確受枕之處頸徑也徑挺而長也咽咽物也喉候也氣之出入不失其候也䑍在頤纓理之中也青徐謂之脰物投其中受而下之者也又謂之嗌氣所流通厄要之處也胡互也在咽下垂能斂互物也胸猶空也空氣所沖也臆猶抑也抑氣所差也膺壅也氣所壅塞也腹復也富也腸胃之屬以自裹盛腹於外腹之其中多品似富者也心纖也所識纖微無物不貫心也肝干也五行屬木故其體狀有枝幹也凡物以木為干也肺勃也言其氣勃鬱也脾裨也在胃下裨助胃氣主化谷也腎引也腎屬水主引水氣灌注諸脈也胃圍也圍受食物也腸暢也通暢胃氣去滓穢也臍劑也腸端之所限劑也胞鞄也鞄空虛之言也土以虛乘水溝也或曰膀胱言其體短而橫廣也自臍以下曰小腹水汋所聚也又曰少腹少小也比於臍以上為小也陰蔭言所在蔭翳也脅挾也在兩旁臂所挾也肋勒也檢勒五臟也膈塞也塞上下使氣與谷不相通也腋繹也言可張翕尋繹也肩堅也甲闔也與胸脅皆所相會合也臂裨也在旁曰裨也肘注也可隱注也腕宛也言可宛屈也掌言可以排掌也手須也事業之所須也節有限節也爪紹也筋極為爪紹續指端也背倍也在後稱也脊積也積續骨節終上下也尾微也承脊之末稍微殺也腰約也在體之中約結而小也髖緩也其腋皮厚而緩也臀殿也高厚有殿選也尻廖也尻所在廖牢也腰要也脾股動搖如機樞也髀卑也在下稱也股固也為強固也膝伸也可以屈伸也腳卻也以其坐時卻在後也脛莖也直而長似莖也膝頭曰膊膊圍也因形團圓而名之也或曰蹁蹁扁也亦因形而名之也足續也言續脛也趾止也言行一進一止也蹄底也乃足之底也踝踴也居足兩旁確確然也亦因其形踝踝然也足後曰根在下旁著地一體任之象本根也踵鍾也鍾聚也上體之所鍾聚也周身臟腑形狀肝重四斤四兩左三葉右四葉凡七葉主藏魂心重十二兩中有七孔三毛盛精汁三合主藏神脾重二斤三兩扁廣三寸長五寸有散膏半斤主裹血溫五臟主藏魂肺重三斤三兩六葉兩耳凡八葉主藏魄腎有兩枚重一斤一兩主藏志膽在肝之短葉間重三兩三銖盛精汁三合胃重二斤十四兩紆曲屈伸長二丈六寸大一尺五寸徑五寸盛谷二斗水一斗五升小腸重二斤十四兩長三丈二尺廣二寸半徑八分分之少半左回疊積十六曲盛谷二斗四升水六升三合之大半大腸重二斤十二兩長二丈一尺廣四寸徑一寸當臍右回疊積十六曲盛谷一斗水七升半膀胱重九兩二銖縱廣九寸盛溺九升九合口廣二寸半唇至齒長九分齒以後至會厭深三寸半大容五合舌重十兩長七寸廣二寸半咽門重十兩廣二寸半至胃長一尺六寸喉嚨重十二兩廣二寸長一尺二寸九節肛門重十二兩大八寸徑二寸大半長二尺八寸受谷九升三合八分合之一人身面背手足之圖十二經脈歌並補瀉溫涼藥手太陰肺經脈歌手太陰肺中焦生下絡大腸出賁門上膈屬肺從肺系系橫出腋臑中行肘臂寸口上魚際大指內側爪甲根支絡還從腕後出接次指屬陽明經此經多氣而少血是動則病喘與咳肺脹膨膨缺盆痛兩手交瞀為臂厥所生病者為氣咳喘渴煩心胸滿結臑臂之內前臁痛小便頻數掌中熱氣虛肩背痛而寒氣盛亦疼風汗出欠伸少氣不足息遺矢無度溺變別肺臟補瀉溫涼藥補人參黃耆天門冬阿膠紫菀山藥五味子栝蔞麥門冬百部白芨沙參馬兜鈴白茯苓瀉葶藶防風通草枳殼檳榔桑白皮澤瀉琥珀赤茯苓紫蘇葉枳實麻黃杏仁蘿蔔子溫乾薑生薑肉桂木香白豆蔻蘇子半夏橘紅胡椒川椒涼片芩山梔桔梗石膏枇杷葉玄參貝母青黛羚羊角竹瀝本臟報使引經藥白芷升麻蔥白肺病飲食宜忌物甲乙經曰肺病者宜食黍雞肉桃蔥宜辛物忌苦物手陽明大腸經脈歌陽明之脈手大腸次指內側起商陽循指上連出合谷兩筋歧骨循臂膀入肘外臁循臑外肩端前臁柱骨旁從肩下入缺盆內絡肺下膈屬大腸支從缺盆上入頸斜貫頰前下齒當環出人中交左右上俠鼻孔注迎香此經氣盛血亦盛是動頸腫並齒痛所生病者為鼽衄目黃口乾喉痹生大指次指難為用肩前臑外痛相仍氣有餘兮脈熱腫虛則寒栗病偏增大腸補瀉溫涼藥補粟殼牡蠣木香蓮子肉豆蔻訶子倍子龍骨榛子砂糖糯米石蜜棕櫚子瀉大黃芒硝牽牛巴豆枳殼枳實桃仁檳榔蔥自麻子仁續隨子棐實溫人參乾薑肉桂吳茱萸半夏生薑胡椒丁香糯米桃花石涼條芩槐花黃連大黃胡黃連梔子連翹芒硝苦參石膏本腑報便引經藥葛根升麻白芷行上石膏行下足陽明胃經脈歌胃足陽明交鼻起下循鼻外下入齒還出俠口繞承漿頤後大迎頰車裡耳前髮際至額顱支下人迎缺盆底下膈入胃絡脾宮直者缺盆下乳內一支幽門循腹中下行直合氣沖逢遂由髀關抵膝臏胻跗中指內關同一支下膝注三里前出中指外關通一支別走足跗指大指之端經盡矣此經多氣復多血是動欠伸面顏黑悽悽惡寒畏見人忽聞木音心驚惕登高而歌棄衣走甚則腹脹仍賁響凡此諸疾皆骭厥所生病者為狂瘧濕淫汗出鼻流血口喎唇裂又喉痹膝臏疼痛腹脹結氣膺伏兔䯒外廉足跗中指俱痛徹有餘消穀溺色黃不足身前寒振栗胃房脹滿食不消氣盛身前皆有熱胃腑補瀉溫涼藥補白朮人參黃耆蓮肉炙甘草芡實山藥陳皮半夏糯米蜂蜜砂糖白糖荔枝林禽棗子山楂麥芽神麯瀉大黃硝石牽牛巴豆枳實厚朴枳殼三稜莪朮溫附子肉桂乾薑生薑丁香木香藿香砂仁益智香附川芎胡椒辛夷肉豆蔻草豆蔻白豆蔻吳茱萸香薷糯米諸糖涼石膏山梔大黃玄明粉寒水石黃連生地黃知母黃芩石斛玉屑連翹滑石葛根蘆根本腑報使引經藥葛根升麻白芷行上石膏行下胃病飲食宜忌物飛來子云虛寒宜辛甘忌苦實熱宜苦淡忌甘足太陰脾經脈歌太陰脾起足大趾上循內側白肉際核骨之後內踝前上腨循胻脛膝里股內前廉入腹中屬脾絡胃與膈通俠喉連舌散舌下支絡從胃注心宮此經氣盛而血衰是動其病氣所為食入即吐胃脘痛更兼身體痛難移腹脹善噫舌本強得後餘氣快然衰所生病者舌亦痛體重不食亦如之煩心心下仍急痛泄水溏瘕寒瘧隨不臥強立股膝腫疽發身黃大指痿脾臟補瀉溫涼藥補人參白朮黃耆炙甘草山藥芡實陳皮酒芍升麻少用柴胡少用南棗枸杞白茯苓蜂蜜砂糖甘蔗牛肉瀉枳殼枳實巴豆葶藶青皮大黃山楂神麯麥芽防風溫丁香木香乾薑生薑附子官桂砂仁豆蔻川芎益智茱萸胡椒花椒藿香良薑紅豆糯米晚米甜酒涼黃連連翹大黃黃芩寒水石石膏山梔芒硝西瓜緑豆苦茶玄明粉本臟報使引經藥升麻酒浸白芍藥脾病飲食宜忌物甲乙經曰脾病者宜食粳米牛肉宜甘忌酸手少陰心經脈歌手少陰脈起心中下膈直與小腸通支者還從肺系走直上喉嚨系目瞳直者上肺出腋下臑後肘內少海從臂內後廉抵掌中鋭骨之端注少衝多氣少血屬此經是動心脾痛難任渴欲飲水咽乾燥所生臑痛目如金脅臂之內後廉痛掌中有熱向經尋心臟補瀉溫涼藥補人參天竺黃金屑銀屑麥門冬遠志山藥川芎當歸羚羊角紅花炒鹽瀉枳實葶藶苦參貝母玄胡索杏仁鬱金黃連前胡半夏溫藿香蘇子木香沉香乳香石菖蒲涼黃連牛黃竹葉知母山梔連翹珍珠蘆根玄明粉貝母犀角本臟報使引經藥獨活細辛心病飲食宜忌物甲乙經曰心病者宜食麥羊肉杏韭宜苦物忌咸物手太陽小腸經脈歌手太陽經小腸脈小指之端起少澤循手外廉出踝中循臂骨出肘內側上循臑外出後廉直過肩解繞肩胛交肩下入缺盆內向腋絡心循咽嗌下膈抵胃屬小腸一支缺盆貫頸頰至目鋭眥卻入耳復從耳前仍上頰抵鼻升至目內眥斜絡於顴別絡接此經少氣還多血是動則病痛咽嗌頜下腫兮不可顧肩如拔兮臑似折所生病兮主肩臑耳聾目黃腫腮頰肘臂之外後廉痛部分尤當細分別小腸腑補瀉溫涼藥補牡蠣石斛甘草梢瀉海金沙大黃續隨子蔥白荔枝紫蘇溫巴戟茴香大茴香烏藥益智仁涼木通黃芩滑石黃柏通草山梔車前子茅根豬苓澤瀉芒硝小腸報使引經藥藁本羌活行上黃柏行下足太陽膀胱經脈歌足經太陽膀胱脈目內眥上起額尖支者巔上至耳角直者從巔腦後懸絡腦還出別下項仍隨肩膊俠脊邊抵腰膂腎膀胱內一支下與後陰連貫臀斜入委中穴一支膊內左右別貫胛俠脊過脾樞臀內後廉膕中合下貫腨內外踝後京骨之下指外側此經血多氣猶少是動頭痛不可當項如拔兮腰似折髀樞痛徹脊中央膕如結兮腨如裂是為踝厥筋乃傷所生瘧痔小指廢頭囟項痛目色黃腰尻膕腳疼連背淚流鼻衄及癲狂膀胱腑補瀉溫涼藥補橘核龍骨續斷菖蒲益智仁黃芩瀉芒硝豬苓澤瀉滑石車前子瞿麥木通萱草根溫茴香肉桂烏藥沉香蓽澄茄山茱萸涼黃柏知母防己滑石地膚子石膏甘草梢生地黃膀胱報使引經藥藁本羌活行上黃柏行下足少陰腎經脈歌足經腎脈屬少陰小指斜趨湧泉心然骨之下內踝後別入跟中腨內侵出膕內廉上股內貫脊屬腎膀胱臨直者屬腎貫肝膈入肺循喉舌本尋支者從肺絡心內仍至胸中部分深此經多氣而少血是動病飢不欲食喘嗽唾血喉中鳴坐如欲起面如垢目視䀮䀮氣不足心懸如飢常惕惕所生病者為舌乾口熱咽痛氣賁逼股內後廉並脊疼心腸煩痛疸而澼痿厥嗜臥體怠惰足下熱痛皆腎厥腎臟補瀉溫涼藥補知母黃柏生地黃熟地黃龜板虎骨覆盆子牛膝少用杜仲少用鎖陽山藥鹿茸枸杞當歸肉蓯蓉山茱萸瀉豬苓澤瀉琥珀苦茗白茯苓木通溫附子乾薑肉桂沉香破故紙柏實烏藥硫黃鍾乳胡蘆巴白馬莖狗肉陽起石諸酒鰻魚五味子巴戟天涼黃柏知母生地黃地骨皮牡丹皮玄參腎臟報使引經藥獨活肉桂鹽酒腎病飲食宜忌物甲乙經曰腎病者宜食大豆豕肉粟藿宜咸物忌甘物手厥陰心包絡經脈歌手厥陰心主起胸屬包下膈三焦宮支者循胸出脅下脅下連腋三寸同仍上抵腋循臑內太陰少陰兩經中指透中衝支者別小指次指絡相通此經少氣原多血是動則病手心熱肘臂攣急腋下腫甚則胸脅支滿結心中淡淡或大動善笑目黃面赤色所生病者為煩心心痛掌熱病之則心包絡補瀉溫涼藥補黃耆人參肉桂蓯蓉胡蘆巴鹿血菟絲子沉香故紙狗肉諸酒瀉大黃芒硝枳殼黃柏山桅子烏藥溫附子乾薑肉桂沉香膃肭臍川芎益智豆蔻補骨脂狗肉茴香硫黃烏藥鍾乳柏子仁燒酒涼黃柏知母黃連黃芩山梔柴胡石膏滑石臘雪玄明粉寒水石心包絡報使引經藥柴胡川芎行上青皮行下手少陽三焦經脈歌手經少陽三焦脈起自小指次指端兩指歧骨手腕表上出臂外兩骨間肘後臑外循肩上少陽之後交別傳下入缺盆膻中分散絡心包膈里穿支者膻中缺盆上上項耳後耳角旋屈下至頤仍注頰一支出耳入耳前卻從上關交曲頰至目內眥乃盡焉此經少血還多氣是動耳鳴喉腫痹所生病者汗自出耳後痛兼目鋭眥肩臑肘臂外皆疼小指次指亦如廢三焦補瀉溫涼藥補人參黃耆藿香益智炙甘草白朮桂枝瀉枳殼枳實青皮蘿蔔子烏藥神麯澤瀉溫附子丁香益智仙茅蓽澄茄厚朴乾薑茴香菟絲子沉香茱萸胡椒補骨脂涼石膏黃芩黃柏山梔滑石木通車前子龍膽草地骨皮知母三焦報使引經藥柴胡川芎行上青皮行下足少陽膽經脈歌足脈少陽膽之經始從兩目鋭眥生抵頭循角下耳後腦空風池次第行手少陽前至肩上交少陽右上缺盆支者耳後貫耳內出走耳前鋭眥循一支鋭眥大迎下合手少陽抵項根下加頰車缺盆合入胸貫膈絡肝經屬膽仍從脅裡過下入氣衝毛際縈橫入髀厭環跳內直者缺盆下腋膺過季脅下髀厭內出膝外廉是陽陵外輔絶骨踝前過足跗小指次指分一支別從大指去三毛之際接肝經此經多氣而少血是動口苦善太息心脅疼痛難轉移面塵足熱體無澤所生頭痛連鋭眥缺盆腫痛並兩腋馬刀挾癭生兩旁汗出振寒痎瘧疾胸脅髀膝至胻骨絶骨踝後及諸節膽腑補瀉溫涼藥補當歸山茱萸酸棗仁五味子諸酒胡椒辣菜雞肉烏梅瀉柴胡青皮黃連白芍川芎木通溫乾薑生薑肉桂陳皮半夏涼黃連黃芩柴胡竹茹龍膽草膽腑報使引經藥柴胡川芎上行青皮下行足厥陰肝經脈歌厥陰足脈肝所終大指之端毛際叢足跗上廉太衝分踝前一寸入中封上踝交出太陰後循膕內廉陰股沖環繞陰器抵小腹俠胃屬肝絡膽逢上貫隔里布脅肋俠喉頏顙目系同脈上巔會督脈出支者還生目系中下絡頰裡還唇內支者便從膈肺通此經血多氣少焉是動腰疼俯仰難男疝女人小腹腫面塵脫色及咽乾所生病者為胸滿嘔吐洞泄小便難或時遺溺並狐疝臨證還須仔細看肝臟補瀉溫涼藥補木瓜阿膠沙參橘核酸棗仁青梅薏苡仁山茱萸豬肉羊肉雞肉諸酒諸醋瀉柴胡黃連白芍川芎黃芩青皮青黛龍膽草溫木香肉桂吳萸楊梅桃子杏子李子涼黃連黃芩龍膽草車前子胡黃連柴胡草決明羚羊角肝臟報使引經藥柴胡川芎行上青皮行下肝病飲食宜忌物甲乙經曰肝病者宜食麻犬肉李韭宜酸物忌辛物十二月七十二候歌立春正月春氣動東風能解凝寒凍土底蟄蟲始振搖魚陟負冰相戲泳半月交得雨水後獺祭魚時隨應候候雁時催也北鄉那堪草木萌芽透驚蟄二月節氣浮桃始開花放樹頭鶬鶊鳴動無休歇催得胡鷹化作鳩春色平分才一半同時玄鳥重相見雷乃發聲天際頭閃閃云開始見電芳菲三月報清明梧桐枝上始含英田鼠化鴛人不覺虹橋始見雨初晴三月中時交穀雨萍始生遍間洲渚鳴鳩自拂其羽毛載勝降於桑樹隅立夏四月節相爭知他螻蟈為誰鳴無端蚯蚓縱橫出有意王瓜取次生小滿瞬時更迭至間尋苦菜爭榮處靡草乾朽死欲枯微看初暄麥秋至芒種一番新換豆不謂螳螂生如許鵙者鳴時聲不休反舌無聲沒半語夏至才交陰始生鹿乃角解養新茸陰陰蜩始鳴長日細細田間半夏生小暑乍來渾未覺溫風時至褰簾幕蟋蟀才居屋壁諸天崖又見鷹始摯大暑雖炎猶自好且看腐草為螢秒勻勻土潤散溽蒸大雨時行蘇枯稿大火西流入立秋涼風至透內房幽一庭白露微微降幾個寒蟬鳴樹頭一瞬中間處暑至鷹乃祭鳥誰教汝天地屬金始肅清禾乃登堂收幾許無可奈何白露秋大鴻小雁來南洲舊時玄鳥都歸去教令諸禽各養羞自入秋分八月中雷始收聲斂震宮蟄蟲壞戶先為御水始涸兮勢向東寒露人言晚節佳鴻雁來賓時不差雀入大水化為蛤爭看籬菊有黃花休言霜降非天意豺乃祭獸班時意草木皆黃落葉天蟄蟲咸俯迎寒氣誰著書來立冬信水始成冰寒日進地始凍兮折裂開雉入大水潛為蜃逡巡小雪年華暮虹藏不見知何處天升地降雨不交閉塞成冬如禁固紛飛大雪轉悽迷鶡鴠不鳴焉肯啼虎始交後風生壑荔挺出時霜滿溪短日漸長冬至矣蚯蚓結泉更不起漸漸林間麋角解水泉搖動溫井底去歲小寒今歲又雁聲北鄉春去舊鵲尋枝上始為巢雉入寒煙時一雊一年時盡大寒來雞始乳兮如乳孩徵鳥當權飛厲疾澤腹彌堅凍不開五朝一候如鱗次一歲從頭七十二達人觀此發天機多少乾坤無限事運氣候節交應時刻數訣前九之年二月中今年元旦日時同月月十五是初一千年萬載不移宮三十六年寒露逢日主時辰一般同今歲立春值此日時時刻刻在其中四十七年加兩月今年閏月過此宮閏年只在閏月起三年兩頭再加逢五時二刻驚蟄求二月節春分二月中十四時刻清明頭三月節穀雨三月中立夏一日三時六四月節小滿四月中芒種一日九候攸五月節至夏五月中二日二時二小暑六月節大暑六月中二日四時七刻秋七月節處暑七月中白露三朝單六刻八月節秋分八月中寒露三朝六時收九月節霜降九月中立冬三朝十一二十月節小雪十月中大雪四四兩頭流十一月節冬至十一月中小寒四日九時六十二月節大寒十二月中五日三時打春牛正月節雨水正月中醫學源流炎黃髮源醫祖軒轅岐伯繩書雷公炮製別精粗扁鵲神應桓主於懿治溺神效仲景傷寒誰如華他祕授當時無又得叔和脈助皇甫仕安甲乙葛洪肘後非殊真人思邈聖神途慈藏藥主恍悟上調西江月
