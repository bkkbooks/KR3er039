body:
  text: 卷之一題曰醫演岐黃本世傳為嗟海內困顛連幾篇術括千年祕一點春回萬病痊解使疲癃躋壽域卻慚譾陋著遺編敢云卞玉思三獻憂國憂民天下先萬金一統述萬金者萬象之精粹也一統者總括之大機也太初者氣之始也太始者形之始也太素者質之始也天者輕清而上浮也地者重濁而下凝也陽之精者為日東升而西墜也陰之精者為月夜見而晝隱也天不足西北故西北方陰也而人右耳目不如左明也地不滿東南故東南方陽也而人左手足不如右強也天氣下降地氣上升也陰中有陽陽中有陰也平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也故人亦應之天地者萬物之上下也陰陽者血氣之男女也左右者陰陽之道路也水火者陰陽之徵兆也金木者生成之始終也玄氣凝空水始生也赤氣炫空火始生也蒼氣浮空木始生也素氣橫空金始生也黃氣際空土始生也天地絪縕萬物化醇也男女媾精萬物化生也三才者天地人也人者得天地之正氣靈於萬物者也命者天之賦也精者身之本也形者生之舍也氣者生之足也神者生之制也心者君主之官神明出也肺看相傅之官治節出也膽者中正之官決斷出也膻者使臣之官喜樂出也肝者將軍之官謀慮出也脾胃者倉廩之官五味出也大腸者傳導之官變化出也小腸者受盛之官化物出也腎者作強之官伎巧出也膀胱者州都之官津液藏也氣化則能出矣命門者精神之所舍也男子以藏精女子以系胞三陽者太陽陽明少陽也三陰者太陰少陰厥陰也陽明者兩陽合明也兩陽合明曰明厥陰者兩陰交盡也兩陰交盡曰幽手太陰肺經也本臟經絡起中府穴終少商穴傳手陽明大腸經手陽明大腸經也起商陽穴終迎香穴傳足陽明胃經手少陰心經也起極泉穴終少衝穴傳手太陽小腸經手太陽小腸經也起少澤穴終聽宮穴注足太陽膀胱經手厥陰心胞絡也起天池穴終中衝穴傳手少陽三焦經手少陽三焦經也起關衝穴終耳門穴出足少陽膽經足太陽膀胱經也起睛明穴終至陰穴注足少陰腎經足少陰腎經也起湧泉穴終俞府穴傳手厥陰心包絡經足少陽膽經也起瞳子髎穴終竅陰穴傳足厥陰肝經足厥陰肝經也起大敦穴終期門穴復傳手太陰肺經足陽明胃經也起頭維穴終厲兌穴傳足太陰脾經足太陰脾經也起隱白穴終大包穴傳手少陰心經頭者諸陽之會也鼻者屬肺鼻和則知香臭也目者屬肝目和則知黑白也口者屬脾口和則知穀味也舌者屬心舌和則知五味也耳者屬腎耳和則知五音也肺開竅於鼻也心開竅於舌也脾開竅於口也肝開竅於目也腎開竅於耳也齒者腎之標骨之餘也發者屬心稟火氣也須者屬腎稟水氣也眉者屬肝稟木氣也毛者屬肺稟金氣也咽者咽物通水穀接三脘以通胃也呵欠者胃也喉者候氣有九節通五臟以系肺也善嚏者肺氣也聲音者根出於腎也善噫者脾氣也發者血之餘也爪者筋之餘也神者氣之餘也目得血而能視也耳得血而能聽也手得血而能攝也掌得血而能握也足得血而能步也髒得血而能液也腑得血而能氣也魂者神明之輔弼也魄者積氣之匡佐也營者水穀之精氣也衛者水穀之悍氣也直行者謂之經也旁行者謂之絡也脈者天真委和之氣也三部者尺關寸也九候者浮中沉也五臟者心肝脾肺腎也六腑者膽胃大腸小腸膀胱三焦也左手寸口心與小腸之脈所出君火也左手關部肝與膽之脈所出風木也左手尺部腎與膀胱之脈所出寒水也右手關部脾與胃之脈所出濕土也右手寸口肺與大腸之脈所出燥金也右手尺部命門與三焦之脈所出相火也每部中各有浮中沉三候也三候三而三之為九候也浮者主皮膚候表及腑也中者主肌肉以候胃氣也沉者主筋骨候里及臟也寸為陽為上部法天為心肺以應上焦主心胸以上至頭之有疾也關為陰陽之中為中部法人為肝脾以應中焦主膈以下至臍之有疾也尺為陰為下部法地為腎命以應下焦主臍以下至足之有疾也四時之脈者弦鉤毛石也春脈弦者肝東方木也夏脈鉤者心南方火也秋脈毛者肺西方金也冬脈實者腎北方水也四季脈遲緩者脾中央土也四時平脈者六脈俱帶和緩也謂有胃氣有胃氣曰生無胃氣曰死一呼一吸者為一息也一息四至者為平脈也太過不及者病脈也關格覆溢者死脈也三遲二敗冷而危也六數七極熱生多也八脫九死十歸墓也十一十二絶魂也兩息一至死脈也五行者金木水火土也相生者謂金生水水生木木生火火生土土生金是也相剋者謂金剋木木剋土土剋水水剋火火剋金是也相生者吉也相剋者凶也心若見沉細肝見短澀腎見遲緩肺見洪大脾見弦長皆遇克也心若見緩肝見洪肺見沉脾見澀腎見弦皆遇我之所生也男子左手脈常大於右手為順也女子右手脈常大於左手為順也男子尺脈常弱寸脈常盛是其常也女子尺脈常盛寸脈常弱是其常也男得女脈為不足也女得男脈為不足也男子不可久瀉也女子不可久吐也左手屬陽右手屬陰也關前屬陽關後屬陰也汗多亡陽下多亡陰也諸陰為寒諸陽為熱也人迎者左手關前一分是也氣口者右手關前一分是也人迎以候天之六氣風寒暑濕燥火之外感也人迎浮盛則傷風也緊盛則傷寒也虛弱則傷暑也沉細則傷濕也虛數則傷熱也氣口以候人之七情喜怒憂思悲恐驚之內傷也喜者則脈數也怒者則脈激也憂者則脈澀也思者則脈結也悲者則脈緊也恐者則脈沉也驚者則脈動也人迎脈緊盛大於氣口一倍為外感風與寒皆屬於表為陽也腑也氣口脈大於人迎一倍脈緊盛為傷食為勞倦皆屬於里為陰也臟也人迎氣口俱緊盛此為夾食傷寒為內傷外感也男子久病氣口充於人迎者有胃氣也女子久病人迎充於氣口者有胃氣也病雖重可治反此者逆外因者六淫之邪也內因者七情之氣也不內外因者飲食勞倦跌撲也浮沉遲數滑澀者為六脈也浮者為陽在表為風為虛也沉著為陰在裡為濕為實也遲者在臟為寒為冷為陰也數者在腑為熱為燥為陽也滑者血多氣少也滑為血有餘澀者氣多血少也澀為氣濁滯八要者表裡虛實寒熱邪正是也八脈者浮沉遲數滑澀大緩是也表者脈浮以別之病不在裡也里者脈沉以別之病不在表也虛者脈澀以別之五虛也實者脈滑以別之五實也寒者脈退以別之臟腑積冷也熱者脈數以別之臟腑積熱也邪者脈大以別之外邪相干也正者脈緩以別之外無邪干也洪弦長散浮之類也伏實短牢沉之類也細小微敗遲之類也疾促緊急數之類也動搖流利滑之類也芤虛結滯澀之類也堅實鉤革大之類也濡弱柔和緩之類也七表者浮芤滑實弦緊洪是也浮者不足舉有餘也芤者中空兩畔居也滑者如珠中有力也實者逼逼與長俱也弦者如按弓弦狀也緊者牽繩轉索是也洪者按之皆極大也浮為中風芤失血也滑吐實下分明別也弦為拘急緊為疼也洪大從來偏主熱也八里者微沉緩澀遲伏濡弱也微者如有又如無也沉者舉無按有餘也遲緩息間三度至也濡者散止細仍虛也伏者切骨沉相類也弱者沉微指下圖也澀者如刀輕刮竹也遲寒緩結微為痞也澀因血少沉氣滯也伏為積聚濡不足也弱則筋痿少精氣也九道者長短虛促結代牢動細也長者流利通三部也短者本部不及細也促者來數急促歇也虛者遲大無力軟也結者時止而遲緩也代者不還真可籲也牢者如弦沉更實也動者鼓動無定居也細者雖有但如線也長為陽毒三焦熱也短氣壅鬱未得倡也促陽氣拘時兼滯也虛為血少熱生驚也代主氣耗細氣少也牢氣滿急時主疼也結主積氣悶兼痛也動是虛勞血痢崩也六死者雀啄屋漏彈石解索魚翔蝦遊也雀啄連來三五啄也屋漏半日一點落也彈石硬來尋即散也解索搭指即散亂也魚翔似有亦似無也蝦遊靜中跳一躍也奇經八脈者陽維陰維陽蹺陰蹺衝脈任脈督脈帶脈也陽維者為病苦寒熱也陰維者為病苦心痛也陽蹺者為病陰緩而陽急也陰蹺者為病陽緩而陰急也沖之為病氣逆而裡急也督之為病脊強而厥冷也任之為病其內苦結男為七疝女為瘕聚也帶之為病腹滿腰脹溶溶若坐水中也中風宜遲浮忌急實也傷寒宜洪大忌沉細也咳嗽宜浮濡忌沉伏也腹脹宜浮大忌虛小也下利宜微小忌浮洪也狂疾宜實大忌沉細也霍亂宜浮洪忌微遲也消渴宜數大忌虛小也水氣宜浮大忌沉細也鼻衄宜沉細忌浮大也心腹疼痛宜沉細忌浮大也上氣浮腫宜浮滑忌微細也頭痛宜浮滑忌短澀也喘急宜浮滑忌澀脈也唾血宜沉弱忌實大也金瘡宜微細忌緊數也中惡宜緊細忌浮大也中毒宜數大忌微細也吐血宜沉小忌實大也腸癖宜沉遲忌數疾也內傷宜弦緊忌小弱也風痹宜虛濡忌緊急也溫病發熱忌微小也腹中有積忌虛弱也病熱忌脈靜也病泄忌脈大也翻胃宜浮緩忌沉澀也咳逆宜浮緩忌弦急也諸氣宜浮緊忌虛弱也痞滿宜滑脈忌澀脈也婦人帶下宜遲滑忌虛浮也婦人妊娠宜洪大忌沉細也産婦面赤舌青母活子死也面青舌青沫出母死子活也唇口俱青子母俱死也婦人已産宜小實忌虛浮也婦人勞虛右寸數者死也魚口氣急者死也循衣摸床者死也口臭不可近者死也面腫色蒼黑者死也髮直如麻者死也遺尿不知者死也舌卷卵縮者死也眼目直視者死也面無光者牙根黑者死也汗出身體不涼者死也頭面痛卒視無所見者死也黑色入耳目鼻漸入口者死也溫病大熱脈細小者死也人病脈不病者名內虛也溫病汗出不至足者死也病若閉目不欲見人者宜強急而長忌浮短而澀也病若開目而渴心下牢者宜緊實而數忌浮澀而微也病若吐血復衄血者宜沉細忌浮大而牢也病若譫言妄語身當有熱脈宜洪大忌手足厥逆脈細而微也病若大腹而泄者宜微細而澀忌緊大而滑也諸風掉眩者皆屬於肝也諸寒收引者皆屬於腎也諸濕腫滿者皆屬於脾也諸痿喘嘔者皆屬於胃也諸痛癢瘡者皆屬於心也瘦脫形發熱脈堅急者死也諸熱瞀瘛皆屬於火手少陽三焦經也瞀昏也瘛跳動也諸禁鼓栗如喪神守皆屬於火手少陰心經也禁冷也諸逆衝上皆屬於火手厥陰心胞絡經也諸痙強直皆屬於濕足太陽膀胱經也諸腹脹大皆屬於熱足太陰脾經也諸燥狂越皆屬於火足陽明胃經也諸暴強直皆屬於風足厥陰肝經也諸病有聲鼓之如鼓皆屬於熱手太陰肺經也諸病跗腫痠疼驚駭皆屬於火手陽明大腸經也跗腫足皆腫也諸轉反戾水液渾濁皆屬於熱手太陽小腸經也諸病水液澄沏清冷皆屬於寒足少陰腎經也諸嘔吐酸暴注下迫皆屬於熱足少陽膽經也暴注卒然瀉也下迫裡急後重也五虛者脈細皮寒氣少泄利前後飲食不入是也糜粥入胃泄瀉止則生五實者脈盛皮熱腹脹前後不通悶瞀是也瀉之大小通利而得汗者生五勝者氣盛則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡泄也五惡者心惡熱肺惡寒肝惡風脾惡濕腎惡燥也六脫者脫氣脫血脫津脫液脫精脫神也五勞者久視傷血勞於心也久臥傷氣勞於肺也久坐傷肉勞於脾也久立傷骨勞於腎也久行傷筋勞於肝也盡力謀慮勞傷乎肝應筋極也曲運神機勞傷平脾應肉極也意外過思勞傷乎心應脈極也預事而憂勞傷乎肺應氣極也矜持志節勞傷乎腎應骨極也頭者精神之府頭傾視深精神將脫也背者胸中之府背屈肩垂腑將壞也腰者腎之府轉搖不動腎將憊也骨者髓之府不能久立則振掉骨將憊也膝者筋之府屈伸不能行則僂傴筋將憊也一損損於皮毛皮聚而毛落也二損損於血脈血脈虛少不能榮於臟腑也三損損於肌肉肌肉消瘦飲食不能為肌膚也四損損於筋筋緩不能自收持也五損損於骨骨痿不能起於床也從上下者骨痿不能起於床者死也從下上者皮聚而毛落者死也肺主皮毛損其肺者益其氣也心主血脈損其心者調其榮衛也脾主肌肉損其脾者調其飲食適其寒溫也肝主筋損其筋者緩其中也腎主骨損其骨者益其精也憂愁思慮則傷心也形寒飲冷則傷肺也恚怒氣逆則傷肝也飲食勞倦則傷脾也坐濕入水則傷腎也亢則害承乃制也寒極則生熱也熱極則生寒也木極而似金也火極而似水也土極而似木也金極而似火也水極而似土也五郁者泄折達發奪也木鬱達之謂吐之令其條達也火鬱發之謂汗之令其疏散也土鬱奪之謂下之令無壅滯也金鬱泄之謂滲泄解表利小便也水鬱折之謂抑之制其沖逆也心下逆滿者下之過也氣上衝胸起則眩暈者吐之過也肉瞤筋惕足蜷惡寒者汗之過也脫陽者見鬼氣不守也脫陰者目盲血不榮也重陽者狂氣並於陽也重陰者癲血並於陰也氣留而不行者為氣先病也血壅而不濡者為血後病也五臟不和則九竅不通也六腑不和則流結為壅也手屈而不伸者病在筋也手伸而不屈者病在骨也瘛者筋脈急而縮也瘲者筋脈緩而伸也搐搦者手足牽引一伸一縮也舌吐不收者陽強也舌縮不能言者陰強也春傷於風夏必飧泄也夏傷於暑秋必痎瘧也秋傷於濕冬必咳嗽也冬傷於寒春必溫病也風者百病之長也風痱者謂四肢不收也偏枯者謂半身不遂也風懿者謂奄忽不知人也風痹者謂諸痹類風狀也癱者坦也筋脈弛縱坦然而不舉也瘓者渙也血氣散滿渙而不用也太陽則頭痛身熱脊強也寒者天地殺厲之氣也陽明則目痛鼻乾不眠也傷風者身熱有汗惡風也傷寒者身熱無汗惡寒也少陽則耳聾脅痛寒熱嘔而口苦也太陰則腹滿自利尺寸沉而津不到咽也少陰則舌乾而口燥也厥陰則煩滿而囊拳也表熱者翕然而熱也裡熱者蒸蒸而熱也項背強者太陽表邪也惡風者見風則怯也發熱惡寒者發於陽也無熱惡寒者發於陰也寒熱往來者陰陽相勝也煩熱者熱邪傳裡也煎厥者氣熱煩勞也薄厥者氣逆大甚也解㑊者脊脈痛少氣不欲言也四肢不收者脾病也肉痿者肌肉不仁也肉蠕動者脾熱也五飲者支飲留飲痰飲溢飲氣飲也五泄者脾泄胃泄大腸泄小腸泄大瘕泄也又有飧泄胃泄洞泄濡泄鶩溏之類脾泄者腹脹嘔逆也胃泄者飲食不化也大腸泄者食已窘迫也小腸泄者泄便膿血也大瘕泄者裡急後重也鶩溏泄者大腸有寒也腸垢者大腸有熱也飧泄者食不化脾病也脾約者大便堅而小便利也五膈者憂恚寒熱氣也五噎者憂思勞食氣也九氣者喜怒憂思悲恐驚勞寒暑也五積者五臟之所生也六聚者六腑之所成也肝積在左脅肥氣也肺積在右脅息奔也心積在臍上伏梁也腎積在臍下奔豚也脾積居中痞氣也五疸者黃汗黃疸酒疸谷疸女勞疸也五輪者風血肉氣水也八廓者天地水火風云山澤也五癭者肉癭筋癭血癭氣癭石癭也六瘤者骨瘤脂瘤肉瘤膿瘤血瘤石瘤也九種心痛者飲食風冷熱悸蟲疰去來痛也七疝者寒水筋血氣狐㿗也三消者多屬血虛也上消者肺也中消者胃也下消者腎也五痔者牝牡血脈腸痔也五淋者氣砂血膏勞也五痹者皮痹脈痹肌痹骨痹筋痹也又有痛痹著痹行痹周痹痛痹者筋骨掣痛也著痹者著而不行也行痹者走痛不定也周痹者周身疼痛也腎移寒於肝則癰腫少氣也脾移寒於肝則癰腫筋攣也肝移寒於心則狂隔中也心移寒於肺則肺消肺消者飲一溲二也死不治肺移寒於腎為湧水湧水者按腹不堅水氣客於大腸疾行則鳴濯濯如囊裹漿水之病也脾移熱於肝則為驚衄也肝移熱於心則死也心移熱於肺傳為隔消也肺移熱於腎傳為柔痓也腎移熱於脾傳為虛腸癖死不可治也胞移熱於膀胱則癃溺血也膀胱移熱於小腸膈腸不便上為口糜也小腸移熱於大腸為虛瘕為沉也大腸移熱於胃善食而瘦謂之食㑊胃移熱於膽亦曰食㑊膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也五味者辛甘苦酸咸也多食辛則筋急而爪枯也多食甘則骨痛而發落也多食苦則皮稿而發拔也多食酸則肉胝䐢而唇揭也多食鹹則脈凝注而變色也酒者氣厚上升陽也肉者味厚下降陰也味之薄者為陰中之陽味薄則通酸苦平咸是也味之厚者為陰中之陰味厚則泄酸苦咸寒是也氣之薄者為陽中之陰氣薄則發泄辛甘淡平寒涼是也氣之厚者為陽中之陽氣厚則發熱辛甘溫熱是也輕清成象味薄茶之類本乎天者親上也重濁成形味厚大黃之類本乎地者親下也各從其類氣味辛甘發散為陽也氣味酸苦湧泄為陰也清陽發腠理清之清者也清肺以助天真清陽實四肢清之濁者也榮華腠理濁陰歸六腑濁之濁者也堅強骨髓濁陰走五臟濁之清者也榮養於神七方者大小緩急奇偶復也大者君一臣三佐九制之大也遠而奇偶制其大服也大則數少少則二之腎肝位遠服湯散不厭頻而多小者君一臣二制之小也近而奇偶制小其服也小則數多多則九之心肺位近服湯散不厭頻而少緩者補上治上制以緩緩則氣味薄也治三以緩緩則治其本急者補下治下制以急急則氣味厚也治三以急急則治其標奇者君一臣二奇之制也君一臣三奇之制也陽數奇偶者君二臣四偶之制也君二臣六偶之制也陰數偶復者奇之不去則偶之是為重方也十劑者宣通補瀉輕重滑澀燥濕寒熱也宣可以去壅薑橘之屬是也通可以去滯木通防己之屬是也補可以去弱人參羊肉之屬是也瀉可以去閉葶藶大黃之屬是也輕可以去實麻黃葛根之屬是也重可以去怯磁石鐵漿之屬是也滑可以去著冬葵子榆白皮之屬是也澀可以去脫牡蠣龍骨之屬是也燥可以去濕桑白皮赤小豆之屬是也濕可以去枯白石英紫石英之屬是也寒可以去熱大黃朴硝之屬是也熱可以去寒附子官桂之屬是也百病晝則增劇夜則安靜是陽病有餘乃氣病而血不病也夜則增劇晝則安靜是陰病有餘乃血病而氣不病也晝則發熱夜則安靜是陽氣自旺於陽分也晝則安靜夜則發熱煩躁是陽氣下陷入陰中也名曰熱入血室晝則發熱煩躁夜亦發熱煩躁是重陽無陰也當亟瀉其陽峻補其陰夜則惡寒晝則安靜是陰血自旺於陰分也夜則安靜晝則惡寒是陰氣上溢於陽中也夜則惡寒晝亦惡寒是重陰無陽當亟瀉其陰峻補其陽也晝則惡寒夜則煩躁飲食不入名曰陰陽交錯者死也火多水少為陽實陰虛其病為熱也水多火少為陰實陽虛其病為寒也白者肺氣虛黑者腎氣足也肥人濕多瘦人火多也在表者汗而發之也在裡者下而奪之也在高者因而越之也謂可吐也剽悍者下而收之也臟寒虛脫者治以灸焫也脈病攣痹者治以針刺也血室蓄結腫熱者治以砭石也氣滯痿厥寒熱者治以導引也經絡不通病生於不仁者治以醪醴也血氣凝注病生筋脈者治以尉藥也人能健步以髓會絶骨也肩能任重以骨會大杼也少壯寐而不寤者此血有餘氣不足也老人寤而不寐者此氣有餘而血不足也前貧後富喜傷心也前富後貧多鬱火也開鬼門者謂發其汗也潔淨府者謂利小便也老衰久病者補虛為先也少壯新病者攻邪為主也節戒飲食者卻病之良方也調理脾胃者醫中之王道也望而知之者謂之神望其五色以知其病也聞而知之者謂之聖聞其五音以識其病也問而知之者謂之工問其所欲五味以審其病也切而知之者謂之巧切其脈以察其病也外感法張仲景也內傷法李東垣也熱病用劉河間也雜病用朱丹溪也識感中傷三者標本之微甚也明內外不內外均表裡之虛實也必先歲氣勿伐天和也能合色脈可以萬全也天地有南北之不同也人身有虛實之各異也化而裁之存乎變也神而明之在乎人也醫演岐黃神聖之術也學推孔孟仁義之心也此前聖之確論為醫家之所宗也誠後學之階梯乃雲林之所述也藥性歌共二百四十人參味甘大補元氣止渴生津調榮養衛肺中實熱並陰虛火動勞嗽吐血勿用肺虛氣短少氣盛喘煩熱去蘆用之反藜蘆黃耆性溫收汗固表托瘡生肌氣虛莫少得防風其功愈大用綿軟箭乾者以蜜水浸炒用之白朮甘溫健脾強胃止瀉除濕兼驅痰痞去蘆油茯苓味淡滲濕利竅白化痰涎赤通水道去皮甘草甘溫調和諸藥炙則溫中生則瀉火解百藥毒反甘遂海藻大戟芫花梢去尿管澀痛節消癰疽厥腫子除胸熱身生炙隨用當歸性溫生血補心扶虛益損逐瘀生新頭主血上行身養血中守尾破血下流全活血不走酒浸洗淨體肥痰盛薑汁浸曬乾用川芎性溫能止頭疼養新生血開鬱上行不宜單服久服令人暴亡白芍酸寒能收能補瀉痢腹疼虛寒勿與下利用炒後重用生赤芍酸寒能瀉能散破血通經産後勿犯生地微寒能消濕熱骨蒸煩勞兼消瘀血勿犯鐵器忌三日薑汁浸炒不泥膈痰熟地微溫滋腎補血益髓填精烏髭黑髮酒浸蒸用勿犯鐵器忌三日麥門甘寒解渴祛煩補心清肺有熱自安溫水漬去心不令人心煩天門甘寒肺痿肺癰消痰止嗽喘熱有功溫水漬去心皮黃連味苦瀉心除痞清熱明眸厚腸止痢去須生用瀉心清熱酒炒厚腸胃薑製止嘔吐黃芩苦寒枯瀉肺火而清大腸濕熱皆可去皮朽枯飄者治上焦條實者治下焦黃柏苦寒降火滋陰骨蒸濕熱下血堪任去粗皮切片蜜炒酒炒人乳炒童便炒或生用隨病用之梔子性寒解鬱除煩吐衄胃痛火降小便清上焦鬱熱用慢火炒黑清三焦實火生用能清曲屈之火連翹苦寒能消癰毒氣聚血凝濕熱堪逐去心石膏大寒能瀉胃火發渴頭疼解肌立妥知母味苦熱渴能除骨蒸有汗痰咳皆舒去皮毛忌鐵器生用瀉胃火酒炒瀉腎火貝母微寒止嗽化痰肺癰肺痿開鬱除煩去心大黃苦寒破血消瘀快膈通陽破除積聚酒炒上達顛頂酒洗中至胃脘生用下行芒硝苦寒實熱積聚蠲痰潤燥疏通便閉即朴硝用再煎煉傾入盆內結成芒硝也柴胡味苦能瀉肝火寒熱往來瘧疾均可去蘆前胡微寒寧嗽消痰寒熱頭疼痞悶能安去蘆毛軟者佳升麻性寒清胃解毒升提下陷牙疼可逐桔梗味苦療咽腫痛載藥上升開胸利壅去蘆紫蘇味辛風寒發表梗下諸氣消除脹滿麻黃味辛解表出汗身熱頭疼風寒發散止汗用根葛根味甘傷寒發表溫瘧往來止渴解酒薄荷味辛最清頭目祛風化痰骨蒸宜服防風甘溫能除頭暈骨節痹痛諸風口噤去蘆荊芥味辛能清頭目表汗祛風治瘡消瘀滑石沉寒滑能利竅解渴除煩濕熱可療白色者佳雜色者毒細辛辛溫少陰頭痛利竅通關風濕皆用去上葉羌活微溫祛風除濕身痛頭疼舒筋活骨獨活甘苦頸項難舒兩足濕痹諸風能除白芒辛溫陽明頭痛風熱瘙癢排膿通用藁本氣溫除痛顛頂寒濕可除風邪可屏香附味甘快氣開鬱止痛調經更消宿食忌鐵器楮去毛沒藥辛溫心腹脹痛小便滑數順氣通用枳實味苦消食除痞破積化痰沖牆倒壁水漬軟切片麩炒白蔻辛溫能卻瘴翳益氣調元止嘔翻胃枳殼微溫快氣寬腸胸中氣結脹滿堪嘗水漬軟去穰麩炒氣血弱者勿與枳殼以其損氣也陳皮甘溫順氣寬膈留白和脾消痰去白用溫水洗淨不可用水久泡則滋味盡去蒼朮甘溫健脾燥濕發汗寬中更祛瘴疫米泔水浸二宿搓去黑皮切片青皮苦寒能攻氣滯削堅平肝安脾下食少用熱水浸透去穰曬乾厚朴苦溫消脹除滿痰氣瀉痢其功不緩去粗皮薑汁浸炒