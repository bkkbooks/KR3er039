body:
  text: 卷之二中風脈中風浮吉滑兼痰氣其或沉滑勿以風治或浮或沉而微而虛扶危治痰風未可疏浮遲者吉急疾者殂真中風證中風者有真中風有類中風之分真中風者中時卒倒皆因體氣虛弱榮衛失調或喜怒憂思悲驚恐或酒色勞力所傷以致真氣耗散腠理不密風邪乘虛而入乃其中也有中腑中臟中血脈氣虛血虛之不同因而治法亦有異也大抵中腑可治中臟難醫有不治之證凡口開手撒眼合遺尿吐沫直視喉如鼾睡肉脫筋骨痛髮直搖頭上攛面赤如妝汗綴如珠痰喘作聲皆不治也若動止筋痛是無血滋筋故痛曰筋枯不治凡卒中昏倒不醒人事牙關緊急者此中風痰也宜後方先用通關散吹鼻次用吐法吐後未醒急灸百會人中頰車合谷即服導痰湯或攝生飲俟稍醒其氣未盡順痰未盡除唯當服藿香正氣散加南星木香防風當歸一二劑然後視其中某症則當以某方治之慎毋膠柱而鼓瑟也通關散治中風痰厥昏迷卒倒不省人事欲絶者牙皂去皮弦一兩生半夏藜蘆各五錢細辛苦參各二錢上為末每用少許吹入鼻內候有嚏可治無嚏不可治祕方治症同前用巴豆去殼紙包捶油去豆不用用紙捻作條送入鼻內或加牙皂末尤良或用前紙條燒煙燻入鼻內亦可回生丹海陵王長登亭傳治中風痰厥不省人事蔥管藜蘆二兩用河水一桶煮為汁青礞石二兩火煅通紅投入汁內如此數次濾淨將雄豬膽十個取汁攪前汁內再用重湯煮成膏候溫入片腦末一錢五分裝入瓷罐內黃蠟封口每用黃豆大一粒新汲水化開男左女右鼻孔吹進其痰自吐若牙關緊不能吐將口撥開其痰得出任下別藥祕方治中風口噤痰厥不省人事用桐油雞翎蘸掃入喉中吐痰即活一方用膽礬一分為末溫黃酒調下以吐痰為度一方用辰砂白礬等分三伏內裝入豬膽內透風處陰乾每用一塊涼水研化灌下一方用皂角末五分半夏末三分白礬末三分為一劑薑汁調服探吐後服加減導痰湯加減導痰湯治中風痰涎壅盛不能言語牙關緊急有熱者宜此南星半夏二藥用牙皂白礬生薑煎湯浸透炒乾白茯苓去皮陳皮去白栝蔞仁去殼枳實麩炒桔梗去蘆黃連薑汁炒黃芩去朽白朮去蘆各一錢人參去蘆當歸酒洗木香各五分甘草三分上銼一劑生薑三片水煎臨服入竹瀝薑汁同服攝生飲治一切卒中不論中風中寒中暑中濕及痰厥氣厥之類不省人事初作即用此無熱者用此南星濕紙裹煨半夏薑湯泡木香各一錢五分蒼朮生細辛石菖蒲甘草生各一錢上銼一劑生薑七片水煎溫服痰盛加全蠍炙二枚仍先用通關散搐鼻若牙噤者用烏梅肉揉和南星細辛末以中指蘸藥擦牙自開初中風邪麻木疼痛者風濕氣也宜後方烏藥順氣散治男婦一切風氣攻注四肢骨節疼痛肢體頑麻手足癱瘓言語謇澀筋脈拘攣宜先服此藥疏通氣道然後進以風藥蓋治風先理氣氣順則痰消徐理其風庶可收效理氣者氣滯氣鬱肩膊麻痛之類此七情也宜服之烏藥陳皮各二錢麻黃去節川芎白芷桔梗枳殼去穰麩炒各一錢殭蠶炒去絲乾薑炮五分甘草炙三分上銼一劑生薑三片棗一枚水煎溫服中風一身俱麻加人參白朮當歸川芎麥門冬久患左癱右瘓去麻黃加天麻防風羌活半夏南星木香當歸口眼喎斜加姜炒黃連羌活防風荊芥竹瀝薑汁遍身疼痛加當歸官桂乳香沒藥臂痛加羌活防風薄桂蒼朮紫蘇背心痛合行氣香蘇散加蒼朮半夏茯苓腳膝浮腫加牛膝獨活五加皮腰痛加牛膝杜仲角茴眼眩加細辛細茶四肢冷痹加附子官桂癱瘓二三年不能行者合和獨活寄生湯婦人血風加防風薄荷荊芥胸隔脹滿加枳實莪朮虛汗去麻黃加黃耆中風面目十指俱麻乃氣虛也用補中益氣湯加木香附子羌活防風烏藥麥門冬風中腑者多著四肢手足拘急不仁面加五色惡風寒為在表也疏風湯治風中在腑惡風寒拘急不仁先用此解表後用愈風湯調理而痊當歸川芎白茯苓去皮陳皮半夏薑製烏藥香附白芷羌活防風各八分細辛桂枝甘草各三分上銼一劑生薑三片水煎熱服風中臟者多滯九竅唇緩失音耳聾鼻塞目瞀二便閉塞為在裡也其半身不遂口眼喎斜語言謇澀或癱瘓不伸或舌強不語痰涎壅盛不省人事牙關緊急此皆中臟也若大便閉結者先服滋潤湯後服愈風湯調理滋潤湯治風中在臟大便閉結當歸生地黃枳殼去穰厚朴去皮檳榔大黃火麻仁杏仁去皮各一錢熟地黃羌活各七分紅花三分上銼一劑水煎空心溫服如元氣虛弱用蜜導法導之方見傷寒風中臟腑俱病者藥必兼用先表而後通也然後服愈風湯調理愈風湯治一切風症卒中初中中腑中臟及臟腑俱中以上數者先宜本經藥治之後用此方調理人參去蘆一錢二分白朮去蘆一錢二分白茯苓去皮一錢當歸酒洗一錢二分川芎八分白芍酒炒一錢陳皮一錢半夏薑製一錢枳實麩炒七分防風羌活各七分甘草三分上銼一劑生薑三片棗二枚水煎臨臥入竹瀝薑汁磨木香調服風中血脈者外無六經之形症內無便溺之阻隔肢不能舉口不能言為在中也宜養榮湯治風中血脈四肢不舉口不能言及痰迷心竅不省人事舌強不能言語痰涎壅盛口眼喎斜半身不遂當歸川芎去毛白芍酒炒生地黃麥門冬去心遠志甘草水泡去骨石菖蒲去毛陳皮烏藥白茯苓去皮枳實麩炒半夏用生薑牙皂白礬煎水浸二三日南星同上制黃連薑汁炒防風羌活秦艽甘草各等分上銼一劑生薑三片竹茹一團水煎入童便竹瀝薑汁少許同服省風清痰轉舌湯治口眼喎斜舌強難治陳皮二錢半夏薑製一錢枳實去殼三分麩炒黃芩酒炒三分防己一錢防風一錢全蠍洗去鹽七分南星薑製二分甘草五分白茯苓八分蟬蛻八分天麻四分上銼一劑生薑三片竹茹一團水煎服為丸服亦可風中經絡者則口眼喎斜也宜後方清痰順氣湯治口眼喎斜南星薑製栝蔞仁貝母陳皮蒼朮米泔浸炒官桂防風荊芥黃芩酒炒黃連酒炒半夏薑製甘草各等分上銼生薑三片水煎臨服入木香沉香末各五分同服青龍散治男子諸風口眼喎斜左癱右瘓半身不遂語言謇澀口流涎水及婦人産後諸風小兒急慢驚風並治川烏南星定粉半夏殭蠶川芎熟地黃草烏各四錢蚯蚓白芷各二錢白附子二錢五分上俱生用火上隔紙微炒為細末每服二錢或六釐小兒二釐初服有汗再服無汗臨臥黃酒調下如前症候先服烏藥順氣散不可見風戒色欲厚味一月其病可愈一方外用白鱔一條裝入竹管內尾上用針深刺出血血攤絹帛上乘熱貼在病人如歪向左貼右邊歪向右貼左邊立時即正正即洗去效左半身不遂手足癱瘓者屬血虛與死血也宜後方加減潤燥湯治中風左半身不遂手足癱瘓及語言費力呵缺噴嚏面目口眼喎斜寬弛頭目眩暈痰火熾盛筋骨時痛頭或痛心悸當歸一錢二分川芎一錢白芍酒炒二錢生地黃酒炒八分熟地黃薑汁炒八分白朮去蘆一錢白茯苓去皮一錢南星薑汁炒一錢半夏薑汁炒一錢陳皮鹽水洗八分桃仁去皮六分紅花酒洗四分天麻一錢羌活六分防風六分黃芩酒炒八分酸棗仁炒八分黃柏去皮酒炒三分薄桂六分甘草炙四分牛膝去蘆酒洗八分上銼一劑水煎入竹瀝薑汁少許溫服手不遂倍黃芩薄桂足不遂倍黃柏牛膝上半身不遂手足癱瘓者屬氣虛與濕痰也宜後方加減除濕湯治中風右半身不遂手足癱瘓及筋骨疼痛人參去蘆八分白朮去蘆一錢二分白茯苓當歸酒洗各一錢川芎八分赤芍一錢陳皮去白一錢半夏薑製一錢蒼朮米泔制一錢烏藥一錢枳殼麩炒一錢白芷九分桔梗八分黃連酒炒一錢黃芩酒炒一錢羌活一錢防風八分甘草五分上銼一劑生薑三片水煎溫服身痛加薑黃腳痛加牛膝防己威靈仙左右手足皆癱瘓此血氣之大虛也宜後方加味大補湯黃耆蜜炙人參去蘆白朮去蘆白茯苓去皮當歸酒洗川芎白芍酒炒大附子麵裹煨去皮臍沉香木香各三分川烏牛膝去蘆酒洗杜仲去蘆酒洗木瓜防風去蘆羌活獨活薏苡仁各五分肉桂甘草各三分上銼一劑薑棗煎服中風手足癱瘓口喎語澀等症屬血虛而火盛者宜清補也宜後方奪命還真丹治中風半身不遂手足癱瘓口眼喎斜語言謇澀一切諸風痰火氣鬱濕熱疼痛驚癇之疾當歸酒洗一兩川芎五錢白芍酒炒一兩熟地黃五錢生地黃五錢人參去蘆七錢白朮去蘆七錢半陳皮去白五錢白茯苓去皮一兩半夏薑製一兩枳殼麩炒一兩桔梗去蘆一兩木香七錢五分官桂五錢全蠍去毒五錢天麻七錢五分防風去蘆一兩殭蠶炒五錢羌活一兩五錢獨活七錢五分藁本七錢五分細辛三錢薄荷葉一兩菊花五錢知母一兩軟石膏一兩柴胡一兩黃芩五錢黃連五錢地骨皮五錢蔓荊子五錢菟絲子酒製七錢五分小茴酒炒一兩杜仲酒炒一兩麻黃一兩蛤蚧酥炙一兩甘草一兩上三十七味為末煉蜜為丸如彈子大金箔為衣每服一丸細嚼茶酒任下如中風癱瘓癩疾茶酒下如遍身筋骨疼痛及心氣痛及不省人事熱醋下如洗頭風及暗風茶清下如驚癇口吐涎沫溫酒下如婦人胎前産後經水不調酒煎香附湯下按上方以羌活愈風湯為本最能行導諸經滋養氣血使陰陽無偏勝久服大風悉去始終調理之良劑也中風手足癱瘓舌強言謇等症屬虛熱者宜滋補也宜後方健步虎潛丸治中風癱瘓手足不能動舌強謇於言黃耆鹽水炒當歸酒洗枸杞子酒洗龜板酥炙一兩知母人乳汁鹽酒炒牛膝去蘆酒洗白朮去蘆白芍鹽酒炒生地黃熟地黃虎脛骨酥炙杜仲薑酒炒人參去蘆二兩破故紙鹽酒炒一兩麥門冬水泡去心一兩白茯苓去皮木木瓜石菖蒲去毛酸棗仁遠志甘草水泡去心薏苡仁炒羌活酒洗獨活酒洗防風酒洗各一兩黃柏人乳汁鹽酒炒二兩五味子沉香大附子童便浸透麵裹煨去皮臍切四片又將童便浸煮乾各五錢上為末煉蜜和豬脊髓五條和為丸如梧桐子大每服百丸溫湯或酒送下中風手足癱瘓半身痿弱不能動履等症屬虛寒者宜溫補也宜後方鹿角霜丸治虛損半身痿弱或二三年不能動履者黃耆蜜水炒三兩人參去蘆二兩白茯苓去皮三兩白朮去蘆二兩當歸酒洗三兩川芎二兩白芍酒炒二兩熟地黃酒蒸二兩蒼朮米泔水浸二兩肉桂一兩破故紙酒炒二兩小茴酒炒一兩肉蓯蓉酒洗兩半木瓜一兩五錢牛膝去蘆一兩杜仲酒炒二兩檳榔一兩木香二錢烏藥炒一兩半續斷一兩虎脛骨酥炙兩半防風一兩半羌活一兩獨活一兩甘草生五錢大附子童便浸濕和麵包煨去皮尖一兩鹿角霜一斤川烏炮去皮尖一兩半上為細末好酒煮米糊為丸如梧桐子大每服七十丸空心米湯酒亦可下中風手足癱瘓等症屬風寒濕痹者宜祛除也宜後方蜜桃酥治男婦久患風寒濕痹左癱右瘓當歸川芎白芍生地黃各一兩人參去蘆白茯苓去皮三錢白朮去蘆陳皮半夏姜炒厚朴姜炒蒼朮米泔浸二日香附枳殼去穰各一兩烏藥砂仁杏仁去皮尖木香沉香各五錢天門冬去心麥門冬去心五味子破故紙小茴牛膝去蘆枸杞子川椒何首烏肉蓯蓉川烏泡去皮尖草烏泡去皮尖各五錢細辛白芷麻黃防風羌活獨活乾薑官桂甘草各一兩五加皮五錢小紅棗八兩北蜜八兩胡桃肉八兩泡去皮真酥油八兩上共四十四味俱銼片用生絹袋盛之用好酒一大金華壇浸藥三日封固放鍋內懸胎煮三個時辰取出埋土中三日出火毒每日空心服三盞日進三服其藥渣曬乾為末本酒打糊為丸如梧桐子大每服三錢丸空心本酒下仙傳藥酒方治男婦左癱右瘓口眼喎斜手足頑麻筋骨疼痛一切諸風痔漏寒濕腳氣疝氣十膈