奏效祕方治癱瘓如神熟牛骨內髓一碗煉熟蜜一斤二味濾過入炒麵一斤炒乾薑末三兩四味攪勻丸如彈子大一日服三四丸細嚼酒下大效神仙外應膏治左癱右瘓筋骨疼痛手足拘攣川烏一斤為細末用隔年陳醋入砂鍋內慢火熬如醬色敷患處如病有一年敷後一日發癢如病二年二日發癢癢時令人將手拍癢處以不癢為度先用升麻皮硝生薑煎水洗患處然後敷藥不可見風類中風證類中風者則常有之有中寒中暑中濕中火中氣食厥勞傷房勞痰厥血暈中惡卒死等症皆類中風者甚多各有治法不可作風治如用風藥誤之甚矣中於寒者謂冬月卒中寒氣昏冒口噤肢攣惡寒脈浮緊也宜後方其症或口吐涎沫重則四肢僵直先用熱酒薑汁各半盞灌之稍醒後隨用附子理中湯若不急治舌短囊縮而死矣附子理中湯治中寒厥倒大附子炮去臍乾薑吳茱萸炮官桂人參當歸陳皮厚朴姜炒白朮去蘆甘草炙上銼生薑棗子水煎熱服中於暑謂夏月卒暴炎暑昏冒痿厥吐瀉喘滿也宜後方十味香薷飲方見中暑中於濕者丹溪所謂東南之人多由濕土生痰痰生熱熱生風清燥湯方見痿躄依本方加竹瀝薑汁中於火者河間所謂肝木之風內中六經之邪外侵良由五志過極火盛水衰熱氣怫鬱昏冒而卒僕也宜後方用六味地黃丸四君子湯獨參湯之類內有恚怒傷肝火動上炎者用小柴胡湯之類六味地黃丸四君子湯俱見補益中於氣者由七情過極氣厥昏冒或牙關緊急也宜後方中氣症因與人相爭暴怒氣逆而暈倒者此名中氣氣脈多沉風脈多浮風中身溫有痰涎氣中身冷無痰涎先用薑湯灌救蘇後即用木香順氣散或藿香正氣散木香順氣散治中氣暈倒木香另研砂仁各五分烏藥香附青皮去穰陳皮半夏姜炒厚朴姜炒枳殼麩炒各一錢官桂乾薑甘草各三分上銼一劑生薑三片水煎木香調服氣不轉加蘇子沉香藿香正氣散治中風調理平和之劑方見霍亂食厥者過於飲食胃氣自傷不能運化故昏冒也宜後方先用姜鹽湯多灌探吐之後服六君子湯凡中卒倒口噤不能言目不識人四肢不舉等症多者飲食過度變為異常必須審問明白若果因飲食之後或著氣惱另煎鹽湯灌之探吐之即愈六君子湯人參七分白朮去蘆白茯苓去皮陳皮半夏薑汁製各一錢香附一錢二分木香砂仁各五分甘草三分上銼生薑三片棗二枚水煎溫服勞傷者過於勞役耗損元氣脾胃虛衰不任風寒故昏冒也宜後方補中益氣湯治氣虛卒倒方見內傷房勞者因腎虛精耗氣不歸元故昏冒也宜後方六味地黃丸方見補益痰厥者皆因內虛受寒痰氣阻塞手足厥冷麻痹眩暈欲倒脈沉細也宜後方加味二陳湯治痰厥暈倒陳皮半夏薑製白茯苓去皮當歸枳實麩炒桔梗去蘆杏仁去皮尖各一錢良薑砂仁各七分木香官桂甘草各三分上銼一劑生薑煎服氣逆加蘇子元氣虛弱去枳實血暈者皆因平日去血過多虛而成血暈脈微澀也宜後方加味四物湯治血虛眩暈卒倒不可艾灸驚哭叫動動則乘虛而死當歸川芎白芍炒生地黃熟地黃黃耆蜜炙人參白朮去蘆陳皮白茯苓去皮荊芥甘草炙各等分上銼棗二枚烏梅一個水煎服飽悶加香附砂仁去黃耆白朮卒中暴厥者卒然不省人事也其症因犯不正之氣忽然手足厥冷肌膚粟起頭面青黑精神不守錯言妄語牙緊口噤昏不知人頭旋暈倒此中惡卒厥客忤飛尸鬼擊吊死開喪入廟登冢多有此病也宜艾灸臍中百壯以皂角末搐鼻或半夏末亦可或研韭汁灌耳中即活或以蘇合香丸灌之俟稍醒用調氣散合平胃散服之或藿香正氣散亦可調氣散白豆蔻丁香檀香木香各二錢藿香甘草炙各八錢砂仁四錢上為末每服二錢入鹽少許沸湯點服蘇合香丸治男婦中風中氣牙關緊閉口眼喎斜不省人事並傳尸骨蒸勞瘵卒暴心疼鬼魅瘴瘧小兒急慢驚搐婦人産後中風赤白痢疾一切氣暴之症最能順氣化痰沉香木香丁香白檀香安息香酒熬膏麝香香附米白朮訶子肉蓽茇硃砂犀角鎊各一兩乳香片腦蘇合香油入息香膏內各五錢上將各味咀成片為細末入腦麝安息香蘇合香油同藥攪勻煉蜜為丸每丸重一錢用蠟包裹每用大人一丸小兒半丸去蠟皮以生薑自然汁化開擦牙關另煎薑湯少許調藥灌下神效預防中風凡人初覺大指次指麻木不仁或手足少力肌肉微掣三年內有中風之疾宜先服愈風湯天麻丸各一料此治未病之先也又云於未病之先服竹瀝枳朮九可祛去之若與搜風順氣丸間服何中風之有愈風湯初覺風動服此不致倒僕此乃治未病之聖藥也又治中風症內邪已除外邪已盡當服此藥以導諸經久服大風盡去縱有微邪只從此藥加減治之然治病之法不可失於通塞或一氣之微汗或一旬之通利如此乃常治之法也久則清濁自分榮衛自和矣黃耆蜜炙人參去蘆當歸酒洗白芍酒炒生地黃枸杞子杜仲姜酒炒秦艽肉桂蒼朮米泔洗羌活獨活防風薄荷菊花細辛麻黃蔓荊子白芷地骨皮知母石膏柴胡黃芩枳殼麩炒甘草上銼每服一兩生薑三片水煎空心服渣再煎臨臥服一方加熟地黃半夏厚朴前胡防己茯苓療腎肝虛筋骨弱語言謇澀精神昏憒此藥安心養神調理陰陽使無偏勝治中風內外無邪服此藥以行中道及治風濕內弱風熱體重或瘦而肢體偏枯或肥而半身不遂天麻丸治風因熱而生熱勝則風動宜以靜以勝其燥是養血也此藥能行榮衛壯筋骨方治足三陰虧損風邪折傷致肢體麻木手足不隨等症去附子加肉桂熟地黃名愈風丹天麻牛膝去蘆酒洗萆薢玄參各一兩半杜仲姜炒一兩七錢大附子去皮臍五錢羌活三兩半當歸酒洗一兩半生地黃酒洗四兩去腎間風加獨活一兩半上為末煉蜜為丸如梧桐子大每服七八十丸空心酒下白湯亦可良久則食竹瀝枳朮丸化痰清火順氣除濕祛暈眩療麻木養血健脾胃白朮去蘆土炒蒼朮泔製鹽水炒各二兩枳實麩炒陳皮去白白茯苓去皮半夏白礬皂角生薑水煮乾南星制同上黃連姜炒條芩酒炒當歸酒洗山楂去核白芥子炒白芍酒炒各二兩人參五錢木香一錢上為細末以神麯六兩薑汁一盞竹瀝一碗煮糊為丸如梧桐子大每服百丸食遠淡薑湯送下搜風順氣丸治腸胃積熱以致膈間痞悶大便結燥小便赤澀腸風痔漏腰膝痠疼肢節頑麻手足癱瘓行步艱辛語言謇澀三十六種風七十二般氣無不效驗大黃五兩酒蒸九次要黑火麻仁微炒去殼郁李仁去殼泡去皮二兩菟絲子酒煮二兩乾山藥二兩牛膝去蘆酒洗二兩枳殼麩炒一兩檳榔二兩車前子炒二兩半山茱萸酒蒸去核二兩上為末煉蜜為丸如梧桐子大每服三十丸茶酒任下百無所忌早晚各一服余屢試前方有效者有不效者不效者多是脾肺之虛腎氣之弱唯宜補中益氣湯六味地黃丸兼進之可免中風之患矣方見補益大司寇三川劉公患卒倒不省人事口眼相引手足戰掉一醫作風治一醫作痰火治俱罔效余診六脈沉數氣口緊盛此非風非痰火乃氣夾食也其家人始悟曰適正食之際被惱怒所觸遂致如此用行氣香蘇散加木香青皮山楂一服即瘥桑環川劉前溪素皆與余善年俱近五旬而桑多欲劉嗜酒其脈左右俱微人迎盛右脈滑大時常手足痠麻肌肉蠕動此氣血虛而風痰盛也余謂三年內俱有癱瘓之患二君宜謹慎因勸其服藥以免後患桑然其言每年制搜風順氣丸延齡固本丹各一料後果無恙其劉不聽愈縱飲無忌未及三年果中風卒倒癱瘓言澀求治於豫曰悔不聽君言致有今日願君竭力救我殘喘則再造之恩也豫以養榮湯加減並健步虎潛丸二藥兼服一年餘始愈劉大尹素有疾兩臂頑麻兩目流淚服搜風化痰藥痰愈甚臂反痛不能伸手指俱攣余曰麻屬氣虛誤服前藥肝火熾盛肝血乾涸筋無所養虛而攣耳當補脾肺滋腎水則風自去熱自退痰自清遂用六味丸補中益氣湯不三月而痊方見補益傷寒附傷風脈脈陽浮而陰弱謂之傷風邪在六經俱弦加之陽浮衛中風也陰弱榮氣弱也風傷陽故浮虛也脈浮緊而無汗謂之傷寒寒傷榮榮實則衛盈陽浮緊邪在上焦主欲吐也脈浮頭項痛腰脊強病在太陽脈長身熱鼻乾目疼不得臥病在陽明脈弦胸脅痛耳聾往來寒熱病在少陽脈沉細咽乾腹滿自利病在太陰脈微緩口燥舌乾而渴病在少陰脈沉澀煩滿囊縮病在厥陰左手脈來緊盛即是傷寒右手脈平和右手脈來緊盛即是飲食內傷左手脈平和左右手脈俱緊盛即是夾食傷寒此為內傷外感右手脈來空虛左手脈來緊盛即是勞力傷寒亦為內傷外感左右手脈來沉細或伏面色青手足冷小腹絞痛甚則吐利舌卷囊縮即是夾陰中寒此是真陰症脈來浮緊有力為寒邪在表治宜發散脈來沉實有力為陰邪伏陽治宜攻下脈來沉細無力此純陰也宜退陰助陽脈來沉數有力為熱相傳裡宜清解邪熱傷寒審證口訣口苦者是膽熱也口甜者是脾熱也口燥咽乾者是腎熱也舌乾口燥者是胃熱也手心熱者邪在裡也手背熱者邪在表也手足溫者陽證也手足冷者陰證也鼻流濁涕者屬風熱也鼻流清涕者屬肺寒也唇口俱腫赤者是熱極也唇口俱青黑者是寒極也凡開目喜見人者屬陽也閉目不欲見人者屬陰也多睡者陽虛陰盛也無睡者陰虛陽盛也喜明者屬陽元氣實也喜暗者屬陰元氣虛也睡向壁者屬陰元氣虛也睡向外者屬陽元氣實也舌青紫者是陰寒也舌赤紫者是陽毒也譫語者口出無倫邪氣勝也鄭聲者語不接續精氣脫也狂言者無稽妄談邪熱氣勝也獨語者無人則言是邪入里也目直視者園正而不轉動也怕木聲走響者胃虛不可下也瘛者筋脈急而縮也瘲者筋脈緩而伸也傷寒治法正傷寒者大汗之大下之感冒暴寒者微汗之微下之勞力感寒者溫散之溫熱病者微解之大下之陰證似陽者溫之陽證似陰者下之陽毒者分輕重下之陰毒者分緩急溫之陽狂者下之陰厥者溫之濕熱發黃者利之下之血症發黃者清之下之發斑者清之下之譫語者下之清之痞滿者消之瀉之結胸者解之下之太陽症似少陰者溫之少陰症似太陽者汗之衄血者解之止之發喘者汗之下之咳嗽者清之解之在表者汗之散之在裡者利之下之在上者因而越之陷下者升而舉之從乎中者和解之直中陰經者溫補之解表不開不可攻裡日數雖多但見表症脈浮尚宜汗之里症具者不可攻表日數雖少但見里症脈沉實尤宜下之若同而異者明之似是而非者辨之傷寒總論夫寒者天地殺厲之氣也秋之寒露冬之霜雪皆寒邪也是以辛苦之人起居不由乎節飲食不順乎時感其霧露之氣則其邪淺感其霜雪之氣則其邪深感而即病名曰傷寒不即病者寒邪藏於肌肉之間伏於榮衛之內至春因溫暖之氣而發者名曰溫病至夏因暑熱之氣而作者名曰熱病傷寒也溫病也熱病也一理而已若乃疫癘之疾稍有不同者蓋因春應溫而反涼夏應熱而反冷秋應涼而反熱冬應寒而反溫四時不正之氣也感其春夏不正之氣則為溫疫感其秋冬不正之邪則為寒疫然其經絡傳變表裡受症與傷寒同也俗云時氣病爾經總論之曰傷寒所以為人之大病者害人最速也軒岐以下得其治法之祕者唯張長沙一人而已厥後劉河間不蹈其麻黃桂枝發表之藥自制雙解散辛涼之劑非不同也時有異也彼一時也奈五運六氣有所更世態居民有所變天以常靜人以常動動則屬陽靜則屬陰清平之世同水化也雖有辛熱之藥不生他症擾攘之世同火化也若用辛熱之藥則發黃生斑變壞之病作矣蓋人內火既動外火又侵所以辛熱發汗不如辛溫辛溫發汗不如辛涼之藥發汗一劑而立雪以辛熱之藥發汗輕者必危重者必死可不謹哉四時感冒風寒者宜表解也十神湯治感冒風寒發熱惡寒頭疼身痛咳嗽喘急或欲成疹此藥不問陰陽兩感風寒及四時不正瘟疫妄行並宜服之川芎白芷麻黃紫蘇陳皮香附赤芍升麻乾葛甘草上銼劑每服一兩生薑三片煎服欲汗以被蓋之如發熱頭痛加細辛石膏蔥白胸膈膨悶加枳殼桔梗心腹脹滿加枳實半夏潮熱加黃芩麥門冬咳嗽喘急加桑白皮桔梗半夏大便閉加大黃芒硝嘔吐加藿香半夏泄瀉加白朮茯苓瘧疾加草果檳榔痢疾加枳殼黃連腹痛加白芍人參敗毒散治傷寒頭痛壯熱惡風及風疾咳嗽鼻塞聲重四時瘟疫熱毒頭面腫痛痢疾發熱諸般瘡毒小兒驚風柴胡桔梗去蘆羌活獨活茯苓川芎前胡枳殼去穰人參去蘆甘草各等分薄荷減半上銼劑每一兩生薑煎服一傷寒頭疼身痛項強壯熱惡寒口乾心中蘊熱加黃芩傷寒汗後不解亦宜服此一傷風鼻塞聲重咳嗽吐痰加半夏杏仁一四時瘟疫流行衆人一般病者加葛根一切火熱之症加連翹梔子枯芩玄參黃連防風貝母天花粉酒大黃玄明粉一酒毒發熱不渴加葛根黃連一瘧疾不問先寒後熱先熱後寒頭疼身痛加蒼朮葛根草果檳榔一痢疾不問赤白發熱不退及時行疫痢加黃連陳倉米噤口加石蓮肉倉米痢後手足痛加木瓜檳榔一頭目眩暈屬風熱者加天麻半夏一眼目腫痛因風寒所感者加防風荊芥歸尾赤芍去參苓一腳氣流注腳踝上焮熱赤腫寒熱如瘧自汗惡風加蒼朮酒大黃皮膚瘙癢加蟬蛻一兩膝赤腫強急作痛而熱兩總筋拘急此血熱也加赤芍大黃或利氣下之一痛風痛有常處赤腫灼熱或渾身壯熱此欲成風毒依本方一腸風下血必在糞前是名近血加黃連又治酒毒下血加黃連用巴豆同炒去豆不用一婦人吹乳乳癰便毒憎寒壯熱或頭痛者加金銀花殭蠶貝母天花粉青皮白芷當歸尾一小兒急慢驚風初起發熱手足發搐上竄天吊加天麻全蠍殭蠶白附子地骨皮一小兒痘疹初起發熱頭疼疑似之間即服此發散加天麻地骨皮防風荊芥去參芩一癰疽疔瘡發背乳癰一切無毒腫毒發熱頭痛狀似傷寒加金銀花連翹防風荊芥升麻葛根湯治傷寒頭痛時疫憎寒壯熱肢體痛發熱惡寒鼻乾不得眠兼治寒暄不時人多病疫乍暖脫衣及瘡疹已發未發疑似之間宜用升麻三錢葛根三錢白芍藥二錢甘草二錢上銼一劑生薑三片水煎服頭痛加蔥白三根同煎熱服咳嗽加桑白皮上膈熱加黃芩薄荷無汗加麻黃咽痛加桔梗甘草發黃丹毒加玄參傷寒頭項痛腰脊強熱者太陽證也無汗惡寒此傷寒在表脈來浮緊有力春夏秋用九味羌活湯冬月用麻黃湯九味羌活湯治春夏秋非時感冒暴寒頭痛發熱無汗脊強脈浮緊此是太陽膀胱經受邪宜此發散羌活二錢防風一錢半蒼朮米泔浸一錢川芎一錢半細辛三分白芷生地黃黃芩各一錢甘草三分上銼生薑三片蔥白三根水煎熱服如汗不出用紫蘇葉煎湯以器盛放被內於腳腕下熏之用生薑渣綿裹周身擦之其汗自出麻黃湯治冬月正傷寒頭疼發熱惡寒脊強脈浮緊無汗為表證此足太陽膀胱經受邪當發汗麻黃桂枝川芎杏仁白芷防風羌活升麻甘草上銼生薑三片蔥白三根豆豉一撮水煎熱服以被蓋出汗有汗惡風此傷寒在表脈來浮緩無力春夏秋宜加減沖和湯冬月宜桂枝湯加減沖和湯治春夏秋感冒非時暴寒亦有頭痛惡寒身熱脈浮緩自汗宜實表羌活白朮川芎白芷黃耆細辛生地黃防風黃芩甘草上銼生薑三片蔥白三根水煎溫服桂枝湯治冬月正傷寒頭痛發熱惡風脊強脈浮緩自汗為表症此足太陽膀胱經受邪當實表散邪無汗者不可服桂枝芍藥防風羌活川芎白朮甘草上銼生薑三片大棗一枚水煎溫服傷寒眼眶痛鼻乾不得眠者陽明症也若發熱無汗宜柴胡解肌湯若渴而有汗不解或經汗過不解宜白虎湯柴胡解肌湯治足陽明胃經受症目痛鼻乾不得眠眼眶痛脈來微洪宜解肌屬陽明經病其正陽明腑病別有治法柴胡黃芩乾葛芍藥羌活白芷桔梗石膏甘草上銼生薑三片棗一枚水煎溫服本經無汗惡寒去黃芩加麻黃白虎湯治陽明經汗後脈洪大而渴或身熱有汗不解石膏五錢知母二錢粳米一勺甘草七分人參一錢五味子十粒麥門冬去心梔子各一錢上銼一劑水煎溫服如口燥煩渴或發赤斑加元參犀角名化斑湯秋感熱之疫癘或陽明下後大便不固熱不退者或濕溫症熱不退而大便溏者依本方加蒼朮若傷寒汗下後自汗虛熱不退加蒼朮人參一服通神無汗脈浮表未解而陰氣盛雖渴不可用白虎湯里有熱者方可用傷寒耳聾胸脅痛發寒熱嘔而口苦者少陽症也此在半表半裡宜和解宜小柴胡湯小柴胡湯治傷寒三四日脈息弦急而數病傳少陽經也其症頭疼發熱脅痛耳聾嘔吐口苦寒熱往來柴胡二錢黃芩一錢半半夏七分人參七分甘草五分加山梔牡丹皮名加味小柴胡湯上銼一劑生薑三片棗二枚水煎服心中飽悶加桔梗枳殼心中痞滿加黃連枳實渴加知母石膏內熱甚錯語心煩不得眠合解毒湯之類上治肝膽經風熱或寒熱往來或晡熱潮熱或怒火口苦耳聾咳嗽瀉痢腹作痛諸症傷寒腹滿而痛咽乾而渴手足溫暖太陽症也桂枝大黃湯治足太陰脾經受症腹滿而痛咽乾而渴手足溫脈來沉而有力皆因邪熱從陽經傳入陰經也桂枝芍藥大黃柴胡枳實甘草上銼生薑三片棗一枚水煎臨服時入檳榔磨水三匙同熱服傷寒身不惡寒反惡熱者表未除里又急也大柴胡湯治傷寒內實大便難不惡寒反惡熱柴胡四錢黃芩芍藥各二錢半半夏一錢大黃二錢枳殼一錢半上銼一劑生薑三片棗二枚水煎溫服以利為度未利再服傷寒潮熱發狂言而燥渴者大便實熱傳裡也六一順氣湯治傷寒傳裡大便結實口燥咽乾怕熱揭衣譫語狂妄揚手擲足斑黃陽厥潮熱自汗胸膈滿硬繞臍疼痛等症柴胡黃芩芍藥枳實厚朴大黃芒硝甘草上銼劑先將水二鍾煎滾三沸後入藥煎至一碗臨服入鐵鏽水三匙同調服蜜煎導法治自汗大便閉結不通甚便於老人並日久不能服藥者又恐服硝黃變為別症又有糞入直腸者以此最便益也煉蜜如飴乘熱捻如指大長三寸兩頭如鋭納入穀道中良久下結糞加皂角末少許尤妙如無蜜以香油灌入穀道中亦妙豬膽汁導法治陽明自汗小便利大便結硬不可攻者豬膽一枚和醋少許以竹管套入穀道中一時許即通蓋酸苦益陰以潤燥也傷寒陽毒斑黃者狂叫欲走也其症表裡俱實內外皆熱脈數有力而無汗三黃石膏湯通解表裡也三黃石膏湯治陽毒發斑黃身如塗朱眼赤如火狂叫欲走六脈洪大燥熱欲死鼻乾面赤過經不解已成壞症表裡皆熱欲發其汗熱病不退又復下之大便遂頻小便不利亦有錯治瘟症而成此症者又有汗後三焦生熱脈洪譫語不休晝夜喘急鼻加時衄狂叫欲走黃連黃芩黃柏梔子麻黃石膏豆豉上銼劑生薑三片細茶一撮水煎溫服傷寒血熱發黃者裡實表虛也消斑青黛飲治熱傳裡裡實表虛血熱不散熱氣乘虛出於皮膚而為斑也輕如疹子重則如錦紋重甚則斑爛皮膚或本屬陽誤投熱藥或當汗不汗當下不下或汗未解皆能致此不可發汗重令開泄更加斑爛也其或大便自利怫鬱短氣燥糞不通黑斑主不治汗下不解足冷耳聾煩悶咳逆便是斑疹之候也柴胡玄參黃連知母石膏青黛生地黃山梔犀角人參甘草上銼劑生薑一片棗一枚水煎臨服入醋一匙同服傷寒汗吐下後煩躁口渴陽厥極深者表裡大熱也黃連解毒湯治傷寒大熱不止煩躁乾嘔口渴喘滿陽厥極深蓄熱內甚及汗吐下後寒涼不能退其熱者黃芩黃連黃柏梔子各二錢柴胡連翹各二錢上銼一劑水煎溫服涼膈散治傷寒三四日以里用發表之藥無汗者或已汗而不解者依本方加石膏知母以解表裡之藥最為穩當方見火門傷寒小便利大便黑漱水不咽口燥者下焦瘀血也桃仁承氣湯治熱邪傳裡熱蓄膀胱其人如狂小便自利大便黑小腹滿痛身面目黃譫語燥渴為蓄血症脈沉有力宜此下盡黑物則愈未服前血自下者不必服為欲愈桃仁十個去皮尖研桂枝一錢大黃三錢芒硝一錢甘草一錢上銼一劑生薑三片水煎去滓入芒硝再煎一沸溫服血盡為度如血未盡再服傷寒結胸者熱痰結也清火化痰湯治熱痰在胸膈間不化咯吐不出寒熱氣急滿悶作痛者名結痰黃連黃芩梔子栝萎仁貝母桔梗桑白皮甘草木香另研杏仁上銼生薑三片水煎入竹瀝薑汁少許磨木香同服解熱化痰湯治傷寒結胸有痰有熱有氣滯並咳嗽失聲蘇子白芥子枳實黃連桔梗黃芩栝萎仁石膏杏仁烏梅黃柏上銼劑生薑一片水煎溫服姜尉法治傷寒胸膈不寬一切寒結熱結水結食結痞結痰結大小便結胸痞氣結者俱治生薑搗爛如泥去汁取渣炒熱絹包漸漸揉尉心胸脅下其滿痛豁然自愈若姜渣冷再入姜再炒再尉結熱不用炒傷寒發黃者濕熱盛也退黃散治傷寒發黃身目俱黃如金色小便如濃黃柏汁諸藥不效柴胡升麻茵陳龍膽草黃連黃芩桅子黃柏木通滑石甘草上銼劑燈草一團水煎服大便實加大黃目睛黃倍龍膽草虛弱加人參外用生薑搗爛時時於黃處擦之其黃自退傷寒汗下煩熱者表裡俱虛也竹葉石膏湯治傷寒已經汗下表裡俱虛津液枯竭心煩發熱氣逆欲吐及諸煩熱並宜服之石膏二錢半夏二錢麥門冬去心人參甘草各一錢上銼劑用青竹葉生薑各五片粳米百餘粒水煎溫服極熱發狂倍知母石膏熱嘔加薑汁傷寒病後不眠者心膽虛怯也濕膽湯治病後虛煩不得臥及心膽虛怯觸事易驚短氣悸乏或復自汗並治陳皮去白半夏薑汁炒茯苓去皮枳實麩炒各二錢半竹茹一錢酸棗仁炒一錢甘草五分上銼劑生薑三片水煎溫服心膽虛怯觸事易驚加麥門冬人參柴胡桔梗竹茹溫膽湯治傷寒日數過多其熱不退夢寐不寧心悸恍惚煩躁多痰不眠者柴胡二錢竹茹桔梗枳實麩炒各二錢黃連五分人參五錢陳皮半夏茯苓香附八分甘草三分上銼一劑生薑三片棗一枚水煎服傷寒懊憹者悶郁不舒也其症因表症誤下正氣內虛陽邪內陷結於其間重則結胸也邪在胸中宜吐熱結在胃腑宜下凡傷寒汗吐下後虛煩不眠若劇者必反復顛倒心中懊憹宜此梔豉湯治汗吐下後心胸滿悶或痛或頭微汗虛煩不得眠反復顛倒心中懊憹乃燥熱怫鬱於內而氣不宣通也紅梔子淡豆豉上水煎溫服煩躁者懊憹不得眠也懊憹者鬱悶不舒之貌煩者氣也火入於肺也躁者血也火入於腎也故用桅子以治肺煩豆豉以治腎躁少氣虛滿加甘草嘔噦加生薑橘紅有宿食而煩躁者加大黃下後脹滿而煩加枳實厚朴下後身熱而煩加甘草乾薑瘥後勞復加枳實傷寒百合者百沒是處也其病又非寒又非熱欲食不食欲行不行欲坐不坐服藥即吐小便赤如見此謂之百合病加味柴胡湯治百合病人參半夏柴胡黃芩百合知母甘草上銼劑青竹茹一團粳米炒食鹽一撮入薑汁少許水煎服傷寒痰氣緊滿者宜上吐也瓜蒂散治傷寒四五日病在胸膈痰氣緊滿於上不得息者以此吐之甜瓜蒂炒赤小豆各等分上為末每服一錢豆鼓煎湯調服以吐為度傷寒神昏不語者越經症也瀉心導赤飲治傷寒心下不痛腹中不滿大便如常身無寒熱漸變神昏不語或睡中獨語三旬目赤神焦將水與之則咽不與則不思形如醉人醫者不識便呼為死症若以針火灸誤人者多矣殊不知熱邪傳入少陰心經也因火上而逼肺所以神昏故名越經症梔子黃芩麥門冬滑石人參犀角知母茯苓黃連薑汁炒甘草上銼一劑生薑一片棗二枚燈芯二十根水煎臨服入新生地黃汁二匙同服傷寒陽症似陰者是火極似水也自熱以至溫由溫乃至厥是傳經之邪輕則宜四逆散合小柴胡湯如渴用白虎湯合解毒湯重則宜六一順氣湯四逆散柴胡芍藥枳實甘草上銼劑生薑一片水煎服傷寒陰症似陽者水極似火也自得病手足便逆冷而不溫者四逆湯方見中寒依本方加參附傷寒狐惑者唇口生瘡聲啞也其症四肢沉重惡聞食氣默默欲臥目閉舌白面目間黑色變異無常蝕下部為狐而唇下有瘡其咽乾蟲蝕其臟為惑上唇有瘡聲啞治慝二者並用黃連犀角湯黃連犀角烏梅木香桃仁上銼水煎服傷寒吐蛔者手足冷胃空虛也宜安蛔湯安蛔湯人參七分白朮茯苓各一錢乾薑炒黑五分烏梅二個花椒去目三分上銼劑水煎服治蛔不可用甘草甜物蓋蛔得甘則動於上得酸則靜見若則安得辛辣則頭伏於下如合丸用烏梅浸爛蒸熟搗如泥入前藥再搗如泥每服十丸米湯吞下傷寒吐蛔雖有大熱忌用涼藥犯之必死先當用溫劑以定蛔後用涼劑以退熱小柴胡湯之類傷寒汗下後昏悶不省人事者元氣大虛也奪命獨參湯治傷寒汗後終日昏悶不省人事發熱發躁似有狂言一切危急之症宜此服後額上鼻尖有微汗是其應也楝參去蘆一兩上銼作一劑水煎不拘時服渣再煎服病後勞復者宜養血氣也益氣養神湯治傷寒新瘥方起勞動應事或多言勞神而微復動熱者日勞復宜服此人參當歸白芍酒炒麥門冬去心知母去毛桅子炒各一錢白茯神去皮前胡各七分陳皮五分升麻生甘草各三分上銼劑棗一枚水煎食遠溫服傷寒瘥後交接復發欲死眼不開不能言語及熱病新瘥早起及多食復發山梔三十枚銼碎水煎服勞力感寒者內傷外感也其症頭疼身熱惡寒微渴濈然汗出身痛腰腿痠痛沉困無力脈空浮無力名曰勞力感寒不可誤作正傷寒大發其汗故經云勞者溫之溫能除大熱正此之謂也宜加味益氣湯若有下症者大柴胡湯下之加味益氣湯治體怯弱兼之勞而染感冒傷寒頭痛發熱者黃耆人參各一錢白朮陳皮當歸各七分柴胡一錢升麻三分黃柏酒炒七分羌活一錢半防風甘草五分上銼一劑生薑三片水煎熱服冬月加細辛三分如熱甚脈滯有力加黃芩酒炒三分傷寒産後禁忌歌新瘥須當自保持勿將酒肉口中肥清宵靜睡無思想用意煩勞最忌之節食寡言須晏起寒暄冬暖減添衣勿忌房室陰陽易悔誤難追已噬臍補遺祕方神仙救苦丸專治四時傷寒不論日期遠近陰陽表裡內外虛實半表半裡男女老幼並皆治之麻黃去節研細熱水浸取汁甘草炙去皮溫水浸取汁以上各四兩赤芍洗去土溫水浸取汁四兩硃砂一兩五錢紅大顆者研細水飛過雄黃去夾石紅朗大顆者研細水飛過一兩五錢升麻微炒研細溫水浸取汁人參去蘆研碎溫水浸取汁當歸用身研細水浸取汁柴胡研碎溫水浸取汁以上各一兩春夏用石膏研細水淘淨枳實研細溫水浸取汁此二味另放一處臨合時入衆藥內各五錢秋冬用桂枝研細溫水浸取汁細辛研細溫水浸取汁此二藥另收一處臨合入衆藥各五錢上為細末依前法修制各陰乾擇庚申日共成一處用溫水攪勻以細絹濾過三遍將汁盛於瓷罐內上以綿紙固之置之不近濕不通風處仍陰乾取下細末擇甲子停分兩處一半入春夏藥一半入秋冬藥醋糊為丸如黍米大每服一丸好鮮明雄黃五分於碗內研細入井花涼水研同藥送下水洗雄黃務要吃盡焚香三寸自然汗出立愈如傷寒汗後變為雜症者應服二丸內外兼表仍出汗自愈若干霍亂等疾即當內解有起死回生之功不能盡述陰陽散治傷寒三五日或近期或初覺無汗服此麻黃一兩六錢緑豆粉二錢川芎白芷石膏甘草蘇葉各一錢上為細末每服一錢涼水調服吃水二三次待汗出來方止水蓋被出汗足以身涼為度二三日勿出門見風食淡飯傷寒昏迷不省人事皂角末捻紙燒煙入鼻有嚏可治無則不治肺氣上絶也可治者隨用皂角半夏生白礬共一錢五分為末入薑汁調服探吐痰去蘇醒效一人傷寒頭疼發熱憎寒身痛發渴譫語日久不出汗余以大梨一個生薑一塊同搗取汁入童便一碗重湯煮熱服之汗出如水即愈太守云亭劉公患傷寒發熱面紅唇赤面壁蜷身而臥諸醫以小柴胡湯解毒湯之類數劑弗效余診六脈浮大無力此命門無火也以人參附子沉香一服立愈三服全安一老嫗年七旬患傷寒初起頭疼身痛發熱憎寒諸醫以藥發散數劑弗效淹延旬日慚而飲食不下昏沉不省口不能言眼不能開咽喉有微氣似欲絶之意諸醫潛退一家倣徨召余察之元氣耗絶即以人參五錢煎湯徐徐灌之須臾稍省欲飲水又煎渣服之頓愈又逾十年而卒夫人參回元氣於無何有之鄉果有起死回生之效信哉不誣中寒脈中寒緊澀陰陽俱盛法當無汗有汗傷命中寒者寒邪直中三陰經也此傷寒尤甚若不急治死在旦夕回陽救急湯治傷寒初起無頭痛無身熱便就怕寒四肢厥冷或過於肘膝或腹痛吐瀉或口吐白沫或流冷涎或戰栗面如刀刮引衣蜷臥不渴脈來沉遲無力即是寒中陰經真寒症不從陽經傳來人參去蘆白朮去蘆茯苓去皮陳皮半夏薑汁製乾薑肉桂大附子煨去皮臍五味子甘草炙嘔吐涎沫或小腹痛加鹽炒茱萸無脈加豬膽汁一匙泄瀉不止加黃耆升麻嘔吐不止加生薑汁上銼劑生薑煎服倉卒無藥不便可用蔥尉法或艾灸關元氣海二三十壯使熱氣通其內逼邪出於外以復陽氣稍待蘇醒灌入薑汁煎服回陽湯寒中太陰者則中脘疼痛也理中湯治即病太陰自利不渴寒多而嘔腹痛下利鴨溏蛔厥霍亂等症人參白朮乾薑甘草各二錢半上銼一劑水二鍾煎至八分去渣溫服如腎氣動急去白朮加肉桂二錢如吐多者去白朮加生薑三錢如下多倍白朮人參添水煎寒多者加乾薑一錢半腹痛滿下利脈沉遲而微者加炮附子二錢如傷冷中寒脈弱氣虛變為陰疸本方中加茵陳蒿二錢如霍亂轉筋加石膏五錢火煅如痞滿而胃寒或霍亂吐瀉不渴胸滿未成結胸者或厥陰飢不能食食吐蛔者用理中丸以本方藥為細末煉蜜為丸如彈子大每服一丸用白湯半盞化下寒中少陰者則臍腹疼痛也五積散治中寒及感冒寒邪頭疼身痛腰背拘急惡寒嘔吐腹痛不問外感風寒內傷生冷寒濕客於經絡腰背痠疼及婦人經脈不通並治白芷當歸川芎陳皮厚朴薑汁炒蒼朮米泔浸白芍炒枳殼麩炒桔梗去蘆半夏薑製各一錢乾薑官桂各五分麻黃八分甘草三分上銼劑生薑三片大棗一枚水煎溫服寒中厥陰者則小腹疼痛也四逆湯治即病太陰自利不渴及三陰症脈微欲絶手足厥冷四逆名者即四肢厥冷也大附子一個去皮臍破入片生用甘草炙六錢乾薑五錢上銼三劑水煎溫服取少汗乃愈灸陰症法氣海穴在臍下一寸五分丹田在臍下二寸關元在臍下三寸用艾火灸二七壯但手足溫暖脈至知人事無汗要有汗汗出即生不暖不省者死蒸臍法用麝香半夏皂莢各一字為末填臍中用生薑切薄片貼臍上放大艾火灸薑片上蒸灸二七壯灸關元氣海二七壯熱氣通於內寒氣逼於外陰自退而陽自復矣尉臍法用蔥頭縛一把切去葉留白根切餅二寸許連縛四五餅先將麝香硫黃二字填於臍中放蔥餅於臍上以尉斗盛火於蔥餅上尉之如餅爛再換餅再尉熱氣入腹以通陽氣如大小便不通以利即止揉臍法用吳茱萸二三合麩皮一升食鹽一合拌勻熱炒以絹包之於腹上下熱揉尉之自然有效也瘟疫脈瘟脈無名隨見諸經未汗宜強虛緩傷生衆人病一般者乃天行時疫也辟邪丹虎頭骨二兩硃砂雄黃雌黃鬼臼蕪荑鬼箭藜蘆各一兩上為末煉蜜為丸如彈子大囊盛一丸男左女右繫於背上或常病者戶內燒之一切邪鬼不敢進兼治婦人與鬼魅交通五瘟丹治四時瘟疫流行傷寒發熱並諸瘧熱病黃連屬火戊癸之年為君黃柏屬水丙辛之年為君黃芩屬金乙庚之年為君甘草屬土甲己之年為君紫蘇香附以上各一兩以直年藥為君者倍一兩上七味皆生用於冬至日製為末用錦紋大黃三兩濃煎湯去滓熬成膏和前藥為丸如彈子大硃砂雄黃末為衣再貼金箔每服一丸冷水磨服神效普濟消毒散治大頭瘟病黃連二兩黃芩酒炒二兩陳皮玄參生甘草川芎鼠黏子白殭蠶升麻柴胡葛根薄荷當歸大黃人參三錢連翹各五錢大蘭根如無加靛花亦可上為細末煉蜜為丸每丸重二錢每服一丸細嚼白熟水送下發汗如不及丸用末藥一錢二分照前服如未愈再進一服以汗為度不可透風若透風復腫再服藥只是去皮一層方愈忌酸冷羊雞魚之物並房事冬應寒而反暖者春發瘟疫也人參敗毒散主之二聖救苦丸治傷寒瘟疫不論傳經過經可服錦紋大黃四兩酒拌蒸曬乾牙皂二兩如豬牙者上二味俱為末水打稀糊為丸緑豆大每服五七十丸冷緑豆湯送下以汗為度人參敗毒散治四時瘟疫通用羌活獨活前胡柴胡川芎枳殼去穰桔梗去蘆茯苓人參各等分甘草減半上銼劑每服一兩生薑三片水盞半煎八分溫服或為末沸湯點服亦可此藥治傷寒瘟疫風溫風眩四肢疼痛憎寒壯熱項強睛疼不問老人小兒皆可服或嶺南煙瘴之地或瘟疫時行或人多風痰或處卑濕之地腳氣痿弱此藥不可缺也連進三五服以止為度一方加薄荷少許春應溫而反清涼者夏發燥郁也大柴胡湯方見傷寒夏應熱而反寒者秋髮寒鬱也五積散主之方見中寒秋應涼而反淫雨者冬發濕鬱也五苓散主之方見中暑大頭病者濕熱在高巔之上也牛蒡芩連湯治積熱在上頭頂腫起或面腫或從耳根上起俗曰大頭瘟並治煙瘴黃芩酒炒二錢半黃連酒炒一錢半桔梗一錢半連翹牛蒡子另研玄參各一錢大黃荊芥防風羌活各三分石膏一錢半甘草一錢上銼一劑生薑一片水煎食後細細呷溫服每一盞做二十次服常令藥在上勿令飲食在後也內府仙方治腫項大頭病蝦蟆瘟病殭蠶二兩薑黃二錢半蟬蛻二錢半大黃四兩上共為細末薑汁打糊為丸重一錢一枚大人服一丸小兒半丸蜜水調服立愈又方治大頭瘟病腫臉頸項者用福建靛花三錢燒酒一鍾雞子清一個入內打勻吃不時而愈腫即消神方也蝦蟆瘟者屬風熱也防風通聖散方見中風凡入病家須避其邪氣不受染著亦醫者之惠不可不知以雄黃末塗鼻孔中或香油塗鼻孔亦妙然後入病家行動從容在位而入男子病穢氣出於口女子穢氣出於陰戶其相對坐立之間必須識其向背既出自以紙條探鼻深入噴嚏為佳太倉公闢瘟丹凡宮舍久無人到積濕容易侵人預製此燒之可遠此害極宜於暑月燒之以卻瘟疫並散邪氣茅朮一斤臺烏黃連白朮各半斤羌活半斤川芎草烏細辛紫草防風獨活藁本白芷香附當歸荊芥天麻官桂甘松三奈乾薑麻黃牙皂芍藥甘草各四兩麝香三分上為末棗肉為丸如彈子大每丸燒之萬曆丙戌春余寓大梁屬瘟疫大作士民多斃其症閭巷相染甚至滅門其症頭疼身痛憎寒壯熱頭面頸項赤腫咽喉腫痛昏憒等症此乃冬應寒而反熱人受不正之氣至春發為瘟疫至夏發為熱病名曰大頭瘟大熱之症也余發一祕方名二聖救苦丸用牙皂以開關竅而發其表大黃以瀉諸火而通其里一服即汗一汗即愈真仙方也日夜塞戶填門應酬不暇全活者不能勝數矣但人稟之稍壯者百發百中其虛弱者余先以人參敗毒散輕者即愈如未愈用牛蒡芩連湯可收全效補遺方清涼救苦散治頭面耳目鼻腫痛芙蓉葉桑葉白芨白蘞車前大黃黃連黃柏白芷雄黃赤小豆芒硝上各等分為細末用蜜水調敷於腫痛處頻頻掃之中暑脈暑傷於氣所以脈虛弦細芤遲體狀無餘夏月有四證傷寒傷風脈證互見中暑熱病疑似難明脈緊惡寒謂之傷寒脈緩惡風謂之傷風脈盛壯熱謂之熱病脈虛身熱謂之傷暑中暑中陽皆熱症也動而得之謂中熱靜而得之謂中暑乃夏火之氣也吐瀉或嘔噦躁悶重則熱極而昏不省人事俱用香薷散加減元氣虛脫者用生脈散加減香薷飲治伏暑引飲口燥咽乾或吐或瀉並治若卒中昏冒倒僕角弓反張不省人事手足或發搐溺此為暑風不可作風治之當以本方加羌活治之香薷厚朴薑汁炒白扁豆炒加黃連薑汁炒尤妙上銼劑水煎熟以涼水沉冷服如有搐搦加羌活瀉利加白朮茯苓脈虛弱加人參五味子麥門冬虛汗不止加黃耆白朮心煩加梔子黃連薑汁炒調辰砂末服胸脹加枳殼桔梗夾痰加南星半夏虛加人參黃耆小便不利加赤茯苓滑石嘔吐加藿香陳皮薑汁少許渴加葛根天花粉十味香薷飲治伏暑身倦體困神昏頭重吐利黃耆蜜水炒人參去蘆白朮去蘆茯苓去皮陳皮木瓜各五分香薷一錢厚朴薑汁炒扁豆炒各五分甘草炙五分上銼劑水煎服暑風減黃耆加羌活一錢五分生脈散滋生精氣培養真元清心潤肺人參去蘆三分麥門冬去心三錢五味子十五粒加白朮去蘆二錢上銼劑水煎不拘時服渣再煎則可充百茶湯中暑者熱傷膀胱經也其症身熱頭痛灑然毛聳微寒口開前板齒燥舌燥生苔大煩渴者用人參白虎湯加香薷扁豆有身重疼痛者用人參敗毒散加香薷黃連主之人參白虎湯治夏月中暍即中熱舌燥生苔刺人參五分石膏知母各一錢半甘草三分麥門冬去心白朮各七分梔子茯苓芍藥各一錢陳皮七分香薷一錢扁豆八個上銼劑蓮肉十個烏梅一個水煎服熱極小便遺尿不止加黃柏炒煩躁加辰砂末酸棗仁若腹痛嘔噦吐瀉飽悶切不可用石膏中暑身熱而煩四肢沉困者此熱傷元氣也清暑益氣湯治長夏濕熱蒸人人感之四肢困倦精神減少懶於動作胸滿氣促肢節疼痛或氣高而喘身熱而煩心下膨悶小便黃而數大便溏而頻或利或渴不思飲食自汗體虛黃耆蜜炒蒼朮米泔制升麻各一錢人參白朮去蘆陳皮神麯炒澤瀉黃柏酒炒當歸青皮去穰麥門冬去心乾葛各三分五味子九粒甘草三分上銼劑水煎溫服中暑熱渴小便赤澀者宜清利三焦也益元散治中暑身熱小便不利此藥性涼除胃脘積熱又淡能滲濕故利小便散濕熱也白滑石六錢甘草微炒一錢上為末每服二三錢加蜜少許煎湯冷水任下如欲發汗用蔥白豆豉湯調下中暑熱渴大便泄瀉者宜分利陰陽也五苓散治中暑煩渴身熱頭痛霍亂泄瀉小便赤少心神恍惚豬苓澤瀉各一錢白朮去蘆茯苓去皮各錢五分肉桂五分上銼一劑水煎服若本方去桂名四苓散夏月感寒者乃取涼之過也因暑熱之時或納涼於深堂大廈涼亭冷館大扇風車風寒以傷其外或飲食生冷瓜果冰水寒冷復傷其內其痛或頭疼身痛發熱惡寒或噁心嘔吐泄瀉腹痛此內傷生冷外感風寒所致也宜藿香正氣散治之此非治暑也因暑而致之病也藿香正氣散方見霍亂依本方外感重加蒼朮羌活去白朮內傷重加砂仁神麯注夏者屬陰血虛元氣不足也夏初春末頭疼腳軟食少體弱者是其症頭眩眼花腿痠腳軟五心煩熱口苦舌乾精神困倦無力好睡飲食減少胸膈不利形如虛怯脈數無力是名注夏宜參歸益元湯多服兼服補陰丸調理參歸益元湯治注夏病人參去蘆五分當歸白芍熟地黃白茯苓去皮麥門冬去心各一錢五味子十粒陳皮黃柏酒炒知母酒炒各七分甘草一分上銼一劑棗一枚烏梅一個炒米一撮水煎服飽悶加砂仁白豆蔻噁心加烏梅蓮肉炒米噦加竹茹煩躁加辰砂酸棗仁竹茹瀉加炒白朮山藥砂仁烏梅去熟地知母黃柏小水短赤加木通山梔胃脘不開不思飲食加厚朴白豆蔻益智砂仁蓮肉去熟地黃柏知母腰痛加杜仲故紙茴香腿痠無力加牛膝杜仲皮焦加地骨皮頭目眩暈加川芎虛汗加黃耆白朮酸棗仁夢遺加牡蠣辰砂山藥椿根皮虛驚煩熱加辰砂酸棗仁竹茹口苦舌乾加山梔烏梅乾葛發熱惡寒身重疼痛小便澀灑然毛聳手足厥冷小有勞身即熱口開前板齒燥脈弦細虛遲表裡中暍也用補中益氣湯加香薷扁豆有熱加黃芩一婦人因暑月廚房熱極遂出當風處脫衣乘涼被風吹即頭痛發熱惡寒身痛草醫不識誤認為寒用附子理中湯一服下咽立時不語口中無氣唇口青紫心口微溫舉家哭泣求救於豫診六脈洪大而數此熱症而誤用熱藥以燒酒噴胸前將鏡撲之更將新汲水入蜜將雞翎沃入其口數次少頃患人即伸舌探水以益元湯灌下即活李北川仲夏患腹痛吐瀉兩手捫之則熱按之則冷其脈輕診則浮大重診則微細余曰此陰寒之症也急服附子理中湯不應仍服至四劑而愈中濕脈濕則濡緩或兼澀小入里緩沉浮緩在表若緩而弦風濕相攪濕症者有內中濕有外中濕人之體虛苟有不謹自然而中也外中濕者或感山嵐瘴氣或被雨濕蒸氣或遠行涉水或久臥濕地或汗衣濕鞋則濕從外而中矣其症頭重目眩身體骨節疼痛手足痠軟四肢倦怠麻木腿膝腫痛體重跗腫筋脈拘攣小腸疝氣偏墜浮腫吊痛目黃小便赤黃等症皆外中濕也內中濕者皆因生冷水食或厚味醇酒過多停滯脾虛不能運化停於三焦注於肌肉滲於皮膚則濕從內而中矣濕傷脾者腫脹泄瀉身黃脈澀也濕傷肺者咳嗽喘急身熱惡寒也濕傷腎者腰腳重骨節痠疼也濕傷肝者大筋軟短目昏脅痛也濕入腑者則麻木不仁也濕入臟者則屈伸不能也中濕腹脹滿者邪在裡也宜後方滲濕湯治一切濕症蒼朮米泔制白朮去蘆茯苓各一錢半陳皮一錢澤瀉一錢豬苓一錢香附撫芎砂仁厚朴去皮各七分甘草三分上銼劑生薑一片燈草一團水煎服脾虛發腫滿氣急喘嗽去白朮甘草加腹皮枳殼木香蘇子桑皮蘿蔔子面白浮腫去撫芎澤瀉厚朴香附加山藥炒芍藥倍蒼朮燥熱勝濕則豁然而收瀉不止加肉蔻訶子烏梅乾薑嘔噦去厚朴香附撫芎加炒山藥烏梅炒米甚不止加煨乾姜濕症身體重痛手足麻木痠軟腫痛或枯細痿弱筋脈拘攣去香附撫芎厚朴豬苓澤瀉加當歸生地芍藥木香乳香薄桂牛膝酒芩羌活防風蓋風勝濕也中濕而一身盡痛者邪在表也除濕羌活湯治風濕相搏一身盡痛蒼朮米泔浸藁本各二錢羌活七分防風去蘆升麻柴胡各五分上銼一劑水煎溫服中濕而偏枯冷痹者腎氣虛也獨活寄生湯治腎氣虛弱冷臥濕地腰背拘急筋攣骨痛當風取涼過度風邪流入腳膝為偏枯冷痹緩弱疼痛牽引腳重行步艱難並白虎歷節風痛獨活桑寄生牛膝酒洗去蘆杜仲姜酒炒秦艽細辛桂心川芎白芍酒炒茯苓去皮人參當歸熟地防風去蘆各等分甘草減半上銼生薑三片水煎空心溫服外用金鳳花柏子仁朴硝木瓜煎湯洗浴每日三次余嘗治一人下元虛冷寒濕腳氣腫痛焦枯臥床不起步履艱辛依本方各一兩用好酒十壺煮一炷香取出去火毒每日飲三次酒盡行步如故又服一料痊愈火證脈虛大浮數實大洪大隨其所見細數為害火症者有君火相火君火者心火也心為君主之官配於五行守位而不動相火者輔助之火也生於虛無寄於肝腎之間聽命而行凡動皆是相火五臟皆有火相火易起五火相扇動矣相火乃元氣之賊無時而不煎熬真陰陰虛則病陰絶則死陰虛火動者難治凡人發熱咳嗽吐痰血者午後至夜發熱面頰唇紅小便赤澀者便是陰虛火動也脈數無力者陰虛火動也滋陰降火湯方見勞瘵治腎經陰虛火動左寸脈洪數者心火也黃連湯治心火舌上生瘡或舌上腫燥裂或舌尖出血或舌硬黃連山梔生地黃麥門冬去心當歸芍藥各一錢薄荷犀角甘草各五分上銼一劑水煎食後頻服左關脈洪數者肝火也柴胡湯治肝火盛水氣實或脅痛或氣從左邊起者或目紅腫痛俱肝火也柴胡芍藥龍膽草當歸青皮山梔連翹各一錢甘草五分上銼一劑水煎食後服右寸脈洪數者肺火也黃芩湯治肺火咳嗽吐血痰血鼻血咽喉腫痛乾燥生瘡或鼻孔乾燥生瘡或鼻腫痛黃芩山梔桔梗芍藥桑白皮麥門冬荊芥薄荷連翹各一錢甘草三分上銼一劑水煎食後服右關脈洪數者脾火也芍藥湯治脾火或消穀易飢或胃熱口燥煩渴或唇生瘡芍藥梔子黃連石膏連翹薄荷各一錢甘草三分上銼一劑水煎食後服脈沉而實大者實火也黃連解毒湯治三焦實火內外皆熱煩渴小便赤口生瘡黃連黃芩桅子黃柏連翹芍藥柴胡各等分上銼一劑水煎食前服涼膈散治三焦實火煩渴舌生瘡小水赤大便結大黃芒硝桔梗連翹桅子黃芩各一錢薄荷五分甘草三分上銼一劑水煎食後服三黃解毒湯治內外諸邪熱毒癰腫瘡疽筋脈拘攣咬牙驚悸一切熱毒並五淋便濁痔漏黑醜四兩滑石四兩大黃黃芩黃連桅子各二兩上為末滴水丸如梧桐子大每服四十丸溫水送下臟腑積熱三焦火盛口舌生瘡咽痛牙疼用六味丸加黃連黃芩黃柏桅子知母生地黃通府志齊徐公因酷好燒酒及五香藥酒過度患吐血痰唾氣喘咳嗽一醫與參蘇飲一醫以敗毒散一醫以滋陰降火湯俱無寸效豫見六脈急數乃酒毒積熱入於骨髓不受滋補以黃連解毒湯加知母貝母石膏連翹玄參天花粉葛根栝萎桔梗酒蒸大黃早晚而服至百日外以六味地黃丸加解毒藥入內與前湯藥並進又服至百日始瘳後歸田逾年為陳酒所犯而卒內傷脈內傷勞役豁大不禁若損胃氣隱而難尋內傷飲食滑疾浮沉內傷飲食數大澀侵右關緩緊寒濕相尋右關數緩濕熱兼臨數又微代傷食感淫外傷內傷證辨東垣曰人迎脈大於氣口為外傷氣口脈大於人迎為內傷外傷則寒熱齊作而無間內傷則寒熱間作而不齊外傷惡寒雖近烈火不除內傷惡寒得就溫暖則解外傷惡風乃不禁一切風內傷惡風唯惡乎些小賊風外傷症顯在鼻故鼻氣不利而壅盛有力內傷則不然內傷症顯在口故口不知味而腹中不和外傷則不然外傷則邪氣有餘故發言壯厲且先輕而後重內傷則元氣不足出言懶怯且先重而後輕外傷手背熱手心不熱內傷手心熱手背不熱內傷頭痛時作時止外傷頭痛常常有之直須傳裡方罷內傷則怠惰嗜臥四肢不收外傷則得病之日即著床枕非扶不能筋攣骨痛外傷不能食然口則知味而不惡食內傷則惡食而口不知味外傷三日以後谷消水去邪氣傳裡必渴內傷則邪氣在血脈中有餘故不渴內傷不足者飲食勞倦是也溫之補之調之養之皆為補也外傷有餘者風寒暑濕是也瀉之吐之汗之利之皆為瀉也內傷勞役者元氣虛損也補中益氣湯治形神勞役或飲食失節勞役虛損身熱而煩脈洪大而虛頭痛或惡寒而渴自汗無力氣高而喘嫩黃耆蜜炙一錢五分楝參去蘆一錢白朮去蘆油陳皮甘草當歸酒洗各一錢柴胡升麻各五分少加黃柏酒炒以救腎水能瀉陰中之伏火也紅花三分入心養血上銼一劑生薑三片大棗一枚水煎空心服如汗多出去升麻柴胡加酸棗仁炒一錢夜間不睡亦如之如頭疼加蔓荊子五分川芎一錢如善嚏者乃腠理不密外邪所搏加白芷川芎如腦痛或頭頂疼加藁本一錢細辛五分如口乾或渴加葛根六分如有痰加貝母前胡各一錢如泄瀉加白芍煨澤瀉茯苓各一錢如心胸覺痞悶去黃耆升麻柴胡加枳實六分姜炒黃連五分如嗽加桑白皮一錢五味子十五粒如額疼加白芷一錢葛根升麻各五分如用心太過神思不寧或怔忡驚悸加茯神一錢遠志七分酸棗仁炒一錢石菖蒲七分柏子仁一錢如飲食少或傷飲食加神麯麥芽山楂枳實各一錢如心脾二經舌乾口燥加黃連五分山桅仁六分如胃中濕痰加半夏一錢如虛火上炎加玄參黃柏蜜水炒知母各一錢如夢遺加牡蠣龍骨各一錢如下部無力加牛膝杜仲各一錢如腳弱加木瓜一錢漢防己五分如有痰或兼脾胃不和加半夏麥芽各一錢如陰虛內熱有痰或上焦有火加貝母天花粉各一錢如有熱加枯芩八分黃連六分如血熱壅盛或眼赤加龍膽草八分如感風寒或頭痛身熱加防風川芎白芷各一錢羌活七分汗多加黃耆一錢眼痛加干菊花熟地黃若身熱加生地黃如大病後元氣未復而胸滿氣短加橘皮枳實白芍升陽順氣湯治因飲食勞役所傷腹脅滿悶氣短遇春則口淡無味遇夏雖熱猶寒飢常如飽不喜食冷黃耆蜜炙一兩人參一錢當歸身一錢半夏二錢薑製陳皮一錢神麯炒一錢草豆蔻二錢升麻柴胡各一錢黃柏酒炒五分甘草炙五分上銼每劑一兩生薑三片水煎服按論云脾胃不足之症須用升麻柴胡苦平味之薄者陰中之陽引脾胃中清氣行於陽道及諸經生髮陰陽之氣以滋春氣之和也又引黃耆人參甘草甘溫之氣味上行充實腠理使陽氣得衛外而為固也凡治脾胃之藥多以升陽補氣名之者也升陽益胃湯治肺及脾胃虛則怠惰嗜臥四肢不收時值秋燥令行濕熱少退體重節痛口燥舌乾飲食無味大便不調小便頻數不欲食食不消兼見肺病淅淅惡寒慘慘不樂面色惡而不和乃陽氣不伸故也當升陽益氣此藥主之黃耆一錢人參五分白朮二分半夏五分橘紅二分半甘草炙五分白芍二分黃連二分茯苓二分小便利而不渴者不用獨活三分柴胡二分防風三分羌活二分澤瀉二分不淋閉者不用上銼作一服生薑五片大棗二枚水煎早飯後溫服服藥後而小便罷而病加增劇是不宜利小便當去茯苓澤瀉如方喜食一二日不可飽食恐胃再傷以藥力尚少脾胃之氣不可轉運升發也須滋胃之食或美食助其藥力益升陽之氣而滋其胃氣慎不可淡食以損藥力而助邪氣之降沉也可以少役形體使胃與藥得轉運升發慎毋大勞役使氣復傷若脾胃得安靜尤佳若胃氣稍強少食佳果以助藥力經云五果為助是也補氣湯凡遇勞倦辛苦用力過多即服此二三劑免生內傷發熱之病黃耆蜜炙一錢半人參白朮陳皮各一錢麥門冬去心一錢五味子十個甘草七分上銼一劑生薑三片棗一枚水煎食前服勞倦甚加熟附子五分補血湯凡遇勞心思慮損傷精神頭眩目昏心虛氣短驚悸煩熱並治當歸一錢川芎五分白芍炒一錢生地黃五分人參一錢二分白茯神去木五錢酸棗仁炒一錢陳皮五分麥門冬去心一錢五味子十五個梔子炒五分甘草炙五分上銼一劑水煎溫服參耆湯治脾胃虛弱元氣不足四肢沉重食後昏沉黃耆蜜炙二錢人參五分甘草炙一錢當歸三分柴胡三分升麻三分蒼朮米泔浸一錢青皮去瓤五分神麯炒七分黃柏酒炒三分上銼一劑水煎食遠服參朮調元膏扶元氣健脾胃進飲食潤肌膚生精脈補虛羸固真氣救危急活生命真仙丹也雪白朮一斤淨去蘆油楝參四兩俱銼成片入砂鍋內將淨水十大碗熬汁二碗濾去渣又熬取汁二碗去渣將前汁共一處濾淨文武火熬至二碗加蜜半斤再煎至滴水成珠為度埋土三日取出每日服三四次白米湯下如勞瘵陰虛火動者去人參白雪糕大米一升糯米二升山藥炒蓮肉去心芡實各四兩為細末入白砂糖一斤半攪令勻入籠蒸熟任意食之其功如前但內傷並虛勞泄瀉者宜當飯食之參苓白朮丸治病後元氣虛弱此藥補助脾胃進美飲食壯健身體充實四肢清火化痰解鬱養元氣人參去蘆一兩白朮去蘆油土炒二兩半白茯苓去皮一兩山藥炒一兩蓮肉去心皮一兩陳皮一兩桔梗去蘆二兩薏苡仁炒一兩半夏湯泡七次薑汁炒一兩神麯炒一兩香附一兩黃連薑汁炒一兩砂仁五錢白扁豆薑汁炒一兩甘草炙一兩當歸酒洗一兩黃耆蜜炙一兩遠志甘草水泡去根一兩上為末薑棗煎湯打神麯糊為丸如梧桐子大每服百丸食後白湯送下忌生冷之物補真膏人參去蘆四兩山藥蒸熟去皮一斤芡實水浸三日去殼皮蒸熟一斤蓮肉水浸去心皮一斤紅棗蒸熟去皮核一斤杏仁水泡去皮尖蒸熟一斤核桃肉水浸去皮殼一斤真沉香三錢另研為末以上俱搗爛蜂蜜六斤用錫盆分作三分入盆內滾水煉蜜如硬白糖為度只有三斤乾淨真酥油一斤和蜜蒸化將前八味和成一處磨極細末入酥油蜜內攪勻如膏入新瓷罐內以盛一斤為度用紙封固勿令透風每日清晨用白滾水調服數匙臨臥時又一服忌鐵器大補真元其功不能盡述雲林潤身丸治肌肉怯弱精神短少飲食不甘此藥服後飽則即飢飢則即飽可以當勞可以耐飢久服四肢充實身體肥健清火化痰開鬱健脾理胃養血和氣宜常服當歸酒洗六兩白朮去蘆六兩白茯苓去皮三兩香附米童便浸炒三兩陳皮三兩枳實麩炒三兩黃連薑汁炒三兩白芍藥酒炒三兩山楂肉三兩神麯炒三兩人參二兩山藥炒二兩蓮肉去心二兩甘草炙五錢上為細末荷葉煎湯煮飯為丸如梧桐子大每服百餘丸米湯送下或酒下百無所忌勞役之士不可一日無此藥也九仙王道糕尋常用養精神扶元氣健脾胃進飲食補虛損生肌肉除濕熱蓮肉去皮心山藥炒白茯苓去皮薏苡仁各四兩大麥芽炒白扁豆芡實去殼各二兩柿霜一兩白糖二十兩上為細末入粳米粉五升蒸糕曬乾不拘時任意食之米湯送下益氣丸治語言多損氣懶語補土益氣麥門冬去心人參各三錢橘皮桔梗甘草炙各五錢五味子二十一個上為極細末水浸油餅為丸如雞頭大每服一丸細嚼津唾咽下油餅和細燒餅也大凡大病後谷消水去精散衛亡多致便利枯竭宜當補中益氣為要蓋脾為中州澆灌四旁與胃行其津液者也況大腸主津小腸主液亦皆稟氣於胃胃氣一充津液自行矣燥甚者別當以辛潤之以苦泄之太府水仙劉公患因勞役太過發熱憎寒頭疼身痛口乾發渴嘔噁心煩一醫以羌活湯一醫以藿香正氣散俱弗效愈增酸困手足無處著落心慌神亂晝夜不寐坐臥不安湯水不入聞藥亦吐余診六脈洪數氣口緊盛此內傷元氣也以補中益氣湯加遠志酸棗仁竹茹麥門冬一服即熟睡半夜而醒曰雲林妙哉藥用當如通神不知病之何所去也次早又進一服痊愈侍御及溪周公患虛損目不敢閉閉則神魂飄散無所知覺且不敢言言則氣不接飲食不思昏昏沉沉余診六脈虛微此元氣虛弱心神虛損也先以硃砂丸一服稍安後以補中益氣湯倍用參耆加遠志茯神酸棗仁白芍生地黃麥門冬連前數劑漸次尋愈飲食脈氣口脈緊盛為傷食食不消化浮滑而痰一云五味淡薄令人神爽氣清蓋酸多傷脾咸多傷心苦多傷肺甘多傷腎辛多傷肝尤忌生冷硬物節調飲食說夫脾者陰氣也靜則神藏燥則消亡飲食自倍腸胃乃傷謂食物無務於多貴在能節所以保和而遂頤養也若貪多務飽飫塞難消徒損暗傷以招疾患蓋食物飽甚耗氣非一或食不下而上湧嘔吐以耗靈源或飲不消而作痰咯唾以耗神水大便頻數而泄耗穀氣之化生溲便滑利而濁耗源泉之浸潤至於精清冷而下漏汗淋瀝而下泄莫不由食物之過傷滋味之太厚如能節滿意之食省爽口之味常不至於飽甚者即頓頓必無傷物物皆為益糟粕變化早晚溲便按時精華和凝上下津液含蓄神氣內守榮衛外固邪毒不能犯疾病無由作故聖人立言垂教為養生之大經也傷食者只因多餐飲食脾虛運化不及停於胸腹飽悶噁心惡食不食噯氣作酸下泄臭屁或腹痛吐瀉重則發熱頭疼左手關脈平和右手關脈緊盛是傷食也初起一吐即寬若郁久不化成食積也脾胃俱實能食而肥過時不飢多食不傷也脾胃俱虛不食而瘦與食則減食不與食則不思飢飽不知也食少而肥者雖肥則四肢不舉蓋脾因邪勝也食多而瘦者胃伏火邪於氣分則能食雖多食而不能生肌肉也傷食夾氣感寒者宜消食順氣表寒也行氣香蘇散治內傷生冷飲食厚味堅硬之物肚腹脹滿疼痛外感風寒濕氣頭疼身熱憎寒遍身骨節麻木而痛七情惱怒相沖飲食不下心腹氣痛紫蘇陳皮香附烏藥川芎羌活枳殼麩炒麻黃甘草因濕加蒼朮上銼生薑三片水煎溫服外感風寒加蔥白三根內傷飲食加山楂神麯炒飲食停積痞脹作痛者宜消導也屬熱積者宜枳實大黃湯治胸腹有食積大便不通者枳實厚朴去皮大黃檳榔甘草腹痛甚加木香上銼一劑水煎空心熱服以利為度不可再服消滯丸消酒消食消水消氣消痞消脹消腫消積消痛此藥消而不見響而不動藥本尋常其功甚捷黑牽牛煅取頭末二兩香附米炒五靈脂一兩上為細末醋糊為丸如緑豆大每服二三十丸食後生薑湯下屬冷積者宜內消散治過食寒硬之物食傷太陰或嘔吐痞滿脹痛陳皮半夏薑製白茯苓去皮枳實去瓤麩炒山楂肉神麯炒砂仁香附三稜莪朮乾生薑上銼一劑水煎溫服沉香化滯丸消積滯化痰飲去惡氣解酒積中滿嘔噦噁心沉香五錢蓬朮醋炒三兩香附炒陳皮各一兩木香砂仁藿香麥芽炒神麯炒甘草炙各一兩上為細末酒糊為丸如緑豆大每服五十丸空心沸湯下飲食不思痞悶者胃寒也香砂養胃湯治脾胃不和不思飲食口不知味痞悶不舒香附炒砂仁蒼朮米泔制炒厚朴薑汁炒陳皮各八分人參五分白朮去蘆一錢茯苓去皮八分木香五分白豆蔻去殼七分甘草炙上銼劑薑棗煎服脾胃寒加乾薑官桂肉食不化加山楂草果米粉面食不化加神麯麥芽生冷瓜果不化加檳榔乾薑胸腹飽悶加枳殼蘿蔔子大腹皮傷食胃口痛加木香枳實益智傷食泄瀉加乾薑烏梅白朮傷食噁心嘔吐加藿香丁香半夏烏梅乾薑飲食不化到飽者脾虛也香砂六君子湯治脾虛不思飲食食後到飽香附一錢砂仁五分人參五分白朮一錢茯苓去皮半夏薑製陳皮各一錢木香五分白豆蔻厚朴薑汁炒一錢益智仁甘草炙各五分上銼一劑薑棗煎服胃口惡寒嘔吐不止去木香益智仁加丁香藿香名藿香安胃湯飲食自倍者脾胃兩傷也香砂平胃散治傷食香附炒一錢砂仁七分蒼朮米泔制炒一錢陳皮一錢甘草五分枳實麩炒八分木香五分藿香八分上銼一劑姜一片水煎服肉食不化加山楂草果米粉面食不化加神麯麥芽生冷瓜果不化加乾薑青皮飲酒傷者加黃連乾葛烏梅吐瀉不止加茯苓半夏烏梅去枳實酒者大熱有毒氣味俱陽乃無形之物也葛花解酲湯治飲酒太過嘔吐痰逆心神煩亂胸膈痞塞手足戰搖飲食減少小便不利白豆蔻砂仁葛花各五錢木香五分青皮三分白茯苓陳皮豬苓人參各一錢半白朮神麯炒澤瀉乾生薑各二錢上為末和勻每服三錢白湯調下但得微汗酒病去矣論云此蓋不得已用之豈可恃賴日日飲酒耶是方氣味辛溫偶因酒病服之則不損元氣何者敵酒病故也若頻服之損人天年也神仙不醉丹白葛花白茯苓去皮小豆花葛根木香天門冬去心縮砂仁牡丹皮人參去蘆官桂枸杞子陳皮澤瀉海鹽甘草各等分上為細末煉蜜為丸如彈子大每服一丸細嚼熱酒送下一丸可飲酒十盞十丸可飲酒百盞調理脾胃者醫中之王道也太和丸治元氣脾胃虛損不思飲食肌體羸瘦四肢無力面色痿黃專補氣生血健脾養胃開胸快膈清郁化痰消食順氣平和調理之劑人參去蘆五錢白朮去蘆土炒四兩白茯苓去皮半兩陳皮一兩半夏麵炒二兩二錢枳實麩炒一兩黃連薑汁炒一兩當歸酒洗一兩山楂蒸去子一兩木香五錢白芍酒炒一兩半香附童便炒一兩神麯炒一兩半麥芽炒一兩半白豆蔻去殼一兩三錢龍眼肉一兩三錢大粉草炙七錢上為末荷葉一個煎湯打倉米糊為丸如梧桐子大每服百九不拘時米湯送下一人患因房勞後吃紅柿十數枚又飲涼水數碗少頃又食熱面數碗而心腹大痛豫診六脈沉微而氣口稍大此寒熱相搏而致也以附子乾薑肉桂枳實山楂神麯莪朮香附一服立止後渾身發熱又以小柴胡湯一劑而安一人臘月賭食羊肉數斤被羊肉冷油凍住堵塞在胸膈不下脹悶而死諸醫掣時余見六脈俱有用黃酒一大壇溫熱入大缸內令患人坐於中衆手輕輕亂拍胸腹背心令二人吹其耳及將熱燒酒灌之次服萬億丸得吐瀉而愈郁證脈多沉伏郁證者鬱結而不散也人之氣血沖和百病不生一有鬱結諸病生焉五郁者金水木火土泄折達發奪之義是也六郁者氣血痰濕熱食結聚而不得發越也氣鬱者腹脅脹滿刺痛不舒脈沉也木香調氣散治氣鬱證木香另研五分烏藥香附枳殼麩炒青皮去穰各一錢砂仁五分厚朴姜炒陳皮各一錢官桂二分撫芎蒼朮米泔浸各一錢甘草三分上銼一劑生薑三片水煎磨木香同服血鬱者能食便紅或暴吐紫血病不移處脈數澀也當歸活血湯治血鬱證當歸芍藥撫芎桃仁去皮尖各一錢紅花五分牡丹皮香附烏藥枳殼去穰青皮各三分官桂乾薑炒黑甘草各三分上銼一劑生薑一片水煎服血結硬痛加大黃食鬱者噯氣作酸胸腹飽悶作痛惡食不思右關脈緊盛也香砂平胃散治食鬱證蒼朮米泔制厚朴薑汁炒陳皮各二錢香附童便炒一錢砂仁五分枳殼麩炒山楂去子麥芽炒神麯炒乾薑各三分木香五分甘草三分上銼一劑生薑三片蘿蔔子一撮水煎磨木香同服食鬱久成塊去乾薑加大黃一方治食鬱久胃脘有瘀血作痛用生桃仁連皮細嚼以生韭菜搗自然汁一盞送下大能開提氣血痰鬱者動則喘滿氣急痰嗽不出胸脅痛脈沉滑也栝蔞枳殼湯治痰鬱症栝蔞去殼枳實麩炒桔梗撫芎蒼朮米泔浸香附杏仁去皮尖片芩去朽貝母去心各一錢砂仁五分陳皮一錢木香另研五分上銼一劑生薑三片水煎入竹瀝薑汁少許磨木香調服熱鬱者即火鬱也小便赤澀五心煩熱口苦舌乾脈數也火鬱湯治火鬱症山梔柴胡乾葛撫芎白芍連翹地骨皮各一錢甘草三分上銼一劑水煎服濕鬱者周身骨節走注疼痛遇陰雨即發脈沉細而濡也滲濕湯方見濕門六郁越鞠者解諸郁之總司也六郁湯治諸郁清火化痰順氣開胸膈香附童便制蒼朮米泔制神麯山梔連翹陳皮川芎貝母去心枳殼炒蘇梗甘草各一錢上銼一劑水煎服有痰加南星半夏有熱加柴胡黃芩血鬱加桃仁紅花濕加白朮羌活氣加木香檳榔食積加山楂砂仁越鞠丸解諸鬱火化痰氣開胸膈神麯炒香附童便浸一宿蒼朮米泔浸川芎山梔炒各等分上為細末水丸緑豆大每服五六十九空心溫水送下補遺方解鬱調胃湯治胃脘血液耗損痰火內郁水漿易下而食物難消若噎膈之症或氣分之火壅遏於中而時作刺痛者皆由怒憂思慮勞心所致也白朮一錢陳皮鹽水洗一錢白茯苓去皮一兩歸尾酒洗一錢二分赤芍酒浸八分川芎六分生地黃酒洗薑汁拌曬乾八分香附米八分神麯炒七分梔子仁鹽水炒一錢二分麥芽炒七分桃仁去皮四兩生甘草四分上銼一劑生薑三片水煎熱服若胸膈刺痛加薑黃酒炒八分若胸噎悶加枳殼麩炒七分胸內煩熱加黃連六分大便不利加酒蒸大黃二錢二分有痰加半夏薑汁炒八分去地黃飲食不美去地黃加白朮五分嘔吐加藿香一錢去地黃川芎桃仁痰飲脈偏弦為飲或沉弦滑或結芤伏痰飲中節又脈多滑有弦滑沉滑微滑火痰黑色老痰膠濕痰白色寒痰清王隱君曰痰之為病難明或頭暈目眩耳鳴或口眼蠕動眉稜骨痛耳輪俱癢或四肢遊風腫硬或齒浮而痛癢或噫氣吞酸心下嘈雜或痛或噦或咽嗌不利咯之不出咽之不下其痰似黑有如破絮桃膠蜆肉之狀或心下如停冰心氣冷痛或夢寐奇怪之狀或足腕痠軟或腰腎骨節卒痛或四肢筋骨疼痛或手足麻痹臂痛狀若風濕或脊上每日一條如線紅起或渾身習習如臥芒刺或眼黏澀癢口噤喉痹或繞項結核或胸腹間如有二氣結紐噎塞煩悶或失志癲狂中風癱瘓或風毒腳氣或心下怔忡如畏人捕或喘嗽嘔吐或吐冷涎緑水黑汁甚為肺癰瘍毒者噁心痞膈泄瀉寒熱便膿或胸間轆轆有聲或背心一點常如冰冷皆痰所致百病中多有兼痰者世所不知也諸病以化痰為先善治痰者兼治氣氣順則痰利痰脈浮滑者宜降浮實者宜吐沉小者不宜吐恐虛故也凡治痰症不可全用利藥過使脾氣虛弱則痰反易生而多若脾虛生痰者用健脾燥濕便要利補兼用陳皮白朮為佐也痰乃穢濁之物宜吐不宜瀉則反加別症矣痰者屬濕乃津液所化也二陳湯治一切痰飲化為百病此藥主之陳皮去白半夏薑製白茯苓去皮甘草上銼一劑生薑三片水煎服咳嗽白痰者肺感風寒也以後諸痰為病悉依前方加減風痰加南星桔梗防風枳實寒痰加乾薑官桂食積痰者多餐飲食郁久成痰也小兒多有此症加山楂神麯香附咳嗽線痰者脾胃有濕也加蒼朮白朮山楂砂仁痰氣者胸膈有痰氣脹痛也痰在咽喉間有如綿絮有如梅核吐之不出咽之不下或升或降塞礙不通亦痰氣也後成膈噎病加砂仁香附栝蔞枳實蘇子桔梗當歸貝母去半夏痰飲者痰在胸膈間痛而有聲也加蒼朮栝蔞枳實木香砂仁當歸川芎香附青皮白芥子治痰飲極效痰涎症者渾身胸背脅痛不可忍也牽引釣痛手足冷痹是痰涎在胸膈也加白芥子砂仁木香茴香香附枳實當歸酒炒黃芩痰濕流注者渾身有腫塊也凡人骨體串痛或作寒熱都是濕痰流注經絡也加栝蔞枳殼蒼朮酒芩羌活防風連翹當歸香附砂仁木香紅花竹瀝薑汁少許有熱加柴胡上痛加川芎白芷下痛加黃柏牛膝塊痛加乳香沒藥頭項痛加威靈仙腫塊痛外加五倍子朴硝大黃南星四味為細末醋調敷腫塊上漸漸自消不散則成膿矣痰核者人身上下結核不散也或發腫塊者是痰塊也大凡治痰塊流注結核俱與濕痰流注同治法俱加皂刺引藥至毒所濕痰加蒼朮白朮砂仁香附枳殼桔梗熱痰加黃芩山梔貝母枳實桔梗麥門冬竹瀝去半夏痰火加炒黃連竹瀝貝母去半夏痰厄者咳嗽氣逆發痰厄也加砂仁酒痰加炒黃連砂仁乾葛烏梅枳實桔梗貝母去半夏項背骨節疼痛者皆是痰氣風熱也老痰加枳實栝蔞海石連翹香附黃芩桔梗貝母去半夏咳嗽咯吐黃痰者脾胃有熱也久不愈成肺痿口吐癰膿或痰血作腥臭難治也加栝蔞枳實桔梗片芩山梔天門冬桑白皮杏仁蘇子竹瀝咯吐黑痰成塊者勞傷心腎也皆是久郁老痰同治法脾虛生痰加白朮人參白芍枳實砂仁桔梗痰喘氣急加蘇子砂仁木香茴香白芥子栝蔞枳實酒炒枯芩羌活蒼朮當歸竹瀝川芎薑汁少許去半夏痰症發熱咳嗽生痰加片芩麥門冬五味子貝母知母桑白皮當歸桔梗竹瀝薑汁少許去半夏如飲酒嘔噦吐痰加砂仁烏梅前二陳湯加減止此不能言語者是痰迷心竅也咯痰不出者是痰結也胸膈有痰不化元氣虛弱津液乾燥咯不得出喘嗽身熱痛難轉側者是痰結也脅下有痰作寒熱咳嗽氣急作痛者亦痰結也喉中漉漉有聲喘急咯痰不出者難治也氣鬱發喘不得睡者難治也服藥後若咯吐痰出為效若咯痰不出者亦難治也以上六條俱宜後方栝蔞枳實湯治痰結咯吐不出胸膈作痛不能轉側或痰結胸膈滿悶作寒熱氣急並痰迷心竅不能言語者並皆治之栝蔞去殼枳實麩炒桔梗去蘆茯苓去皮貝母去心陳皮片芩去朽山梔各一錢當歸六分砂仁木香各五分甘草三分上銼一劑生薑煎入竹瀝薑汁少許同服痰迷心竅不能言語加石菖蒲去木香氣喘加桑白皮蘇子外用姜渣揉擦痛處痰燥者痰火作熱煩躁也痰話者痰火作熱驚惕不安錯語失神也痰迷心竅神不守舍因思憂鬱結驚恐傷心心不自安神出舍空使人煩亂悲歌叫罵奔走不識人也以上諸條俱宜後方加減溫膽湯治痰燥痰話驚惕失志神不守舍茯神去皮木一錢半夏薑汁製一錢陳皮一錢枳實麩炒一錢當歸八分酸棗仁炒八分山梔炒一錢竹茹八分人參六分白朮去蘆一錢麥門冬辰砂五分為末臨服調入黃連薑汁炒一錢竹瀝半盞臨服加入甘草三分上銼薑棗烏梅煎調辰砂末溫服千般怪症者多兼痰火也滾痰丸大黃酒拌蒸曬乾黃芩去朽各八兩沉香五錢金星礞石一兩捶碎焰硝一兩和勻入砂罐內鐵線扎鹽泥封固曬乾碳火煅過方加硃砂二兩研極細末為衣上為細末水丸如緑豆大每服三五十九量虛實加減服之各隨引子送下一切失心喪志或癲或狂等症每服百丸人壯盛氣實能飲食狂甚者服百二十丸以上三百丸以效為度一切中風癱瘓痰涎壅塞大便或通或閉者每服八九十丸人壯盛實者一百丸常服二三十丸無大便不利之患自然上清下潤之妙一切陽症風毒腳氣遍身遊走疼痛每服八九十丸未效更加十丸一切走刺氣痛每服七八十丸未效再加十丸一切無病之人遍身筋骨平白疼痛不能名狀者每服七八十丸以效為度一切頭痛非頭風症牙疼或浮或癢非風疰牙疼者每服八九十丸一切噫氣吞酸至於噯逆厄氣及胸閉或從胸中氣塊衝上嘔吐涎飲狀如翻胃者每服七八十丸未效再服一切心中怔忡如畏人捕怵惕不安陰陽關格變生怪症每服七八十丸一切失飢傷飽憂思過慮至於心下嗜雜或嘔或噦晝夜飲食無度或只虛飽腹中稍飢並不喜食每服七八十丸一切新久痰氣喘嗽或嘔吐涎沫或痰結實熱或頭目眩暈每服八九十丸虛老羸瘦者五六十丸未便再加十丸一切急慢喉閉赤眼每服八九十丸腮頜腫硬繞項結核若瘰癧者正宜服之若年深多次服之口糜舌爛咽喉生瘡者每服五六十丸用蜜少許口嚼碎噙睡徐徐咽下些小口瘡如此噙三四夜即瘥也一切遍身無故遊走疼痛或腫或攣或無常處痛無定所不腫在一處及痠軟沉滯者每服七八十丸量大小輕重加減服之一切心氣疼痛如停冰塊或動身散入腹中絞痛上攻頭面腫硬遍身四肢去處腫起軟浮或痛或癢或穿或不穿或穿而復閉或消或長漸成篤疾皆系痰毒內攻或使爛痰臭或作腸癰內疽服之打下惡物日淺膿近者剋日全安一切男婦久患心疼下連小腹面黃羸瘦痛陳日發必嘔緑水黑汁冷涎乃致氣絶心下溫暖者每服八九十丸立見生意然後陸續服之以瘥為度兼服生津化痰溫中理脾之藥唯豁痰湯加減為妙一切痢疾不問雜色或帶血塊惡物者不問曾經推挨但是新久不已者或熱或不進飲食每服八九十丸次日熱退再進三二十九即服止痢藥萬無一失若兼寒熱痰涎者並用倉廩散一切荏苒之疾日久男婦之患非傷寒內外之症或酒色吐血或月水過期心煩志亂或腹脹脅痛勞痛耳聵鼻窒骨節痠痛乾嘔噦噁心百藥無效痛者不能喻其狀方書未嘗載其疾醫者不能辨其症並依前法加減服之無不效之理也大凡服藥必須臨睡臥床之時用熟水一口只送過咽喉即便仰臥令藥在咽膈之間徐徐而下要半日不可飲食湯水及不可起身行坐言語直候藥丸徐逐上焦痰滯惡物過膈入腹然後動作方能中病每次須當連進兩夜先夜所服次日痰物既下三五次者次夜減十丸上兩次者仍服前數下五七次或只二三次而疾勢頓已者次夜減二十丸頭夜所服並不下惡物者次夜加十丸壯人病實者多至百丸唯狂疾徑實及暴卒惡候多服無效其或服罷臥倒咽喉稠滯壅塞不利者乃痰氣從上藥病相攻之故也少頃藥力既勝自然寧貼又或百中有一稍稍腹痛腰背拘急者蓋有一種頑痰惡物滯壅閉氣滑腸裡急後重者狀如痢病片晌即已若其痰涎易下者其為快利不可勝言頓然滿口生津百竅爽快間有片時倦怠者蓋連日病苦不安一時為藥所勝肌體暫和如醉得醒如浴方出如睡方起即非虛倦此藥並不洞瀉刮腸大瀉但能取痰積惡物自胸胃次第穿鑿而下腹中嗜雜並不相傷唯下部黏腸之糞乃藥力不到之處是故先去其餘余不備述耳竹瀝化痰丸上可取上之濕痰下可取腸胃之積痰一名導痰小胃丹南星半夏二藥用皂礬姜水浸煮干各二兩陳皮枳實二藥用皂礬水泡半日炒各二兩白朮去蘆二兩蒼朮用米泔皂礬水浸一宿去黑皮切曬乾炒二兩桃仁去皮杏仁用皂礬水泡去皮尖各一兩紅花酒蒸一兩白芥子炒一兩大戟長流水煮一時曬乾一兩芫花醋拌濕過一宿炒黑一兩甘遂麵裹煨過一兩黃柏炒褐色一兩大黃酒濕紙包煨過再以酒炒一兩半上為末薑汁竹瀝打蒸餅糊為丸如緑豆大每服三二十丸極甚者五七十丸量人虛實加減再不可多恐傷胃氣也一切痰飲臨臥時白湯送下一日一服最能化痰化痞化積治中風喉痹極有神效一中風不語癱瘓初起用濃薑湯送下三五十丸少時即能說話一頭風頭痛多是濕痰上攻臨臥時薑湯下二十丸一眩暈多屬痰火食後薑湯下二十五丸然後以二陳湯合四物湯加柴胡黃芩蒼朮白芷倍用川芎熱多加石膏知母一痰痞積塊臨臥白湯送下三十丸一日一服雖數十年只五七服見效一哮吼乃痰火在膈上臨臥薑湯下二十五丸每夜服一次久服自效一喉痹腫痛食後白湯送下調理痰火之疾者宜消補兼濟也清氣化痰丸化痰順氣開鬱清火寧嗽止喘妙不可言橘紅鹽水洗去白二兩香附米鹽水浸炒三兩青黛四錢半夏溫水洗七次薑汁浸炒二兩片芩酒炒一兩貝母去心二兩天門冬水泡去心二兩栝蔞去殼微炒另研二兩桔梗去蘆二兩杏仁水泡去皮尖微炒二兩枳實去瓤麩炒二兩山楂肉蒸去錢二兩黃連去毛薑汁炒二兩白茯苓去皮二兩白朮不油者二兩蘇子微炒二兩連翹去梗一兩海石一兩另研皂角火炮去皮弦子一兩熬膏上為細末用神麯竹瀝打糊為丸如梧桐子大每服五十丸食後白湯下清茶亦可千金化痰丸健脾理胃清火化痰頑痰能軟結痰能開疏風養血清上焦之火除胸膈之痰清頭目止眩暈如神膽星四兩半夏姜礬同煮半日四兩陳皮去白二兩白茯苓去皮二兩枳實去瓤麩炒一兩海石火煅一兩天花粉二兩片芩酒炒二兩黃柏酒炒一兩知母酒炒一兩當歸酒洗一兩天麻火鍛二兩防風去蘆二兩白附子煨二兩白朮米泔浸炒二兩大黃酒拌蒸九次五兩甘草生三錢氣虛加人參八錢上為細末神麯二兩打糊為丸如梧桐子大每服六七十丸清茶任下法制半夏化痰如神若不信將半夏七八粒研入痰碗內化為清水有痰疾中風不語研七八粒用井花水送下以手摩運腹上一炷香時即醒能語用大半夏一斤石灰一斤滾水七八碗入盆內攪晾冷澄清去渣將半夏入盆內手攪之日曬夜露一七日足撈出井花水洗淨三四次泡三日每日換水三次撈起控干用白礬八兩皮硝一斤滾水七八碗將礬硝共入盆內攪晾溫將半夏入內浸七日日曬夜露日足取出清水洗三四次泡三日每日換水三次日足取出控干入藥甘草南薄荷各四兩丁香五錢白豆蔻三錢沉香一錢枳實木香川芎各三錢陳皮五錢肉桂三錢枳殼五味子青皮砂仁各五錢上共十四味切片滾水十五碗晾溫將半夏同藥共入盆內泡二七日日曬夜露攪之日足取出藥與半夏用白布包住放在熱坑用器皿扣住三炷香時藥與半夏分胎半夏干收用有痰火者服之一日大便出似魚膠一宿盡除痰根永不生也按上諸方皆治壯人痰火有餘之症宜服之若虛人痰火宜照後論治若脾肺氣虛不能運化而有痰者宜六君子湯加木香方見補益若脾氣虛弱不能清化而有痰者宜六君子湯加桔梗方見補益若因肺經氣滯而痰中有血者宜加味歸脾湯方見補益若因肝經血熱而痰中有血者宜加味逍遙散方見婦人虛勞若因肝經陰虛而痰中有血者宜加味地黃丸方見補益若過服寒涼之劑而吐痰有血者必用四君子湯之類以主之方見補益若中氣虛而痰甚者用補中益氣湯加茯苓半夏如未應加一味薑汁尤妙滌痰散此藥清肺消痰定嗽解酒毒除一切痰火廣陳皮先用白水洗淨每一斤入食鹽四兩同入水浸過一宿鍋內煮乾略去筋膜切作小片炒乾每陳皮一兩入粉草二錢共為末每日早晚各二匙白湯調下一儒者體肥仲夏患痰喘用二陳芩連桔梗痰喘益甚加桑皮杏仁栝蔞盜汗氣促加貝母枳殼不時發熱飲食漸減脈大而無力余以為脾肺虛寒用八味丸以補土母用補中益氣湯以接中氣而愈一男子飲食素少忽痰壅氣喘頭搖目札揚手擲足難以候脈視其面色黃中見青此肝木乘脾土如小兒慢驚之症先用六君子柴胡升麻而愈用補中益氣湯加半夏而痊張秋官面赤作渴痰盛頭暈此腎虛水泛為痰用六味丸而愈咳嗽脈咳嗽所因浮風緊寒數熱細濕房勞澀難右關微濡飲食傷脾左關弦短肝極勞疲肺脈浮短咳嗽與期五臟之嗽各視本部浮緊虛寒沉數實熱沉滑多痰弦澀少血形盛脈細不足以息沉小伏匿皆是危脈唯有浮大而嗽者生春是上升之氣夏是火炎上最重秋是濕熱傷肺冬是風寒外束四時感冒一切咳嗽發熱吐痰者宜發散風邪也參蘇飲治四時感冒發熱頭疼咳嗽聲重涕唾稠黏中脘痞滿嘔吐痰水寬中快膈不致傷脾此藥大解肌熱將欲成勞痰咳喘熱最效紫蘇一錢前胡二錢桔梗枳殼各一錢乾葛二錢陳皮半夏茯苓各一錢甘草七分人參七分熱咳者去之木香五分氣盛者去之上銼一劑生薑棗子煎食後溫服若天寒感冒惡寒無汗咳嗽喘促或傷風無汗鼻塞聲重咳嗽並加麻黃二錢去皮杏仁二錢金沸草一錢以汗散之若初感冒肺多有熱加杏仁黃芩桑白皮烏梅肺寒咳嗽加五味子乾薑心下痞悶或胸中煩熱或停酒不散或嘈雜噁心加黃連枳實各一錢乾葛陳皮倍用之胸滿痰多加栝蔞仁一錢氣促喘嗽加知母貝母鼻衄加烏梅麥門冬白茅根心盛發熱加柴胡黃芩頭痛加川芎細辛咳嗽吐血加升麻牡丹皮生地黃勞熱咳嗽久不愈加知母貝母麥門冬見血加阿膠生地黃烏梅赤芍藥牡丹皮吐血痰嗽加四物湯名茯苓補心湯妊娠傷寒去半夏加香附感冒風寒嗽而聲啞者是寒包熱也與久嗽聲啞不同冷風嗽者遇風冷即發痰多喘嗽是也以上二條俱宜後方三拗湯治感冒風邪寒冷鼻塞聲重語音不出咳嗽多痰胸滿短氣喘急甘草生麻黃不去節杏仁不去皮尖各二錢加荊芥桔梗名五拗湯上銼劑生薑煎服痰嗽者嗽動便有痰聲痰出嗽止是也嗽而痰多者是脾虛也肺脹嗽者嗽則喘滿氣急也喘急不得眠者難治久嗽不止成勞若久嗽聲啞或喉生瘡者是火傷肺金也俱難治之若血氣衰敗聲失音者亦難治也以上三條俱宜後方清肺湯治一切咳嗽上焦痰盛黃芩去朽心一錢半桔梗去蘆茯苓去皮陳皮去白貝母去心桑白皮各一錢當歸天門冬去心山梔杏仁去皮尖麥門冬去心各七分五味子七粒甘草三分上銼生薑棗子煎食後服痰咯不出加栝蔞枳實竹瀝去五味子咳嗽喘急加蘇子竹瀝去桔梗痰火咳嗽面赤身熱咯出紅痰加芍藥生地黃紫菀阿膠竹瀝去五味子杏仁貝母桔梗久嗽虛汗多者加白朮芍藥生地黃去桔梗貝母杏仁久嗽喉痹聲不清者加薄荷生地黃紫菀竹瀝去貝母杏仁五味嗽而痰多者加白朮金沸草去桔梗黃芩杏仁咳嗽身熱加柴胡咳嗽午後至晚發熱者加知母黃柏生地芍藥竹瀝去黃芩杏仁咳嗽痰結脅痛者加白芥子栝蔞枳實砂仁木香小茴竹瀝薑汁少許去貝母杏仁山梔亦加柴胡引經食積嗽者痰嗽如膠也咳嗽胸膈結痛者是痰結也早晨嗽者胃中有食積也上半日嗽多者胃中有伏火也以上四條俱宜後方栝蔞枳實湯加減方見痰飲午後至夜嗽多者屬陰虛也黃昏嗽多者火氣浮少加涼藥火嗽者有聲痰少面赤身熱脈數者是也乾咳嗽無痰者是痰鬱火邪在肺難治也勞嗽者盜汗痰多作寒熱脈數大無力是也以上四者皆是勞力酒色內傷憂怒鬱結陰虛火動而嗽者俱宜後方滋陰降火湯方見虛怯一切久嗽不止者宜後方呂洞賓仙傳蘆吸散治新久咳嗽百藥無功服此立效款冬花蕊五錢鵝管石二錢五分陳皮二錢五分年老人及虛者加人參五分冬月加肉桂一錢五分上忌鐵器為細末和勻分作七帖作七日服每服一帖夜仰臥將藥一帖作三次入竹筒內病者口噙竹筒近咽喉用力一吸將白溫水一口送下不可多吃水忌諸般油膩鹽一七日藥服完之後亦少用些油鹽至半月後不忌吸藥仙丹鵝管石二兩寒水石四錢半金星礞石七錢焰硝煅後用醋淬白附子七錢白礬七錢枯過四錢半孩兒茶四錢款冬花淨蕊七錢粉甘草四錢上各為末研令極細稱過方用總籮過攙勻如有氣加沉香五分木香七分官桂七分如心下虛悸加硃砂三分熱嗽用茶湯下寒用薑湯下咳如浮腫用木瓜牛膝湯下咳而有紅痰吐血白芥子湯下歌曰仙方二兩鵝管石青礞白附款冬花三味各稱七錢重四錢甘草與兒茶枯礬寒水四錢半八味精研製莫差日進六分三次吸寒用薑湯熱用茶虛加五分沉木桂咳而驚悸用硃砂薄荷煎湯潮熱使化痰止嗽最為佳雞鳴丸治男婦不問老少十八般咳嗽吐血諸虛等症如神從來咳嗽十八般只因邪氣入於肝胸膈咳嗽多加喘胃嗽膈上有痰涎大腸咳嗽三焦熱小腸咳嗽舌上干傷風咳嗽喉多癢膽嗽夜間不得安肝風嗽時喉多痹三因嗽時船上灘氣喘夜間多沉重肺嗽痰多喘嗽難熱嗽多血連心痛膀胱嗽時氣多寒暴嗽日間多出汗傷寒嗽時冷痰酸此是神仙真妙訣用心求取雞鳴丸知母四兩炒杏仁去皮尖二錢桔梗去蘆五錢阿膠麩炒四錢葶藶火上焙三錢款冬花四錢旋覆花一兩半夏薑汁炒三錢甘草炙一兩陳皮去白一兩兜鈴一兩五味子四錢麻黃一兩人參五錢上共為細末煉蜜為丸如彈子大每服一丸五更烏梅生薑棗子湯下大抵久嗽者多屬腎氣虧損火炎水涸或津液湧而為痰者乃真臟為患也須用六味地黃丸壯腎水滋化源為主以補中益氣湯養脾土生肺腎為佐久之自愈方見補益補遺方治咳嗽肺痿吐血氣喘等症用豬肺一個倒懸滴盡血水又用大蘿蔔十個搗爛用新砂鍋一個水五碗煮前蘿蔔爛濾去渣添蜜四兩雞子清十個不用黃與蜜攪勻卻裝入肺內又用款冬花五味子訶子去核各一錢白礬五分俱為末通攪蜜入雞清內入肺管煮熟空心服之其效如神又方豬肺一個洗淨血水若病人每歲用杏仁一個去皮尖將肺以竹片簽眼每眼用杏仁一個麻扎住安瓷器內重湯煮熟去杏仁不用只吃此肺輕者只用一具而已重者制二具吃全安加味上清丸治咳嗽煩熱清聲潤肺寬膈化痰生津止渴爽氣凝神南薄荷葉四兩柿霜四兩玄明粉五錢硼砂五錢冰片五分寒水石五錢烏梅肉五錢白粉八兩上為細末甘草水熬膏為丸如芡實大每服一丸噙化茶湯送下杏仁煎治老人久患喘嗽不已睡臥不得者服之立效杏仁水泡去皮尖炒胡桃仁去皮等分上二味共碾為膏入煉蜜少許為丸如彈子大每服一丸細嚼薑湯送下治痰火咳嗽兼治酒痔白礬一兩煅過礦石灰一兩半上研勻每服一錢或茶或滾水酒亦可如作丸用灰面一兩和合冷水為丸如梧桐子大每服二十五丸前引送下清上噙化丸清火化痰止嗽定喘栝蔞霜天門冬去心橘紅枯芩去朽酒炒海石煅柿霜各一兩桔梗去蘆連翹玄參青黛各五錢風化硝三錢上為細末煉蜜為丸如龍眼大食遠噙化周藩海陽王昆湖公患痰嗽喘熱左足腫痛日輕夜重每年發一二次已經三十年遍治弗效余診左脈微數右脈弦數此血虛有濕痰也以四物湯加蒼朮黃柏木瓜檳榔木通澤瀉空心服以治下元以茯苓補心湯臨臥服以治上焦各三服而愈後以神仙飛步丸空心服清氣化痰丸臨臥服各一料永不再發一儒者每至春咳嗽用參蘇飲之類乃愈後復發仍用前藥反喉喑左尺洪數而無力余以為腎經陰火刑剋肺金以六味丸料加麥門冬五味子炒山梔以補中益氣湯而愈喘急脈喘急脈沉肺脹停水氣逆填胸脈必伏取沉而實滑身溫易愈身冷脈浮尺澀難補又云脈滑而手足溫者生脈沉澀而四肢寒者死喘者為惡候因火所鬱而痰在脾胃也痰喘者喘動便有痰聲也宜後方栝蔞枳實湯治痰喘方見痰飲火喘者乍進乍退得食則減止食則喘也宜後方清肺湯治火喘片黃芩一錢山梔子枳實桑白皮陳皮白茯苓去皮杏仁去皮尖蘇子麥門冬去心貝母去心各八分沉香磨水辰砂研末一味臨服調入各五分上銼一劑姜一片水煎入竹瀝同服氣短而喘者呼吸短促而無痰聲也四君子湯治短氣人參去蘆白朮去蘆一錢三分茯苓去皮陳皮厚朴薑汁炒砂仁蘇子桑白皮各六分當歸八分沉香木香各五分另磨水甘草炙一錢上銼一劑姜一片棗二枚水煎磨沉香調服陰虛火動而喘者心脈數也滋陰降火湯方見虛症依本方加蘇子沉香杏仁桑白皮竹瀝寒喘者四肢逆冷脈沉細也理中湯治寒喘砂仁乾薑炒蘇子厚朴薑汁炒官桂陳皮甘草炙各一錢沉香木香各五分水磨入上銼一劑生薑三片水煎磨沉木香同服若脈細手足冷加附子傷寒喘急者宜發表也五虎湯治傷寒喘急麻黃三錢杏仁去皮尖炒三錢石膏五錢甘草一錢細茶一撮加桑皮一錢有痰加和二陳湯上銼一劑生薑三片蔥白三根煎熱服後用小青龍湯加杏仁虛陽上攻喘急者宜降痰氣也蘇子降氣湯治陽虛上攻氣不升降上盛下虛痰涎壅盛喘促氣滿咳嗽蘇子五錢陳皮厚朴薑汁炒前胡肉桂各二錢半夏薑汁浸炒當歸甘草一方去桂加南星上銼一劑生薑三片棗一枚水煎服若加川芎細辛茯苓桔梗名大降氣湯定西侯蔣公患上氣喘急其脈寸口洪滑此痰滯胸膈也余令先服稀涎散二錢更以熟水頻頻飲之則嗌而吐其痰如膠內有一長條裹韭葉一根痊愈一路姓者年近五十身體肥大飲食倍常患月餘每行動即喘求豫診六脈微澀豫曰此死症也衆皆以豫為妄後逾月果中痰而卒哮吼專主於痰宜用吐法亦有虛而不可吐者治吼必使薄滋味不可純用涼藥必兼發散哮吼者肺竅中有痰氣也五虎二陳湯治哮吼喘急痰盛麻黃杏仁各一錢石膏二錢陳皮一錢半夏一錢薑汁炒茯苓去皮二錢人參八分細茶一撮沉香木香各五分另水磨入上銼一劑生薑三片蔥白三根水煎服定喘湯治哮吼喘急麻黃三錢杏仁去皮尖一錢半片芩去朽半夏薑製桑白皮蜜炙蘇子水洗去土款冬花蕊各二錢甘草一錢白果二十一個去殼切碎炒黃上銼一劑水煎服紫金丹凡遇天氣欲作雨便發齁喘甚至坐臥不得飲食不進此乃肺竅中積有冷痰乘天陰寒氣從背口鼻而入則肺脹作聲此病有苦至終身者亦有子母相傳者每發即服不過七八次覺痰腥臭吐出白色是絶其根也白砒一錢生用枯礬三錢另研淡豆豉出江西者一兩水潤其皮蒸研如泥旋加二味末合勻上捻作丸如緑豆大但覺舉發用冷茶送下七丸甚者九丸以不喘為愈再不必多增丸數慎之慎之小兒服一二丸殊效竹瀝化痰丸治哮吼十數年不愈宜久久服之奏效方見痰飲三白丸治諸般咳嗽吼氣白大半夏一兩生用白砒三錢白礬三錢雄黃通明三錢巴豆仁去油三錢上將白礬熔化入砒末在礬內焙乾取出擂爛再炒成砂同前藥為細末麵糊為丸如粟米大大人服十丸小兒三五丸咳嗽茶下吼氣桑白皮湯送下治吼積方用雞子一個略敲碎損膜不損浸尿缸內三四日夜取出煮熟食之神效蓋雞子能去風痰青金丸治哮喘用厚味發者用之蘿蔔子淘淨蒸熟曬乾為末薑汁浸蒸餅為細丸每服二十粒津送下
