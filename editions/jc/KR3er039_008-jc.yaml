body:
  text: 卷之八癰疽脈癰疽脈數浮陽沉陰浮數不熱但惡寒侵若知痛處急灸或針洪數病進將有膿淫滑實緊促內消可禁宜托裡者脈虛濡遲或芤澀微潰後亦宜長緩易治短散則危結促代見必死無疑瘡瘍之症當察經之傳受病之表裡人之虛實而攻補之假如腫痛熱渴大便閉結者邪在內也疏通之腫焮作痛寒熱頭疼者邪在表也宜發散之焮腫痛甚者邪在經絡也和解之微腫微痛而不作膿者氣血虛也補托之漫腫不痛或不作膿或膿成不潰者血氣虛甚也峻補之色黯而微腫痛或膿成不出或腐肉不潰者陽氣虛寒也溫補之若疑其未潰而概用敗毒復損脾胃不唯腫者不能成膿而潰者亦難收斂七惡之症蜂起多致不救經云諸痛癢瘡瘍皆屬心火若腫赤煩躁發熱引冷便閉作渴脈洪數實是其常也雖在嚴寒之時必用大苦寒之劑以瀉熱毒若脈微皮寒瀉痢腸鳴飲食不入嘔吐無時手足逆冷是變常也雖在盛暑之時必用大辛溫之劑以助陽氣經曰用寒遠寒用熱遠熱有假者反之雖違其時必從其症癰疽大按乃痛者病深小按便痛者病淺按之處陷不復者無膿按之處即復者有膿不復者可消若按之都牽強者未有膿也按之半軟者有膿也又手按上下不熱者無膿若熱甚者有膿凡覺有膿急當破之無膿但氣腫若有血慎之慎之不可針破也癰者大而高起屬乎陽六腑之氣所生也疽者平而內發屬乎陰五臟之氣所成也凡癰疽未破毒攻臟腑一毫熱藥不敢用若已潰破臟腑既虧飲食少進一毫冷藥不敢用也腫瘍者癰疽未見膿而腫也腫瘍內外皆壅宜以散毒表散為主設欲行大黃者宜審其虛寒之原癰疽初起之時宜灸法治癰疽發背初生累試累效凡人初覺癰疽發背已結未結赤熱腫痛先以濕紙覆其上立視候其紙先干處即是結疽頭處取大蒜切成片如三個銅錢厚安在頭上用火艾壯灸之三壯換一蒜片痛者灸至不痛不痛者灸至痛時方住最要早覺早灸為上方發一二日者十灸十愈三四日者六七愈五六日者三四愈過七日則不可灸矣若有十數頭作一處生者用大蒜搗成膏作餅子鋪瘡頭上聚艾燒之亦能安也若背上初發赤腫內有一粒黃如粟米者即用獨蒜切片如前灸法治之次日去痂膿自潰也竹筒吸毒方諸般惡瘡並治用苦竹長一二寸用頭節妙刮去青皮似紙薄為佳其大小隨瘡斟酌應毒瘡初發時用白蒺藜蒼朮烏桕皮白厚朴各五錢重上四味銼片用水一碗同煎竹筒煎煮以藥將干為度乘竹筒熱以手按之於瘡上頃之其筒自黏在瘡上不必手按也仍更用前藥分兩再煮候前竹筒冷以手拔去再換熱者如前法其膿自吸入筒中而愈荊芥敗毒散治癰疽疔腫發背乳癰等症憎寒壯熱甚者頭痛拘急狀似傷寒一二日至四五日者一二劑散其毒輕者內自消散防風荊芥羌活獨活柴胡前胡薄荷連翹桔梗枳殼川芎茯苓金銀花甘草大便不通加大黃芒硝熱甚痛急加黃芩黃連上銼生薑煎服瘡在上食後服在下食前服千金漏蘆湯治一切惡瘡腫毒丹瘤瘰瘍疔腫魚睛五發瘭疽初起一二日便如傷寒頭痛煩渴拘急惡寒肢體疼痛四肢沉重恍惚悶亂坐臥不寧皮膚壯熱大便閉結小便赤黃並治妊婦勿用漏蘆白蘞黃芩麻黃枳實麩炒升麻芍藥甘草炙大黃芒硝連翹上銼作劑水煎服追風通氣散治癰疽發背腦疽流注腫毒救壞病活死肌弭患於未萌之前拔根於既愈之後此藥順氣勻血扶植胃本不傷元氣滌盪邪穢自然通順不生變症兼治打破傷折疝氣血疝腳氣諸氣痞塞塊痛腰痛一切痰飲為患當歸何首烏不犯鐵器木通去皮節赤芍白芷烏藥小茴香枳殼麩炒甘草上銼劑酒水各煎病在上食後服在下食前服一癰疽初萌必氣血凝滯所成為日既久則血積於所滯而後盛作故病人氣血盛者減當歸多則生血發於他所再結癰毒生生不絕矣一癰疽發背在上者去木通恐導虛下元為上盛下虛之病難於用藥一癰疽生痰有二一胃寒生痰加半夏健脾化痰二乃鬱而成風痰加桔梗生薑一流注可加獨活流注者氣血凝滯故氣滯則血留而凝加獨活者可以動一身血脈血脈既動豈復有流注乎一方以醋濕紙貼痛處以炒鹽熨之即消一流注起於傷寒傷寒表未盡遺毒於四肢經絡澀於所滯而後為流注也如病尚有潮熱則里有寒而未盡散加升麻蘇葉熱不退加乾葛頭痛加川芎薑蔥無汗用酒水各半煎大能行血生氣故也一發背既久不愈乃前醫用涼藥過也涼藥內傷其脾外冰其血脾主肌肉脾既受傷飲食必減顏色痿瘁肌肉不生血為脈絡血一受冰則氣不旺肌肉糜爛故必理脾脾健肉自生本方去木通少用當歸加厚朴陳皮盛則加白豆蔻一凡病癰疽之人有泄瀉者不可便服此藥宜先服蠟礬丸止瀉後用此一腸肚內癰宜十宣散與此方相間服之並宜加忍冬藤一腫毒堅硬不穿加川芎獨活麻黃連須蔥煎服出汗即穿一傷折在頭上去木通加川芎陳皮一經年腰痛加萆薢玄胡索酒煎一腳氣加木瓜檳榔穿山甲水煎一痰飲為患或喘或咳或暈頭痛睛疼遍身拘急骨節痹疼胸背頭項腋胯腰腿手足聚結腫硬或痛或不痛按之無血潮雖或有微紅亦淡薄不熱堅如石破之無膿或有薄血或清水或乳汁又有壞肉如破絮或又如瘰癧在皮肉之間如雞卵可移動軟活不硬破之亦無膿血針口胬肉突出唯覺咽喉痰實結塞作寒作熱加南星半夏神功散治癰疽發背一切疔毒並瘰癧等症已成未成患者神效川烏泡去皮尖川黃柏炙去粗皮各等分上為細末用唾調成膏如唾少漱口水亦可發背癰疽等瘡才起者敷患處留頂候藥干用淘米水時常潤濕每日藥敷一次如瘡已成重患將潰爛者先將槐枝艾葉煎湯頓溫將瘡洗淨用絹帛展去膿血以香油潤患處用綿紙仍照患處剪成圓錢留頂貼上後用藥塗於紙如干依前用淘米水潤日換一次聽其自然流膿不可手擠如敷藥後病人瘡覺住痛減熱即愈如生肌則腐肉自落腐如不落者剪割亦可最不宜用針發背不宜貼膏藥凡醫瘡屏去別醫止飲別藥方可治忌氣怒房事勞復並孝服體氣飲酒之人飲食忌酒並雞羊魚肉瓜茄薑辣之物若因氣怒再復發腫依前治之如治對口並腦疽不必洗去舊藥逐次添藥恐動瘡口惹風也一腫毒加南星赤小豆等分醋調塗即消薑汁亦可真人奪命飲治一切癰疽疔腫不問陰陽虛實善惡腫潰大痛或不痛然當服於未潰之先與初潰之際如毒已失潰不可服仍用一劑大勢已退然後隨症調治其功甚捷誠仙方也穿山甲三大片切蛤粉炒成珠天花粉甘草節乳香明透者赤芍白芷各一錢防風貝母各七分沒藥皂角刺各五分炒陳皮一錢半歸尾一錢半金銀花二錢上銼一劑好酒煎空心熱服能飲者服後再飲酒三五杯滓再煎服在背俞倍皂角刺在腹膜倍白芷在胸次加栝蔞仁二錢在四肢倍金銀花呂洞賓仙傳化毒湯治癰疽發背乳癰一切無名腫毒初起服之立消已成已潰服之立愈防風甘草節白芷茯苓貝母黃芩連翹白芍各一錢天花粉金銀花各一錢二分半夏七分乳香沒藥各五分上銼一劑好酒煎胸前飯前服背上飯後服下部空心上部食後俱要出汗為度如無汗用木香薰腳膝腕內被蓋汗出而愈神仙排膿散治惡瘡毒風毒疔瘡背花瘡小兒惡瘡膿血俱從大便中出亦治氣滯腹脹及婦人經閉不通此方壯實之人可用虛弱者當忌之矣大黃十二兩酒浸一宿曬乾白芷沉香木香乳香沒藥穿山甲陳壁土炒各五錢上各為細末量人虛實用之實者不過三錢虛者二錢半臨臥用好生酒調服服後禁飲食湯水半日五更覺腹內疼痛動三五次以稀米粥補之服此藥內有穿山甲恐令人作嘔須慎之即嚼生蔥可止凡修合此藥要誠意不可令婦人雞犬見又不可多合恐久放則不效矣芙蓉膏治癰疽發背諸毒芙蓉葉或皮或根亦可黃荊子上各等分入石臼內搗極爛用雞子清調搽於瘡上留頂不過二次收功頂如煙起立時止痛其效如神一方治發背癰疽不問已潰未潰敷上立消止痛如神白金鳳花科連根葉同搗爛先用陳米醋洗淨患處後敷藥一日一換瘡將好用桑葉醋煮一滾即撈起貼瘡上即生肌收口而愈潰瘍者癰疽之膿已潰出也瘍潰內外皆虛宜以補接為主設欲行香散者宜防其虛實之失由是言之則癰疽之腫時與潰時不同癰疽已潰之後宜後方李氏云疽疾將安每日當服十全大補湯以補氣血宜與千金內托散相間服托裡消毒飲治一切癰疽六七日未消者服此藥瘡未成即消已成即潰能壯氣血固脾胃使毒氣不能內攻使毒膿易潰肌肉易生切不可早用生肌之藥恐毒未盡反潰爛難愈金銀花三錢黃耆蜜水炒天花粉各二錢防風當歸酒洗川芎白芷厚朴薑汁炒桔梗穿山甲炒成珠皂角刺炒各一錢陳皮三錢上銼一劑酒水各一盞煎服瘡在上食後服在下空心服後用水煎服千金內托散治癰疽瘡癤未成者速敗已成者速潰膿自去不用手擠惡肉自去不用刀針服藥後疼痛頓解此藥活血勻氣調胃補虛祛風邪闢穢氣乃王道之劑宜多服之大效黃耆蜜炙人參當歸酒洗各二錢川芎防風桔梗白芷厚朴薑汁炒薄荷甘草生用各一錢加金銀花亦可上為細末每服二錢黃酒調下不飲酒木香湯調下亦可或都作一劑用酒煎尤佳癰疽腫痛倍白芷不腫痛倍官桂不進飲食加砂仁香附痛甚加乳香沒藥水不幹加知母貝母瘡不穿加皂角刺咳加半夏陳皮杏仁生薑五片大便閉加大黃枳殼小便澀加麥門冬車前子木通燈草十全大補湯治癰疽潰後補氣血進飲食實為切要凡膿血出多陰陽兩虛此藥有回生起死之功但不分經絡不載時令醫者觸類而長之可也或見腫平痛寬遂以為安慢不知者無補調養之功愈後虛證復見因而轉為他病而危劇者多矣神仙蠟礬丸治癰疽及肺癰腸癰能消毒固臟腑止疼痛護脂膜止瀉漏化膿癰疽潰後宜兼治諸瘡毒粉瘤痰核三五年者半料即消不問惡瘡新起者亦效黃蠟二兩白礬三兩上為末熔蠟為丸如梧桐子大每服三十九酒下不飲酒熟水下一日服三次肺癰蜜湯下咳嗽薑湯下五善七惡主治夫善者動息自寧飲食知味便利調勻膿潰腫消水鮮不臭神彩精明語聲清朗體氣和平是也此屬腑症病微邪淺更能慎起居節飲食勿藥自愈惡者乃五臟虧損之症或因汗下失宜榮衛消灼或因寒涼克伐氣血不足或因峻厲之劑胃氣受傷以致真氣虛而邪氣實外似有餘而內實不足法當純補胃氣多有可生不可因其惡遂棄而不治若大渴發熱或瀉泄淋閉者邪火內淫一惡也竹葉黃耆湯氣血俱虛八珠湯加黃耆麥門冬五味子山茱萸如不應佐以加減八味丸同服若膿血既泄腫痛尤甚膿色敗臭者胃氣虛而火盛二惡也人參黃耆湯如不應用十全大補湯加麥門五味若目視不正黑睛緊小白睛青赤瞳子上視者肝腎陰虛而目系急三惡也六味丸加炒山梔麥冬五味子如不應用八珍湯加炒山梔麥冬五味子若喘粗氣短恍惚嗜臥者脾肺虛火四惡也六君子加大棗生薑如不應用補中益氣湯加麥門五味心火刑剋肺金人參平肺散陰火傷肺六味丸加五味子煎服若肩背不便四肢沉重者脾腎虧損五惡也補中益氣湯加山茱萸山藥五味如不應用十全大補湯加山茱萸山藥五味若不能下食服藥而嘔食不知味者胃氣虛弱六惡也六君子湯加木香砂仁如不應急加附子若聲嘶色敗唇鼻青赤面目四肢浮腫者脾肺俱虛七惡也補中益氣湯加大棗生薑如不應用六君子湯加炮姜更不應急加附子十全大補湯加附子炮姜若腹痛泄瀉咳逆昏憒者陽氣虛寒氣內淫之惡症也急用托裡溫中湯後用六君子湯加附子或加薑桂溫補若有潰後發熱惡寒作渴或怔忡驚悸寤寐不常牙關緊急或頭目赤痛自汗盜汗寒戰咬牙手撒身熱脈洪大按之如無或身熱惡衣欲投於水其脈浮大按之微細衣厚仍寒此氣虛極傳變之惡症也若手足逆冷肚腹疼痛泄痢腸鳴飲食不入呃逆嘔吐此陽氣虛寒氣所乘之惡症也若有汗而又惡寒或無汗而惡寒口噤足冷腰背反張頸項頭強此血氣虛極變痙之惡症也急用參耆歸朮附子救之間有可生者大抵五善見三則吉七惡見四必危虛中見惡症者難治實症無惡候者易治六味丸又名六味地黃丸此壯水之劑夫人之生以腎為主凡病皆由腎虛而致此方乃天一生水之劑無有不可用者世所罕知若腎虛發熱作渴小便淋閉痰氣壅盛咳嗽吐血頭目眩暈小便短少眼花耳聾咽喉內燥口熱瘡裂齒不堅固腰腿痿軟五臟齊損肝經不足之症尤當用之水能生木故也若腎虛發熱自汗盜汗便血諸血失喑水泛為痰之聖藥血虛發熱之神劑也熟地黃用生者自制八兩山茱萸酒浸去核取肉山藥各四兩白茯苓去皮牡丹皮澤瀉各三兩上地黃酒蒸黑杵膏余為末煉蜜丸如梧子大每服七八十丸滾水下八味丸治命門火衰不能生土以致脾土虛寒而患流注鶴膝等症不能消潰收斂或飲食少思或食而不化臍腹疼痛夜多漩溺即六味丸加肉桂附子各一兩經云益火之源以消陰翳即此方也加減八味丸治癰疽瘡瘍痊後及將痊口乾渴甚舌或生黃及未患先渴此腎水不能上潤致心火上炎水火不能既濟故心煩躁小便頻澀或白濁陰痿飲食減少肌膚瘦削諸症服此以生腎水降心火諸症頓止及治口舌生瘡不絕山藥一兩山茱萸去核淨肉酒浸杵膏桂心去粗皮澤瀉白茯苓去皮各五錢五味子二兩半牡丹皮五錢熟地黃用生者半斤酒拌砂鍋蒸半日搗膏上為末入膏加蜜少許同丸如梧子大每服六七十丸五更初未言語前或空心用鹽湯送下補中益氣湯治元氣虛損或因克伐惡寒發熱肢體倦怠飲食少思或不能起發消散生肌收斂或兼飲食勞倦頭疼身熱煩躁作渴脈洪大弦虛或微細軟弱黃耆蜜炙人參白朮去蘆甘草炙用一錢五分當歸一錢陳皮五分升麻柴胡三分上銼一劑薑棗煎服四君子湯治脾胃虛弱或因克伐腫痛消散潰斂不能宜用此以補脾胃諸症自愈若誤用攻毒七惡隨至脾胃虛弱瘡口出血吐血便血尤宜用之益氣能攝血故也凡氣血俱虛之症宜此湯但加當歸脾胃既壯飲食自進陰血自生若用四物湯沉陰之劑脾胃復傷諸症蜂起若命門火衰而脾胃虛寒必用八味丸以補土母人參白朮去蘆茯苓各二錢甘草炙一錢上銼一劑薑棗水煎服六君子湯治脾胃虛弱或寒涼克伐腫痛不消或不潰斂宜服此湯以壯榮氣諸症自愈即四君子湯加陳皮半夏八珍湯治脾胃虛損惡寒發熱煩躁作渴或瘡瘍潰後氣血虧損膿水清稀久不能愈即四物四君子合方十全大補湯治瘡瘍氣血虛弱腫痛不愈或潰瘍膿消寒熱自汗盜汗食少體倦發熱作渴頭痛眩暈似中風狀即八珍湯加黃耆肉桂托裡溫中湯治瘡瘍膿潰元氣虛寒或因克伐胃氣脫陷腸鳴腹痛大便溏泄神思昏憒此寒變內陷緩則不治羌活附子炮去皮臍各四錢乾薑炒益智丁香沉香木香茴香陳皮各二錢甘草炙三錢上銼姜水煎服人參黃耆湯治潰瘍飲食少思無睡發熱人參白朮陳皮麥門冬蒼朮米泔浸各五分黃耆一錢歸身升麻各五分黃柏炒四分上銼水煎服竹葉黃耆湯治癰疽氣血虛胃火盛而作渴淡竹葉一錢芍藥麥門冬半夏川芎黃耆炒人參當歸甘草石膏生地黃各二錢上銼作二劑水煎服人參平肺散治心火克肺傳為疽痿咳嗽喘嘔痰涎壅盛胸膈痞滿咽嗌不利若因肺火太過而治當補肺若因腎水不足而患當補脾肺若因心火旺而自病當利小便人參茯苓陳皮地骨皮甘草各一錢知母炒七分五味子青皮天門冬去心各四分桑白皮炒一錢上銼一劑水煎服一癰疽發背諸瘡出膿潰爛日久不愈飲食少思身體倦怠口舌乾燥或寒熱往來驚怖少睡用補中益氣湯去柴胡加蒼朮麥門冬神麯五味子黃柏少睡加炒酸棗仁瘡肉生遲加白蘞一錢肉桂五分如膿多或清倍加黃耆人參當歸白朮外治敷貼之藥琥珀膏治癰疽發背諸般腫毒久年頑瘡香油四兩下沉香一錢炸浮待油熟去之次下嫩松香八兩文武火不住手攪如琥珀色住火下乳香沒藥銀硃血竭各一錢為末攪入膏內令勻退火毒用油紙攤貼神效白龍膏治背疽及糜瘡皆效香油四兩煎數沸入官粉一兩研細次入黃蠟一兩熔化攪勻退火待藥將皺面用厚連四紙剪大小下一拖藥在上收候若貼時先將蔥須煎湯洗淨貼之治發背官粉不拘多少研細用槐枝大梃銼碎拌炒官粉黃色去槐枝每粉一兩入銀硃一錢研勻用豬蠟油調攤膏棉紙上貼之一瘡瘍肌肉不生若赤色而不生者血熱也四物湯加牡丹皮若膿水清稀氣血俱虛也十全大補湯食少體倦脾氣虛也補中益氣湯煩熱作渴起居如常胃火也竹葉黃耆湯煩熱作渴日晡熱甚腎虛也用加減八味丸瘰癧繞項起核名曰蟠蛇癧延及胸前腋下起名曰瓜藤癧左耳根腫核者名曰惠袋癧右耳根腫核者名曰蜂窩癧結核連續者為瘰癧也形長如蛤者為馬刀也夫瘰癧初發必起於少陽經不守禁戒必延及陽明經大抵飲食厚味鬱氣之積曰毒曰風曰熱皆此三端招引變換須分虛實彼實者故易自非痛斷厚味與發氣之物雖易亦難殊為可慮以其屬膽經主決斷有相火而且氣多血少婦人見此若月信不作寒熱可生梢久轉為潮熱其證危矣自非斷欲絕慮食淡雖聖神不可治也瘰癧先從結喉起者紫蘇烏藥枳殼桔梗柴胡前胡防風羌活獨活川芎芍藥茯苓大腹皮甘草各等分上銼水煎食後服瘰癧先從項上起者紫蘇連翹桔梗枳殼防風柴胡羌活獨活白芷當歸川芎芍藥甘草各等分上銼水煎食後服瘰癧先從左邊起者紫蘇厚朴當歸羌活枳殼桔梗前胡防風川芎芍藥蘿蔔子蘇子甘草上銼水煎食後服瘰癧先從右邊起紫蘇香附青皮烏藥半夏厚朴桔梗茯苓柴胡防風羌活甘草上銼水煎食後溫服人稍壯者宜內消散治瘰癧結核硃砂血竭各一錢斑蝥去翅足三分生用上為細末每服一分空心燒酒調服一日一服未破者三五服立消已破者內服此藥外用金頭蜈蚣一條焙研極細末用麻油一小鐘浸三旦夕搽患處其瘡即腫潰過一二日腫消可貼膏藥瘡勢大者二十日痊小者十餘日可保平復琥珀散治瘰癧結核內消神效滑石白牽牛頭末各一兩斑蝥三錢去翅足殭蠶一兩枳殼五錢赤芍柴胡各五錢木通連翹各七錢琥珀二錢黃芩一兩甘草三錢上銼作六劑水煎服斑蝥散即神效散斑蝥去翅足酒炒淨一錢穿山甲土炒殭蠶去頭足酒炒丁香白丁香苦丁香紅小豆磨刀泥各一錢上為細末每服一錢五更無根水調服至未時打下毒物其形如鼠後用田中野菊花焙黃色為末陳醋調貼瘡上一日一換七日全安赤白丸治瘰癧未破白礬三兩硃砂九錢上為細末酒糊為丸如綠豆大每服二十丸清茶送下日進三服藥盡即消人虛弱者宜益氣養榮湯治懷抱抑鬱瘰癧流注或四肢患腫肉色不變或日晡發熱或潰不斂黃耆人參白朮炒各一錢半當歸川芎白芍生地陳皮香附貝母去心各一錢柴胡桔梗炒地骨皮甘草炙各五分上銼一劑水煎食遠服有痰加橘紅脅下刺痛加青皮木香午後有熱或頭微眩加炒黃柏膿水清倍參耆當歸女人有鬱氣胸膈不利倍香附貝母月經不通加牡丹皮當歸益氣內消散治瘰癧並諸瘤結核當歸川芎白芍酒炒白朮去蘆青皮去瓤陳皮半夏姜炒桔梗羌活白芷獨活厚朴薑汁炒各八錢防風黃芩烏藥香附檳榔各一兩蘇葉一兩半沉香二錢木香人參粉草各五錢上銼水煎溫服服十餘劑即消若再服照分量制酒糊為丸如梧桐子大每服七十丸酒下瘰癧外施之藥神品膏歷年久不愈瘰癧瘡神效香油一斤官粉二兩半黃蠟二兩乳香沒藥孩兒茶血竭各四錢胡椒六錢先將香油熬滴水不散方下官粉熬成膏下黃蠟再熬滴水成珠離火方入細藥瘡久者胡椒加半攪勻入瓷器內收貯退火毒油單紙攤貼每用先將蔥須花椒艾槐條熬水洗瘡淨後貼之奇效膏貼瘰癧未破內消已破則合真香油一斤二兩大黃六兩入油炸浮濾去渣慢火下淨黃丹半斤慢火再熬滴水成珠下古石灰炒過五錢乳香四錢沒藥四錢黃蠟二兩成膏用油單紙攤膏貼治瘰癧鼠瘡甚效嫩槐條一斤蘄艾四兩川椒三兩淨上三味用新大炒鍋一個盛水滿煎至七分去渣待溫將所患之瘡徐徐洗一炷香去膿水並甲用軟白布擦待乾至午時仍將藥渣入水一鍋又煎至六分去渣照前洗一炷香摻干待晚仍將熬洗一炷香次日用大蒜瓣切薄片圍瘡上用麥子大艾炷灸蒜上如癢再灸以痛為止漸漸自愈烏龍膏治瘰癧潰爛久不愈者神效木鱉子帶殼炒存性去殼柏葉焙人中血即亂髮燒灰青龍背即鍋脾面上垢膩紙錢灰飛羅面各一錢上俱為末用好陳米醋調成膏塗瘡上外用紙貼瘰癧膏真香油四兩象皮三錢熬熱去滓入黃蠟三錢官粉一兩五錢離火晾溫入乳香沒藥各三錢孩兒茶一兩龍骨一錢五分血竭一錢攪勻以瓷器收貯任意點之馬刀瘡者項側有瘡堅而不潰是也柴胡通經湯柴胡連翹當歸尾黃連黃芩牛蒡子三稜各一錢桔梗二兩生甘草一錢紅花少許上銼水煎食後服忌苦藥泄大便散腫潰堅湯治馬刀結核硬如石或在耳下至缺盆中或至肩上或於腋下皆屬手足少陽經及瘰癧遍於頰下或至頰車堅而不潰在足陽明所出或瘡已破出水並皆治之兼治癭瘤大如升久不潰者昆布冷水洗海藻微炒黃柏酒炒知母酒浸天花粉桔梗各五錢連翹三稜酒浸莪朮各三錢酒浸龍膽草黃連黃芩酒炒乾葛白芍酒炒各三錢升麻柴胡各五分甘草炙五錢歸尾五分上銼每一兩水二盞先浸半日煎至一盞去渣熱服於臥處伸足在高處頭微低每噙一口作十次嚥下至服畢依常安臥取意在胸中停蓄之意也另揀半料作細末煉蜜為丸如綠豆大每服百丸或百五十丸用此湯留一口送下一婦人瘰癧後遍身作癢脈大按而虛以十全大補加香附治之而愈大凡潰後午前癢作氣虛午後癢作血虛若作風症治之必死一儒者瘰癧愈後體瘦發熱晝夜無定此足三陰氣血俱虛八珍湯加麥門冬五味子二十劑愈又用補中益氣湯加麥門冬五味子及六味丸而愈疔瘡疔瘡皆生四肢發黃泡中或紫黑必先癢後痛先寒後熱也其中或紫黑色有條如紅絲直上倉卒之際急以針於紅絲所至處必刺出毒血然後以蟾酥丹藥於刺處塗之針時以病者知痛出血即好否則紅絲入腹攻心必致危矣疔瘡者風邪熱毒相搏也退疔奪命丹專治疔瘡防風八分青皮七分羌活一錢獨活一錢黃連一錢赤芍六分細辛八分殭蠶一錢蟬蛻四分澤蘭葉五分金銀花七分甘草節一錢獨腳蓮七分紫河車一名金線重樓七分上銼五錢先服倍金銀花一兩澤蘭一兩少用葉生薑十片同內搗爛好酒鏇熱泡之去渣熱服不飲酒者水煎亦可然後用酒水各一半煎生薑十片熱服出汗病退減後再加大黃五錢同煎熱服以利二三次去除毒若有膿加何首烏白芷梢在腳加檳榔木瓜要通利加青皮木香大黃梔子牽牛治龍芽一醉飲治疔瘡如神龍芽草五月五日端午採收陰乾將好酒浸搗取汁量加乳香沒藥綠豆粉入汁內同飲將渣敷瘡上此日不許吃一些茶水只可飲酒就洗亦不可用水秘傳妙方治誤食瘟牛馬羊肉生出疔瘡疔毒用桐油樹葉搗爛絞汁一二碗頓服得大瀉毒氣乃愈如冬月無葉挖取嫩根研水服之以利二三次為度神效丹即黑舌丹治傷寒初起諸般惡毒疔瘡發背一切腫毒遍身癢痛又治傷寒咳嗽鼻涕勞嗽久咳小兒痘瘡黑陷不起喉痹腫痛又治蠱毒並破傷風硃砂雄黃片腦各五分乳香沒藥輕粉各三分血竭三錢真蟾酥一錢麝香當門子者二分上共為末用酥油或乳汁為丸如扁豆大每一丸噙化用好酒嗽嚥下飛龍奪命丹治疔瘡腦疽發背乳癰附骨疽一切無名腫毒惡瘡服之便有頭跡不痛者服之便痛已成者服之立愈此皆惡症乃藥中至寶危者服之立安雄黃二錢蟾酥乾者二錢老酒化開銅綠乳香沒藥膽礬寒水石血竭各三錢硃砂一錢研為衣輕粉片腦麝香當門子者各五分蜈蚣一條酒浸炙黃去頭足蝸牛二十個上件俱為細末先將蝸牛連殼研如泥和藥為丸如綠豆大如丸不就入酒打麵糊丸之每服二十丸用蔥白三寸令病人嚼爛吐於男左女右手心將丸藥放在內用無灰熱酒三四杯送下於避風處以衣被蓋之約人行五里之久再用熱酒三四杯以助藥發熱大汗為度如重者無汗再進二丸汗出即愈如疔瘡走黃過心者並出汗冷者難治病人不能嚼蔥者研爛裹之與服瘡在上食後服在下食前服忌冷水黃瓜茄子油膩雞魚肉濕面一切發物不可食神仙解毒丸治一切疔瘡發背魚口諸般惡瘡無名腫毒初發一服即消白礬不拘多少熔化作丸如綠豆大硃砂為衣每服十丸用連須蔥七八根水煎至二碗送下汗出立愈已成者不傷未成者即消疔瘡外施之藥蟾酥丹用大癩蝦膜以針破眉稜上手捻出酥於油紙上或桑葉上用竹蔑刮下然後插在背陰處自干取用蟾酥以白麵黃丹等分拌和丸如麥粒狀針破患處以一粒納之類聖散治一切疔瘡惡毒腫痛如神川烏草烏蒼朮細辛白芷薄荷防風甘草炙五錢上為細末雞子清調塗患處留頂追毒膏治諸般惡瘡及無名腫毒乳香五分沒藥一錢兒茶二錢血竭一分青木香一錢廣木香五分芙蓉葉四兩白芨四兩上各為細末勻在一處臨用時看瘡大小以生蜜調塗患處以綿紙附之不過三五次即消疔毒方急將毒用針刺破蔥白搗爛敷上手帕繫住人行五里之時其疔出然後用熱醋洗淨一切疔瘡用黃花苗老蔥蜂蜜共一處搗爛貼瘡即好治疔瘡方核桃仁一個古銅錢一個二者細嚼黃酒送下至重不過二服其效如神小奪命丹治腦疽及疔瘡惡毒無名腫毒其效如神千頭子即掃帚子槐花子地丁上三味各等分水煎通口溫服加蟾酥尤妙鐵柱杖治疔瘡發背頭風用草烏頭不拘多少去皮淨為末用蔥白去須葉搗爛為丸碗豆大以雄黃為衣每一丸先將蔥細嚼熱酒下或噁心吐三四口冷水一口止之即臥以被厚蓋汗出為度一男子患疔服奪命丹汗不止而瘡不痛熱不止而便不利此汗多亡陽毒氣盛而真氣傷矣用參耆歸朮芍藥防風五味子二劑諸症悉愈唯以小便不利為憂余曰汗出不宜利小便汗既止陽氣復而自利矣仍用前藥去防風加麥門冬用當歸黃耆四劑便行瘡潰而愈灸法治疔瘡惡毒用大蒜搗爛成膏塗腫處四圍留露腫頂以艾炷灸之以爆為度如不爆稍則難愈宜多灸百餘壯無不愈者便毒便毒一名跨馬癰此奇經衝任為病而癰見於厥陰經之分野其經少血又名血疝或先有疳瘡而發或忽然起核疼痛而發皆熱鬱血聚而成也初發宜疏利之即散成膿後如常用托裡內補之藥便毒是厥陰濕熱因勞倦而發用射干三寸以生薑煎食前服得行二三次立效凡射干用開紫花者是便毒者生兩腿合縫之間也歸尾白芍金銀花天花粉白芷梢各一錢木鱉子十個殭蠶二錢大黃三錢芒硝二錢穿山甲三片土炒上銼一劑好酒二碗煎至一碗次入硝黃再煎二沸連藥罐露一宿五更溫服厚蓋出汗利一二次即愈神奇散治便毒魚口穿山甲三片土炒木鱉子去殼三個牡蠣大黃各三錢黃連黃芩黃柏金銀花連翹各一錢半黃蠟三錢上銼一劑酒水各半煎空心服斑白散斑蝥去翅足炒一錢白芷八分上共為細末每服六分空心黃酒送下即刻立效龍膽瀉肝湯治肝經濕熱或囊癰便毒下疳懸癰腫痛焮作小便澀滯或婦人陰癃癢痛或男子陽挺腫脹或出膿水龍膽草酒洗炒澤瀉各一錢半車前子木通黃芩生地黃酒拌歸尾酒洗山梔上銼一劑水煎空心溫服便毒潰破即魚口瘡也大黃二錢殭蠶穿山甲炒成珠五靈脂炒各一錢金銀花二錢上為細末每服三錢空心黃酒送下立消散治魚口便毒大蝦蟆一個剝去皮連腸搗爛入蔥五錢再搗敷腫處卻用皮覆貼其口下疳下疳者陰頭腫痛而生瘡也乃厥陰肝經主病宜防風獨活各六分連翹荊芥黃連蒼朮知母各七分黃柏赤芍赤茯苓木通龍膽草各九分柴胡一錢半甘草梢三分上銼一劑燈草二十四根水煎空心熱服如有便毒量人虛實加大黃一二錢涼血解毒丸先服升麻葛根湯發其毒毒出後服此丸即愈不必服輕粉之類苦參八兩黃連四兩連翹牛蒡子生地黃白芷各二兩防風石膏各一兩大黃二兩半上為末荊芥湯打糊為丸如梧桐子大每服百丸空心溫水送下下疳外治之藥珍珠散治下疳瘡如神枯白礬雄黃珍珠黃柏官粉煅過各等分上為末以米泔水洗瘡令淨後擦藥治疳瘡蝸牛焙乾一錢枯白礬一錢上為細末濕則乾摻干則以香油調敷上即愈治下疳並玉莖蝕子也長出來如初止少元首就是舌頭被人咬去抹上藥也長全有效黑鉛五錢化開即投汞二錢五分研不見星入寒水石三錢五分真輕粉二錢五分好硼砂一錢共為極細末聽用如遇此患用蔥艾花椒熬水洗患處若怕洗將湯入瓶內將龜頭向瓶口熏之止了痛再洗試干摻上此藥若治舌咬去先以乳香沒藥煎水口噙止痛後上藥即長也洗疳湯川楝子黃連瓦松花椒艾葉蔥根上銼各等分煎水傾入盆內用青布展洗瘡上立效治下疳用皮硝一碗乳香雄黃孩兒茶各五分入小壇內外用干牛糞火煨熱壇其硝自化熏之晚上使心口涼為度下疳方抱過雞卵殼略炒為末孩兒茶末各一錢和勻先用茶洗淨後搽藥楊梅瘡楊毒天泡者風濕熱毒也初起宜消風散毒散歸尾川芎赤芍生地黃升麻乾葛黃芩各一錢黃連黃柏連翹防風各八分羌活金銀花甘草各五分蟬蛻二個初服加大黃二錢芒硝一錢半通利惡物去淨後勿用上銼一劑水煎熱服毒發出宜二十四味風流飲防風荊芥連翹白芷稍歸尾川芎上部瘡多宜焙用赤芍黃芩黃連梔子地骨皮五加皮白鮮皮木通下部瘡多宜焙用木瓜苦參金銀花皂角刺薏苡仁蟬蛻殭蠶黃柏白蒺藜甘草土茯苓白實者三斤瘡痛加羌活獨活體弱加人參茯苓去梔子上銼作五十劑每日服二劑水煎忌牛肉燒酒鹽宣炒過食則不生癬茯苓湯土茯苓四兩搗汁桔梗防風各一兩乳香沒藥各五分上銼水五碗煎至三碗溫服一日服盡忌茶水諸物五帖全除忌鐵器茯苓糕治楊梅瘡毒土茯苓去粗皮為細末一斤白蜜一斤糯米粉一斤三味和勻蒸糕食之常以茯苓煎服當茶吃不可飲茶水雄黃敗毒丸雄黃硃砂輕粉孩兒茶各一錢苦參一兩淨末上為細末粳米飲為丸如梧桐子大每服二十丸米湯送下日進二服口噙綠豆湯遺毒為患宜香螵湯治楊梅筋骨疼痛久不愈者立效茜草麻黃烏藥細茶魚螵三錢用項麻同炒成珠槐子炒花椒各五錢乳香一錢上銼一劑水二鍾姜五片蔥五根煎至一鍾通口溫服二三帖即愈不發通仙五寶散凡人病過楊梅天泡綿花等瘡致成一切難名狀之疾或楊梅瘡爛見骨經年不收口者或筋骨疼痛舉發無時或通身疙瘩不消或手足皺破出血或通身起皮發靨好一層起一層或赤癜白癜鵝掌風癬或皮好骨爛口臭難當及年久臁瘡不愈一切頑瘡惡毒並皆治之鍾乳粉三分大丹砂二分琥珀五釐冰片五釐珍珠二釐半上為細末每服五釐另入飛白霜二分半炒過合作一服每一料分作十二帖每一日用土茯苓一斤水煎作十二碗去渣清晨只用一碗入藥一帖攪勻溫服其茯苓湯須一日服盡不可別用湯水並茶日日如是服盡一料至十二日即愈或有不終劑而愈者如病重須再服一料無不愈也百發百中忌雞鵝牛肉房事服藥完不忌此方乃王範泉遊廣東傳來極真治楊梅瘡乃天下古今第一仙方也幸寶之寶之西聖復煎丸治楊梅瘡後腫塊經年破而難愈以致垂危百方不效用此如神此方乃扶溝寶林僧傳殊效乳香沒藥兒茶丁香焙各一兩阿魏白花蛇血竭各四錢俱為末白麵炒一斤蜂蜜煉熟六兩香油四兩煎熟棗肉水煮去皮核上共一處為末搗千餘下丸如彈子大每用一丸土茯苓四兩水四碗煎至二碗入丸煎化去渣溫服茯苓餅治遠近頑瘡爛不斂口並治防風人參五加皮白鮮皮當歸川芎丁皮木瓜皂角刺海桐皮乳香沒藥金銀花甘草各一錢土茯苓半斤上共為細末將藥末四兩對麥面四兩水和一處作餅焙乾熟用不拘時外將細粗末煎作湯飲以瘡好為度楊梅天泡愈後疤痕紅黑用大黃白礬二味等分同研擦患處其痕即去色亦如舊玉脂膏治楊梅愈後發出鵝掌風癬起白皮去一層發一層久不愈者牛油香油桕油黃蠟各一兩化開待溫入銀硃一兩官粉二錢麝香五分以上三味為細末入油內攪勻火烤癬令熱將藥搽上再烤再搽即效秘方治楊梅瘡官粉二錢入一文錢豆腐將粉摻於內重湯煮食立瘥灸法治楊梅瘡初起那一個灸三五壯後不再發臁瘡臁瘡腫痛者風熱溫毒也荊防敗毒方見癰疽三香膏治遠年近日一切臁瘡潰爛至骨疼痛乳香二錢松香三錢共為細末用香油調用包棕子的箬葉薄者密密刺孔將藥攤其上用箬葉貼患處藥居中上用完箬葉蓋之帛扎住當時止痛生肌黃柏散治臁瘡濕痛及遍身熱瘡黃柏一兩輕粉三錢共為末用豬膽汁調塗濕則乾摻臁瘡膏並治杖瘡古石灰枯礬各二錢乳香沒藥血竭各一錢半上為細末用桐油一半香油一半先用槐花一合入內煎黑濾去渣後入松香三錢煎沸又濾去渣入黃蠟五錢熬成膏滴水不散為度將藥末於內再熬黑色滴水成珠即好不問遠年新發臁瘡先用蔥白防風煎水洗淨敷藥其有不平唾津塗指捻藥成塊填於不平處用油單紙攤膏貼患處候瘡愈皮老為度棒瘡亦然神效隔紙膏黃香研爛輕粉銀硃各五錢冰片半分上合研極細末香油調用油單紙攤先以針密密刺孔將藥攤於孔上夾於中每貼以孔口向瘡貼先將蔥頭花椒細茶煎水洗淨瘡毒後貼上用布帶緊扎夏月一日一換冬月二日一換一洗其臭爛不可聞者不過五貼而愈神效宜忌諸般發物凡攤藥看瘡大小形式攤貼貼臁瘡方治不拘新久臁瘡並棒瘡疔痂貼之即效花紅絹燒灰二分蛾口繭燒灰二分桔礬一分珍珠火煨三分血餘灰二分飛羅白麵一分官粉二分上研細末用黃蠟二兩熔化入藥內好紙攤神效臁瘡方五倍子炒為末加百草霜化黃蠟入內攤隔紙膏貼之愈一男子腿患癰服克伐之藥虧損元氣不能成膿余謂托裡而潰大補而斂若大便燥緒用十全大補湯加麥門五味而潤月餘仍結自服潤腸丸而瀉不止余用補中益氣湯送四神丸數服而止補中益氣湯見補益四神丸見泄瀉鴻臚瞿少溪兩臁生瘡漸至遍身發熱吐痰口乾咽燥盜汗心煩溺赤足熱日晡益甚形體日瘦此腎經虛火也用六味丸不月諸症悉愈三月瘡見平復方見癰疽疥瘡五疥者干濕蟲砂膿也五疥者由五臟壅毒而發也防風通聖散治風熱瘡疥久不愈者方見中風仙子散治遍身瘡疥經年舉發者威靈仙蔓荊子何首烏荊芥苦參上各等分為細末每二錢食前溫調服日進二服忌發風物五疥靈丹服此可以除根苦參糯米泔浸一兩白芷一倆白鮮皮炒一兩枳殼麩炒連翹羌活梔子當歸荊芥各七錢上為細末煉蜜為丸如梧桐子大每服五十丸滾湯下斷根方治未患瘡疥之前用此服之永不生瘡或已成瘡服此可保用田螺不拘多少煮熟去腸屎取淨用好酒酒酵炒熱食之能除一身之瘡疥也神效一掃光枯白礬一兩硫黃七錢五倍子炒花椒五錢砒二分上為末用香油煎雞子令熟去雞子不用只用香油搽瘡金不換治血風瘡癬瘡疥瘡蟲瘡及坐板瘡疥癩等疾立效蛇床子五錢大楓子去殼五錢水銀二錢白錫一錢枯白礬一錢上各為末先將錫化開次入水銀研勻不見星再入末藥柏油共搗勻搽瘡宜幹些或無柏油臘豬油亦可治疥癩瘙癢先用藥水洗後用熏藥被蓋熏之防風荊芥馬鞭草白礬花椒苦參野菊花上銼水煎頻洗熏藥苦參五錢蒼朮一錢半夏大黃雄黃各二錢熟艾葉上為末分作筒以熟艾綿紙捲筒每一晚被蓋熏一筒又方銀硃一錢雄黃一錢木鱉子一個好香一錢艾三錢上為細末以綿紙捲筒被蓋留頭在外熏之大小便亦要包裹治男婦小兒遍身生疥癬並腳上瘋塊痛癢不止硫黃二錢蛇床子二錢白礬二錢水銀渣三錢上為細末用生薑汁調擦患處立已治滿身生牛皮疥癩花椒一錢大楓子去皮六個巴豆仁八個人言一錢雄黃一錢艾一兩上共為細末將艾槌熟入藥紙卷作二筒每晚熏一筒被蓋頭露在外仍要包裹大小便免傷毒氣作瓦二片陰陽盛藥於中放腳脘下熏甚者不過二次愈補遺方祛熱搜風飲治疥及膿泡瘡苦參金銀花二味為君柴胡連翹片芩荊芥黃柏炒黃連炒六味為臣生地黃薄荷獨活枳殼麩炒防風五味為佐甘草蜜炙為使上銼水煎食遠熱服癬瘡五癬者濕頑風馬牛也疥癬皆血分熱燥以致風毒克於皮膚浮淺為疥深沉者為癬疥多挾熱癬多挾濕防風通聖散治癬疥去硝黃加浮萍皂角刺方見中風浮萍散治諸風癬疥癩瘡浮萍當歸川芎赤芍藥荊芥麻黃甘草各三錢上銼二劑蔥白二根豆豉五六十粒煎至八分熱服出汗治乾溼癬雄黃一錢斑蝥七個輕粉四分硫黃三分蛇床子五分金毛狗脊五分寒水石五分芒硝三分上為末香油調搽濕則乾摻治鵝掌風癬層層起皮且癢且痛用此一洗立愈川烏草烏何首烏天花粉赤芍防風荊芥蒼朮地丁各一兩艾葉四兩上銼煎水先熏後洗立愈又方治鵝掌風癬核桃殼鮮皮者佳鵓鴿糞等分煎水頻洗立愈又方用白菀豆一升入楝子同熬水早午晚洗每七次立愈治鵝掌風並癬用黑鉛不拘多少打成片熬一炷香時入綠豆一碗再煮爛去渣以水乘熱洗數次立效或搽亦可治癬方用蒜瓣煮水洗浴展干再用生桐油搽摻炭火上炙即愈治癬瘡方枯白礬四錢潮腦二錢為末用極好醋調起將癬抓破搽上即愈治癬瘡方雄黃煨過六錢川撞樹皮一兩白蘞一兩上為細末用無根水調在飲鍋上頓以赤色為度癬瘡不可抓破忌七八日不可見水神效上用小瓷器罐一個用鹽泥封置雄黃在內用燈盞蓋定用鐵線縛緊周圍以木炭泥固完封口慢火煅過半炷香黃升盞上取用禿瘡防風通聖散治癩頭瘡用本方為末酒浸焙乾凡三次食後白湯調服日三服至頭有汗效方見中風小兒頭生白禿瘡陀僧散鵓鴿糞一兩炒研末用五錢密陀僧五錢硫黃一錢花椒五錢人言半分上為細末香油渣調搽患處晚間洗去治男婦小兒頭生白禿瘡胡前溪傳公雞屎曬乾半升能去病根人言一錢火煅過殺蟲塘中黑泥曬乾篩過二兩殺蟲蛇床子五錢殺蟲白礬煅三錢止癢硫黃五錢殺蟲五倍子炒五錢上為細末先用雞子二個香油煎餅熱貼在頭上引出蟲去盡用白礬倍子煎水洗一次後用香油調前藥搽頭上一日搽一次搽過六七日即愈掃雪膏治小兒禿瘡松樹厚皮燒灰三兩黃丹水飛一兩寒水石細研一兩枯礬黃連大黃各五錢白膠香熬飛頑石上二兩輕粉一分上為細末熟熬油調敷瘡上須先洗淨瘡痂後敷藥治禿瘡清水瘡薄皮瘡羊鬚子瘡槐枝不拘多少截四指長用真香油放鍋內浸過槐枝為止熬數沸將槐枝拿出一根掐兩截看內渣黑色通去槐枝加黃些須入油搽之治禿瘡用花椒艾熬滾湯放深盆內將禿瘡倒放熬湯泡浸如湯冷再換將瘡甲洗淨用枯礬黃丹蔥汁蜂蜜調搽包住不許見風癜風白癜紫癜一般風附子硫黃最有功薑汁調勻茄蒂搽但患癢處並無蹤上將粗布搽洗患處令淨以茄蒂蘸擦之一說白癜用白茄蒂紫癜用紫茄蒂追風丸治白癜風何首烏荊芥蒼朮米泔浸苦參各等分上為末用好大肥皂去皮弦銼碎煮汁濾去渣入面少許打糊為丸如梧桐子大每服五十丸空心清茶送下忌一切動風之物治汗斑用密陀僧為細末以隔年釅醋調搽斑上隨手而愈治黑白癜風硫黃一錢密陀僧一錢信六分以上三味俱為細末用隔年陳醋調和擦之一二次即愈晚間搽上次早洗去癘風癧風者天刑之疾陰陽肅殺之氣砭人肌膚傷人肢體初起白屑雲頭紫黑疙瘩流膿甚者鼻崩肉陷致死危矣初見雲頭皮木就當施治患者屏絕欲情清淡飲食十活一二否則難治通天再造飲鬱金五錢皂角刺黑大者大黃煨各一兩白牽牛頭尾六錢半生半炒上為細末每服五錢日未出時無灰酒送下面東服之當日必利下惡物或臭不可近或蟲或膿如蟲口黑色乃是多年赤色乃是近者數日後又進一服無蟲乃止洗大風方地骨皮苦參荊芥細辛防風蒼耳子上銼片水煎熏洗遍身血出為效如洗務要寬湯浸洗良久方佳多洗數次為妙灸法治大風斷根方於大母指筋骨縫間約半寸灸三炷香以出毒氣諸瘡防風通聖散治諸瘡腫毒神效方見中風隔蒜灸法治一切惡瘡毒大痛或不痛或麻木如痛者灸至不痛不痛者灸至知痛而止其毒隨火而散蓋火有暢達之義此從治之法也大有回生之驗用大蒜頭切三文錢厚安瘡頭上用艾壯與蒜上灸之三壯換蒜復灸未成者即消已成者即敗大勢不能為害如瘡大用大蒜搗爛攤瘡上將艾鋪上燒之蒜敗再換如不痛或不作膿不起發或陰毒痛更宜多灸灸而仍不痛不作膿者不治此氣血虛也蔥熨法治虛怯人患腫塊或痛或不痛或風襲於經絡肢體疼痛或四肢筋攣骨痛又治流注跌撲損傷腫痛棒打刺痛及婦人吹乳陰症腹痛手足厥冷並治用蔥頭細切杵爛炒熱敷患處冷則易之再熨腫痛即止如神豆豉餅治瘡瘍腫硬不潰及潰而不斂並一切頑瘡惡瘡用江西豆豉為末以唾調作餅子三文錢厚置患處上將艾壯灸之干則易之如瘡勢大及發背用水漱口水調作餅覆患處以艾鋪餅上灸之如未成即消已成即敗其毒勢易愈如不效者氣血虛也一切無名腫毒洪寶丹治一切腫毒敗血消腫及湯燙火燒金瘡打撲血出不止並效天花粉三兩白芷二兩赤芍二兩鬱金一兩上為末熱毒用茶調冷用酒調塗患處衄血不止冷水調塗頸項上此藥最絕血路三白散治一切腫毒諸瘡疼痛白芨一兩白蘞一兩白礬煅五錢上為細末用時入藥於水碗中即沉底外用桑皮紙托水搭於患處熱則再易連搭連易直待其腫處冰冷將藥敷上立時即消千金消毒散治一切惡瘡無名腫毒發背疔瘡便毒初發脈洪數弦實腫甚欲作膿者連翹黃連赤芍各一錢歸尾一兩金銀花一兩皂角刺牡蠣大黃天花粉芒硝各三錢上銼酒水各半煎服祛毒湯治一切無名腫毒疼痛初起神效貝母穿山甲土炒成珠殭蠶各一錢大黃三錢半生半熟上銼作劑水煎熱用好生酒一盞攪勻空心熱服渣再煎服以利為度一切惡瘡洗法洗毒湯治一切惡瘡疥癩地膚子即掃帚子用升半煎湯頻浴數次漸愈滌法洗諸般惡毒艾葉細茶蔥白桃柳枝花椒上銼水煎入鹽少許頻洗杖瘡一杖後即飲童便和酒一鍾以免血攻心再用熱豆腐鋪在杖紫色處其氣如蒸其腐即紫復易之須得紫血散盡轉淡紅色為度又方用鳳仙花科連根帶葉搗爛塗患處如干又塗一夜血散即愈如冬月無鮮的秋間收起陰乾的為末水調塗搽上亦效一名金鳳花又方並打傷皮不破內損者用蘿蔔搗爛奄之又方用豬膽汁塗之亦好又方用綠豆粉微炒雞子清調塗上又方用隔年風化石灰不拘多少取新汲水一碗銀簪子順攪千餘下如膏鵝翎刷上患處即佳烏龍解毒散以杖之後服此如人受杖責不拘輕重致於伏不能起動者及疔甲爛肉連腿腫面青疼痛難忍晝夜無眠渾身憎寒壯熱神魂驚怖此藥可治即時可止疼痛善能動履及疔甲痛腫其效如神用木耳四兩入淨沙鍋內炒焦存性為末每服五錢熱黃酒一碗調服服藥後坐待少時其藥力行開至杖瘡上從肉裡面往外透如針刺癢甚不時流血水或以藥水洗淨貼上膏藥其杖處疼痛腫硬次日即消散破毆斑痕方用熱麻油黃酒各二碗同煎數沸服服畢臥火燒熱地上一夜疼止消腫無痕有打傷人者仇家陰令術士以此治之次日驗即無一毫傷痕散救法方土鱉一個瓦上焙乾為末沉香末二分銀硃五分上三味為末合一處刑後隨用好酒溫調服消腫去毒止疼神效隔宿不用退血止疼痛飲治杖後腫瘀血不散血氣攻心或憎寒壯熱歸尾赤芍生地黃白芷防風荊芥羌活連翹黃連黃芩黃柏梔子薄荷枳殼桔梗知母石膏車前甘草上銼劑水煎溫服生血補氣湯治杖後潰爛久不愈者人參白朮炒茯苓當歸白芍熟地黃陳皮香附貝母各等分桔梗甘草二味減半上銼劑水煎服寒熱往來加柴胡地骨皮口乾加五味子麥門冬膿清加黃耆膿多加川芎肥肉遲生加白蘞肉桂棒瘡疔甲膏藥止疼痛收血水消腫去疔甲乳香沒藥孩兒茶雄黃各三錢輕粉一錢官粉一兩黃蠟一兩先將豬脂入鍋煉出油冷定卻將諸藥研成細末入油攪勻隨將黃蠟化開投入一處又攪勻用油單紙攤成膏藥貼患處量大小貼之極能去疔甲收膿水消腫止痛內宜用木耳散先用此藥水洗好的便快防風荊芥苦參各等分煎水洗生肌散用前藥水洗後摻藥乳香沒藥孩兒茶各等分為細末摻上即止痛生肌去疔甲方用雞子清加麝香少許銀簪打成稀水照疔甲處輕輕用簪子尖點上上不多時其疔甲化爛取去上散藥外貼膏藥一日一換化盡死肉之後三四日換一次不數日如初鬱金膏貼一切腫毒杖瘡生豬脂熬去渣淨油一斤鬱金四兩生地黃忌犯鐵器咀片入豬油內煎枯去藥渣又入淨黃蠟半斤化開又入好潮腦一兩瓷罐收入每用一兩加官粉二錢熔化攪勻攤油單紙上貼之英雄丸乳香沒藥密陀僧自然銅燒紅淬二次地龍即蚯蚓焙乾木鱉子去殼花椒各等分上為細末煉蜜為丸如彈子大每一丸以酒化下或臨刑方用打不覺痛任打血不浸心妙不可言折傷折傷者多有瘀血凝滯也宜用童便黃酒各一鍾和而溫服最能散瘀消滯效通導散治跌撲傷損極重大小便不通乃瘀血不散肚腹膨脹上攻心腹悶亂至死者先服此藥打下死血瘀血然後方可服補損藥不可用酒飲愈不通矣亦量人虛實而用大黃芒硝枳殼各二錢厚朴當歸陳皮木通紅花蘇木各一錢甘草上銼一劑水煎熱服以利為度唯孕婦小兒勿服麥鬥散治跌撲骨折用藥一釐黃酒調下如重車行千里之候其骨接之有聲初跌之時整調如舊對住綿衣蓋之勿令見風方服藥休移動端午制忌婦人雞犬等物孫都督傳土鱉一個新瓦上焙乾巴豆一個去殼半夏一個生用乳香半分沒藥半分自然銅火燒七次醋淬七次用些須上為細末每服一釐黃酒送下不可多用多則補得高起神效天靈散天靈蓋用柴火燒存性為末每二錢黃酒神效按骨效方山梔生為末五分飛羅面三錢薑汁調和搽患處一夜皮肉青黑是其驗也一方治跌撲傷損逆氣作腫痛不可忍者用梔白麵為末井水調搽干則掃去即效接骨膏當歸七錢半川芎五錢乳香二錢半沒藥五錢廣木香一錢川烏四錢煨黃香六錢古錢三錢火煨酒淬七次骨碎補五錢香油一兩五錢上先將各藥為末和油成膏用油紙攤貼患處如骨碎筋斷用此復續如初白膏藥治跌打或刀斧所傷候血盡用蔥花椒煎水將患處洗淨拭乾敷藥不必包裹其效如神白芨一兩豬脂油六兩芸香四兩樟腦四兩輕粉乳香沒藥孩兒茶各二錢片腦五分上各為末將油銅鍋化開先下白芨次下芸香樟腦兒茶一二時取出離火方下乳香沒藥候冷又下片腦輕粉此方不但生肌凡瘡毒皆可貼之膏成將瓷罐內盛之每用油紙攤貼患處接骨散治跌打損傷能接筋續骨用窩苣子不拘多少微炒研細末每服二三錢同好酒調服接骨方白蒺藜炒為末每服一錢熱酒調下被蓋汗出即愈神效蔥熨法治跌撲傷損用蔥白細切杵爛燒熱敷患處如冷易之腫痛即止其效如神人墜馬腹內作痛飲酒數杯翌早大便自下瘀血即安此元氣充實挾酒勢而行散一男子墜馬腹有瘀血服藥下之致發熱盜汗自汗脈浮澀予以為重劑過傷氣血所致投以十全大補湯益甚時或譫語此藥力未及而然也以前藥加炮附子五分服之即睡覺來頓安再劑而安金瘡熱黏皮治金瘡出血不止龍骨煅三錢五倍子二兩半生半炒白礬半生半枯各一兩沒藥乳香各二錢無名異一兩上共為末乾摻患處不作膿不怕風立時止血住痛生肌如神軍中一捻金治金瘡傷破出血並狗咬要端午日製礦石灰不拘多少炒研生韭菜連根同搗作餅陰乾為末摻上止血生肌出箭方花蕊石其形似硫黃出在陝西有白斑點者一味火煅七次為細末撒在傷處周圍箭頭即出止痛生肌散治刀斧傷出血不止乳香沒藥兒茶象皮炒龍骨水飛石膏煅水飛黃丹三七上八味各等分共為細末用之金瘡出血不止用楮樹葉為末搽上血即止梁閣老侄金瘡腫痛出血不止寒熱口乾此氣虛血無所附而血不歸經也用補中益氣湯五味麥門主之陽氣復而愈方見癰疽破傷風破傷風症河間云風者善行數變入臟甚速死生在反掌之間宜急分表裡虛實而用之破傷風邪在表者則筋脈拘急時或寒熱筋惕搐搦脈浮弦也宜散之羌活防風湯治破傷風邪初在表者急服此藥以解之稍遲則邪入於裡與藥不相合矣羌活防風甘草川芎藁本當歸白芍各一錢地榆細辛各五分上銼一劑水煎食服破傷風邪在半表半裡者則頭微汗身無汗也宜和之羌活湯治破傷風在半表半裡急服此湯稍緩邪入於裡不宜用羌活菊花麻黃川芎石膏防風前胡黃芩細辛甘草枳殼白茯苓荊芥子各五分薄荷白芷各二分半上銼一劑水煎服破傷風邪傳入里者舌強口噤項背反張筋惕搐搦痰涎壅盛胸腹滿悶便溺閉赤時或出血脈洪數而弦也宜導之大芎黃湯治破傷風在裡宜疏導急服此藥川芎羌活黃芩大黃各三錢上銼一劑水煎溫服臟腑通和為度一人鬥毆眉稜被打破傷風頭面腫大發熱以九味羌活湯熱服取汗外用杏仁搗爛入白麵少許新汲水調敷瘡上腫消熱退而已金刀如聖散治破傷風蒼朮八錢白芷川芎細辛麻黃各五錢川烏炮草烏炮各四錢薄荷一錢上為末每服一錢熱黃酒調服蓋覆遍身汗出有驗如治痛風加滴乳香一錢玉真膏治破傷風及金刃傷打撲傷損並癲狗咬傷能定痛生肌天南星為防風所制服之不麻人防風各等分上為末破傷風以藥敷瘡口然後以溫酒調一錢如牙關緊急角弓反張用藥一錢童便調下一打傷欲死但心頭微溫以童便灌下二錢並進二服一癲狗咬破先口噙漿水洗淨用綿拭乾貼藥更不再發無膿大有功一方治破傷風槐子一合炒好黃酒一碗煎八分熱服汗出為愈一方治破傷風用野蘇子半生半炒為末煉蜜丸如指頭大每服一丸熱黃酒下破傷風外治之法治跌打破頭面及刀傷破手足大口血流不止瀝青即松香不拘多少碾為細末將傷破瘡口用手捏湊一處以用藥末厚敷上將淨布扎住不怕風不懼水旬日即痊治破傷風甘草甘遂各等分研成末將蜂蜜並隔年老蔥頭共搗一塊將瘡甲揭起微將麝香先撒於上然後搭藥在上點香至四寸渾身汗出即愈灸法治破傷風及癲狗咬傷此方最易而神效用核桃殼半邊內填稠人糞滿仍用槐白皮親扣傷處用艾灸桃核上灸之若遍身汗出其人大困即愈若遠年只在瘡上灸之亦愈湯火治湯火傷蛤蜊殼不拘多少炙焦黃色研細末用生香油調膏敷之一方以蜜調敷之疼立止不膿不痂效治湯火傷用桐油二分水一分攪令勻調入黃丹石膏末敷之效黃白散用榆樹根白皮為細末一兩黃丹二錢攪勻看瘡大小用井水花調勻敷患處若干再以涼水敷之不唯止痛三五日即痊或人家失火燒了牲畜照患處塗之須臾流水出可治不流水是燒得太重不可治也然人彼燒亦同此斷湯火瘡方槐子燒灰為末香油調上即好用槐皮炒為末香油調上亦好一男子火傷兩臂焮痛大小便不利此火毒傳於下焦用生地黃當歸芍藥黃連木通山梔赤茯苓甘草一劑便清利其痛亦止乃以四物參耆白芷甘草而壞肉去又數劑而新肉生一男子因醉被熱湯傷腿潰爛發熱作渴飲水脈洪數而有力此火毒為患用生地黃當歸芩連木通葛根甘草十餘劑諸症漸退卻用生耆川芎當芍炙草白芷木瓜新肉將完因勞忽寒熱此氣血虛而然也仍用參耆之藥而五味酸棗而安又月餘而瘡痊一人夜間回祿煙燻致死者以蘿蔔汁灌之即蘇蟲獸一狗咬傷杏仁甘草口嚼搭傷處又宜銀杏塗傷處又宜蓖麻子五十粒去殼以井花水研成膏先鹽水洗傷處後敷此藥一癲狗咬傷用斑蝥七個去翅足為末酒調服於小便桶內見尿沫似狗形者為效如無再服須六七次無狗形亦不再發甚效又宜以斑蝥去翅用糯米一撮同炒黃去米將斑蝥研末麵糊丸如綠豆大每七丸溫酒下又以番木鱉即馬前子磨水吃即看腦頂上有紅頭髮急宜摘去又宜用艾灸蒜切片一二七炷五倍子末撒上包住勿見風一蛇咬傷用雄黃五錢五靈脂一兩共為末每服二錢好酒調服仍敷患處良久再進一服又宜貝母去心好酒服又宜白芷為末麥門冬湯調服立愈又宜扛板歸不拘多少其藥四五月生至九月見霜即無葉尖青如犁頭尖樣藤有小刺有子圓黑如睛味酸用藤葉搗汁酒調隨量服之用渣搭傷處立愈又方治蛇咬食蒜飲酒更用蒜搗爛塗患處加艾於蒜上灸之其毒自解凡毒蟲傷並效一蠍螫傷妙化丹治螫蠍蛇傷宜端午日製忌婦人雞犬沖之乳香沒藥輕粉海螵蛸雄黃各五錢硫黃二分上為細末左邊被傷點左眼右邊被傷點右眼立刻神效六神散治蠍螫疼痛不可忍者川烏草烏南星半夏香白芷九節菖蒲各等分上為末每用少許先以涎唾抹傷處即將此藥搽之立止神效一蜘蛛咬成瘡用雄黃一錢麝香半分為末用蓼蘭汁和塗瘡上如無蓼汁以青黛五分入水內和塗之立愈治蠍螫方川烏草烏狼毒半夏南星雄黃膽礬各三錢上共為細末五月五日午時以醋調丸如鼠糞大塗患處立愈一臭蟲方用蕎麥秸熬水漻淋其蟲即死蟬花散治夏月犬傷蛆蟲極盛臭惡不可近者晉州吳推官佃客五月收麥用騾車搬載一小廝引頭被一騾跑倒又咬破二三處痛楚不可忍五七日膿水臭惡難近又蛆蠅極盛不能救無如之何臥於大門外車房中偶一化飯道人見之云我有一方用之殊效我傳與汝修合服之蛆皆化水而出蠅亦不敢近又以寒水石水敷之旬日良愈眾以為神故錄之蟬蛻青黛各五錢蛇退一兩燒存性華陰細辛一錢五分上為細末每服三錢黃酒送下中毒人為百毒所中傷其脈洪大者生微細者死又曰洪大而遲者生微細而數者死大凡百毒所中用甘草綠豆水煎服之能解百毒又方不問一切諸毒急宜多灌香油無慮解毒丹治砒毒若飲食中者易治酒中得者難治若在胸中作楚可吐急用膽礬三分研水灌之即吐若在腹中宜下後服此黃丹水粉青黛焰硝綠豆粉各等分上為細末以小藍按水調下腹痛倍黃丹豆粉井花水調下解砒毒神方用江西豆豉一兩干蚯蚓一兩為末涼水調服不拘多少立效又宜用黃連煮水取汁去渣熬成膏用黑牛膽停對加蜜少許調稠得所入瓷瓶內每用涼水化下入口即活雖不言但心口動者還治得又宜硫黃四錢綠豆粉五錢共為末冷水調服緩緩服之冬月溫水服如肚痛再加一服待不痛用雞毛探吐吐後用溫溫稀粥啜下四五日不可食飯粿誤吞木屑搶喉不下死在須臾用鐵斧磨水灌下即效誤吞銅錢銅物多食核桃或荸薺其銅自爛誤吞針蠶豆煮熱同韭菜吃下針同菜從大便而出誤吞水蛭宜食蜜即化為水又宜用田泥作丸如櫻桃大每一丸白水下水蛭即抱泥同下一方用濃茶多服亦效誤吞金銀銅錢等物不能化者以砂仁濃煎湯服之其物自下白衣丸治男婦小兒誤吞麥芒針刺銅錢雜魚等骨哽在喉中及喉閉腫痛死在須臾烏賊魚骨白茯苓砂仁山豆根甘草殭蠶各五錢管仲一兩五錢硼砂麝香珍珠象牙腦子各少許上為細末飛羅白麵打糊丸如梧桐子大用蚌粉為衣陰乾每用二丸冷水浸化頻頻咽服又將一丸口噙化尤妙治誤食粉毒用伏龍肝水為末百草霜為衣淋稈灰水送下即解一男子偶然低頭往暗處藏身不言亦不答以飲食俱揹人竊食人見之則食不下諸人以為中邪用三牲祭之其物經宿乃妻食之病亦如是諸醫莫識余思必中鼠涎蓋鼠有大毒用吳茱萸塞入貓口以貓涎自出將茱萸令夫婦服之悉愈一藥室家人正銼藥忽仆地不省人事諸人以為中風痰厥乃訊於余余曰此非病也必藥氣熏蒸中於藥毒令與甘草煎湯灌之立醒一婦人將燒酒貯在錫壺內經旬取服止飲一小鐘即醉悶不省眾莫識其症余曰此中鉛毒也令以陳土攪水澄清入甘草煎湯灌之即醒骨鯁神仙釣骨丹治諸骨鯁喉其骨自隨藥帶下或吐出如神硃砂丁香各一錢血竭磁石龍骨各五錢上為細末黃蠟三錢為丸硃砂為衣每服一丸香油煎好醋吞下如要吐用矮荷煎好醋吃後用濃茶任服如無矮荷以桐油代之治諸骨鯁喉以象牙末吹之妙又宜將狗倒吊起涎出碗盛以徐徐嚥下其骨化水如神又宜燈芯以竹筒填滿火燒過取燈芯灰用米糖化開灌下勿犯牙治骨鯁白飴粉大口嚼咽即下又宜硼砂大塊者水洗淨日夜噙化咽其骨自軟治雞骨焦骨鯁用霜梅肉捶成指大作丸子將綿裹用線穿在肉冷茶送下扯住線頭在手一嘔即出又宜用胡荽略擂拌醋並渣嚥下即下五絕五絕病者一曰自縊死氣已絕二曰牆壁屋崩墜壓死氣已絕三曰溺水死氣已絕四曰魘死氣已絕五曰產乳死氣已絕並可救治又治卒然死並中風不省人事等症半夏為末如黃豆大吹入鼻中即活心頭溫者一日可治一自縊死者自旦至暮雖已冷可治自暮至旦則難治此陰氣盛故也然夏月夜短於晝又熱猶應可治又云心下若微溫者一日以上猶可治之當徐徐抱解不得截繩上下安被臥之一人以腳踏其兩肩手挽其發常令弦急勿使縱緩一人以手按據胸上數摩動之一人摩將臂脛屈伸之若已僵直但漸漸強屈之並按其腹如此少頃雖得氣從口出呼吸眼開仍按莫置亦勿勞之須臾可治以溫飲粥灌之更令兩人以管吹兩耳此法最效一自縊者切不可割斷繩宜以膝蓋或用手厚裹衣物緊頂穀道抱起解繩放下揉其項痕搐鼻及吹其兩耳待其氣回方可放手若便泄氣則不救矣一自縊死者宜從容安定心神徐徐解下慎勿割斷繩抱取心下猶溫者刺雞冠血滴口中即活男用雌女用雄一方雞屎白如棗大酒半盞和灌吸鼻中尤妙千金方以蘭汁灌之余法同上卒墮壓倒打死心頭溫者皆可救將本人如僧打坐令一人將其頭髮控放低用半夏末吹入鼻中如活卻以生薑汁清油攪勻灌之一救溺死方取灶中灰兩擔埋之從頭至足水出七孔即活一溺水者放大凳上臥著將腳後凳站起二磚卻蘸鹽擦臍中待其水自流出切不可倒流水出此數等但心頭微熱者皆可救治又方溺水死者過一宿尚活搗皂角為末綿裹納下部須臾水出即活一方急解死人衣帶艾灸臍中即活一救鬼魘死不省並中惡者皂角為末如綠豆大許吹入鼻中即嚏則氣通而活一魘死不得近前喚但痛咬其腳跟及唾其面不省者移動些少臥處徐徐喚之原有燈則存無燈則不可點燈用皂角末吹兩鼻則活一臥忽不語勿以火照之殺人但以痛齧大拇指甲際而唾其面則活取韭菜汁吹鼻孔冬月用韭菜根搗汁灌口中一卒魘用雄黃末吹鼻孔中即活一從高處墮下瘀血中心欲死淡豆豉一盞水煎去渣服若便覺氣絕不能言取藥不及掰開口以熱小便灌之一救冬月墮水凍死凡四肢冷口不能言只有微氣者不可便以火炙用布袋盛熱灰放在心頭冷即換熱者待眼開卻用溫酒或薑湯灌之一救挾暑死不可使冷水冷之即死宜用溫湯常摩洗其心腹間如途路急切用路上熱土置臍間令人便尿其臍中即活一用路上熱土大蒜等分搗研水調去渣浸飲之即活膏藥彰德府趙王府秘傳萬病無憂膏治風寒濕氣所致跌撲閃挫傷損一切疼痛皆貼患處心腹痛俱貼患處哮吼喘嗽貼背心瀉痢貼臍上頭痛眼痛貼太陽穴及治一切無名腫毒癰疽發背疔瘡癤毒流注濕毒臁瘡初覺痛癢便貼患處即消已成亦能止痛箍膿長肉生肌百發百中其功不能盡述川烏草烏大黃各六錢當歸赤芍白芷連翹白蘞白芨烏藥官桂木鱉子各八錢槐桃柳桑棗枝各四錢加苦參皂角各五錢上銼劑用真香油二斤浸藥一宿用火熬至藥焦色以生絹濾去渣不用將油再熬一滾入飛過黃丹十二兩炒過陸續下槐柳棍攪不住手滴水成珠為度離火吹入乳香沒藥末各四錢攪勻收貯退火毒聽用一方加蘇合香二錢尤妙萬應紫金膏治跌撲傷損手足肩背並寒濕腳氣風毒痛不可忍瀝青二斤半威靈仙二兩蓖麻子一百粒去殼研木鱉子二十八個去殼研爛乳香一兩筍箬炙為末沒藥一兩為末黃蠟二兩生薑一斤搗汁一碗麻油夏二兩春秋三兩冬四兩先同靈仙熬去渣滴水不散為度上將瀝青研末同二汁下鍋熬化看二汁盡時卻起火桃柳條不住手攪勻卻入前靈仙油同熬再下木鱉子蓖麻子搗勻入內攪又下乳沒黃蠟再攪即成膏矣每用好厚絹紙攤貼先將姜擦患處後貼上即用烘熱鞋底熨之瀉痢貼丹田咳嗽吐血貼背心心疼貼心上風損貼患處海仙膏治風損諸瘡癰疽腫毒並效赤葛苦參各等分上二味銼片用香油浸過煎至焦枯濾去滓秤香油一斤淨再煎沸徐徐入密陀僧水粉各四兩千捶膏用松香明淨者不拘多少為末蓖麻子仁同入石臼內搗爛成膏如稀則加松香如稠則加麻仁須要稀稠得所取出入水中扯拔數次再入乳香沒藥血竭孩兒茶各為末少許頑瘡加輕粉龍骨再扯令勻瓷器收貯每用時重湯化開綿帛攤上貼患處神效通治尹蓬頭祖師秘傳混元丹專治大人小兒諸虛百損五勞七傷小兒百病隨後引用之詩曰百花未放此花先修合成丹號混元能除腹內諸般疾安神定志最延年嬰兒胎毒驚風症疳積瀉痢嘔痰涎立奏奇功真可羨老無風疾少無癲又曰乘鶴西風出華州袖藏千載混元球紅鉛黑汞東西產白雪黃芽次第收孔子泣麟周道否卞和識玉楚王休藥中消息誰人會脫卻紅塵自在遊混元衣乾者二錢按中央梅花三錢按北方明白雪解痘元方一兩辰砂甘草一兩水煮過半日一兩研細為衣按西方去甘草甘松四錢去毛按秋金滑石六兩牡丹皮二兩煎水去丹皮用汁煮乾為度按北方粉草一兩去皮按東方莪朮三錢火煨過按東方宿砂三錢去皮按西方益智仁六錢去殼按西方人參一錢去蘆按東方木香一錢按東方黃耆一錢按西方山藥二錢五分按北方薑汁炒香附一兩按東方桔梗去蘆一錢按東方白茯苓二錢五分去皮按北方白茯神二錢五分去皮木按北方遠志一錢五分甘草水泡去心麝香三分按中央醜玄三分按中央空個玄一錢按西方金箔二帖為末按西方上共為細末煉蜜為丸如龍眼大量人大小加減丸數用之中風痰厥不省人事薑湯研下宜出汗傷寒夾驚發熱蔥薑湯研下宜出汗停食嘔吐大便酸臭腹脹薑湯下赤白痢裡急後重陳倉米湯下大便去血槐花陳倉米湯下小便不通車前子湯下夜出盜汗浮小麥湯下發熱金錢薄荷湯下痘疹不出升麻湯下積聚腹痛薑湯下喘急咳嗽麻黃杏仁湯下疝氣偏墜小茴大茴湯下蟲痛苦楝根皮湯下急驚搐搦薄荷湯下夜喘不止燈芯灰湯下慢驚人參白朮湯下諸病後無精神少氣力不思飲食薑棗湯下胎寒手足冷口氣涼腹痛腸鳴薑蔥下面目四肢浮腫面黃茯苓皮桑白皮大腹皮陳皮姜皮湯下即五皮散瘧疾槐柳枝各五寸姜三片煎熟一宿五更溫熱送下疳熱身瘦肚大手足細大便或淋或泄小水如泔陳倉米湯下敕封通微顯化真人即赤腳張三峰神仙所授神仙萬億丸硃砂透明鏡面者佳巴豆去殼並心膜寒食麵於清明前一日名寒食用白麵不拘多少好酒和麵一塊包細乾麵在內蒸熟聽用上各五錢先將硃砂研細以入巴豆又研極細卻將寒食麵去包皮取內細面用好酒打成膏蒸熟入藥內仍又同研百餘下為丸如黍米大每服三五丸看人大小加減用之各隨症用引於後感冒風寒發熱薑蔥煎湯下出汗內傷飲食生冷茶下心痛艾醋湯下腹痛淡薑湯下霍亂吐瀉薑湯下赤痢茶清下白痢薑湯下赤白痢疾薑茶湯下瘧疾作寒薑湯下心膨脹薑湯下伏暑傷寒冷水下諸蟲作痛苦楝根皮湯下小便不通燈芯湯下積聚發熱茶清下大便閉結茶清下急慢驚風薄荷湯下咳嗽痰喘薑湯下神應救苦丹治諸風百毒如神大川烏略炮肥草烏略炮蒼朮青皮去瓤生地黃西芎枳殼麩炒白芍各五錢五靈脂二兩上共為細末酒打糊為丸如彈子大每服一丸細嚼熱酒送下汗出即效若為小丸亦可不飲酒者冬月熱水下一治頭風腫痛心腹痛腳跟痛疝氣痛手背痛遍身骨節痛破傷風痛棒瘡痛癰疽發背及一切惡瘡痛奇病一項上生瘡如櫻桃大有五色瘡破則項皮斷但逐日飲牛乳自消一寒熱不止經月後四肢堅如石以物擊之一似鐘磬日漸瘦惡用茱萸木香等分煎湯服即愈一大腸頭出寸余痛苦直候乾自退落又出名為截腸病若腸盡乃不治但初截寸余可治用芝麻油器盛之以臀坐之飲火麻子汁數升愈一口鼻中腥臭水流以碗盛之有鐵色鰕魚如粳米大走躍不住以手提之即化為水此肉壞矣任意饌食雞肉愈一腹上麻痹不仁多煮蔥白吃之自愈一婦人小便中出大糞名交腸服五靈散效如未盡愈可用舊幞頭燒灰酒服之一兩足心凸如腫上面青黑色豆瘡硬如釘子履地不得脛骨破碎跟髓流出身發寒顫唯思飲食此是肝腎氣冷熱相吞用炮川烏頭末敷之煎韭菜湯服效一腹脹經久忽瀉數升晝夜不止服藥不驗乃為氣脫用益智子煎濃湯服立愈一四肢節脫但有皮連不能舉動名曰經解用酒浸黃蘆三兩經一宿取出焙乾為末每服二錢酒調下服盡安一玉莖硬不痿精流不歇時時如針刺捏之則脆乃為腎滿漏疾用韭菜破故紙各二兩為末每服三錢水一盞煎至六分作三次飲之愈則住服一咽喉間生肉層層相疊漸漸腫起不痛多日乃有竅子臭氣自出遂退飲食用臭橘皮煎湯連服愈一腹中如鐵石臍中水出旋變作蟲行之狀繞身匝啄癢痛難忍撥掃不盡用濃煎蒼朮浴之以蒼朮末入麝香少許水調服痊一眼前常見諸般禽蟲飛走以手捉之則無乃肝膽經為疾用酸棗仁羌活玄明粉青葙子花各一兩為末每服二兩水一大盞煎至七分和渣飲一日三服一大腸蟲出不斷斷之復生行坐不得用鶴蝨末水調五錢服之自愈一眼睛垂出至鼻如黑角色痛不可忍或時時大便出血名曰肝脹用羌活煎汁服數盞自愈一腹中有物作聲隨人語言用板藍汁一盞分五服服之又名應聲蟲當服雷丸自愈一有飲油五升以來方始快活又得吃則安不爾則病此是發入胃被氣血裹了化為蟲用雄黃半兩為末水調服蟲自出如蟲活者置於油中逡巡間連油潑之長江一治臥於床四肢不能動只進得食好大言說吃物謂之失說物望病治法如說食豬肉時便云爾吃豬肉一頓病者聞之即喜遂置肉令病人見臨要卻不與吃此乃失他物望也當自睡中涎出自愈一手十指節斷壞唯有筋連無節蟲行如燈芯長數尺余遍身綠毛卷名曰血餘以茯苓胡黃連煎湯飲之愈一遍身忽皮里混混如波浪聲癢不可忍抓之血出不能解謂之氣奔以人參苦梗青鹽細辛各一兩作一服水二碗煎十數沸去渣飲盡便愈一眼白渾黑見物依舊毛髮直如鐵條雖能飲食不語如醉名曰血潰用五靈脂為末二錢酒調下一著艾灸訖大痂便退落瘡內鮮肉片子飛如蝶形狀騰空去了痛不可忍是血肉俱熱用大黃朴硝各半兩為末水調下微利即愈一臨臥渾身蝨出約至五升隨至血肉俱壞每宿漸多癢痛不可言狀雖吃水臥床晝夜號哭舌尖出血不止牙齒俱黑唇動鼻開但飲鹽醋湯十數碗即安一眼赤鼻孔大喘渾身出斑毛髮如銅線乃胃中熱毒氣結於下焦用白礬滑石各一兩為末作一服水三碗煎至半冷不住飲候盡乃安一有蟲如蟹走於皮膚下作聲如小兒啼為筋肉之化用雄黃雷丸各一兩為末摻在豬肉片上熱吃盡自安一手足甲忽然長倒生肉刺如錐痛不可忍吃葵萊自愈一鼻中毛出晝夜可長一二寸漸漸粗圓如繩痛不可忍雖忍痛摘去一莖即後更生此因食豬羊肉過多遂用乳香硇砂各一兩為末以飯丸如梧子大空心臨臥各一服水下十粒自然脫落一面上及遍身生瘡似貓兒眼有光彩無膿血但痛癢不常飲食減少久則透脛名曰寒瘡多吃魚雞韭蔥自愈一腸破腸出臭穢急以香油沫腸用手送入煎人參枸杞淋之皮自合矣吃羊腎粥十日即愈一鼻中氣出盤旋不散涎如黑墨色過十日漸漸至肩胸與肉相連堅勝金鐵無由飲食此多因瘧後得之煎澤瀉湯日飲三盞連服五日愈一遍身忽肉出如錐既癢且痛不能飲食此名血擁若不速治潰而膿出以青皮蔥燒灰淋洗吃豉湯數盞自安一眉毛搖動目不能視交睫喚之不應但能飲食有經日不效者用蒜三兩取汁酒調下即愈一毛竅節次血出若血不出皮脹膨如鼓須臾眼鼻口被氣脹合此名脈溢飲生薑水汁各一二盞即安一忽然氣上喘不能言語口中汁流吐逆齒皆搖動氣出轉大則悶絕蘇復如是名曰傷寒並熱霍亂用大黃人參末各半兩水三盞煎至一盞去渣熱服可安一口內生肉球臭惡自己惡見有根線長五寸余如釵股吐球出飲食也卻吞其線以手輕捏痛徹於心困不可言用水調生麝香一錢服三日驗一渾身生潦泡如甘棠梨每個破出水內有石一片如指甲大泡復生摘肌肉不可治急用荊三稜及蓬萊術各五兩為未分二服酒調連進愈一頭面發熱有光色他人手近之如火燒用蒜取汁半兩酒調下吐如蛇狀遂安一人自覺自形作兩人並臥不別真假不語問亦無對乃是離魂用辰砂人參茯苓濃煎湯服真者氣爽假者化也一男子自幼喜飲酒成丁後日飲一二升不醉片時無酒叫呼不絕全不進飲食日就衰弱其父用手巾縛住其手足不令動搖但扶少立卻取生辣酒一罈就於其子口邊打開其酒氣衝入口中病者必欲取飲堅不與之飲須臾口中忽吐物一塊直下壇中即用紙封裹壇中用猛火燒滾約酒幹一半即開視之其一塊如豬肝樣約三兩重周圍有小孔如針眼不可數計棄之於江飲食復舊雖滴酒不能飲矣一夜間飲水誤吞水蛭入腹經停月餘日必生下小蛭能食人肝血腸痛不可忍面目黃瘦全不進食若不早治能令人死用田中干泥一小塊死魚三四個將豬脂熔攪勻用巴豆十粒去殼膜研爛入泥內為丸如綠豆大用田中冷水吞下十丸小兒只用三丸至五丸須臾大便蛭蟲一時皆瀉出卻用四物湯加黃耆煎服生血補理方見補益一婦人產後忽兩乳伸長細小如腸垂下直過小肚痛不可忍危亡須臾名曰乳懸將川芎當歸各二斤半斤銼散於瓦石器內用水濃煎不拘時候多少溫服餘一斤半銼作大塊用香爐慢火逐漸燒煙安在病人面前桌子下要煙氣在上不絕令病人低伏桌子上將口鼻及病乳常吸菸氣直候用此一料藥盡看病症如何或未全安略縮減再用一料如前法煎服及燒煙燻吸必安如用此二料已盡雖兩乳略縮上而不復舊用冷水磨蓖麻子一粒於頭頂心上塗片時後洗去則全安矣一婦人臨產服催生藥驚動太早夫肉離經而用力太過以肓膜有傷產後水道中垂出肉線一條約三尺母牽引心腹痛不可忍以手微動之則痛欲絕先服失笑散數服仍用老生薑三片淨洗不去皮於石缽臼內研爛用清油二斤拌勻入鍋內炒熟以油乾焦為佳先用熟絹緞綾五尺長摺作結左令穩重婦人輕輕盛起肉線使之屈曲作一團放在水道口卻用絹袋兜裹候油姜稍溫傳在肉線上熏覺姜漸冷又用熨斗火熨熱使之常有姜氣如姜氣已去除去又用新者如此熏熨一日一夜其肉線已縮大半再用前法越二日其肉縮盡入腹中其病全安卻再服失笑散芎歸湯補理切不可使肉線斷作兩截則不可醫一人患勞瘵兩年諸藥不效一日聞肉味其腹痛不可忍又恐傳染移至空房候其自終經停三日病者腹痛氣息將絕思憶肉味之急忽有人惠雞子三枚其病人俯仰取火低頭取瓦銚煎熟吹火屢燃屢滅鼻中如有所礙將熟間忽嚏噴一聲有紅線一條自鼻中出牽抽約二尺長趨下瓦銚中病人知是怪物急用碗復煎銚中盡力燒火不佳其銚自裂方住火開銚視之乃是小蟲一條頭目皆見已鍛死如鐵線樣示家人後棄之於江其病即安一居民逃避石室中賊以煙火熏之欲死迷悶中摸索得一束其以蘿蔔嚼汁下咽而蘇又炭煙燻之往往致死含蘿蔔一片著口中煙起不能毒人或預曝乾為末備用亦可或新水擂爛干蘿蔔飲之亦可一自行癲穿斷舌心血出不止以米醋用雞翎刷所斷處其血即止仍用真蒲黃杏仁去皮尖硼砂少許研為細末煉蜜調藥稠稀得所噙化而安一身上及頭面上浮腫如蛇伏者用雨滴階磉上苔痕一錢水化開噙蛇頭上立消一病人齒無色舌上白或喜睡不知痛癢處或下利宜急治之下部不曉此者但攻其上不以為意則下部生蟲食其肛爛見五臟便死燒艾於管中熏下部令煙入更入少雄黃良一人被蜘蛛咬腹大如孕其家棄之吃食於道有僧遇之教飲羊乳未幾日而平一妖魅貓鬼病人不肯言鬼以鹿角屑搗末以水調服方寸匕即實言也一蛟龍生子在芹菜上食之入腹變成龍子須慎之用錫粳米杏仁乳餅煮粥食之二升三服吐出蛟龍子有兩頭一鬼擊之病得之無漸卒者如刀刺狀胸脅腹內切痛不可抑按或即吐血衄血下血一名鬼排斷白犬頭取熱血一升飲之一馬希聖年五十餘性嗜酒常痛飲不醉糟粕出前竅便溺出後竅六脈皆沉澀與四物湯加海金沙木香檳榔木通桃仁服而愈此人酒多氣肆酒升而不降陽極虛酒濕積久生熱煎熬血乾陰亦太虛陰陽偏虛皆可補接此人中年後陰陽虛時暫可活者以其形實酒中谷氣尚在三月後其人必死後果然
