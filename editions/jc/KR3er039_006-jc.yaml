body:
  text: 卷之六婦人科脈脈經曰寸關調如故而尺脈絕不至者月水不利當患小腹引腰痛氣滯上攻胸臆也寸口脈浮而弱浮則為虛弱則無血尺脈來而斷絕者月水不利尺脈滑血氣實婦人經脈不利肝脈沉主月水不利腰腹痛少陰脈弱而微微則血少脈來至狀如琴絃若小腹痛主月不利孔竅生瘡胃脈澀少陰脈微而遲微則無精遲則陰中寒澀則血不來此為居經三月一來少陰脈滑而數者陰中生瘡少陰脈數則氣淋陰中生瘡少陰脈弦者陰中必挺核少陰脈浮而動浮則為虛動則為痛婦人則漏下婦人生死脈訣脈經曰婦人漏下赤白且下血數升脈急數者死遲者生婦人漏下赤白不休脈小虛滑者生大緊實數者死婦人新生乳子脈沉小滑者生實大弦急者死婦人疝瘕積聚脈弦急者生虛弱者死婦人生產因中風寒熱病喘鳴而肩息脈實而浮緩者生小急者死婦人生產之後寸口脈焱疾不調者死沉細附骨不絕者生金瘡在陰處出血不絕陰脈不能至陽者死接陽而復出者生懷孕六七月脈實大牢強弦急者生若沉而細者死丹溪曰產前脈細小產後脈洪數者死又曰產前當洪數既生而洪數如故豈得不死此亦大概言之亦有洪數而生者調經婦人諸病者多是氣盛而血虛也調氣養血湯專治婦人室女血氣不和胎前產後諸病蓋婦人以血為主殊不知血氣先不調然後血脈不順即生諸病香附米炒一錢烏藥一錢砂仁一錢當歸川芎熟地黃薑汁浸炒各一錢白芍酒炒甘草上銼一劑生薑棗煎服或丸或散皆可氣痛加吳茱萸痰盛加二陳湯全服婦人經水或前或後或多或少或逾不來或一月兩來者俱是不調之故也千金調經散治婦人經水不調或曾經小產或帶下二十六病腹痛口乾或發熱小腹痛急手足煩熱六腑不調時時泄血經水不調久不懷孕當歸川芎白芍酒炒各二錢人參阿膠炒牡丹皮肉桂各一錢吳茱萸炒一錢麥門冬去心半夏薑製各一錢五分甘草五分上銼一劑生薑煎服經水先期而來者血虛有熱也治當補血清熱經自准也當歸一錢半川芎五分白芍酒炒八分生地黃一錢阿膠炒五分艾葉三分條芩一錢黃芩姜炒八分黃柏五分知母五分香附一錢甘草三分上銼一劑水煎空心溫服經水過期不來作痛者血虛有寒也治當溫經養血痛自止也當歸一錢半川芎五分白芍酒炒一錢熟地黃一錢桃仁二十個去皮尖研紅花三分香附一錢肉桂五分蓬朮一錢蘇木一錢木通八分甘草五分上銼一劑水煎空心溫服經水將來作痛者血實氣滯也腹中陣陣作痛乍作乍止氣血俱實治當行經順氣痛自止也當歸川芎白芍生地黃黃連香附桃仁去皮尖玄胡索牡丹皮莪朮各等分紅花減半上銼一劑水煎空心溫服發熱加柴胡黃芩經行著氣作心腹腰脅疼痛者乃瘀血也治當順氣消瘀痛自止也當歸川芎白芍生地黃桃仁去皮尖紅花玄胡索莪朮青皮各等分上銼一劑水煎溫服經水過期而來紫黑成塊者氣鬱血滯也治當調經順氣經自准也當歸川芎白芍生地黃桃仁去皮尖紅花牡丹皮青皮香附玄胡索甘草上銼一劑水煎服經水過期而來色淡者痰多也治當活血化痰經自調也當歸川芎白芍生地黃陳皮半夏姜炒白茯苓去皮甘草各等分上銼一劑生薑三片水煎服經水過期而來作痛者血虛有熱也治當生血清熱痛自止也當歸川芎白芍酒炒生地黃牡丹皮桃仁去皮尖紅花木香玄胡索香附甘草上銼水煎溫服經水過多久不止者成血崩也治當涼血補血經自止也當歸川芎白芍酒炒生地黃白朮條芩阿膠炒白茯苓皮不用山梔地榆荊芥香附甘草上銼水煎空心服久不止者加茅根汁磨墨同服經水行後作痛氣血虛也治當調養氣血痛自止也當歸川芎白芍酒炒熟地黃人參白朮去蘆乾薑炒甘草上銼一劑薑棗煎服經水去多久不止發腫滿者是脾經血虛也治當補血健脾利小水腫自消也當歸川芎白芍酒炒木香熟地黃茯苓白朮砂仁大腹皮陳皮厚朴薑汁炒蘇子豬苓木通香附玄胡索牛膝去蘆甘草上銼一劑水煎溫服經水月久不行發腫者是瘀血滲入脾經也治當活血健脾行氣腫自消也當歸川芎白芍桃仁去皮紅花牡丹皮乾薑肉桂厚朴枳殼麩炒木香香附牛膝去蘆玄胡索上銼劑水煎服經水月久不行腹脅有塊作疼者是血作結癥瘕也治當調經止痛塊漸消也當歸川芎砂仁木香小茴乳香枳實麩炒厚朴姜炒桃仁紅花牡丹皮肉桂香附玄胡索牛膝去蘆上銼劑水煎溫服錯經妄行於口鼻者是火載血上氣之亂也治當滋陰降火順氣調經經自准也脈必芤澀久而不治乃成虛怯也當歸川芎白芍生地黃黃芩山梔牡丹皮阿膠炒犀角白茯苓去皮麥門冬去心陳皮上銼一劑水煎服經行身痛麻痹寒熱頭疼者乃觸經感冒也加減五積散治婦人遇經行時沿身疼痛手足痹麻或生寒熱頭痛目眩等症依本方去乾薑加羌活獨活牛膝薑棗煎服方見中寒經水不調或腹痛白帶或淋瀝不止或肌瘦者此血氣俱虛也大補經湯治婦人氣血虛弱血海寒冷經水不調或時心腹疼痛或下白帶如魚腦髓或似米泔色錯亂不分信期每月淋瀝不止面色痿黃四肢無力頭目眩暈肌體羸瘦當歸酒洗白芍香附各六分川芎熟地黃各五分白朮去蘆白茯苓黃耆陳皮玄胡索各四分人參砂仁阿膠炒沉香另研小茴酒炒吳茱萸炒肉桂粉甘炙各三分上銼一劑薑棗煎服經驗調經湯治婦人經水或前或後或多或少當歸熟地黃香附各一錢二分白芍酒炒吳茱萸炒大腹皮紫荊皮肉蓯蓉各一錢川芎條芩各七分粉草五分上銼一劑生薑三片棗一枚水煎待經至之日服起一日一劑服至四劑而止即經對期艾附暖宮丸治婦人經水不調小腹時痛赤白帶下子宮虛寒南香附米一斤四兩醋浸四兩湯浸四兩童便浸四兩酒浸各浸一宿焙乾北艾葉焙乾搗爛去灰醋浸炒四兩當歸川芎白芍酒炒熟地黃薑汁炒各一兩玄胡索子炒二兩甘草生用八錢上為細末醋糊為丸如梧桐子大每服七八十丸空心米湯下酒亦可調經八物丸養血調經如期除赤白帶久服立孕當歸酒洗二兩南芎鹽湯浸切一兩白芍酒炒一兩半熟地黃酒浸二兩白茯苓去皮一兩白朮米泔浸焙一兩橘皮鹽湯洗曬一兩牡丹皮一兩條芩酒炒一兩玄胡索酒炒一兩上為末煉蜜為丸如梧桐子大每服八九十丸空心淡鹽湯下寒月酒下一婦人晡熱肢體瘦倦食少無味月經不行或鼻衄或血崩半載矣或用順氣清熱等劑不應更加寒熱且時欲作嘔余以為鬱怒虧損脾胃濕火錯經妄行而然耳遂朝用補中益氣湯夕用六味丸各數劑半載而痊方見補益一婦人經行遇怒其經即止甚則口噤筋攣鼻衄頭痛痰氣搐搦瞳子上視此肝火熾甚以小柴胡湯加熟地黃山梔鉤藤而愈方見傷寒一婦人多怒經行旬余方止後淋瀝無期肌體倦瘦口乾內熱盜汗如洗日晡熱甚皆由肝脾虧損無以生髮元氣用補中益氣湯加茯神遠志酸棗仁麥門五味牡丹皮龍眼肉治之即痊方見補益一婦人經行感冒風邪晝則安靜夜則譫語此熱入血室也用小柴胡湯方見傷寒加生地黃治之頓安但內熱頭暈用補中益氣方見補益加蔓荊子而愈後因怒惱寒熱譫語胸脅脹痛小便頻數月經先期此肝火血熱妄行用加味逍遙加生地黃而愈方見婦人虛勞經閉婦人壯盛經閉者此血實氣滯宜專攻也通經丸治經閉並乾血氣斑蝥二十個糯米炒大黃五錢桃仁四十九個上為末酒糊為丸如梧桐子大空心酒下五七丸甚者十五丸如血枯經閉者四物湯送下通經甘露丸治婦人經血不通崩漏腸風赤白帶下血氣五淋產後積血男女五勞七傷及小兒骨蒸勞熱夫婦陰血陽精不交諸疾神效大黃四兩用頭紅花四兩入水取汁浸一日不用紅花四兩童便入鹽二錢浸一日取出曬乾不用童便四兩用好酒浸一日令軟切片如杏核大曬乾入巴豆去皮三十五粒同炒黃色去巴豆不用四兩用當歸四兩入淡醋浸一日曬乾不用當歸上四分共合一處入南木香二兩百草霜五錢共為細末以當歸醋紅花水煮米糊為丸如梧桐子大每服三四十丸空心溫酒下反經丸治婦人經閉不通不論新久乳香沒藥孩兒茶巴豆去殼蔥白各五分斑蝥五個上為末共搗為丸綿裹三層系放筒上將線繫住送入陰戶內三四寸許俟一炷香時經水即下一粒仙丹治婦人乾血癆並赤白帶下種子如神巴豆一百二十個去殼用新磚一塊將豆紙包放磚上捶去油令淨如面白方好用斑蝥六十個去翅足為末穿山甲五錢油煎過為末皂角一兩刮粗皮火炮為末苦葶藶末一兩大黃末一兩上合一處以棗煮去皮核丸藥如彈子大用綿繭張開裹藥在內穿入三寸竹簡上頭後仍留系二三寸余挽一轉不令藥氣出外用時先以溫水洗陰內令潔淨拭乾卻以蔥汁浸濕藥頭送入子宮極深處整一日一夜取出藥不用此藥用後少間耳冷氣下行發寒發熱如傷寒之狀不怕飲食任意食用無妨半日即通或鮮血或死血一切惡物悉下忌生冷發物自此子宮和暖而交媾則有孕矣婦人虛弱經閉者此血脈枯竭宜補經自通也通經調氣湯治婦人經閉虛弱者當歸酒洗川芎白芍酒炒生地黃酒浸香附童便炒各一兩牡丹皮八錢柴胡六錢黃柏酒炒知母酒童便炒八錢黃芩酒炒六錢牛膝去蘆酒洗八錢桃仁紅花二味量入上銼作十劑水煎空心一服臨臥一服牡丹皮湯治室女經閉咳嗽發熱牡丹皮一錢半當歸一錢半川芎八分白芍生地黃陳皮白朮香附各一錢柴胡黃芩各一錢甘草四分上銼一劑水煎服養真湯治婦人經閉不通臍下一塊已經三載顏色如故百藥無功服此數劑經行又投數服而塊消矣當歸酒洗川芎白芍酒炒益母草香附酒醋米泔童便同浸炒熟地黃薑汁炒山茱萸去核白茯苓去皮梔子炒小茴酒炒陳皮各等分上銼六劑水煎服盡經通後此作丸服六味地黃治婦女經閉發熱或咳嗽等症婦人半虛半實經閉者宜攻補兼施也通經湯治婦女經閉者當歸川芎白芍生地黃大黃官桂厚朴枳殼枳實黃芩蘇木紅花烏梅上銼一劑薑棗煎服調經養血丸治婦女經脈不行或不調或前或後赤白帶下久不成孕服此有孕任服香附十二兩酒醋鹽湯童便各浸三日取出炒當歸酒洗白芍酒炒各二兩川芎一兩生地黃酒洗二兩茯苓去皮白芷一兩牡丹皮酒洗二兩乾薑炒一兩肉桂一兩紅花一兩桃仁泡去皮一兩玄胡索六錢沒藥一兩半夏香油炒一兩甘草蛤粉炒成珠一兩小茴炒三錢莪朮煨醋炒五錢阿膠炙五錢上為末醋糊丸每服八十丸空心白湯黃酒任下婦女經閉有積塊者宜養血破積也四物調經湯治婦女或十五六歲經脈不行日夜生寒熱手足麻痹飲食少進頭痛惡心嘔吐腹中忽然結一塊衝動痛者宜此誤食生冷感而致也當歸酒洗川芎白芍酒炒柴胡枳殼去穰麩炒各八分黃芩熟地黃酒浸陳皮莪朮醋炒三稜醋炒白朮去蘆白芷小茴鹽水炒玄胡索各五分香附童便炒一錢二分青皮麩炒砂仁紅花甘草各四分上銼一劑生薑三片蔥白三根水煎溫服若有塊不通須與調經丸間服遍身疼痛加羌活獨活咳嗽加杏仁五味子各五分肚痛加炒乾漆七分瘧疾加草果常山泄瀉去枳殼加肉蔻調經丸當歸酒洗二兩川芎熟地黃薑汁炒青皮麩炒陳皮枳殼去瓤炒白朮去蘆厚朴薑汁炒小茴香炒艾葉去筋各一兩香附醋炒五兩三稜煨醋炒莪朮煨醋炒砂仁白芷牛膝去蘆酒洗玄胡索各一兩粉草琥珀各五錢另研入上為末醋打糊為丸如梧桐子大每服八九十丸米湯下酒亦可若肚痛加蒼朮白朮婦人經通之後宜調理之劑也加減四物湯加香附陳皮