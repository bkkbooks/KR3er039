炒各二錢敗龜板酒炙二兩上為末酒糊為丸如梧桐子大每服八十丸空心白滾水下加減六合湯治婦人上有痰火下有白帶腹痛當歸酒洗一錢白芍酒炒八分川芎鹽水浸八分熟地黃酒洗焙一錢橘紅鹽水洗去白八分白茯苓去皮七分甘草炙四分半夏薑製七分貝母去心糯米拌炒七分白朮去蘆二錢黃柏酒浸七分知母酒浸七分椿根皮酒炒一錢上銼一劑生薑三片水煎空心熱服若上痰火盛加枯芩七分臨臥服收帶六合丸一名益氣固腸丸治赤白帶下肚腹疼痛和脾胃燥中宮之濕提下陷之氣化痰清火白朮米泔浸焙蒼朮米泔浸焙白茯苓去皮陳皮鹽水炒去白當歸酒洗白芍酒炒各二兩熟地黃酒洗半夏薑製各一兩半椿根白皮洗炒牡丹皮黃柏酒炒各一兩二錢防風九錢甘草炙一兩升麻八錢上為末酒糊丸如梧桐子大每服百丸空心米湯下鹽湯亦可一方加香附枳殼滋榮收帶丸治崩後氣下陷或白帶小腹脹滿痛甚等症當歸酒洗白芍酒炒蒼朮米泔制白茯苓去皮黃柏酒炒椿根皮焙各一兩白朮二兩半夏薑製八錢川芎鹽湯浸切七錢香附米鹽水浸炒六錢防風升麻青皮醋炒各五錢木香大甘草炮各四錢上為細末酒打糊為丸如梧桐子大每服一百二十丸空心鹽湯米湯白湯送下雙白丸治白帶如神石灰一兩白茯苓二兩為末水丸每服三十丸空心白水送下專治赤白帶下蕎麥麵不拘多少用雞子清為丸每服三五十丸白湯送下即愈一婦人頭暈吐痰胸滿氣喘得食稍緩苦於白帶二十餘年諸藥不應此氣虛而痰飲也痰飲愈而帶自愈遂朝用六君子湯夕用六味丸不月而驗方見補益一婦人帶下四肢無力余曰四肢者土也此脾胃虛弱濕痰下注以補中益氣歸脾二藥治之而愈一婦人年逾六十內熱口乾勞則頭暈吐痰帶下或用化痰行氣前症益甚飲食愈少肢體或麻恪服祛風化痰肢體常麻手足或冷或熱日漸消瘦余曰症屬脾氣虛弱而不能生肺祛風之劑復損諸經也當滋化源遂用補中益氣加茯苓半夏炮姜二十餘劑脾氣漸復飲食漸加諸症頓愈方見補益虛勞脈脈來數大或虛細弦急虛勞者多因氣結憂思驚恐或清欲動心或經水不調變成諸病上盛下虛腳手心熱或皮焦骨熱或午後怕寒夜間發熱或日夜不退盜汗減食嘈雜怔忡嘔噦煩躁胸腹作痛飽悶作瀉痞塊虛驚面白唇紅頭目眩暈腰背痠疼四肢困倦無力小水赤色重則虛火上攻兩頰顴紅骨蒸勞熱陰虛火動也治之宜養血健脾以治其本降火清郁以治其標以逍遙散茯苓補心湯之類選而用之虛勞吐血者清肺飲子治婦女虛勞發熱咳嗽吐血先服此清熱止血後服逍遙散加減調理當歸酒洗川芎黃芩貝母去心知母蜜水炒阿膠珠蒲黃炒陳皮各八分白芍酒炒生地黃天門冬去心麥門冬去心前胡各一錢薄荷六分枳殼麩炒五分藕節十片甘草炙三分上銼一劑水一鍾半煎至一鍾食後徐徐溫服虛勞熱嗽有汗者逍遙散治肝脾血虛發熱或潮熱或自汗盜汗或頭痛目眩或怔忡不寧煩赤口乾或月經不調或肚腹作痛或小腹重墜水道澀痛或腫痛出膿內熱作渴當歸酒洗白芍酒炒白朮土炒白茯苓柴胡酒炒各一錢甘草炙五分上銼一劑煨姜一片薄荷少許水煎服加牡丹皮梔子炒名加味逍遙散滋陰至寶湯治婦人諸虛百損五勞七傷經脈不調肢體羸瘦此藥專調經水滋血脈補虛勞扶元氣健脾胃養心肺潤咽喉清頭目定心慌安神魄退潮熱除骨蒸止喘嗽化痰涎收盜汗住泄瀉開鬱氣療腹痛利胸膈解煩渴散寒熱祛體疼甚有奇效當歸酒洗白朮去蘆白芍酒炒白茯苓去皮陳皮知母生用最能瀉虛中之火貝母去心香附童便炒地骨皮去骨麥門冬去心各八分薄荷柴胡酒炒甘草各三分上銼一劑用煨生薑三片水煎溫服虛勞熱嗽無汗茯苓補心湯治婦人以血旺氣衰為本心生血肝藏血今血衰而氣盛者由心氣虛耗不能生血又不能制乎肺金使肺氣得以乘乎肝木肝之虧損則不能藏血漸至枯涸不榮經絡故月信不調矣此藥專補心元之虛抑其肺氣之盛調和榮衛滋養血脈其疾自愈兼治去血過多虛勞發熱及吐血咳嗽痰喘上壅胸膈不利當歸川芎白芍酒炒熟地陳皮半夏姜炒白茯苓去皮桔梗枳殼麩炒前胡去蘆各一錢乾葛紫蘇各七分人參木香各五分甘草三分上銼一劑薑棗煎服滋陰地黃丸治婦人經水不調或不通虛勞吐血衄血咳血便血發熱咳嗽盜汗痰喘一切虛損瘦怯之病熟地黃薑汁浸焙四兩山藥一兩山茱萸酒蒸去核二兩白茯苓去皮牡丹皮去皮澤瀉去毛各一兩半天門冬去心生地黃酒洗麥門冬去心知母酒炒去毛貝母去心當歸酒洗香附米童便浸炒各二兩上為細末煉蜜為丸如梧桐子大每服百丸空心鹽湯下痰吐淡薑湯下烏骨雞丸治婦人虛弱咳嗽吐痰或骨蒸勞熱或赤白帶下或經水不調形體瘦倦無力或口乾舌燥人參去蘆五錢當歸酒洗熟地薑汁浸焙白芍酒炒白茯苓去皮各一兩香附童便浸炒一兩川芎陳皮秦艽玄胡索貝母去心牡丹皮七錢甘草五錢上俱銼成飲片聽用用黃耆為末拌飯喂鳥雞喂至肌肥眼生眵縊死燥去毛破開取出腸胃好酒洗淨入前藥飲片在雞肚內線縫住用酒醋等分煮雞爛如泥撈起焙乾或曬乾為細末將雞汁打麵糊為丸如梧桐子大每服五十丸空心清米湯吞服一婦人為哭母吐血咳嗽發熱盜汗經水不行此悲傷肺思傷脾朝服補中益氣加桔梗貝母知母夕服歸脾湯方見健忘送下六味丸而愈一女子懷抱素郁胸滿食少吐血面赤用六味丸及歸脾加山梔貝母芍藥而愈一婦人素勤苦冬初咳嗽發熱吐血盜汗遍身作痛或寒熱往來用化痰降火之藥口噤筋攣此血本虛而藥復損之耳予用八味丸為主佐以補中益氣麥門五味山藥年餘而愈一婦人患勞嗽不時發熱或時寒熱或用清熱之劑其熱益甚盜汗口乾兩足如炙遍身皆熱昏憒如醉良久熱止方蘇或晡熱至旦方止此陰血虛而陽氣弱也余朝用六味丸一料夕用十全大補湯月餘諸症稍愈更兼以補中益氣兩月餘而痊愈以上方俱見補益求嗣脈求嗣之脈專責於尺右尺偏旺火動好色左尺偏旺陰虛非福唯沉滑勻易為生息微澀精清兼遲冷極若見微澀入房無力女不好生亦尺脈澀一氣既分兩儀肇判萬物之中而唯人最靈通天地之幽微達聖賢之蘊奧審神仙之法術窮造化之根源無所不知矣自盤古及今逮羲農之為帝分陰陽運會之源流有夫婦人倫之道理故普天率土之姓貴賤窮達之人無子覆宗絕嗣者寧不惻然而痛哉則夫男女之生本陰陽自然之奧理若非智術勉強之為也但世情早立嗣者以為常未立嗣者以為變滔瀆鬼神齋僧布施以求獲嗣其愚甚矣其實萬戶之候無能以繼百畝之田無後孰能與守是誠可悲也無嗣有不動心求者寡矣故孟子曰不孝有三無後為大誠哉是言也求嗣者不若求之於己其理甚明人所易曉愚竊聞黃帝之論驗百家之仙方秘訣雖乃不經之言是或一種之道唯取其生育立昭之理胎月合配之妙虛陰老陽之說其道專生乎男其訣不生乎瘡疹其子且壽而弗夭胎連生女而轉男乏嗣者效之每每經驗百無二謬好事者潛心於此不唯得嗣子凡興陽採戰固精取藥養身之術無不在其中矣豈指專論事而已哉人間大道乃我眾仙師之秘訣誠不可輕泄而易露也珍之重之軒轅曰婦人有徹老不生男女者何也多因房事損動臟腑或天癸不通子宮挾寒或男子事狂陽弱精少清寒不能射又不能濟而相勝此所以不生長故也或有正生產當年便斷六七年數歲不生何也亦由女人上有數疾勞損身體以致經脈不調雖有亦微弱亦難以容納陽精如主請客而無備客來多而不管待此賓主不能相歡客何以久留此又難以生長也須要陽事舉經脈勻子宮暖精純熟且壯射而相濟然後可成故足月生者中道不足月生者貧薄過月生者其子貴重決矣交合月日時刻佳期論凡女人生長十三歲為始至四十九歲為終五十歲生者四十九歲受胎來也每年十二月有生男生女之月不同按婦歲數有三十七圖交合可揀生男之月以待婦人經水來時有兩日半淨者三日淨者亦有女人血旺氣盛六七日淨者不可拘定但觀寶田看經水之顏色何如耳乃以潔白之物或綿或帛夾之於戶口取而目之金色者乃佳期也鮮紅者未淨不及也淺淡者太過也唯以敗血去淨新血生如金者為佳期此時交合無不成矣若先期而交者縱便施精則金水太盛子宮淤塞且無受精之處胎亦難成後期而交者則子宮已閉施精亦無門而入胎豈有成也哉所謂敗血已淨子宮空虛新血復生正等陽時乃是乾道之日以此時施精如爐鍊金如漿點腐立胎個個成矣又云經水淨後單日下種則成男雙日下種則成女四日以後不成矣施精亦要在子時後方可也蓋子時後夜氣清明一陽發生古語云一陽動處外興工是也此時施精順則成人也此時修煉逆則成丹也此時再遇天晴月朗風日清和又是成定吉日又逢天月二德合日行房不唯成子而子且貴神氣清秀聰明必過人矣或揀生女月交合卻生男揀生男月交合卻生女何也蓋陰陽運會之差以致胎氣之錯如女胎當以男名喚男胎當以女名喚易名呼喚可保長生矣結胎交合妙訣美子要摘金丹先要點穴動情結胎若要都成須明交合之道要興陽要動情要耐戰要採藥要頓挫要斟酌要謹慎要用功然後胎可成未交之先要種子先將紅印紙剪下燒灰用無根水調女人面東服之然後交接使夫婦各飲微醺乃有興趣或以言語引戲手足撫摩挑挽皮面相猥女人面赤用手抱摟可見欲動矣如男子陽事未舉卻取月華秀氣以意運下興陽再戰蟠桃煨爐鑄劍走馬撫琴以招鳳至然後交合望鳳而進龜第一要藏神只可體交不可神交令鼎氣端睡正臥甚勿偏斜如泄精卻用五字之訣鈞縮提吸閉以使神於利害怒惡之地進退交合以待女人樂生果見目瞑身顫兩頰赤熱鼻口涼氣兩手若緊抱美子亦開弓鼻口接吸女人真氣卻用神交著力深入直撞鳳凰靈臺女人肢體不收滑精流溢此則女子快美之極子宮正開之際男子亦泄精陽先至裹陰定生女陰先降包陽定生男此所謂陰陽固濟相盛一種一子百種百男胎皆成也切記泄精之時猛咬女人上唇令其自驚仍用男呼女吸如忍大小便之狀則精始混融而成胎矣殊不知子宮有一穴男在左穴女在右穴入爐偏於左施精亦在於左交合畢令女人穩睡勿動屈左足而左側臥者男胎多成若屈右足而右側臥而女胎多成頓飲時節不可動身如交之時令鼎器先去小便交後不可小解此胎定成無錯矣且若不用壯陽敗陰之手段假若陰盛之婦而遇衰老之夫將何以使陰精之先至而必於生男哉胎成禁忌秘訣胎既成矣則陰陽之精且純渾融一氣已無雜氣脈精血蕊嫩而未老動之易克而易化第恐風邪感入損傷胎氣切忌復後連交挾持重物過險超壑深怒大笑大驚高語是何也蓋以胎嬰之結一月如白露二月如桃花三月之後男女分可當靜以守之逸以待之故曰靜而有常故也且如連交一次則胎息反被動搖感受風邪入於子宮譬如果木開花若遇風寒霧露花定不能結果縱有結成必定生蟲風落結胎後若要連交亦不能以成子耳縱有一成亦不能以結實完真非小產則臍風非生蟲落而何將產若連交則胎受毒穢產後滿頭生瘡之必然也慎之忌之未及三月轉女成男妙訣東南桃枝作斧柄親夫張目自作成孕婦床下刀向上無人見之男孕成若置抱雞巢下安滿巢盡是雞之雄也雄黃一塊墜騎當真陽朝上產仙郎宜男萱草發左簪此花珮帶產兒童弓弦繫腰百日間轉女成男有萬千夫發手足指甲剪身鋪席下男即轉雄雞長尾扯二莖插安床下男即定軒轅野云傳至今此訣種種皆曾應人倫大道是真訣不遇明傳莫與命畫八卦算生男女訣父母之年上下舉坐胎之月為中主乾坎艮震定是男巽離坤兌決是女算男卻生女三六九歲死算女卻生男終久鬼來纏若是正胎者壽考不須言婦人之道始於求子求子之法莫先調經每見婦人無子者其經必或前或後或多或少或將行作痛或行後作痛或紫或黑或淡或凝而不調不調則血氣乖爭不能成矣婦人無子多因血氣俱虛不能攝養精神故也肥人痰多軀脂滿溢閉塞子宮治消痰養血順氣四物湯加白朮茯苓陳皮枳實半夏砂仁香附甘草竹瀝瘦人火多子宮乾燥無血治宜清熱補血四物湯加人參茯苓黃芩山梔香附生地甘草陳皮調經種玉湯調經種子百發百中當歸酒洗川芎各四錢熟地黃六錢香附炒六錢白芍酒炒三錢白茯苓去皮三錢陳皮三錢吳茱萸炒四錢牡丹皮玄胡索各三錢若過期而經水色淡者乃血虛有寒也加官桂炒乾薑熟艾各二錢若先期三五日色紫者加條芩三錢上銼作四劑每一劑用生薑三片水一碗半煎至一碗空心溫服渣再煎臨臥服待經至之日服起一日一服藥盡經止則當交媾即成孕矣縱未成孕經當對期候經來再服四劑必孕無疑矣種子濟陰丹常服順氣養血調經脈益子宮療腹痛除帶下種子屢驗香附米四兩四制一兩醋一兩酒一兩米泔一兩童便各浸三日焙乾為末益母草二兩當歸酒洗一兩半川芎一兩白芍鹽酒炒一兩三錢熟地黃二兩薑汁炒陳皮去白一兩半夏薑汁浸香油炒一兩白朮去蘆土炒一兩半阿膠蛤粉炒成珠一兩艾葉醋煮一錢條芩酒炒一兩麥門冬去心一兩沒藥五錢牡丹皮酒洗一兩川續斷酒洗一兩小茴鹽酒炒五錢玄胡索四錢吳茱萸炮炒五錢炙甘草二錢白茯苓去皮一兩上為細末酒糊為丸如梧桐子大每服百丸空心米湯下螽斯勝寶丸治婦人經水不調臍腹冷痛赤白帶下一切虛寒之疾久無子嗣服之即孕屢用屢驗黃耆蜜炙人參去蘆白朮去蘆白茯苓去皮當歸酒洗川芎白芍酒炒肉桂大附子麵裹火煨去皮乾薑炒胡椒小茴香鹽酒炒破故紙酒炒艾葉醋炒烏藥炒以上各二兩吳茱萸三兩鹽水炒香附六兩醋炒蒼朮四兩米泔浸炒甘草炙一兩上銼作片用白毛烏骨雞一隻重一斤半或二斤者吊死水泡去毛腸屎並頭腳翼尖不用將雞放砂鍋里將前藥片蓋上入好酒煮爛為度取去骨同藥在鍋焙乾為末將煮雞酒汁打稀米糊為丸如梧桐子大每服五十丸空心好酒吞下女金丹當歸酒洗川芎白芍酒炒人參去蘆白朮去蘆白茯苓去皮桂心藁本白薇白芷牡丹皮赤石脂另研玄胡索沒藥另研甘草各等分上各等分除石脂沒藥另研其餘皆以醇酒浸三日烘乾曬亦可為末足秤十五兩外用香附米去皮毛以水醋浸三日略炒為末足秤十五兩上共十二味和合重羅篩過煉蜜為丸如彈子大瓷器收封每取七丸空心雞未鳴時服一丸先以薄荷湯或茶灌漱咽喉後細嚼以溫酒或白湯送下咸物乾果壓之服至四十九丸為一劑以癸水調平受孕為度孕中三日一丸產後二日一丸百日上盡人事而不孕焉天矣一方去沒藥加沉香治婦人久虛無子及胎前產後一切病患男子積年血氣手足麻痹半身不遂血崩帶下產後腹中結痛吐逆心痛並婦人諸虛不足心腹疼痛並治一方去桂用熟地黃丸如梧桐子大每服五十丸空心溫酒或白湯送下乾物壓之百子建中丸女人服此藥調經養血安胎順氣不問胎前產後月事參差有餘不足諸症悉皆治之真阿膠二兩蛤粉炒成珠蘄艾葉二兩去筋梗醋煮汁香附米十二兩杵去皮毛醋浸炒乾熟地黃薑汁浸焙二兩南川芎二兩白芍藥酒炒二兩當歸酒洗二兩上為細末煉蜜為丸如梧桐子大每服八十丸空心白沸湯點醋少許下內寒者溫酒下六味地黃丸方見補益治婦人久無孕育者加香附二兩童便炒用殊效男子無嗣必用之藥固本健陽丹凡人無子多是精血清冷或稟賦薄弱間有壯盛者亦是房勞過甚以致腎水欠旺不能直射子宮故令無子豈可盡歸咎於血之不足與虛寒耶妊娠脈妊孕初時寸微五至二部平勻久按不晰妊孕三月陰搏於陽氣衰血旺脈正相當肝橫肺弱心滑而洪尺滑帶散久按益強或關滑大代止尤忙洪且脈遲其胎必傷四月辨質右女左男或浮或沉疾大實兼左右俱盛胎有二三更審經脈陰陽可參但疾不散五月懷耽太急太緩腫漏為殃六七月來胎喜實長沉遲而澀墮胎當防脈弦寒熱當暖子房八月弦實沉細非良少陰微緊兩胎一傷勞力驚怔胎血難藏衝心悶痛色青必亡足月脈亂反是吉祥經脈不行已經三月者尺脈不止則是胎也驗胎散川芎為末每服一錢空心艾葉煎湯調下覺腹內微動則有胎也若服後一日不動非胎必是經閉艾醋湯如憑月難明有無如月數未足難明用好醋絞艾服半盞後腹中番大痛是有孕不為痛定無安胎者養血健脾清熱也素有熱者宜當歸二錢川芎一錢半生地一錢益母草一錢白朮二錢條芩一錢砂仁八分香附米童便炒一錢蘇梗一錢黃連炒八分甘草三分上銼一劑生薑三片水煎溫服安胎丸妊娠常宜服之當歸川芎白芍條芩各一兩白朮去蘆五錢上為末酒糊丸如梧桐子大每服五十丸茶湯任下空心服日進三服此方養血清熱之藥也瘦人血少有熱胎動不安素慣半產者皆宜服之以清其源而後無患也素虛弱者宜芎歸補中湯治婦人懷孕血氣虛弱不能榮養以致數月而墮名半產黃耆蜜炙人參白朮當歸川芎白芍酒炒乾薑煨炒阿膠炒五味子杜仲酒炒木香甘草上銼劑水煎服千金保胎丸凡女人受胎經二月而胎墮者雖氣血不足乃中衝脈有傷中衝脈即陽明胃脈供應胎孕至此時必須節飲食絕欲戒怒庶免小產之患服此可以保全當歸酒洗二兩川芎一兩熟地薑汁炒四兩阿膠蛤粉炒二兩艾葉醋煮砂仁炒五錢條芩炒二兩益母草二兩杜仲去粗皮薑汁酒炒四兩白朮土炒四兩陳皮一兩續斷酒洗一兩香附米二兩酒醋鹽水童便各浸二日炒上為細末煮棗肉為丸如梧桐子大每服百丸空心米湯下惡阻者噁心阻其飲食也當歸白芍煨陳皮香附炒白朮去蘆半夏薑湯泡香油炒過不傷胎氣白茯苓去皮藿香神麯炒砂仁各等分甘草減半上銼劑生薑三片棗一枚水煎溫服子煩者心神悶亂也白茯苓去皮二兩防風一錢麥門冬去心黃芩各一錢半上銼一劑竹葉五片水煎服子癇者目吊口噤也當歸川芎防風獨活茯苓五加皮薏苡仁杏仁酸棗仁木香羚羊角甘草上銼一劑生薑五片水煎服子懸者心胃脹痛也胎前諸病總宜此方加減當歸川芎白芍人參紫蘇陳皮大腹皮水洗甘草上銼一劑生薑五片蔥白七寸同煎服腹痛加香附木香咳嗽加枳殼桑白皮熱加條芩嘔加砂仁瀉加白朮茯苓子腫者面目虛浮也當歸川芎白芍地黃茯苓澤瀉白朮條芩梔子麥門冬厚朴甘草上銼劑水煎溫服子氣者兩足浮腫也天仙藤即青木藤洗略炒紫蘇陳皮香附烏藥木香甘草上銼生薑煎服加蒼朮尤良子淋者小便澀少也麥門冬赤茯苓木通淡竹葉上銼水煎空心服轉胞者卒不得小便也冬葵子五錢山梔子五錢木通三錢滑石五錢上銼一劑水煎溫服外用山梔子冬葵子滑石為末田螺肉搗膏或生蔥汁調膏貼臍中立通崩漏者屬血虛漏下也芎歸湯治胎漏下血不止或心腹脹一服立效當歸尾川芎各五錢上銼一劑酒煎入童便一盞同煎服膠艾四物湯一名安胎飲治胎漏下血腹痛當歸川芎白芍酒炒熟地阿膠炒條芩白朮去蘆砂仁香附炒艾葉少許上銼劑糯米一撮水煎空心服胎動者因有所傷也佛手散治妊娠五七個月因事築磕著胎或子死腹中惡露下痛不已口噤欲絕用此藥探之若不損則痛止子母俱安若胎損即便遂下當歸六錢川芎四錢益母草五錢上銼一劑水煎入酒一盞再煎一沸溫服如人約行五里再進一服胎逆喘急者火動也條芩香附上各等分為末每服二錢白湯調下妊娠傷寒護胎法井底泥青黛伏龍肝上為末攪勻塗於孕婦臍中二寸許如干再塗上以保胎孕也一妊婦下血服涼血之藥下血益甚食少體倦此脾氣虛而不能攝血余用補中益氣湯而愈後因怒而寒熱其血仍下此肝火旺而血沸騰用加味逍遙散血止用補中益氣湯而安一妊婦下血發熱作渴食少體倦屬脾氣虛而肝火所侮用四君加柴胡山梔血止因怒復作用六君加柴胡山梔升麻而安一妊婦胎六月體倦懶食面黃晡熱而胎不長因勞欲墜此脾氣不足也用八珍湯倍加參朮茯苓三十餘劑脾胃漸健胎安而長矣一妊婦墮胎昏潰不時吐痰自用養血化痰之劑昏憒不省自汗發搐痰涎壅出彼以為中風欲用祛風化痰予曰此屬脾氣虛寒所致遂用十全大補湯加炮姜二十餘劑尋愈一妊婦因怒吐血兩脅脹痛小便淋澀此怒而血蓄於上隨火出也用小柴胡合四物四劑血止用六君子安胎飲調理而安一婦人經閉八月肚腹漸大面色或青或黃用胎症之藥不應余診視之曰面青脈澀寒熱往來肝經血病也此鬱怒傷脾肝之症非胎也不信仍用治胎散不驗余用加味歸脾逍遙二藥各二十餘劑諸症稍愈彼欲速效別服通經丸一服下血昏憒自汗惡寒手足俱冷嘔吐不食余用人參炮姜二劑漸愈又用十全大補湯五十餘劑而安以上俱見補益劉尚書寵夫人有孕患惡阻嘔吐不止飲食不下心中煩躁頭目眩暈諸醫以和脾胃之藥二陳湯藿香正氣散保生湯之類遍投罔效余診左脈微數氣口數此血虛氣盛有火也若不養血則火不降火不降則嘔不止以茯苓補心湯加薑汁炒黃連竹茹二服痊愈一婦人每懷孕至三個月必墮不肯服藥余以四五年老母雞煮湯入紅谷小黃米煮粥食之不數次而胎固至月滿而生男產育脈臨產六至脈號離經或沉細滑若無即生浮大難產寒熱又頓此時凶候急於色徵面頰唇舌忌黑與青面赤母活子命必傾若胎在腹子母歸冥夫產育之難者此由產婦不曾預聞講說生育道理臨事愴惶用力失宜遂有難產之患是故有逆產者則先露足有橫產者則手先露坐產者則先露其臀此皆用力太早之過夫當臍腹疼痛之初兒身才轉而未順用力一逼遂致橫逆若手足先露者用針刺兒手足心一二分深三四刺之以鹽塗其上輕輕送入兒得痛驚轉一縮即順生矣或先足下者謂踏蓮花生急以鹽塗兒腳底又可急搔之並以鹽摩母腹上則正生矣凡胎衣不下乃母生兒訖流血入衣中衣為血所脹故不得下治之稍緩脹滿腹中以次上衝心胸痛疼喘急必致危篤若偶得此症急系臍帶急斷之以物墜住使其子血脈不潮入胞中則胞衣自當痿縮而下縱淹延數日亦不害人只要產母心懷安泰不可輕信穩婆妄用手法多因此而損者良可嘆哉又胞衣不下因產母元氣衰薄者用芎歸倍桂以溫之自下凡妊婦欲產痛陣尚疏經三兩日不生或產母氣之委頓產道乾澀致令難產才覺腹痛但破水後便可服以五積散加杏仁七粒木香磨順流水薑棗煎調百草霜末一錢服之未經破水者勿服凡生產先知此十證庶免子母之命折於無辜也世之救生者少有精良妙手多致傾命余因傷痛而備言之一曰正產正產者言懷胎十月陰陽氣足忽然作陣疼痛胎至穀道漿破血下兒即正產二日傷產傷產者言懷胎未足月有所傷動以致忽然臍腹疼痛或服催藥過早或產母努力太早逼兒錯路不能正生凡分娩須待兒身轉順頭對產門努力一送兒即正生三曰催生催生者言欲產時兒頭至產門方眼藥催之或經日久產母困倦難生宜服藥以助其血氣令兒速生四曰凍產凍產者言天氣寒冷產母血氣遲滯兒不能速生故衣裳宜厚產室宜暖背心亦宜溫和庶兒易生五曰熱產熱產者言盛暑之月產婦當溫涼得宜熱甚產母則頭疼面赤昏暈若產室人眾熱氣蒸逼亦致前患名曰血暈若夏月風涼陰雨亦當謹避六曰橫產橫產者言兒方轉身產母用力逼之故也凡產母當令安然仰臥穩婆先推兒身順直頭對產門以中指探其肩不令臍帶羈扳方用藥催之繼以產母努力兒即生七曰倒產倒產者言兒未能轉身產母努力故也當令產母仰臥穩婆推入候兒自順若良久不生令穩婆手入產戶一邊撥兒轉順近產門卻服催藥並努力即下八曰偏產偏產者言兒回身未順生路產母努力逼兒頭偏一邊產雖露頂非也乃額角耳當令產母仰臥穩婆輕手正其頭向產門卻令產母努力子即下若兒頂後骨偏在穀道露額令穩婆以綿衣炙暖裹手於穀道外傍輕手推正令產母努力兒即生九曰礙產礙產者言兒身已順門路已正兒頭已露因兒轉身臍帶絆其肩以致不能生令產母仰臥穩婆輕推兒向上以中指按兒肩脫臍帶仍令兒身正順產母努力兒即生十曰坐產坐產者言兒之欲生當從高處牢系手巾一條令產母以手攀之輕輕屈坐令兒生下不可坐抵兒生路十一曰盤腸產趙都運恭人每臨產則子腸先出然後產子其腸不收名曰盤腸穩婆以醋水半盞默然噀產婦面背方收不可不知子死腹中夫子死腹中者多因驚動太早或觸犯禁或抱腰太重或頻探試水胎衣先破血水先盡而胎乾涸故耳其候產母唇舌青黑者子母俱死若舌黑或脹悶甚者然其子已死矣先以平胃散一兩酒水各半煎卻投朴硝半兩即熟皮硝服或用硝一兩以童便調下亦妙平胃散蒼朮米泔浸陳皮厚朴薑汁炒甘草上銼一劑酒水煎加朴硝再煎一二沸溫服如因難產或大寒時急以大油紙捻徐徐斷其臍帶雖兒已死令暖氣入腹多得復生切不可用刀斷之產生難者燥澀緊斂也催生只用芎歸湯最穩當又效捷催生飲當歸川芎大腹皮洗枳殼麩炒白芷各等分上銼一劑水煎溫服此五味下胎催生立應柞木飲催生亦治橫生逆產死胎爛脹不下者服之立下如神柞木生枝如小指大者一握淨洗銼碎一葉一刺處處有之甘草五寸上銼一大劑水一碗半砂鍋內紙二重密封慢火煎至一半候產母腹痛甚時溫飲一杯不過一二服覺下重即生催生湯候產母腹痛腰痛見胞漿水下方服桃仁炒去皮赤芍牡丹皮淨官桂白茯苓去皮各一錢上銼一劑水煎熱服如神散催生屢效靈妙於理固難通於事實殊效臨產時令人路上尋草鞋一隻取耳燒灰溫酒調下三錢如得左足者生男右足者生女復者兒死側者有驚此藥委是神奇催生散治難產並胞衣不下白芷伏龍肝百草霜滑石各等分甘草減半上為細末用芎歸湯入酒童便少許調前末服之二次立效脫衣散治胞衣不下川牛膝三錢歸尾二錢木通三錢滑石四錢冬葵子二錢半加枳殼二錢上銼劑水煎熱服有胞衣不下因產母元氣虛薄者用芎歸倍桂以溫之自下補遺方治婦人難產用蛇蛻一錢焙存性為末黃酒調下即生治橫生逆產服諸符藥不下者灸右足小指尖頭三炷艾炷如小麥大治死胎不出麝香五分另研官桂末三錢作一服黃酒調下須臾如手推下效治胎死腹中疼痛不已鹿角燒灰存性為末每服三錢溫黃酒送下一孕婦交骨不開產門不閉皆由元氣虛弱胎前失於調攝以致血氣不能運達而然也交骨不開陰氣虛也用加味芎歸湯補中益氣湯產門不閉氣血虛也用十全大補湯加味芎歸湯即芎歸各一兩加自死龜板一個酥炙婦人頭髮一握燒存性為散每服五錢水煎服如人行五里即生如胎死亦下灼過龜板亦可小產小產重於大產將息當過十倍大產乃慄熟自脫小產如採生慄破其皮殼去其根蒂非自然者蓋胎臟損傷胞系腐爛然後胎墮豈不過於大產但多以小產為輕以致損命大抵小產宜補血生肌肉養臟氣生新血去瘀血補氣養血湯治小產氣虛下血不止人參黃耆蜜炒當歸白朮去蘆白芍藥酒炒艾葉炙甘草阿膠炒川芎青皮去瓤香附炒砂仁各等分上銼一劑水二盞煎至一盞去渣溫服補血定痛湯當歸川芎熟地白芍酒炒各一錢玄胡索七分桃仁去皮研細紅花各三分香附青皮炒澤蘭牡丹皮各五分上銼一劑用水一盞半入童便酒各一盞半煎至一盞溫服若以手按腹愈痛此是瘀血為患宜用此藥若按之反不痛此是血虛宜用四物湯參苓白朮若痛而作瀉此是脾虛宜六君子加破故紙炒肉豆蔻煨薑棗煎服產後脈產後緩滑沉細亦宜實大弦牢澀疾皆危婦人產畢飲熱酒童便共一鍾閉目少坐上床倚高立膝仰臥不時喚醒及以醋塗鼻或用醋澆炭及燒漆器更以手從心捍至臍下使惡露不滯如此三日以防血暈血逆酒雖行血亦不可多恐引血入四肢且能昏暈宜頻食白粥少許一月之後宜食羊肉豬蹄少許仍慎言語七情寒暑梳頭洗足以百日為度若氣血素弱者不計日月否則患手足腰腿痠疼等症名曰蓐勞最難治療初產時不可問是男女恐因言語而泄氣或以愛憎而動氣皆能致病不可獨宿恐致虛驚不可刮舌恐傷心氣不可刷齒恐致血逆須血氣平復方可治事犯時微若秋毫或病重如山嶽可不戒哉產後諸疾以末治之大補氣血為主也芎歸補血湯治產後一切諸病氣血虛損脾胃怯弱或惡露不行或去血過多或飲食失節或怒氣相沖以致發熱惡寒自汗口乾心煩喘急心腹疼痛脅肋脹滿頭暈眼花耳鳴口噤不語昏憒等症當歸川芎白朮去蘆白茯苓去皮熟地黃陳皮烏藥香附童便炒乾薑炒黑益母草牡丹皮甘草上銼一劑生薑一片棗一枚水煎溫服看病加減於後一產後惡寒發熱頭疼體痛脈大無力者是氣血俱虛也依本方加人參黃耆去川芎牡丹皮益母草一產後早起勞動發熱惡寒依本方加人參黃耆一產後惡露不盡胸腹飽悶疼痛或腹中有塊惡寒發熱有惡血也依本方加桃仁紅花肉桂牛膝枳殼木香玄胡索童便薑汁少許去熟地黃一惡血去後腹不滿不硬不痛但虛熱不退依本方加人參去牡丹皮益母草一產後惡露不盡瘀血上衝昏迷不醒腹滿硬痛者當去惡血依本方加桃仁紅花肉桂玄胡索牛膝童便薑汁少許一產後腹軟滿不硬痛者不是瘀血乃是脾虛故也依本方加人參砂仁厚朴去益母草牡丹皮一產後惡露不盡敗血流入肝胃二經或腹脅刺痛或發腫滿依本方加遠志紅花厚朴玄胡肉桂青皮木香去熟地久不愈成血鼓一產後血去不止是血虛血熱依本方加人參黃耆生地黃炒梔子荊芥阿膠烏梅去益母草牡丹皮烏藥血甚不止加地榆次茅根汁磨墨調血久不止成血崩服五灰散方見血崩一產後去血過多大腸乾燥無血大便閉結不通依本方加麻黃生地桃仁杏仁黃芩枳殼厚朴紅花去川芎白朮茯苓烏藥乾薑益母草陳皮一產後氣大脫血虛極昏暈不醒者切不可驚哭叫動則驚散真氣乘昏暈死可用熱米湯布按元氣復醒依本方加人參黃耆去牡丹皮益母烏藥先將熱醋熏即醒一產後泄瀉脾虛發腫依本方加人參蒼朮厚朴砂仁豬苓木通大腹皮白芍炒去熟地黃川芎烏藥益母草牡丹皮瀉甚不止加肉蔻柯子烏梅去厚朴久不愈成產後脾瀉中滿一產後食傷脾胃飽悶泄瀉後變痢者難治依本方加砂仁木香山藥蒼朮厚朴白芍炒去熟地川芎益母草牡丹皮烏藥瀉甚不止加肉蔻訶子煨烏梅去厚朴木通一產後噁心嘔噦不止若去血過多乃是脾胃虛寒血少之故依本方加人參半夏烏梅去益母草牡丹皮香附烏藥一產後惡露去少嘔噦噁心胸脹或胸膈疼痛是惡血沖胃依本方加肉桂砂仁厚朴紅花去熟地白朮茯苓一產後因怒傷肝胸脅刺痛飽脹不進飲食發熱依本方加砂仁木香厚朴青皮玄胡索茴香去熟地黃白朮茯苓益母草牡丹皮一產後血虛發煩躁虛驚睡臥不寧錯語失神依本方加人參酸棗仁竹茹炒山梔麥門冬辰砂去烏藥牡丹皮益母草乾薑一產後口眼喎斜手足牽引或筋惕肉瞤或驚悸戰掉不止或作寒熱脈或大無力或虛細皆是氣血俱虛不能榮養筋脈依本方加人參黃耆辰砂去烏藥乾薑益母草牡丹皮若脈來浮緊有力恐血虛中風本方去黃耆辰砂加防風荊芥羌活不可全作風治以風散氣誤矣有痰加竹瀝薑汁少許半夏姜炒去黃耆二三服藥除防風荊芥羌活依本方加減調理一產後心血空虛神無所依或因悲思鬱結怒氣憂驚驚則神舍空舍空則生痰是神不守舍使人驚狂煩亂時罵欲走悲歌妄笑頭搖手戰依本方加人參竹茹酸棗仁麥門冬山梔貝母枳實辰砂竹瀝薑汁去川芎烏藥乾薑益母草牡丹皮產後血少脾虛生痰痰迷心竅使人昏迷不能言語依本方加栝蔞貝母枳實人參菖蒲桔梗竹瀝薑汁少許去香附烏藥乾薑益母草牡丹皮一產後心血空虛心無血養口不能言精神短少依本方加人參酸棗仁石菖蒲遠志茯神生地桔梗麥門竹瀝薑汁少許去牡丹益母烏藥乾薑香附一產後去血過多血虛發腫者依本方加砂仁大腹皮厚朴豬苓木通去牡丹皮益母草烏藥乾薑一產後惡血去不止流入脾經發腫滿者依本方加紅花大腹皮厚朴砂仁木香豬苓木通去益母草烏藥白朮茯苓一產後脾虛飽悶不進飲食依本方加砂仁白豆蔻厚朴益智木香去川芎益母牡丹皮烏藥乾薑一產後血虛煩渴不止津液枯竭依本方加人參麥門五味子天花粉葛根蓮肉烏梅白芍去川芎乾薑牡丹皮益母草烏藥香附一產後脾虛發痰喘氣急依本方加沉香木香蘇子厚朴白芍砂仁枳實貝母竹瀝薑汁少許去益母草牡丹皮乾薑白朮香附烏藥一產後因去血過多遍身骨節痛難轉側是血虛不能榮養筋骨依本方加生地黃白芍紅花人參牛膝乳香薄桂少許去益母草牡丹皮烏藥乾薑一產後因去血過多血虛發痓者依本方加黃耆人參生地白芍去益母牡丹皮薑汁烏藥發熱加柴胡黃芩少許有痰加栝蔞貝母枳實竹瀝薑汁少許去熟地黃一產後形體壯盛手足癱瘓遍身疼痛難以動縮者是血虛有風痰也依本方加貝母枳實薄桂牛膝炒黃芩羌活蒼朮白芍竹瀝薑汁少許去益母草牡丹皮乾薑烏藥白朮一產後初起腹中有塊升舉作痛無寒熱者俗雲兒枕七日痛自已或腹痛塊痛作寒熱者痛不移處是死血痛當去惡血痛自止矣一產後初起蒸乳發寒熱者依本方加枳實通草益母丸治婦人胎前產後或難產胎肥不下血暈不醒或惡露不盡俱可服之五月五日午時取益母草陰乾搗為細末煉蜜為丸如圓眼大每服一丸童便好酒各半研化服之不飲酒薑湯化下回生丹長葛孫奎亭經驗大黃一斤為末蘇木二兩銼用河水五碗煎汁三碗去渣不用存汁紅花三兩炒黃色入好酒一大壺同煮三五滾去紅花不用存汁用黑豆三升煮熟取汁三碗去豆不用只用豆汁先將大黃末以好米醋三四碗攪勻以文武火熬成膏如此二遍次下紅花酒蘇木湯黑豆汁攪開大黃膏入內又熬成膏取出如有鍋粑再焙乾入後藥當歸川芎熟地黃白茯苓去皮蒼朮米泔浸香附米烏藥玄胡索桃仁另研蒲黃牛膝去蘆各一兩白芍酒炒甘草陳皮木香三稜五靈脂羌活地榆山萸酒浸去核各五錢人參白朮去蘆青皮去穰木瓜各三錢良薑四錢乳香沒藥各一錢上為細末用大黃膏為丸如彈子大每服一丸酒頓化通口服若產後頭疼身熱有汗謂之傷風加桂枝末三分薑蔥煎湯頓化服之若產後頭疼身熱無汗謂之傷寒加麻黃末三分薑蔥煎湯頓化服之若產後無乳加天花粉三分當歸尾三分穿山甲炙三分黃連三分為末同入酒內化開不拘時服令乳母將乳頭揉千餘轉其乳如湧泉自出保生論回生丹功效養胎益血和子治妊婦失宜勞復胎動或胎漏惡露時下臟極寒久不成胎痿燥不長過期不產日月雖滿動作無力或致損墜產時未至惡露先下胞終枯燥致令難產或逆痼悶亂連日不產子死腹中腹上冰冷口唇青黑出冷沫惡露上攻昏悶不省喘促汗出及血未盡臍腹冷痛寒熱往來或因產勞虛損身羸而黃體瘦心怯盜汗飲食不進漸成勞疾八月常服壯氣養胎順產滋陰養血調和陰陽密腠理實臟腑治風虛實痼冷閨門寶鑑經驗醫方治妊婦胎前產後崩漏帶下室女絕閉月水不調第一子死腹如何答曰妊母因染熱病六七日經傳臟腑熱極以致子死腹中墜臍下不分離命在須臾急服回生丹三丸便生第二難產如何答曰緣胎氣已成子食母血臨月足余血化成塊俗呼為兒枕臨產時兒枕先破及將生時枕破血裹其子故難產但服此藥遂去敗血須臾自生橫生逆產同治第三產後胎衣不下如何答曰母子分解既訖母受其寒產血入胎衣中被血所脹此胎衣不下令人脹悶飲食不進去衣中敗血自然下矣第四產後血暈起止不得眼見黑花如何答曰產後三日血氣未定還走五臟奔克於肝醫人不識呼為暗風差矣宜此丹治之即愈第五產後口乾心悶如何答曰產後七日以來血氣未定因三日食麵面與血結積聚在心是以煩渴醫人不識呼為胸膈壅悶但服此藥萬無一失第六產後寒熱似瘧如何答曰產後虛羸血入於心肺熱入於脾胃則寒熱極反渴醫人不識呼為瘧疾誤傷產婦不可勝紀若服此救之百發百中第七產後四肢浮腫如何答曰敗血走注五臟轉滿四肢停留迴轉不得乃化為浮腫遂致四肢俱腫醫人不識遂呼為水腫與血腫不問水腫氣閉而小便澀血腫氣竭而四肢寒先服此丹去敗血後用利水氣藥第八產後血邪如見鬼神癲狂言語無度如何答曰產後敗血熱極衝心所以煩躁言語癲狂醫人不識呼為風邪若以風治之是庸醫誤人若急服此丹萬無一失第九產後失音不語如何答曰心有七孔三毛敗血衝心流入孔中被血所閉言語不得醫人不識呼為脫陽脫陽失音甚是為難無方下藥除不審視產婦敗血行與不行順與不順令血氣妄行流入心孔卻反為難語若服此萬無一失第十產後泄痢腹痛如何答曰妊婦未滿月誤食酸冷堅硬之物與血相搏流入大腸不得克化或泄膿血或作汙刺不得安穩但服此即愈第十一產後百節痠疼如何答曰生產妊婦百骨脂中開張產後余血流入經絡停留日久結聚不散壅滯虛脹是以百節痠疼醫不識此呼為濕症用藥誤損者多矣但服此丹二三服去其滯血即痊第十二產後小腸尿如雞肝如何答曰產婦月中調理失宜飲食不得應時兼以氣怒以致余血流入小腸閉卻水道是以小便澀結血似雞肝流入大腸閉卻肛門遂致大便澀難醫人不識呼為五臟淋瀝傷損心肝以致瘀血成塊形如雞肝殊不知敗血流入大腸閉塞水穀以致如此但服此藥立痊第十三產後下血似崩中如何答曰產後敗血惡露盡止之間亦當服藥以調五臟或食酸鹹之物寒熱不一因此榮衛不得調和以致腹中便作漏崩形如肝色渾身潮熱背膊拘急心中煩悶醫人不察云為崩下但婦人癸水將至暴下不止愆期過度故曰崩下產婦血氣正行失於保養以成此疾但服此丹其病即痊第十四產後胸膈氣滿嘔逆不定如何答曰產後血停於脾胃食充氣充心氣不安胸膈脹滿嘔吐偏多醫人不識呼為翻胃口不容受飲食故曰翻胃況妊婦血停於脾心氣相沖而為嘔逆如何謂之翻胃但服此丹三二丸百無一失第十五產後咳嗽寒熱往來如何答曰產後不能忌口食麵結痰為塊氣喘咳嗽四肢寒熱心悶口乾渾身煩躁睡夢多驚體虛無力經水不來名曰血閉腸痛面赤因此難治變作骨蒸治須仔細若服此丹不應盧醫不起第十六產後喉中似蟬聲如何答曰敗血沖遏於心轉入肺氣與血並結成塊入喉中作聲似蟬鳴人以為怪產得此病者十不救一第十七產後面黃舌乾鼻中流血遍身色點生斑如何答曰產後敗血入五臟六腑皆滿流入肌膚敗血出入流走四肢熱結流注傳送不得故有此疾可畏可慎產後有此十無一活但此疾百中無一二如遇此丹可保無虞第十八產後眼澀腰痛似角弓如何答曰產後百日之後方得脫體今在月中七日以來食麥爽口之物以致煩躁不得安寧因循不肯服藥調理兼百日之內過傷房事或久病或坐臥當風取其一時快樂殊不知產後血氣虧損倘一犯之則不能免此患也第十九產後小便澀大便不通如何答曰血入腸中誰得知小便淋瀝大便遲乍寒乍熱常多汗如醉如癡似鬼迷花發目前如碎錦病纏身內總成虛只消一粒回生藥產婦從今免困危產後諸疾補遺一產婦略聞音響其汗如水而昏憒諸藥到口即嘔余以為脾氣虛敗用參附末為細丸時含三五粒隨液嚥下乃漸加之至五錢許卻服參附湯而痊一產後生腸不收皆由氣虛血弱所以懸下但養氣和血其物自收用補中益氣湯去柴胡陳皮加川芎升提之用熱手心常熨腰肚氣暖其物自收一產婦陰脫腫痛脈滑數欲作膿也用十全大補湯而膿成又數劑而潰但小便頻數患處重墜此元氣虛而下陷也用補中益氣湯而尋愈一產婦生門不閉發熱惡寒用十全大補加五味數劑而熱退用補中益氣加五味數劑生門閉一產婦血崩因怒其血如湧仆地口噤目邪手足搐搦此肝經血耗生風余用六味丸一料諸症悉退但食少晡熱佐以四君子柴胡牡丹皮而愈一產婦泄瀉四肢面目浮腫喘促惡寒余謂脾肺虛寒用六君子加薑桂而泄瀉愈又補中益氣而脾胃健一產婦泄痢腹痛日久形體骨立內熱晡熱自汗盜汗口舌糜爛吐痰脈洪大重按全無此命門火衰脾土虛寒而不能攝痰歸元用八味丸補火以生土用補中益氣湯兼補肺金而痊一產婦牙關緊急腰脹背反張四肢抽搐兩目連札此血去過多元氣虧損陰火熾盛用十全大補湯加炮姜一劑而蘇數劑而安一產婦筋攣臂軟肌肉抽掣皆屬氣血虛用十全大補湯而痊以上諸方俱見補益乳病乳汁不通結核成餅不散寒熱作痛者宜速揉散乳汁亦通餅核自消如不消結成乳癰急用連須蔥搗成餅搭乳上用炭火一罐蓋蔥上須臾汗出立消乳汁不通者有盛有虛也盛宜桔梗二錢瞿麥柴胡天花粉各一錢通草七分青皮白芷木通赤芍連翹甘草上銼一劑水煎頻服更摩乳房虛宜王不留行木通天花粉當歸川芎白芍酒炒生地各等分上銼一劑用獖豬蹄膀肉四兩煎湯二鍾入藥同服先將蔥湯頻洗乳房湧泉散治乳汁不通不問虛盛先用木梳頻刮乳房後服藥效穿山甲炒白殭蠶炒肉豆蔻麵包煨熟各四錢皂角五錢胡桃仁去皮四兩芝麻外半斤上為細末每服不拘多少溫酒調下任意食之治乳汁不通王不留行天花粉甘草各三錢當歸穿山甲上為細末每服三錢豬蹄湯或熱酒調下其乳即通乳癰發痛者血脈凝注不散也天花粉金銀花皂角刺穿山甲土炒當歸尾白芷梢栝蔞仁貝母甘草節上銼酒煎服此方治吹乳乳癰痛腫不可忍者栝蔞散治婦人乳疽乳癰奶勞黃栝蔞子多者不去皮研爛當歸五錢乳香一錢研碎沒藥一錢研生甘草五錢上合一劑好酒三碗於銀石器中慢火熬至碗半分為二次食後服如有乳勞便服此藥杜絕病根如毒氣已成能化膿為黃水毒未成即內消疾甚者再合一服以愈為度婦人吹乳用黍子一合黃酒下即散治婦人吹乳硬腫身發熱憎寒疼痛難忍不進飲食者服之良驗鹿角一兩炭火煅存性為末分作二服先將末藥五錢入鍋次下無灰酒一碗滾數沸倒在碗內乘熱盡飲臨臥服汗出即安治吹乳仙方用蔥一大把搗成餅一指厚攤乳上用炭火一罐覆蔥上須臾汗出腫痛立消一產婦勞役忽乳汁如湧昏昧吐痰此陽氣虛而厥也灌以獨參湯而蘇更以十全大補湯而安方見補益一婦人血氣方盛乳房作脹或無兒飲脹痛憎寒發熱用麥芽二三兩炒熟水煎服立消其耗散氣如此何脾胃虛弱飲食不消方中多用之乳岩婦人乳岩始有核腫如鱉棋子大不痛不癢五七年方成瘡初便宜多服疏氣行血之藥須情思如意則可愈如成之後則如巖穴之凹或如人口有唇赤汁膿水浸淫胸腹氣攻疼痛用五灰膏去蠹肉生新肉漸漸收斂此疾多生於憂鬱積忿中年婦人未破者方可治成瘡者終不可治宜服十六味流氣飲十六味流氣飲治乳岩當歸川芎白芍黃耆人參官桂厚朴桔梗枳殼烏藥木香檳榔白芷防風紫蘇甘草乳癰加青皮亦治痘疹餘毒作癰瘤上銼一劑水煎食遠臨臥頻服婦人諸病婦人與鬼交通者由臟腑虛神不守舍故鬼氣得為病也其狀不欲見人如有對晤時獨言笑或時悲泣是也脈息遲伏或為鳥啄皆鬼邪為病也又脈來綿綿不知度數而顏色不變此亦是斯候也宜灸鬼哭穴以患人兩手拇指相併用線紮緊當合縫處半肉半甲間灼艾灸七壯若果是邪祟病者即乞求免灸云我自去矣茯神散治婦人與鬼交通妄有見聞言語雜亂白茯神一錢半白茯苓去皮人參石菖蒲各一錢赤小豆五分上銼一劑水煎服外用辟邪丹祛之方見瘟疫婦人傷寒發熱經水適來晝則明白夜則譫語如見鬼狀此為熱入血室也小柴胡湯方見傷寒依本方加生地黃一方用四物湯去熟地黃用生地黃加柴胡各等分煎服亦治此症婦人陰腫者是胞絡虛為風邪所客也黑白散治陰中腫痛小麥朴硝白礬五倍子蔥白上件煎湯頻洗一方用馬鞭草搗爛塗之婦人陰癢者是蟲蝕陰戶也治陰癢用蛇床子白礬煎水淋洗即止一方用牛肝或豬肝三寸納入陰中其蟲盡入肝內取出立效婦人陰中生瘡者是濕熱也療女人陰中生瘡杏仁雄黃礬石各二分麝香二分半上研細敷入陰中一方單用硫黃敷之亦效研細末一婦人素鬱悶陰內痛癢不時出水飲食少思肢體倦怠用歸脾湯加牡丹皮山梔芍藥柴胡生甘草主之而安一婦人病愈後小便出屎此陰盛失於傳送名大小腸交也先用五苓散二劑而愈又用補中益氣湯而安一婦人陰中寒冷小便澄清腹中亦冷飲食少思大便不實下元虛寒治以八味丸月餘飲食漸加大便漸實又月餘諸症悉痊一婦人每交接出血作痛此肝火動脾而不能攝血用補中益氣濟生歸脾二湯而愈若出血過多而見他症但用前藥調補脾肝一婦人陰中挺出一條五寸許悶痛重墜水出淋瀝小便澀滯夕與龍膽瀉肝湯分利濕熱朝與補中益氣湯升補脾氣諸症漸愈再服歸脾加山梔茯苓川芎黃柏間服調理而愈後因勞役或怒氣下部濕癢小便不利仍用前藥即愈亦有尺許者亦有生諸蟲物者皆用此治一婦人小便自遺或時不利日晡益甚此肝熱陰挺不能約制用六味丸料加白朮酒炒黑黃連七分知母五分數劑諸症悉愈若誤用分利之劑愈損真陰必致不起一婦人有孕小便不利小腹腫脹幾至於殞用八味丸一服小便淋瀝再以前丸之料加車前子一劑即利肚腹頓宛而安一妊婦無故自悲用大棗十枚甘草小麥各三兩分三劑水煎服而愈後復患又以前湯佐以四君子加山梔而安一婦人身顫振口妄言諸藥不效余以為鬱怒所致詢其故蓋為素嫌其夫而含怒久矣投以小柴胡湯稍可又用加味歸脾湯而愈一婦人驚悸怔忡無寐自汗盜汗怠惰嗜臥飲食不甘用歸脾湯而愈至年餘懷抱鬱結患前症兼衄血便血仍用前湯而愈一婦人忽昏憒發譫語自云為前生賴某人銀兩其神責我將你解往城隍理問兩腳踝膝臀處皆青腫痛不可忍口稱苦楚次日方蘇痛尚不止用金銀藤兩許水煎服即愈一女子年二十歲未婚每見男子即咬住不放後昏倒陰戶流出冷精頃間即醒其厥陰肝脈弦出寸口乃陰盛思男子不可得也余令其父母用棍痛責因思痛而失欲也後服抑陰丸而愈
