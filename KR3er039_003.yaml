body:
  text: 卷之三瘧疾脈瘧脈多弦弦而數者多熱宜汗之弦而遲者多寒宜溫之弦而緊實者宜下之弦而虛細者宜補之弦而實大者宜吐之弦短者多食弦滑者多痰瘧脈遲緩者病自愈久瘧不愈者脈必虛宜養正祛邪夫瘧者因外感風寒暑濕內傷飲食勞倦或飢飽色欲過度以致脾胃不和痰留中脘然無痰不成瘧脾胃屬土有信來去不失其時若移時或早或晚者是邪無容地瘧將好也瘧疾來時呵缺怕寒手足冷發寒戰大熱口渴頭痛腰胯骨節痠疼或先寒後熱或先熱後寒或單寒單熱或寒多熱少或熱多寒少一日一發受病淺也容易治間日發者或二日連發住一日者皆難痊治宜在表無汗者散邪湯為主有汗者正氣湯為主在半表半裡者柴苓湯為主分利陰陽而未已者人參養胃湯加減後方可截之若用截藥吐出黃膠水者瘧自愈也不可一二日早截早則邪氣閉塞而成壞症又不可遲截遲則元氣衰憊而成虛怯當在三四日就截為好須待熱退身涼方可飲食也切不可帶熱飲食恐不消而成痞一名瘧母痞散成鼓者有之矣大凡瘧初起者散邪正氣為先也無汗要有汗散邪為主散邪湯治瘧疾初發憎寒壯熱頭疼身痛無汗川芎白芷麻黃白芍防風去蘆荊芥紫蘇羌活各一錢甘草三分上銼一劑生薑三片蔥白三根水煎去渣露一宿次早溫服有痰加陳皮有濕加蒼朮夾食加香附有汗要無汗正氣為主正氣湯治瘧疾初發憎寒壯熱頭疼口乾有汗柴胡前胡川芎白芷半夏姜炒麥門冬去心檳榔草果去殼青皮去穰茯苓去皮各一錢桂枝甘草各三分上銼一劑生薑三片棗一枚水煎預先熱服瘧發寒熱作渴者宜分利陰陽也柴苓湯治瘧發寒熱病在半表半裡陰陽不分柴胡黃芩人參半夏豬苓澤瀉白朮茯苓肉桂甘草上銼一劑生薑三片棗一枚水煎服無汗加麻黃有汗加桂枝寒多加官桂熱多加黃芩虛人患瘧者養正邪自除也人參養胃湯治暴瘧初起服二帖後用人參截瘧飲加減截之人參茯苓去皮陳皮半夏薑汁炒厚朴薑汁炒蒼朮米泔浸藿香當歸川芎草果去殼各八分甘草三分烏梅一個上銼一劑生薑三片大棗一枚水煎溫服寒多加官桂熱多加柴胡汗多去蒼朮藿香川芎加白朮黃耆飽悶加青皮砂仁去人參渴加麥門冬知母去半夏瀉加炒白朮芍藥瀉不止加肉豆蔻去厚朴草果嘔噦加白朮山藥炒砂仁炒米去草果厚朴蒼朮痰多加貝母竹瀝去半夏草果內熱盛加炒黃芩去半夏長夏暑熱盛加香薷扁豆去半夏藿香人參竹瀝飲治虛瘧昏倦汗多痰盛舌大語言混雜不清脈虛大無力人參去蘆白朮去蘆茯苓去皮當歸生地黃酸棗仁炒麥門冬去心知母陳皮芍藥各一錢烏梅一個甘草三分上銼一劑生薑三片棗一枚水煎入竹瀝半盞薑汁少許同服風暑入陰在臟者喑瘧也柴胡芎歸湯治夜間陰瘧引出陽分則散後服人參截瘧飲止之柴胡桔梗去蘆當歸川芎芍藥人參厚朴薑汁炒白朮去蘆乾葛茯苓去皮陳皮各一錢紅花甘草各三分上銼一劑生薑一片棗二枚烏梅一個水煎食遠服人虛者截補兼用也人參截瘧飲治虛人截瘧一切瘧疾並可截之人參白朮去蘆茯苓去皮當歸青皮去穰麩炒厚朴薑汁炒柴胡黃芩知母去毛各八分桂枝三分常山酒浸草果去殼各八分鱉甲醋炙八分烏梅一個甘草三分上銼一劑生薑一片棗二枚桃腦七個水煎露一宿臨發日五更空心溫服渣待日午再煎服糖拌烏梅下藥切忌雞魚豆腐麵食及房勞怒氣戒之即痊此方俱照前人參養胃湯後開治加減法相同截瘧飲加酒少許尤妙人壯盛者宜單截也不二飲治一切新久寒熱瘧疾一劑截住神效常山檳榔要一雄一雌者重二錢余藥各二錢知母貝母各等分上銼每八錢酒一鍾煎至八分不可過熟熟則不效露一宿臨服日五更溫服勿令婦人煎藥常山七寶飲治壯健人瘧疾可截之常山草果去殼檳榔青皮去穰厚朴薑汁炒知母蒼朮米泔制各一錢鱉甲一錢烏梅一個甘草三分上銼一劑生薑一片桃腦七個水煎入酒少許露一宿臨發日五更溫服午間渣再煎服汗多加白朮去蒼朮熱多加柴胡黃芩寒多加桂枝口渴加麥門冬天花粉痰多加貝母瘧久不止者先截而後補也如聖散人參三錢常山三錢丁香二十四個甘草二分上為細末用好酒一鍾烏梅一個煎熟露一宿臨發日五更溫服用糖拌烏梅下藥時時可食之雄黃截瘧丸人言一錢雄黃三錢辰砂三錢甘草二錢緑豆粉一兩五錢上藥各為細末用緑豆粉打糊為丸如白豆大外用硃砂為衣臨發日五更井花水吞服二丸小兒一丸勿多服瘧以後者須調養血氣也參歸養榮丸治瘧疾截住後用此湯藥調養血氣人參當歸茯苓去皮白朮去蘆陳皮砂仁厚朴薑汁炒山藥炒蓮肉炒芍藥酒炒熟地黃甘草炙各等分上銼一劑大棗二枚水煎溫服瘧熱虛汗加黃耆去砂仁腹中有塊者瘧母也凡瘧發時切不可帶熱飲食恐不消而成痞塊痞散成鼓者有之矣參歸鱉甲湯治老瘧腹脅有塊成瘧母人參五分青皮去穰黃耆蜜水炒鱉甲醋炙當歸酒洗茯苓白朮去蘆厚朴薑汁炒香附撫芎各八分砂仁山楂去子枳實麩炒各五分甘草三分上銼一劑生薑一片棗二枚烏梅一個水煎食前溫服如制丸藥加阿魏醋煮化和前藥末再用水醋少許打糊為丸如梧桐子大每服三十丸空心米湯吞下十將軍丸治久瘧不瘥有瘧母者三稜炮莪朮生青皮去穰陳皮去白草果去殼砂仁檳榔烏梅肉半夏泡七次各一兩常山酒蒸二兩上先將常山草果二味銼用好酒醋各一碗入瓦器內先浸一宿後入八味藥同浸至晚入瓦銚內炭火煮取出曬乾若無日色用火焙乾為末半酒半醋打糊為丸如梧桐子大每服三四十丸白湯吞下日進三服忌生冷魚腥酸鹹油膩麵食炙爆諸死毒物服至四兩至八兩即除根凡有積聚及煙瘴濕地方更宜服之一方加蒼朮香附醋炒各一兩一平素虛弱兼以勞役內傷夾感寒暑以致瘧疾寒熱交作肢體倦怠乏力少氣用補中益氣湯加黃芩芍藥半夏有汗及寒重加桂枝倍黃耆熱盛倍柴胡黃芩渴加麥門冬天花粉大凡久瘧多屬元氣虛寒蓋氣虛則寒血虛則熱胃虛則惡寒脾虛則發熱陰火下流則寒熱交作或吐涎不食戰栗泄瀉手足厥冷皆脾胃虛弱但服補中益氣湯其諸證悉愈方見補益大抵久瘧氣血俱虛而三日一發者用十全大補湯蓋邪氣在陽分者淺而易治邪氣在陰分者深而難治方見補益一婦人瘧後形體骨立發熱惡寒自汗盜汗胸膈痞滿日飲米湯少許服參朮藥益脹臥床半年矣余以為陽氣虛寒用大劑補中益氣加附子一錢二劑諸症漸退飲食漸進又二劑痊愈方見補益痢疾脈痢脈多滑按之虛絶尺微無陰澀則少血沉細者生洪弦者死痢疾不分赤白俱作濕熱治之明矣赤屬血白屬氣赤白相兼膿血雜痢皆因脾胃失調飲食停滯積於腸胃之間多其暑濕傷脾故作痢疾起於肚腹疼痛大便裡急後重小水短赤不長身涼脈緩者易治身熱脈弦急者難治痢疾初起一二日元氣壯實者先用玄白散虛弱者用芍藥湯疏通積滯三四日以後元氣漸弱調和飲食加減治之如不止服參歸芍藥湯調理脾胃補益元氣久不愈方可服人參養臟湯加減治之切不可驟用粟殼等藥止塞太早恐內積氣未盡成休息痢亦恐毒攻上胸腹飽悶作疼噁心嘔噦發厄難治因毒氣攻胃故也先水瀉後膿血者是腎傳脾難愈先膿血後水瀉者是脾傳腎易愈又有痢下鮮血者如塵腐色者如屋漏水者大孔如竹筒者嘔噦發厄煩躁身熱者俱難治也如魚腦髓者身熱脈數大半生半死也大抵治痢疾一二日元氣未虛治宜疏通積滯此通因通用之法三四日後不可疏通恐元氣虛也當清熱解毒調養脾胃為主經云行血則便膿自愈調氣則後重自除若大腸積滯壅實而後重法當疏導之若大腸氣虛下陷而後重法當升補之初下痢者不分赤白皆濕熱也壯盛人初痢宜利之玄白散治痢疾初起裡急後重腹痛膿血窘迫壯盛人一劑即愈牽牛赤痢用黑白痢用白赤白相雜黑白兼用半生半炒搗碎生地黃赤芍歸尾檳榔枳殼去瓤麩炒莪朮煨黃連各一錢大黃二錢暑月加香薷一錢炒上銼一劑水煎空心溫服以利二三次為度虛弱人初痢宜清之芍藥湯芍藥二錢木香一錢當歸一錢枳殼去穰一錢黃芩去朽一錢檳榔一錢黃連二錢甘草五分上銼一劑水煎溫服下痢稍久者宜調和也調和飲白芍三錢當歸一錢川芎二錢黃連二錢黃芩二錢桃仁一錢升麻五分上銼一劑水煎空心服如紅痢依本方如白痢用吳茱萸一錢芩連用酒炒赤白痢加白朮茯苓陳皮香附各一錢痢因熱積而氣滯者宜清熱順氣也立效散治赤白痢疾膿血相兼裡急後重疼痛一服立止淨黃連四兩酒洗吳茱萸三兩同炒去茱萸不用陳枳殼二兩去穰麩炒上二味為細末每服三錢空心黃酒調下泄瀉米湯下噤口痢疾陳倉米湯送下下痢發熱不退者腸胃中有風邪也倉廩散治痢疾赤白發熱不退腸胃中有風邪熱毒及時行瘟疫沿門闔境皆下痢噤口者服之神效即人參敗毒散加黃連陳倉米三百粒薑棗煎服如痢後手足痛加檳榔木瓜噤口痢加陳倉米一撮石蓮肉七枚下痢發熱便閉者表裡有實熱也六一順氣湯方見傷寒治痢不問赤白相雜肚痛裡急後重渾身發熱口乾發渴用此通利即止下痢噤口不食者脾虛胃熱甚也參連湯人參五錢黃連一兩上銼一劑水煎終日時呷之如吐再強飲但得一口呷下咽喉即好加石蓮肉三錢尤效外以田螺搗爛盦臍中引藥下行故也開噤湯治噤口痢疾徐元濟傳砂仁一錢研砂糖七錢細茶五錢生薑五片上銼一劑水二鍾煎至八分露一宿次早面北溫服外用木鱉子二錢去殼麝香二分共搗置臍中即思食一方治噤口痢米穀不下者神效用石蓮肉為末每服二三錢用陳倉米湯調下即效嘔加生薑汁二三匙下痢久不止者宜調養氣血兼升澀也參歸芍藥湯治痢久一二十日痢多不止用此調養氣血自愈人參一錢當歸酒洗二錢茯苓白朮一錢砂仁七分山藥炒陳皮各一錢甘草五分上銼一劑烏梅一個燈草一團蓮肉七個水煎溫服照後加減噤口痢不食者胃口熱極故也加炒黃連蓮肉人參炒米烏梅清熱開胃為主下痢腹痛裡急後重者是熱極氣滯也又云裡急者腹中不寬快也亦有虛坐而大便不行者皆血虛也血虛則裡急後重如四物湯之類治之加木香檳榔和消積氣則後重自除久痢後重不除者虛氣墜下也治痢用下藥挨積仍後重者乃陽不升也用升麻為君加人參當歸芍藥為君升麻少許提氣大凡痢作痛者熱流下也加炒芩芍藥清之痢後發熱不止或積少但虛坐努力者俱是血虛故也倍加當歸芍藥地黃滋養陰血其熱自安積中有紫血者是瘀血也加芍藥紅花生血和血則便血自愈痢下如緑豆汁者是濕也加蒼朮白朮滲濕利小便實腸散治久痢去多不分赤白用此末藥換出黃糞來乾山藥炒黃色一兩好蓮肉炒去心一兩炒黃米一合上共為細末用砂糖調熱湯和勻前藥末不幹不稀漸漸調服後用清米湯漱口常服之最效湯泡飲治久痢不愈無分赤白俱可服粟殼蜜水炒三錢烏梅一個去核甘草三分蜜三匙上銼碎用滾水一鍾泡浸一時去渣三次服之真人養臟湯治大人小兒冷熱不調下痢赤白或如膿血魚腦裡急後重臍腹疼痛或脫肛下墜酒毒便血並皆治之肉桂五分人參去蘆當歸訶子煨去核木香甘草炙肉豆蔻麵裹煨各一錢芍藥白朮各一錢枳殼蜜炙一錢上銼一劑水煎食前溫服臟寒者加附子一錢制痢疾日久不愈不能起床不思飲食瘦弱之甚者用補中益氣湯去柴胡加炒芍澤瀉木香砂仁白蔻地榆米殼醋炒大抵久痢不止多屬血氣虛弱宜用八珍湯若脾氣虛而血弱者用四君子湯若胃氣虛而血弱者用補中益氣湯大凡此症久而不愈或變症百出但守前法久之自愈一血痢及下血久不止用六味丸加地榆阿膠黃連黃芩生地黃以上四方俱見補益補遺方狗皮膏貼瀉痢如神乳香五錢沒藥五錢木鱉子十個杏仁四十九個桃枝四十九節二指長柳枝四十九節如箸大上用香油七兩將木鱉子以下四味入油炸浮撈起渣下好黃丹飛過三兩熬將成膏用槐枝不住手攪滴水成珠退火再入乳香沒藥加麝香一分攪勻退火毒以狗皮攤膏貼臍上瀉痢膏赤石脂四兩訶子四兩罌粟殼四兩乾薑五兩上以上為細末用真麻油二斤四兩熬去四兩止吊二斤再熬滾入上好飛黃丹一斤熬黑色滴水成珠方入後四味藥龍骨二兩乳香五錢沒藥五錢麝香一錢俱為細末入內攪勻退火出火毒攤貼臍上每一個重三錢冬月可加肉蔻五錢祕方治痢久不愈者用白蘿蔔取汁一鍾蜜一鍾共煎滾調勻溫服立止又方用陰乾陳久蘿蔔英煎湯服之止痢如神又方用大團魚一個水煮去腸甲加生薑七片砂糖一小塊不用鹽醬少入米粉作羹吃一二碗其痢立止大司寇春岡劉公年近古稀患痢膿血腹痛諸醫弗效余診六脈微數此肥甘太過內有積熱當服酒蒸大黃一兩清利之公曰吾衰老恐不能唯滋補平和之劑可也余再四寬釋公意始從遂服之逾日而愈通府竹峰何公患痢赤白晝夜無度遍身瘙癢心中煩躁豫診六脈大數人迎偏盛此風邪熱毒也以人參敗毒散加防風荊芥黃連去人參二服即愈又診六脈仍前大數余曰數則心煩大則病進將來必有痰喘之患不起後逾月果如其言一人痢後兩足浮腫胸膈脹滿小便短少用分利之劑遍身腫兼氣喘余曰兩足浮腫脾氣下陷也胸膈脹滿脾虛作痞也小便短少肺不能生腎也身腫氣喘脾不能生肺也用補中益氣加附子而愈半載後因酒食勞倦兩目浮腫小便短少仍服前藥頓愈方見補益泄瀉脈瀉脈自沉沉遲寒侵沉數火熱沉虛滑脫暑濕緩弱多在夏月泄瀉之症只因脾胃虛弱飢寒飲食過度或為風寒暑濕所傷皆令泄瀉治須分利小便健脾燥濕為主若瀉太多而不止者當用補住為要若瀉不止手足寒脈虛脫煩躁發厄氣短目直視昏冒不識人者皆死症也若泄瀉初起不可就用補塞恐積氣未盡而成腹疼飽悶噁心煩躁發厄而死直待瀉去四五次方可補住此大法也泄瀉清濁不分者濕多成五瀉也胃苓湯治脾胃不和腹痛泄瀉水穀不化陰陽不分蒼朮米泔制厚朴薑汁炒陳皮豬苓澤瀉白朮去蘆茯苓去皮白芍煨各一錢肉桂甘草炙各二分上銼一劑生薑棗子煎空心溫服水瀉加滑石暴痢赤白相雜腹痛裡急後重去桂加木香檳榔黃連水煎服久瀉加升麻勝濕加防風升麻食積加神麯麥芽山楂氣虛加參術寒泄者悠悠腹痛瀉無休止色青脈沉遲是也理中湯治寒瀉症人參白朮去蘆乾薑炒各一錢官桂甘草炙各五分陳皮藿香茯苓去皮良薑各七分烏梅一個上銼一劑生薑三片棗二枚燈草一團水煎溫服寒極手足冷脈沉細加附子去良薑官桂腹痛加厚朴砂仁木香去人參嘔噦噁心加丁香半夏去良薑官桂瀉不止加蒼朮山藥瀉多不止加肉蔻訶子附子去良薑官桂虛汗加黃耆去藿香官桂飽悶加厚朴砂仁去人參良薑官桂火瀉者腹中痛一陳瀉一陳後去如湯後重如滯瀉下赤色小水短赤煩渴脈數是也即火瀉也四苓散治火瀉熱瀉茯苓白朮豬苓澤瀉蒼朮炒山藥芍藥山梔炒陳皮各一錢甘草五分烏梅一個上銼一劑燈草一團水煎溫服飽悶加厚朴砂仁去山藥腹痛加厚朴砂仁木香茴香去白朮嘔噦噁心加藿香烏梅蓮肉砂仁人參小水短赤加木通車前去澤瀉口燥煩渴加黃連麥芽蓮肉烏梅乾葛去澤瀉蒼朮瀉多元氣虛脫昏倦加人參黃耆去澤瀉蒼朮夏月暑瀉加香藿扁豆瀉多煩躁加炒黃連人參辰砂烏梅去蒼朮澤瀉瀉多不止加肉蔻烏梅人參去澤瀉山梔發熱脈數加柴胡炒黃芩烏梅暑瀉者夏月暴瀉如水面垢脈虛煩渴自汗是也香薷飲方見中暑依本方加人參白朮茯苓白芍陳皮甘草炒米一撮烏梅一個燈芯一團煎服濕瀉者瀉水多而腹不痛腹響雷鳴脈細是也五苓散治濕瀉症茯苓去皮白朮去蘆豬苓澤瀉山藥陳皮蒼朮米泔制砂仁炒肉蔻麵包煨捶去油訶子煨去核各八分官桂甘草炙各五分上銼一劑生薑一片烏梅一個燈芯一團水煎溫服照前理中湯加減同前風瀉者瀉而便帶清血脈浮弦是也胃風湯治風冷乘虛客於腸胃水穀不化泄瀉注下腹腸虛滿腸鳴疼痛及腸胃濕毒下如豆汁或下瘀血並治有效當歸川芎白芍炒人參白朮去蘆茯苓去皮肉桂各等分上銼一劑入粟米一撮水煎溫服食積瀉者腹疼甚而瀉瀉後痛減脈弦是也香砂平胃散依本方去枳殼加白朮茯苓痰瀉者或多或少或瀉或不瀉脈沉滑是也二陳湯治痰瀉症陳皮半夏薑汁炒茯苓去皮白朮去蘆蒼朮米泔制砂仁山藥炒車前木通厚朴薑汁炒甘草各等分上銼一劑生薑三片烏梅一個燈草一團水煎溫服瀉不止加肉蔻訶子去厚朴照香砂六君子湯加減相同滑瀉不止灸百會一穴天樞二穴中脘一穴氣海一穴虛瀉者飲食入胃即瀉水穀不化脈微弱是也參苓白朮散治氣虛泄瀉人參白朮去蘆茯苓去皮山藥炒砂仁研藿香陳皮乾薑炒蓮肉去心皮訶子煨肉蔻煨去油甘草炙各等分上銼一劑生薑一片燈芯一團水煎服嘔噦噁心加半夏烏梅若元氣虛脫昏倦加黃耆升麻少許去砂仁藿香飽悶加厚朴去肉蔻訶子小水短澀加木通車前去乾薑瀉甚不止加炒蒼朮烏梅熟附子少許脾瀉者食後到飽瀉後即寬脈細是也香附六君子湯治脾瀉症香附炒砂仁厚朴薑汁炒陳皮人參白朮去蘆芍藥炒蒼朮炒山藥炒甘草炙各等分上銼一劑姜一片烏梅一個水煎溫服腹痛加木香茴香去人參山藥渴加乾葛烏梅小水赤短加木通車前嘔噦噁心加藿香烏梅半夏夏月加炒黃連白扁豆冬月加煨乾姜去芍藥滑瀉者日夜無度腸胃虛寒不禁脈沉細是也即滑瀉也八柱湯治腸胃虛寒滑瀉不禁人參去蘆白朮去蘆肉蔻煨乾薑炒訶子煨附子麵裹煨去皮臍粟殼蜜炒甘草炙各等分上銼一劑生薑一片烏梅一個燈草一團水煎溫服照前理中湯加減相同溫脾散治久瀉米穀不化水穀入口即時直下下元虛冷滑脫黃耆蜜炒人參去蘆白朮土炒白茯苓去皮山藥炒乾薑炒訶子煨去核肉蔻煨去油粟殼蜜炒草果去皮丁香肉桂大附子制黃連薑汁炒砂仁陳皮厚朴薑汁炒甘草炙各等分上銼一劑薑棗煎空心服八仙糕治脾胃虛損泄瀉不止理脾胃消飲食最益老人小兒枳實去穰麩炒四兩白朮陳壁土炒四兩白茯苓去皮二兩陳皮炒二兩乾山藥四兩蓮肉去心皮二兩山楂肉去核二兩楝參一兩氣盛者砂仁一兩代之上為末用白粳米五升糯米一升半打粉用蜜三斤入藥末和勻如做糕法先就籠中劃小塊蒸熟取出火烘乾瓦罐收貯封固取三五片食之以白湯漱口一因內傷勞倦飲食化遲作瀉及脾胃素蘊濕熱但遇飲食勞倦即發而肢體痠軟沉困泄瀉者用補中益氣湯去當歸加芍藥茯苓蒼朮豬苓澤瀉薑棗煎服方見補益凡泄瀉病誤服參耆等甘溫之藥能生濕熱故反助病邪久則濕熱甚而為疸矣唯用苦寒瀉濕熱苦溫瀉濕寒則愈瀉止後脾胃虛弱方可用參耆等藥以補之濕熱宜用茵陳五苓散方見中暑一腎虛久瀉不止用六味丸加五味子破故紙肉豆蔻吳茱萸若久瀉脾胃虛寒不禁者用六君子湯加炮乾薑肉桂方見補益若命門火衰而脾土虛寒者用八味丸方見補益若脾腎氣血俱虛者用十全大補湯送四神丸若大便滑利小便閉澀或肢體漸腫喘嗽唾痰為脾腎氣血俱虛用十全大補湯送四神丸若大便滑利小便閉澀或肢體漸腫喘嗽唾痰為脾胃虧損用金匱加減腎氣丸方見補益大抵久瀉多因泛用消食利水之劑損其真陰元氣不能自持遂成久泄若非補中益氣湯四神丸滋其本源後必胸痞腹脹小便淋瀝多致不起四神丸治脾胃虛弱大便不實飲食不思或瀉痢腹痛等症兼治腎泄清晨溏泄一二次經年弗止者破故紙四兩酒浸炒吳茱萸一兩泡過炒肉豆蔻二兩麵裹煨五味子二兩上為細末用生薑八兩切片同棗一百枚煮爛去姜取棗肉為丸如梧桐子大每服一錢半淡鹽湯送下一方去吳茱萸五味子加木香茴香炒各一兩治泄瀉三五年不愈者唯灸百會穴五七壯即愈補遺方治水瀉痢疾神效石蓮肉為末二錢細茶五錢生薑三錢上茶姜二味煎湯調蓮肉末服又方治瀉痢蓮肉二兩為末五更空心無根水調服忌半日勿飲食仍忌葷腥生冷一切除濕健脾湯久瀉色蒼而齒疏倦怠食減下墜白朮去蘆炒一錢半蒼朮米泔浸炒一錢白茯苓去皮一錢白芍醋炒一錢當歸八分厚朴去皮姜炒六分陳皮八分豬苓澤瀉各七分柴胡升麻各五分防風去蘆六分甘草炙四分久瀉加南星麵包煨七分上銼一劑生薑三片棗一枚水煎早晚熱服參朮健脾丸滋養元氣補理脾胃益腎水溫下元進飲食調中下氣臍腹冷痛泄瀉年久不止此藥補溫脾腎除寒濕大補諸虛蒼朮八兩二兩鹽水浸二兩米泔浸二兩醋浸二兩蔥白炒人參白朮去蘆白茯苓去皮乾山藥炒破故紙酒炒枸杞子去梗菟絲子酒製焙蓮肉去心各二兩川楝子取肉五味子川牛膝去蘆各一兩半川椒去目炒小茴香鹽炒陳皮木香不見火遠志甘草水泡去心各五錢上為細末酒糊為丸如梧桐子大每服八十丸空心鹽湯送下以乾物壓之霍亂脈霍亂吐瀉滑而不勻或微而澀代伏驚人熱多洪滑弦滑食論夫霍亂者有濕霍亂有乾霍亂皆是內傷飲食生冷外感風寒暑濕而成濕霍亂忽時心腹疼痛或上吐或下瀉或吐瀉齊作攪亂不安四肢厥冷六脈沉欲絶此名濕霍亂俗云虎狼病因風則伯風有汗因寒則怕寒無汗因暑則熱煩躁悶因濕則身體重著因食則胸腹飽悶治用正氣散加減若吐瀉煩渴躁不止厥冷痛甚轉筋入腹者死夏月因伏暑熱伏暑霍亂吐瀉者甚多手足雖厥冷脈雖虛小切不可用姜附熱藥治在暑症香薷飲內治之有乾霍亂者最難治死在須臾俗云攪腸痧忽然心腹絞痛手足厥冷脈沉細或沉伏欲吐不得吐欲瀉不得瀉陰陽乖隔升降不通急用鹽湯探吐及刺委中穴出血治用理中湯加減慎勿用米湯補住邪氣難治直待吐瀉後方可用清米湯補接元氣若吐瀉不出胸腹脹硬面唇青手足冷過肘膝六脈伏絶氣喘急舌短囊縮者死症也濕霍亂者吐瀉腹痛脈沉伏欲絶也藿香正氣散治四時不正之氣寒疫時氣山嵐瘴氣雨濕蒸氣或中寒腹痛吐利中暑冒風吐瀉中濕身重泄瀉或不服水土脾胃不和飲食停滯復感外寒頭痛憎寒或嘔逆噁心胸膈痞悶或發熱無汗者並皆治之藿香二錢紫蘇陳皮厚朴薑汁炒半夏薑汁炒白朮去蘆茯苓去皮桔梗大腹皮白芷甘草炙各一錢上銼一劑生薑棗煎溫服霍亂轉筋加木瓜腹痛加炒芍藥寒痛加官桂冷甚加乾薑飲食不化心下痞悶加香附砂仁米穀不化加神麯麥芽肉食不化加山楂心下痞加枳實青皮中暑冒風加香薷扁豆時氣憎寒壯熱加柴胡乾葛發熱加麥門冬淡竹葉口渴作泄小便不利合五苓散濕熱相搏霍亂轉筋煩渴悶亂合黃連香薷散心腹絞痛加木香若頻欲登廁不通利者加枳殼夏月暑熱霍亂者吐瀉煩渴自汗脈浮也香薷飲方見暑症夏月暑熱明知多食生冷瓜果麵食卻於風涼處坐臥以致飲食停滯胸腹飽脹作痛或吐或瀉手足冷脈沉細或伏暑是濕霍亂用前正氣散內加減治之不可作夏月伏暑霍亂吐瀉腹痛口渴煩躁自汗面垢脈虛躁亂不寧者此是伏暑霍亂也香薷飲加減治之乾霍亂者心腹飽脹絞痛不吐不瀉脈沉欲絶也先用鹽湯探吐急用此方理中湯治乾霍亂心腹飽脹絞痛不吐不瀉脈沉欲絶藿香蒼朮米泔制厚朴薑汁炒砂仁香附木香枳殼麩炒陳皮各一錢甘草炙乾薑官桂各五分上銼一劑生薑三片水煎磨木香調服夏月乾霍亂不吐不瀉胸腹絞痛煩渴自汗不可用薑桂心腹絞痛面唇青手足冷脈伏欲絶加附子茴香去蒼朮心腹飽悶硬痛結實者加檳榔枳實山楂栝蔞蘿蔔子去甘草枳殼蒼朮胃寒嘔噦發厄加丁香茴香香附良薑去官桂甘草蒼朮虛汗加附子去蒼朮外用炒生薑渣揉法急用鹽湯探吐得物出為好及刺委中穴血出甚妙霍亂吐瀉止後發熱頭疼身痛口乾脈數者參胡三白湯人參五分柴胡白朮去蘆白茯苓去皮白芍炒當歸陳皮麥門冬去心五味子十粒山梔子甘草各五分烏梅一個上銼一劑棗一枚燈草一團水煎溫服有異鄉人初到地方不服水土或吐或瀉胸腹飽悶或腫脹不吐瀉者宜服加減正氣散藿香蒼朮米泔浸炒厚朴薑汁炒陳皮砂仁香附半夏薑汁炒甘草各等分上銼一劑姜三片棗一枚燈芯一團水煎溫服瀉加白朮炒山藥烏梅炒米嘔吐同上腹痛加木香茴香飽悶加益智仁大腹皮發腫氣喘加蘇子桑白皮木通豬苓大腹皮木香去甘草小水短赤加木通豬苓山梔車前去半夏甘草胸腹飽脹或四肢浮腫如不吐瀉者加蘿蔔子枳殼大腹皮木通去半夏甘草內熱煩渴加葛根黃連山梔烏梅去半夏甘草內寒手足冷脈沉細加乾薑官桂補遺方治霍亂吐瀉用緑豆粉和白砂糖少許服之即愈乾霍亂不得吐者用淡湯一碗入皂角末三分鹽一撮調服探吐之慎勿與米湯吃反動邪氣則難治矣治霍亂吐瀉乾薑胡椒胡黃連各三分緑豆粉五分上為末每服三分沸湯點服陰陽湯用井水和百沸湯各半碗同服神效洗法治霍亂轉筋蓼一把去兩頭水煎熏洗灸法治霍亂已死腹中有暖氣者用鹽納臍中灸七壯嘔吐脈嘔吐無他寸緊滑數微數血虛單浮胃薄芤則有瘀最忌澀弱嘔吐者有聲有物胃氣有所傷也保中湯治嘔吐不止飲食不下藿香梗白朮去蘆各一錢陳皮半夏薑製白茯苓去皮各八分黃連土炒黃芩去朽土炒山梔薑汁炒各一錢砂仁三分甘草二分上銼一劑生薑三片長流水和膠泥澄清二鍾煎至一鍾稍冷頓服嘔噦清水冷涎脈沉退者是寒吐也理中湯治胃寒嘔吐清水冷涎人參茯苓去皮白朮去蘆乾薑炒陳皮藿香丁香半夏薑汁炒砂仁炒官桂各二分上銼一劑生薑三片烏梅一個水煎徐徐溫服寒極手足冷脈微吐不出者加附子去官桂煩躁加辰砂炒米煩渴脈數嘔噦者是熱吐也黃連竹茹湯治胃熱煩渴嘔吐黃連薑汁炒山梔炒黑竹茹各一錢人參五分白朮去蘆茯苓去皮陳皮白芍炒麥門冬去心甘草三分炒米一撮發熱加柴胡上銼一劑烏梅一個棗一枚水煎徐徐溫服嘔噦痰涎者是痰火也二陳湯治痰火嘔吐也陳皮半夏姜炒茯苓去皮甘草加人參白朮竹茹砂仁山梔炒麥門冬去心各等分烏梅一個上銼一劑姜三片棗一枚水煎不拘時徐徐溫服水寒停胃嘔吐者宜燥濕也茯苓半夏湯治水寒停胃嘔吐茯苓去皮半夏薑汁炒陳皮蒼朮米泔浸炒厚朴薑汁炒各一錢砂仁五分藿香八分乾薑炒三分烏梅一個甘草三分上銼一劑水一鍾生薑三片煎至六分不拘時塗徐溫服飽悶作酸嘔吐者是停食吐也香砂平胃散治停食嘔吐方見傷寒久病嘔吐者脾胃不納穀也六君子湯治久病胃虛嘔吐人參去蘆白朮去蘆茯苓去皮白芍炒山藥炒當歸各一錢藿香砂仁各五分蓮肉十粒烏梅一個半夏薑汁炒陳皮各八分甘草三分炒米百粒上銼一劑生薑三片棗一枚水煎徐徐溫服噁心者心中兀兀然無奈欲吐不吐欲嘔不嘔此為噁心非心經病胃口有寒有熱有痰火有胃虛有停食有水飲與嘔吐同治法梁太府乃因患頭暈嘔吐聞藥即嘔諸醫措手余以伏龍肝為末水丸塞兩鼻孔用保中湯以長流水入膠泥攪澄煎稍冷頻服之而安信陵府桂臺殿下夫人患因性氣不好一怒即便嘔吐胸膈不利煩躁不睡腹痛便閉食下即吐已經八日心慌喘急垂危後事已備舉家哭泣召余診六脈虛微此血虛胃弱氣鬱痰火也以二陳湯加姜連酒芩炒梔當歸酒芍香附竹茹白朮入竹瀝薑汁二服而安翻胃脈反胃噎膈寸緊尺澀緊芤或弦虛寒之厄關沉有痰浮澀脾積浮弱虛氣澀小血弱若澀而沉七情所搏夫膈噎翻胃之症皆由七情太過而動五臟之火熏蒸津液而痰益盛脾胃漸衰飲食不得流行為膈為噎為翻胃也丹溪云年高者不治蓋年少之人氣血未虛用藥劫去痰雖得暫愈其病立復所以然者氣虛則不能運化而生痰血虛則不能滋潤而生火也又云此症切不可用香燥之藥而厚滋味蓋症屬熱燥故不可用香燥之藥香能散氣燥能耗血厚滋味能助火而生痰也粗工不識病源但見斯疾便以峻劑撥之而取刻效以圖厚賄不思病危復而不救可不嘆哉大凡膈噎翻胃不可服辛熱香燥最能耗血糞如羊屎者不治大腸無血故也口吐白沫者不治氣血俱憊故也翻胃者胃虛吐食而不納也安胃湯人參五分白朮三分茯苓去皮山藥炒當歸陳皮半夏薑汁炒藿香各一錢砂仁五分黃連薑汁炒蓮肉各八分甘草三分上銼一劑生薑三片棗一枚烏梅一個水煎溫服順氣和中湯治嘔吐翻胃嘈雜吞酸痞悶噫氣噎膈心腹刺痛噁心吐痰水陳皮鹽水浸炒一錢半夏薑汁炒七分白茯苓去皮七分白朮去蘆土炒八分枳實麩炒五分香附醋浸炒一錢砂仁炒三分黃連薑汁和豬膽汁拌炒六分山梔薑汁炒黑一錢神麯炒六分甘草炙三分上銼一劑生薑三片長流水入膠泥攪澄清水一鍾煎至七分入竹瀝童便薑汁不拘時細細溫服如氣虛加黃耆人參各八分如血虛加當歸七分川芎五分如氣惱或氣不舒暢加烏藥五分木香三分如胸膈飽悶加蘿蔔子炒六分如心下嘈雜醋心加吳茱萸四分倍黃連白朮如嘔吐不吐加藿香梗七分太倉丸治噎膈翻胃脾胃虛弱不思飲食白豆蔻二兩砂仁二兩陳倉米一升黃土炒熟上為細末薑汁為丸如梧桐子大每服百丸淡薑湯送下氣血虛而翻胃者宜攻補兼濟也王道無憂散治翻胃膈噎當歸白芍炒川芎生地黃各八分赤芍五分白朮土炒白茯苓去皮各一錢二分赤茯苓砂仁枳實麩炒香附烏藥陳皮半夏薑汁炒藿香檳榔豬苓木通天門冬去心麥門冬去心黃柏人乳炒知母人乳炒黃芩炒各八分粉甘草三分上銼一劑水煎溫服年老之人陰血枯槁痰火氣結升而不降飲食不下者乃成膈噎之病也當歸養血湯當歸白芍炒熟地黃茯苓去皮各一錢貝母去心栝蔞去殼枳實麩炒陳皮厚朴薑汁炒香附撫芎蘇子炒各七分沉香五分黃連用吳茱萸同炒去茱萸用連八分上銼一劑生薑一片棗一枚水煎竹瀝磨沉香調服年少之人有患膈噎者胃脘血燥不潤便閉塞而食不下也生津補血湯治年少胃脘血燥故塞當歸白芍炒熟地黃生地黃茯苓去皮各一錢枳實麩炒陳皮黃連炒蘇子貝母去心各七分砂仁沉香各五分上銼一劑姜一片棗一枚水煎竹瀝沉香同服翻胃因氣惱者宜順氣化痰清火也四子調中湯治翻胃或小便赤大便閉及痰氣壅盛者青皮五分去穰麩炒陳皮五分枳實麩炒一錢香附炒一錢黃連薑汁炒七分半夏薑汁炒二錢栝蔞仁炒一錢蘇子炒白芥子炒桃仁去皮尖各一錢五分茯苓去皮木通各一錢沉香芒硝各五分上銼一劑生薑五片水煎稍熱服五子散治氣膈鼓脹噎食白蘿蔔子紫蘇子白芥子各五錢山楂子去核香附子去毛各一錢上各為末合一處作芥末用祕方神妙不測者有起死回生之功也奪命丹裘一個麝香一分孩兒茶二分金絲黃礬三分硃砂春二分夏四分秋六分冬八分上裘乃土糖裘即蜣螂所滾之彈丸糞土之下皆有用彈中有白蟲者如指大與大蠐螬一樣將彈少破一點蓋住火煅過大黃色存性不要燒焦了入前藥內並彈共為末燒酒調空心服如覺飢用大小米煮粥漸漸少進一日二三次不可多吃一日徐徐進一碗半足矣慎不可多服多則病復不可治矣忌生冷醬炒厚味蔥蒜酒面炙爆等物及氣惱五十以後一二服即效二豆回生丹治翻胃噎食硼砂二錢雄黃二錢乳香一錢硃砂二錢黑豆四十九粒緑豆四十丸粒百草霜五錢微火炒過用上共為細末用烏梅三十個取肉和丸如指頂大硃砂為衣每噙化一丸良久將麵餅一個茶泡爛與食之不吐乃藥之效若吐再噙化一丸忌油膩鹽醋怒氣房勞神灸翻胃法以男左女右手拿棍一條伸手拄棍在地與肩一般高肩上有窩名肩井穴灸三炷即效灸法治翻胃神效膏盲二穴令病人兩手交在兩膊上則脾骨開以手揣摩第四椎骨下兩旁各開二寸四肋三間之中按之痠痛是穴灸時手搭兩膊上不可放下灸至百壯為佳膻中一穴在膺部中行兩乳中同陷中仰臥取之灸七壯禁針三里二穴在膝下三寸䯒外臁兩筋間灸七壯收功保後者宜調養血氣也養血助胃丸治嘔吐翻胃愈後用此養元氣健脾胃生血脈調榮衛清鬱氣收功保後當歸酒洗一兩川芎一兩白芍鹽酒炒一兩人參去蘆五錢扁豆薑汁炒六錢白朮山藥炒一兩蓬肉去心皮一兩甘草炙三錢上為細末薑汁打神麯糊為丸如梧桐子大每服六七十丸空心白滾水送下補遺祕方七傷通氣散治十膈五噎腹內久積氣塊傷力嘔吐膨脹此散諸病皆治牙皂二兩火煅大黃二兩麵包燒熟硇砂二錢巴豆六錢去油二錢當歸二錢半上為末每眼一分或二分量人大小虛實加減用之引用好酒一口調服不飲酒者滾白水亦可引不許多引多動一二行此藥服之不吐則瀉不瀉則吐兼治小兒驚風痰響上竄天吊吐痰即愈又治中風不語劉海田治翻胃方用馬蛇兒即野地蠍虎用公雞一隻籠住餓一日只與水吃換淨肚腸把蛇兒切爛與雞食之取糞焙乾為末每服一錢燒酒送下治噎食效方用醋蛾曬乾為末每服一錢用酒空心下即愈永不再發治噎食祕方用活蠍虎一個入燒酒內浸七日將酒頓熟去蠍虎只飲酒即愈治蟲亦同治噎食病並回食病回食者食下即吐也用初出窯石灰礦投入鍋中滾水內化開去渣止用清水煮乾炒黃色為度黃色難得牙色即可用罐收貯黃蠟封口勿令泄氣過一二年的無用凡人四十內外身體壯健者用四分如年老體弱者止用二分或二分半三分為止以好燒酒一二鍾能飲者三四鐘調服此方專治回食病哽咽年深或吐出蟲或下蟲其疾即愈如不吐不下遇發再服一次不發不必服自然痊好治噎食方皮硝二錢飛過孩兒茶一錢麝香半分上為細末作三服黃酒送下永除根不發治噎膈方新石灰三錢大黃一錢上用黃酒一鍾煎去渣服酒八仙膏專治噎食生藕汁生薑汁梨汁蘿蔔汁甘蔗汁白果汁竹瀝蜂蜜上各汁一盞加一處盛飯甑蒸熟任意食之厄逆脈厄逆甚危浮緩乃宜弦急必死結代促微發厄者氣逆上衝而作聲也厄一名咳逆若胃火上衝而逆隨口應起於上膈病者知之易治也自臍下上衝直出於口者陰火上衝難治俗名謂之打厄是也胃口虛寒手足冷脈沉細是寒厄也丁香柿蒂湯丁香柿蒂良薑官桂半夏薑汁炒陳皮木香另磨沉香另磨茴香藿香厚朴薑汁炒砂仁各等分甘草減半乳香為末上銼一劑姜三片水煎磨沉木香調乳香末同服寒極手足冷脈沉細加附子乾薑去良薑官桂發熱煩渴脈數者是熱厄也小柴胡湯治身熱煩渴發厄柴胡黃芩山梔柿蒂陳皮砂仁半夏薑汁炒竹茹各一錢藿香八分沉香木香各三分茴香五分甘草三分上銼一劑姜一片烏梅一個水煎磨沉木香溫服一切發厄用柿蒂沉香木香乳香砂仁為細末每服一錢淡薑湯調服最效如口燥渴身熱不可服胃中痰火發厄者黃連竹茹湯治胃中痰火發厄黃連竹茹麥門冬去心山梔陳皮半夏各一錢砂仁沉香木香茴香各五分蘇子八分甘草二分上銼一劑姜一片烏梅一個水煎磨沉香木香調服水寒停胃發厄者茯苓半夏湯治水寒停胃發厄茯苓半夏薑汁炒厚朴薑汁炒各一錢乾薑炒丁香官桂砂仁各五分陳皮一錢藿香八分柿蒂一錢茴香七分沉香木香甘草各三分上銼一劑姜三片水煎磨沉香木香同服臍下氣上升發厄者陰火也滋陰降火湯治陰火上升發厄方見虛症依本方加砂仁茴香沉香木香山梔柿蒂辰砂中氣不足脈虛微氣不相續而發厄者補中益氣湯加生脈散黃柏以降陰火或少加附子方見內傷陽明內實失下而發厄者六一順氣湯下之方見傷寒傷寒傳經熱症醫者誤用薑桂等熱藥助其火邪痰火相搏而為咳逆者黃連解毒白虎湯及竹瀝之類治之方見傷寒凡瀉痢發厄與傷寒結胸發黃又發厄者俱難治也大抵發厄不止將乳香紙卷燒煙燻鼻中及灸中脘膻中期門三處即效咳逆丸花椒微炒出汗去目為末醋糊丸如梧桐子大每服十五丸醋湯下傷寒發熱而厄逆者用黃荊子不拘多少炒水煎服立止嗅法治咳逆服藥無效者硫黃乳香上各等分為細末以酒煎急令患人嗅之即止又方用雄黃二錢酒一盞煎七分急令患人嗅之愈灸咳逆法乳根二穴直乳一寸六分婦人在乳房下起肉處陷中灸七壯效如神又方灸氣海三五壯亦效氣海在臍下一寸半噯氣脈噯氣嘈雜審右寸關緊滑可治弦急則難兩寸弦滑留飲胸間脈橫在寸有積上欄噯氣者乃噯胸膈之氣上升也噯氣有胃中有火有痰者宜二陳湯方見痰飲依本方加炒山梔砂仁白豆蔻木香益智仁枳實黃連炒厚朴姜炒香附米星半湯治症同前南星半夏軟石膏香附炒桅子上銼生薑三片水煎服或作丸亦可蓋胃中有鬱火膈上有稠痰故也噯氣有胃寒者宜理中湯方見中寒依本方加木香茴香益智仁陳皮厚朴香附去人參茯苓破郁丹治婦人噯氣胸緊連十餘聲不盡噯出氣心頭略寬不噯即緊宜服香附米醋煮四兩梔子仁炒四兩黃連薑汁炒二兩枳實麩炒二兩檳榔一兩莪朮一兩青皮去穰一兩栝蔞仁一兩蘇子一兩上共為末水丸如梧桐子大每服三十九食後滾水送下吞酸脈吞酸脈形多弦而滑或沉而遲胸有寒飲或數而洪膈有痰熱吞酸與吐酸不同吞酸水刺心也吐酸者吐出酸水也俱是飲食入胃氣虛不能運化鬱積已久濕中生熱濕熱相蒸故作酸也用香砂平胃散加減治之譬如穀肉在器濕熱則易為酸也若是吞酸吐酸嘈雜心煩久而不治成膈噎翻胃症也吞酸者濕熱在胃口上為酸也清郁二陳湯治酸水刺心及吞酸嘈雜陳皮半夏薑汁炒茯苓各一錢蒼朮制八分川芎八分香附一錢神麯炒五錢枳實麩炒八分黃連炒梔子炒各一錢白芍炒七分甘草三分上銼一劑生薑三片水煎服香砂平胃散治吞酸吐酸方見傷食依本方加炒黃連山梔吳茱萸去枳殼木香有因心痛服熱藥過多後患吞酸病本方加炒黃連有因熱藥過多湧出酸苦黑水如爛木耳汁者心痛既愈乃頻作酸塊痞自胸築上咽喉甚惡炒黃連煎濃汁常服一二匙自安平肝順氣保中丸治鬱火傷脾中氣不運胃中伏火鬱積生痰致令嘔吐吞酸嘈雜心腹悶常服順氣和中開胃健脾進食化痰消痞香附米童便浸三日炒三兩小川芎二兩陳皮去白三兩白朮土炒四兩枳實麩炒二兩黃連薑汁炒二兩吳茱萸湯泡一兩神麯炒一兩麥芽炒七錢木香三錢梔子薑汁炒一兩萊蔔子炒一兩半夏薑汁炒一兩半白茯苓去皮一兩砂仁炒四錢乾生薑一兩竹茹一兩甘草炙四錢一方加山楂去核一兩青皮清油炒六錢去吳茱萸竹茹上為細末竹瀝打神麯糊為丸如梧桐子大每服八九十丸白湯送下一日進二次吐酸者吐出酸水肝木之味也蒼連湯蒼朮米泔制黃連薑汁炒陳皮半夏薑汁炒茯苓去皮神麯炒各一錢吳茱萸炒砂仁各五分甘草三分上銼一劑生薑三片水煎溫服治吐清水蒼朮壁土炒白朮炒陳皮白茯苓去皮滑石炒上銼水煎服嘈雜嘈雜者俗謂之心嘈也有胃中痰因火動而嘈者用二陳湯加減有心血少而嘈者用當歸補血湯加減有因食鬱而嘈者用香砂平胃散治之嘈雜有痰因火動者多也化痰清火湯南星薑汁炒半夏薑汁炒陳皮黃連黃芩梔子知母石膏蒼朮米泔浸白朮去蘆白芍各等分甘草一錢半上銼一劑生薑三片水煎服二陳湯治痰火而嘈方見痰症一依本方加炒山梔黃連竹茹人參當歸白朮酸棗仁辰砂烏梅大棗生薑一片水煎竹瀝調辰砂末同服心血虛而嘈雜者宜養血以清火也當歸補血湯治心血少而嘈兼治驚悸怔忡當歸芍藥生地黃熟地黃各三錢人參五分白朮去蘆茯苓去皮麥門冬去心山梔仁炒陳皮各八分甘草三分辰砂研末臨服入二分烏梅一個去核炒米百粒上銼一劑棗二枚水煎溫服食鬱而作嘈者宜消食以開鬱也香砂平胃散治食鬱而嘈方見傷食依本方加炒黃連山梔川芎白芍辰砂去枳殼藿香交泰丸治胸中痞悶嘈雜大便稀則胸中頗快大便堅則胸中痞悶難當不思飲食黃連一兩薑汁浸黃土炒枳實一兩麩炒白朮去蘆土炒一兩吳茱萸湯泡微炒二兩歸尾酒洗一兩三錢大黃用當歸紅花吳茱萸乾膝各一兩煎水洗大黃一晝夜切碎曬乾仍以酒拌曬之九蒸九曬用四兩上為細末薑汁打神麯糊為丸如緑豆大每服七八十丸不拘時白滾水送下消食清郁湯治嘈雜悶亂噁心發熱頭痛陳皮半夏薑汁炒白茯苓去皮神麯炒山楂去核香附米川芎麥芽炒枳殼麩炒梔子炒黃連薑汁炒蒼朮米泔浸藿香甘草上銼生薑三片水煎服諸氣脈下手脈沉便知是氣沉極則伏澀弱難治其或沉滑氣兼痰飲人身之氣一身之主也要在周流順行而無病矣逆則諸病生焉男子宜養其氣以全其神婦人宜平氣以調其經若內傷七情者喜怒憂思悲恐驚是也喜則氣散怒則氣逆憂則氣陷思則氣結悲則氣消恐則氣怯驚則氣耗也外感六淫者風寒暑濕燥火也風傷氣者為疼痛寒傷氣者為戰栗暑傷氣者為熱悶濕傷氣者為腫滿燥傷氣者為閉結有虛氣有實氣虛者正氣虛用四君子湯實者邪氣實用分心氣飲丹溪有云氣實不宜補氣虛宜補之雖雲氣無補法若痞滿壅塞實脹似難於補若正氣虛而不補則氣何由而行故經云壯者氣行而愈怯者著而成病此氣之確論也一切七情之氣為病者宜順氣飲分心氣飲治男子婦人諸氣不和多因憂愁思慮忿怒傷神或臨食憂戚或事不遂意使抑鬱之氣留滯不散停於胸膈之間不能流暢致心胸痞悶脅肋虛脹噎塞不通吞酸噯氣嘔噦噁心頭目昏眩四肢倦怠面色痿黃口苦舌乾飲食減少日見羸瘦或大腸虛閉或因病之後胸中虛痞不思飲食並皆治之木通官桂茯苓去皮半夏薑製各三錢桑白皮大腹皮水洗青皮去穰陳皮各五錢紫蘇二兩羌活五錢甘草二錢半赤芍三錢上銼一劑生薑三片棗一枚燈芯一團水煎溫服又方加枳殼檳榔香附治氣百病最能升降陰陽調順三焦屢用屢驗其功難以盡述又隨症加減法於後一方治憂思鬱悶怒氣痞滿去芍藥羌活加枳殼桔梗木香檳榔香附藿香莪朮水氣面目浮腫加豬苓澤瀉車前木瓜葶藶麥門冬氣塊加莪朮性急加柴胡多怒加黃芩食少加砂仁神麯咳嗽加桔梗半夏胸膈緊加枳實香附三焦不和加烏藥氣閉加蘿蔔子枳殼氣滯腰疼加木瓜枳殼上焦熱盛加黃芩下焦熱甚加山梔翻胃加沉香磨服上下分消導氣湯功勝分心氣飲常患氣惱之人可用此作丸常服甚妙黃連薑汁炒二兩半夏水泡薑汁浸炒栝蔞去殼各一兩枳殼麩炒桔梗各二兩桑白皮蜜炙川芎茯苓去皮厚朴薑汁炒青皮去穰香附童便浸炒各二兩澤瀉木通檳榔麥芽炒各一兩甘草三錢上銼作劑生薑三片水煎服或作丸以神麯糊為丸每服七八十丸空心白湯送下淡薑湯亦可名分消丸一切氣滯食積腹脹痛者宜消導也利氣丸治一切滯氣心腹脹悶疼痛脅肋脹滿難消嘔吐酸水痰涎頭目眩暈並食積酒毒及米穀不化或下利膿血大小便結滯不快氣壅積熱口苦咽乾煩躁涕唾稠黏此藥最能流濕潤燥推陳致新滋陰抑陽敗郁破結活血通經治氣分之聖藥也大黃生四兩黑牽牛頭末四兩香附米炒木香檳榔枳殼麩炒青皮去穰陳皮莪朮煨黃連各二兩黃柏三兩上為細末水丸如梧桐子大每服五十丸或一百丸臨臥時淡薑湯送下以利為度如不利再加丸數一方加黃芩當歸各一兩尤妙神仙一塊氣治諸氣食積及噎塞痞滿胸脅刺痛癥瘕疝氣並皆治之青皮陳皮三稜炒莪朮香附童便炒各一兩神麯麥芽炒蘿蔔子炒白醜頭末檳榔鬱金黃連各五錢枳實三錢皂角百草霜各二錢半上為細末麵糊為丸如緑豆大每服三十丸視疾之上下為食之先後熱酒薑湯送下一切氣虛為病者宜補氣也四君子湯治氣虛症人參去蘆白朮去蘆砂仁茯苓去皮陳皮厚朴薑汁炒當歸甘草各等分上銼一劑生薑一片棗二枚水煎不拘時服氣虛甚加黃耆調理氣鬱之病者此藥雖平易而有殊效也交感丹治一切諸氣公私拂情名利失志抑鬱煩惱七情所傷不思飲食面黃形羸胸膈諸症極有神效香附米一斤長流水浸三日撈起炒乾忌鐵器白茯苓去皮木為淨末四兩上二味為末攪勻煉蜜為丸如彈子大每清晨細嚼一丸白滾湯送下或陳皮湯亦可抑氣湯尤妙補遺祕方一粒金丹鴉片二錢半即啞芙蓉阿魏一錢木香九分沉香五分牛黃二分半上將沉香木香牛黃為末以鴉片放碗內滴水溶化阿魏溶化和蜜為丸如緑豆大金箔為衣每一粒熱氣痛涼水下冷氣痛滾水下忌酒醋青菜一旦夕神效管藩相夫人患因氣鬱生火每至夜半不睡口乾煩渴吐黏痰必欲茶水漱口舌上赤黑皮厚胸悶嘈雜飲食少思余診兩寸脈洪數兩尺脈代虛右氣口盛此上盛下虛血虛氣鬱有火也以四物湯加生地黃黃連麥門冬知母貝母天花粉玄參梔子桔梗枳實青皮甘草數劑奏效又以六味地黃丸加生地黃麥門冬知母玄參天花粉貝母五味子黃連一料全安周賓崇親家患因氣惱得咽喉噎塞如有所礙胸膈痞悶時吐痰唾耳若蟬鳴頭目不清豫診六脈沉數丹溪云下手脈沉便知是氣以清火豁痰丸服之而安青筋夫青筋之症原氣逆而血不行並惡血上攻於心也多由一切怒氣相沖或憂鬱氣結不散或惱怒復傷生冷或房勞後受寒濕以致精神恍惚心慌氣喘噎塞上壅嘔噦噁心頭目昏眩胸膈痞滿心腹刺痛脅肋腰背痛頭痛腦疼口苦舌乾面青唇黑四肢沉困百節痠痛或憎寒壯熱遍身麻痹不仁手足厥冷顫掉默默不語不思飲食等症皆惡血攻心而致之也自古以來無人論此但有患此疾者無方可治唯以砭針於兩手曲池青筋上刺之出瘀血不勝其數而疾有即愈者有不愈者而變為大患者常慣病此者或有一月一次或二三次者屢患屢刺莫之能愈愚唯慮人之生命以氣血為主故丹溪曰氣血和一疾不生虧則百病生焉況此病先傷於風而後復損其血不致於夭枉者蓋亦鮮矣雖然未有退血之法又不得不刺不刺則惡血攻心須臾不救余制一方屢獲效驗名曰白虎丸白虎者西方肺金之謂也青筋者東方肝木之謂也以白虎而治青筋是金能剋木故耳何病之不愈哉此方之妙不唯代刺青筋之苦愈青筋之病而亦免後日之患其惠也不亦大乎此方兼治男子久患痢疾便血婦人崩漏帶下並一切打撲內損血不能散心腹痛欲死者服之其效不啻桴鼓之影響也按此青筋之症北人多患之南人有此即痧症也白虎丸白虎仙丹古石灰穀神子制救人災桕中為末水飛過手上成丸日曬來引宜燒酒一二盞每服須吞五十枚保全男婦青筋症廣積陰功遍九垓千年石灰不拘多少刮去雜色泥土為末水飛過上曬乾量可丸如梧桐子大每服五十丸看輕重加減燒酒送下此藥能順氣散血化痰消滯治青筋初覺頭疼噁心或腹痛或腰疼或遍身作痛不思飲食即進一服當時血散若過三五日青筋已老者多服取效又治心腹痛及婦人崩漏帶下或因氣惱致病或久患赤白痢疾或打撲內傷血不能散服之大效斷痧散治青筋甘草乾薑川烏炮枯礬炒鹽各等分上為末每服二錢白水送下灸斷青筋法於打青筋出血眼上用新黑驢糞些須塗破眼上艾灸一壯永不再發治男婦慣打青筋王春元傳五靈脂蒲黃各一錢半上為細末黃酒調下永不再犯痞滿脈痞滿滑大痰火作孽弦伏中虛微澀衰劣夫痞滿者非痞塊之痞也乃胸腹飽悶而不舒暢也有氣虛中滿有血虛中滿有食積中滿有脾泄中滿有痰膈中滿皆是七情內傷六淫外侵或醉飽飢餓失節房勞過度則脾土虛而受傷轉輸之官失職胃雖受谷不能運化故陽自升而陰自降而成天地不交之痞不通泰也蓋陰伏陽蓄治用香砂養胃湯加減枳殼丸調養脾胃使心肺之陽下降肝腎之陰上升而成天地交泰是無病也痞者心下痞滿而不能食也仲景云滿而不痛為痞滿而痛為結養胃湯治胸腹痞滿香附砂仁木香枳實麩炒各七分白朮去蘆茯苓去皮半夏薑汁炒陳皮各一錢白豆蔻去殼七分藿香厚朴薑汁炒各七分甘草炙二分上銼一劑生薑三片棗一枚水煎食後服瘦人心下痞悶加炒黃連去半夏血虛中滿加當歸白芍去半夏食積中滿加炒神麯山楂麥芽去白朮半夏肥人心下痞悶加蒼朮氣虛中滿加人參去半夏痰膈中滿加栝蔞仁貝母桔梗竹瀝薑汁少許去白朮半夏脾泄中滿加炒蒼朮炒白芍去半夏內傷元氣而痞滿者宜大補氣也加減補中益氣湯治內傷心下痞滿方見內傷脈緩有痰而痞加半夏黃連脈弦四肢滿悶便難而心下痞加黃連甘草柴胡大便閉燥加黃連桃仁少加大黃當歸身心下痞飽悶加白芍黃連心下痞腹脹加白芍砂仁五味子如天寒少加乾薑官桂心下痞或中寒者加附子黃連心下痞嘔逆者加陳皮生薑黃連冬月加黃連少加丁香藿香能食而心下痞加枳實三錢黃連五分如不能食心下痞者勿加之只依本方食以後心下痞者則服橘皮枳實丸大消痞丸治一切心下痞及年久不愈者黃連去蘆須土炒黃芩去朽土炒各六錢枳實麩炒五錢半夏泡陳皮厚朴薑汁炒各四錢白朮去蘆薑黃各一兩豬苓澤瀉砂仁各三錢乾生薑二錢人參四錢神麯炒甘草炙各二錢上為末蒸餅為丸如梧桐子大每服五十丸至百丸空心白湯送下解鬱和中湯治胸膈痞滿內熱夜不安臥臥則愈悶陳皮去白一錢二分赤茯苓一錢半夏八分青皮去瓤醋炒五分香附米童便炒一錢枳殼麩炒一錢梔子一錢黃連薑汁炒七分神麯炒七分厚朴姜炒七分前胡八分蘇子研碎七分生甘草四分上銼一劑姜五片水煎熱服鼓脹脈脹滿脈弦脾制於肝洪數熱脹遲弱陰寒浮為虛脹緊則中實浮大者生虛小危急夫脹者由脾胃之氣虛弱不能運化精微而致水穀聚而不散故成脹也然飲食失節不能調養則清氣下降濁氣填滿胸腹濕熱相蒸遂成脹滿經曰鼓脹是也中空無物有似於鼓小便短澀不利其病膠固難以治療用分消湯加減治之健脾順水寬中為主也不可大用猛烈之藥反傷脾胃病再復來不可治也若臍凸肉硬肚大青筋足背手掌俱浮男從腳下腫上女從頭上腫下並皆不治腹脹者肚腹脹起中空似鼓是也分消湯治中滿成鼓脹兼治脾虛發腫滿飽悶蒼朮米泔浸炒白朮去蘆陳皮厚朴薑汁炒枳實麩炒各一錢砂仁七分木香三分香附豬苓澤瀉大腹皮各八分茯苓一錢上銼一劑生薑一片燈草一團水煎服氣急加沉香腫脹加蘿蔔子脅痛面黑是氣鼓加青皮去白朮脅滿小腸脹痛身上有血絲縷是血鼓加當歸芍藥紅花牡丹皮去白朮茯苓噯氣作酸飽悶腹脹是食鼓加山楂神麯麥芽蘿蔔子去白朮茯苓惡寒手足厥冷瀉去清水是水鼓加官桂胸腹脹滿有塊如鼓者是痞散成鼓加山楂神麯半夏青皮歸尾玄胡鱉甲去白朮茯苓豬苓澤瀉腹脹脾胃氣血俱虛者宜半補而半消也行濕補氣養血湯治氣血虛弱單腹鼓脹浮腫人參白朮去蘆茯苓當歸川芎白芍斂脹各一錢蘇梗陳皮泄滿厚朴姜炒大腹皮斂氣蘿蔔子炒海金沙木通利水各八分木香運氣甘草生各三分上銼一劑生薑三片棗一枚水煎服氣虛倍人參白朮茯苓血虛倍當歸川芎白芍小便短少再加豬苓澤瀉滑石服後腫脹俱退唯面足不消此陽明經氣虛倍用白朮茯苓和榮順氣湯治脾弱血虛心腹脹悶兩足虛腫當歸酒洗一錢川芎六分白芍酒浸白朮土炒各一錢茯苓烏藥蒼朮米泔浸陳皮去白枳實炒神麯炒香附醋炒木瓜牛膝酒洗獨活酒洗澤瀉薏苡仁炒木通各一錢甘草三分上銼一劑生薑煎服腹脹元氣脾胃兩虛者宜補多而消少也調中健脾丸治單腹脹及脾虛腫滿膈中閉塞及胃口作痛並皆治之神效黃耆蜜炒人參去蘆各二兩白朮六兩黃土拌炒茯苓二兩陳皮二兩鹽水炒蘇子二兩半微炒蘿蔔子一兩半炒山楂肉三兩炒草豆蔻二兩半酒拌炒澤瀉三兩半薏苡仁三兩炒沉香六錢另為末五加皮三兩炒栝蔞一兩用大栝蔞二個鑽一孔每個入川椒三錢多年糞磏二錢敲米粒大俱納入瓜內外以綿紙糊完再用紙筋鹽泥封固炭火內煅紅為度取出擇去鹽泥其黑色一併入藥上銼為細末煎荷葉大腹皮湯打黃米糊為丸如梧桐子大每服百丸日進三次白湯下此藥不傷元氣大有補益勿輕視之熱脹腹有積聚者宜分消也廣朮潰堅湯治中滿腹脹有積聚如石堅硬令人坐臥不寧二便澀滯上氣喘促或通身虛腫厚朴薑製黃連黃芩益智仁草豆蔻當歸各五分半夏七分廣朮升麻紅花吳茱萸各三分生甘草柴胡澤瀉神麯炒青皮陳皮各三分口乾加乾葛四分上銼一劑生薑煎食遠服忌酒醋濕面中滿分消丸治中滿鼓脹氣脹水脹大熱脹不治寒脹人參白朮薑黃豬苓去黑皮炙甘草各一錢白芍砂仁乾生薑各二錢澤瀉陳皮各三錢知母炒四錢枳實麩炒半夏泡黃連炒各五錢黃芩炒一兩二錢厚朴姜炒一兩上為細末水浸蒸餅為丸如梧桐子大每服百丸熟白湯下食遠服寒脹不喜飲食宜溫散也香朴湯治老人中寒下虛心腹膨脹不喜飲食脈浮遲而弱此名寒脹厚朴姜炒一兩大附子炮去皮臍七錢半木香三錢上銼一劑姜七片棗一枚水煎服血氣凝結積聚而成腹脹者宜專攻也四炒枳殼丸治氣血凝滯腹內鼓脹積聚此藥寬中快膈快氣消導飲食枳殼四兩米泔浸去瓤切片分四處炒之一分蒼朮一兩同煮乾炒黃色去蒼朮一分蘿蔔子一兩水同煮乾炒黃色去蘿蔔子一分小茴香一兩水同煮乾炒黃色去茴香一分乾漆一兩水同煮乾炒黃色去幹漆香附二兩檳榔一兩玄胡索一兩微炒三稜二兩同莪朮法制莪朮一兩稜莪二味用童便一鍾浸一宿次日用完巴豆仁去殼三十粒同水煮乾炒黃色去豆不用上為細末用蒼朮茴香蘿蔔子乾漆煮汁好醋一碗同麵糊為丸如梧桐子大每服七十丸清米湯下腹脹因於氣者宜順氣也分心氣飲方見諸氣依本方如水氣浮腫因於氣者加豬苓澤瀉車前葶藶木瓜麥門冬金陵酒丸治鼓腫真沉香一兩牙皂一兩廣木香二兩半檳榔一兩上為末用南京燒酒為丸每服三錢重者四錢五更燒酒下水腫水自小便而出氣鼓放屁水鼓加苦亭藶五錢煎酒送下再服金蟾散治氣鼓如神大蝦膜一個以砂仁推入其口內使吞入腹以滿為度用泥罐封固炭火鍛令紅透煙淨取出候冷去泥研末為一服或酒或陳皮湯送下候撒屁多乃見其效寬中養胃湯治胸膈脹滿飲食少用蒼朮炒四分香附七分枳殼麩炒五分厚朴姜炒五分藿香五分山楂三分陳皮一錢砂仁三分細神麯炒四分檳榔三分麥芽炒四分青皮去瓤三分枳實麩炒四分半夏五分茯苓五分甘草炙三分上銼一劑生薑三片棗一枚水煎食遠服春元李河山患腹左一塊數年不愈後食肉餅過多得腹脹滿悶余診六脈洪數氣口緊盛以藿香正氣散加山楂神麯二劑而愈逾月又因飲食失節腹脹如初而仍以前正氣散數劑弗效又易行濕補氣養血湯二十餘劑始安余囑曰病雖愈而體未復原務要謹守勿犯禁戎逾數月過余曰凡有病皆天與也不在服藥不在謹守若當時顏子亞聖豈不能保養何短命死矣我今保養半年未見何如豈在保養服藥者哉豫不能對渠遂放肆無忌未經數旬忽患痢赤白裡急後重痛不可忍晝夜無度渠自制大黃一劑數下勿效復求豫診六脈洪數先以調中理氣湯二劑又以補中益氣湯加白芍黃連微效渠欲速效遂易他醫其醫不審病原數患內傷鼓脹之疾輒用下藥不愈又易一醫又下之前後約三十餘度將元氣愈憊而下脫肛門痛如刀割腹脹如鼓然醫不知元氣下陷陷深則痛愈深當大補元氣升提為主非百劑不可今以素損元氣者欲速效豈可得也嗟夫醫者不補而反瀉病者不慎而欲速安得不死也信兩誤耳補遺方化龍丹治單腹脹用大鯉魚一個巴豆四十粒將魚㓾了將魚脊割開兩刀將巴豆下在兩刀路合住用紙包裹慢火燒熟去豆食魚米湯下水腫脈水腫之病有陰有陽陰脈沉遲其色青白不渴而瀉小便清澀脈或沉數色赤而黃燥糞赤溺兼渴為陽沉細必死浮大無妨水腫者通身浮腫皮薄而光手按成窟舉手即滿者是水腫也初起眼胞上下微腫如裹水上則喘咳氣急下則足膝浮腫大小便短澀不利或大便溏泄皆因脾虛不能運化水穀停於三焦注於肌肉滲於皮膚而發腫也治用健脾利水以為上策久則肌肉潰爛陰囊足脛水出唇黑缺盆平臍口肉硬足背手掌俱平者是脾氣憊也水腫氣急而小便澀血腫氣滿而四肢寒朝寬暮急是血虛暮寬朝急是氣虛朝暮急氣血俱虛大凡水腫者宜健脾去濕利水也實脾飲治水腫蒼朮米泔制白朮土炒厚朴薑汁炒茯苓連皮用豬苓澤瀉香附砂仁枳殼麩炒陳皮大腹皮木香各等分上銼一劑燈芯一團水煎磨木香調服氣急加蘇子葶藶桑白皮去白朮發熱加炒山梔黃連去香附瀉加炒芍藥去枳殼小水不通加木通滑石去白朮飲食停滯加山楂神麯去白朮惡寒手足厥冷脈沉細加官桂少許腰上腫加藿香腰以下加牛膝黃柏去香附胸腹腫脹飽悶加蘿蔔子去白朮加減胃苓湯治水腫蒼朮米泔制一錢半陳皮去白一錢厚朴薑製八分豬芩去皮赤茯苓去皮澤瀉白朮去蘆各一錢大腹皮六分神麯炒八分甘草炙三分山楂去核七分香附姜炒六分木瓜一錢檳榔八分砂仁七分上銼一劑水二鍾生薑三片燈芯一團煎至一鍾食遠溫服渣再煎服水腫腹有積塊者宜半消而半補也木香流氣飲調順榮衛流通血脈快利三焦安和五臟治諸氣痞滯不通胸膈膨悶口苦咽乾嘔吐食少肩背腰脅走注則痛喘急痰嗽面目虛浮四肢腫脹大便閉結小便赤澀又治憂思太過怔忡鬱積腳氣風濕結聚腫痛脹滿喘急水腫等症並皆治之陳皮一錢四分青皮去瓤香附紫蘇各一錢二分赤茯苓木瓜白朮去蘆麥門冬大黃各二錢五分白芷枳殼麩炒各三分草果人參去蘆各一錢半官桂蓬朮大腹皮丁皮檳榔木香沉香各四分半木通六分甘草半夏薑汁炒厚朴薑汁炒各一錢二分上銼一劑生薑三片棗一枚水煎不拘時熱服消腫調脾順氣湯治水腫消脹滿順氣和脾除濕利水蒼朮米泔浸陳皮厚朴去皮姜炒草果砂仁豬苓澤瀉木香檳榔男雌女雄香附枳殼麩炒桔梗三稜莪朮官桂大茴香木通人參木瓜桑白皮牽牛男用白女用黑大腹皮大黃甘草上銼劑生薑煎服水腫因氣惱者宜順氣也分心氣飲方見氣症依本方加豬苓澤瀉車前葶藶木瓜麥門冬濕熱作腫脹滑泄者宜清熱除濕利水也葶藶木香散治濕熱內外甚水腫腹脹小便赤澀大便滑泄此藥下水濕消腫脹止瀉利小便之聖藥也豬苓一錢半澤瀉五分白朮二錢半茯苓二錢半官桂二錢半葶藶二錢半木通五錢木香五錢滑石三兩甘草五錢上為細末每服三錢白湯調下食前服若小便不得通利而反泄看此乃濕熱痞悶深而攻之不開是反為注泄乃正氣已衰多難救也水腫元氣壯盛者宜消導也三消丸治腫脹甘遂木香巴豆去殼各一錢上共研為末寒粟米飯為丸如梧桐子大量人虛實用之實者每服二分虛者每服分半先服五芩散加瞿麥車前木通滑石煎服後服此三消丸消上用陳皮湯下消下用蔥白湯下隔一日進一服三服止若動三五次以冷粥補之消完後用白朮三兩陳皮三兩甘草炙三兩厚朴姜炒二兩皂礬三兩用麵炒盡煙或用醋炒皂礬三五次同前藥研為末醋糊丸梧桐子大每服五十丸米湯送下每日進三服忌惱怒戒煎炒及無鱗魚諸般發物連服四十九日而安積聚脈五積屬陰沉伏附骨肝弦心芤腎沉急滑脾實且長肺浮喘卒六聚結沉痼則浮結又有癥瘕其脈多弦弦結瘕積弦細癥堅沉重中散食成癖痃左轉沉重氣癥胸前若是肉癥右轉橫旋積聚癥瘕緊則痛纏虛弱者死實強者痊痞塊者一名癥瘕不能移動者是癥塊能移動或左或右者是瘕塊五臟五積六腑六聚積在本位聚無定處氣不能作塊成聚塊乃是有形之物痰與食積死血而成此理曉然且中為痰飲左為血塊右為食積俱用潰堅湯丸加減消痰活血順氣健脾為主也積者有常所有形之血也聚者無定位無形之氣也積塊者痰與食積死血也潰堅湯治五積六聚諸般癥瘕痃癖血塊之總司也當歸白朮去蘆半夏薑汁炒陳皮枳實麩炒山楂肉香附厚朴薑汁炒砂仁木香各等分上銼一劑姜一片水煎磨木香調服左脅有塊加川芎右脅有塊加青皮肉食成塊加姜炒黃連粉面成積加神麯血塊加桃仁紅花官桂去半夏山楂痰塊加海石栝蔞枳實去山楂飽脹加蘿蔔子檳榔去白朮壯健人加蓬朮瘦弱人加人參少許潰堅丸依本方加海石楞子鱉甲各為細末將阿魏用醋煮化和前藥末薑汁糊為丸如梧桐子大每服五十丸不拘時服黃酒送下清米湯亦可真人化鐵湯治五積六聚癖痃癥瘕不論新久上下左右三稜莪朮青皮陳皮神麯炒山楂肉香附枳實麩炒厚朴薑製黃連薑汁炒當歸川芎桃仁去皮紅花木香各三分檳榔八分甘草二分上銼一劑生薑一片棗一枚水煎服積塊屬熱者宜清化也柴胡湯柴胡黃芩半夏薑汁炒蒼朮米泔浸厚朴姜炒陳皮青皮去瓤枳殼麩炒神麯炒山楂肉三稜莪朮各等分甘草減半上銼一劑姜一片棗一枚水煎服化痞丹消積塊專攻之劑大黃四兩米醋浸一七日曬夜露一七木鱉子去油一兩穿山甲土炒三兩香附米童便浸炒一兩桃仁去皮研一兩紅花三錢生青黛五分上為細末將大黃醋煮成糊為丸如豆大每服五十丸或六十丸茅根葛根煎湯送下忌花椒胡椒煎炙糯米等物化鐵金丹化一切積塊如神黃耆人參白朮當歸川芎陳皮青皮去瓤香附烏藥檳榔枳殼麩炒枳實麩炒木香沉香蒼朮米泔浸山楂肉神麯炒草果麥芽炒草豆蔻蘿蔔子蘇子白芥子三稜莪朮厚朴薑汁炒小茴香白礬牙皂黃連赤芍柴胡龍膽草甘草以上各五錢大黃生用六錢牽牛用頭末八錢乳香沒藥阿魏硇砂用瓷罐煨過各五錢皮硝一兩上為細末釅醋打稀糊為丸如梧桐子大每服五十丸空心米湯送下午間白水下夜白水下日進三服積塊屬寒者宜溫散也大化氣湯治五積六聚狀如癥瘕隨氣上下發作有時心腹疼痛上氣窒塞小腹脹滿大小便不利三稜莪朮青皮去瓤陳皮桔梗藿香香附益智仁肉桂甘草一方加大黃檳榔治諸般痞積面黃肌瘦四肢無力皆緣內有蟲積或好食生米壁泥茶炭咸辣等物用水煎露一宿空心溫服不得些少飲食則蟲積不行矣上銼生薑三片棗一枚水煎服心脾痛加烏藥枳殼脾滯合四聖散勝紅丸治脾積氣隔滿悶氣促不安嘔吐酸水丈夫酒積婦人血積氣滯小兒食積並皆治之陳皮莪朮二味同醋煮青皮去瓤三稜醋煮乾薑炮良薑各一兩香附炒去皮毛二兩上為末醋糊丸如梧桐子大每服五十丸薑湯下食前服男子積塊痛者宜化氣也千金化氣湯治男子腹中氣塊疼痛青皮陳皮枳殼去瓤香附砂仁白豆蔻各一兩木香五錢丁香三錢半夏薑製草果乾薑各七錢檳榔一兩五錢川芎白芷三稜醋炒莪朮玄胡索各一兩小茴香五錢厚朴薑汁炒大腹皮白芍各一兩甘草三錢上銼一劑生薑三片水煎半空心服女子積塊痛者宜導氣也千金導氣湯治婦人滿腹氣塊遊走不定漉漉有聲攻作疼痛久年不愈者神效丁香木香砂仁白豆蔻香附烏藥枳實焙當歸川芎白芷白芍白朮去蘆青皮去瓤陳皮桔梗肉桂厚朴姜炒乾薑炒三稜醋炒莪朮醋炒角茴小茴牛膝去蘆紅花杜仲姜炒乾漆醋炒淨煙乳香沒藥甘草上銼半水半酒薑蔥煎熱服飽悶不食加山楂神麯麥芽有熱加柴胡黃芩積塊兼虛者宜半消半補也消積保中丸順氣化痞理脾消滯散痞結除積塊進飲食清鬱熱陳皮去白二兩青皮清油炒四錢白茯苓去皮一兩半白朮土炒三兩香附醋炒二兩半夏一兩泡七次薑汁炒木香三錢不見火檳榔七錢莪朮醋浸炒八錢三稜醋浸炒八錢萊蔔子微炒一兩砂仁四錢神麯炒一兩麥芽炒六錢白芥子炒一兩黃連薑汁炒一兩真阿魏醋浸三錢山梔仁薑汁炒一兩乾漆炒淨煙五錢加人參五錢尤效上為細末薑汁酒打糊丸如梧桐子大每服八十丸食後白湯送下血積塊者宜專攻也神化丹消癖積破血塊下鬼胎通經脈及諸痞積血氣塊硇砂乾漆炒血竭各三錢紅娘二十個去翅乳香一錢半斑蝥二十個去翅足上為末棗肉丸如豌豆大每服一丸至三五丸臨臥或棗湯薑湯或紅花蘇木湯下凡積塊內服藥而外貼者乃兼濟也五仙膏治一切痞塊積氣癖疾肚大青筋氣喘上壅或發熱咳嗽吐血衄血大黃肥皂角生薑半斤生蔥半斤大蒜半斤上共搗爛用水煎取出汁去渣再煎汁熬成膏黑色為度攤絹帛上先用針刺患處後貼膏藥神仙化痞膏專治一切積聚痞塊一貼即消應驗如神當歸川芎赤芍黃連黃芩黃柏梔子各一錢紅花肉桂丁香生地黃草烏巴豆去殼各五錢大黃二兩蘇木川烏各一兩穿山甲二十片蜈蚣六條白花蛇一條或一兩桃枝柳枝棗枝各二寸上銼細香油二斤浸五七日桑柴慢火熬至焦黑色去渣起白光為度放冷濾淨澄清取一斤半再入鍋桑柴火熬至油滾陸續下飛過黃丹炒黑色一兩燒過官粉一兩水飛過炒褐色密陀僧一兩仍慢火熬極沸止再加嫩松香四兩黃蠟半斤熬至滴水成珠用厚綿紙時時攤藥貼貼自己皮上試之老漱得所方住手離火待微溫下後細藥松香先以油少許入鍋溶成汁入膏內方佳乳香一兩箬葉炙過沒藥一兩炙血竭五錢咀之如蠟嗅之作梔子味方佳天竺黃三錢輕粉三錢硇砂一錢半胡黃連三錢阿魏五錢取一豆大火化滴銅器上上頭變白者佳麝香一錢上九味共為細末陸續入膏內不住手攪勻以冷為度剷出以溫水洗去浮膩埋在陰地二十一日去火毒狗皮攤膏先以白酒煮朴硝洗患處良久方貼藥時時炭火烤熱手摩尉之一貼可愈貼時尤當戒厚味生冷及房欲怒氣又以多服藥餌不可專恃貼藥也一五積六聚癥瘕痞塊元氣虛弱肌體瘦怯飲食不進四肢沉困用補中益氣湯加三稜莪朮青皮香附桔梗藿香益智肉桂五疸脈五疸實熱脈必洪數其或微澀症屬虛弱黃疸症者雖有五疸俱是脾胃水穀濕熱相蒸故發黃也胸腹飽悶面目俱黃小水短赤如皂莢汁者就如𨠭曲相似濕熱而生黃也用茵陳四苓散加減發黃口渴大便實者用茵陳大黃湯下之黃自退也小水清白為愈疸散成鼓者多矣五疸者濕熱鬱蒸於脾也茵陳散治濕熱發黃茵陳梔子赤苓豬苓澤瀉蒼朮枳實黃連厚朴滑石各等分上銼一劑燈草一團水煎服身熱加柴胡小水短赤加黃柏胸膈飽悶加蘿蔔子茯苓飲酒人加栝蔞仁乾葛砂仁去滑石此成酒疸者多茵陳大黃湯治黃疸大便結實茵陳大黃枳實山梔厚朴滑石各等分甘草減半上銼一劑燈草一團水煎服棗子緑礬丸治黃疸胖病針砂緑礬炒蒼朮米泔制厚朴姜炒陳皮神麯炒各一兩甘草五錢上為細末棗肉為丸或醋糊為丸如梧桐子大每服五十丸食後米湯送下切忌蕎麥羊肉母豬肉食之急死無醫四寶丹治黃病吃生米茶葉黃泥黑炭者宜服生米用麥芽一斤炒使君子肉二兩檳榔南星各二兩薑汁製茶葉用茶葉一斤炒使君子肉二兩檳榔南星各一兩薑汁製黃泥用壁土一斤炒使君子肉二兩檳榔南星各一兩薑汁製黑炭用黑炭一斤炒使君子肉二兩檳榔南星各一兩薑汁製上為末煉蜜為丸如梧桐子大每服五十丸清早砂糖水送下大效治黃病方黑礬不拘多少日曬夜露二十一日為末棗肉為丸如緑豆大每服九丸早午晚各進一服日進三服二十一日即止小兒服三九治黃腫病方七月七日採水花干為末每服一錢黃酒下效治氣黃病方以蛇蛻用棍子挑於燈上點火著滴成珠多年陳麻楷圃燒灰各等分為末黃酒調服效痼冷凡陰症身靜而重語言無聲氣少難以喘息目睛不了了口鼻冷氣水漿不入大小便不禁面上惡寒有如刀刮先用蔥尉法次服四逆湯方見中寒痼冷者寒之甚也加味理中湯大附子麵包煨去皮殼人參去蘆白朮去蘆乾薑炒肉桂陳皮茯苓去皮各等分甘草炙減半上銼一劑生薑一片棗二枚水煎熱服固陽湯治陽症歸陰陰囊縮入手足厥冷腹痛脹汗冷出脈或反洪弦黃耆人參各二錢白朮去蘆茯苓各四錢乾薑八錢良薑三錢腹痛倍用白姜八錢厚朴三錢薑汁炒大附子炮四錢上銼一劑水煎熱服治陰症方胡椒三十粒黃丹一兩乾薑一塊上三味為末用醋調塗放男左女右手心內合在小便上一時蓋被出汗即已治陰症腹痛灸小指外側上紋尖艾炷如小豆大灸三壯男灸左女灸右治陰症冷極熱藥救不回者手足冰冷腎囊縮入牙關緊急死在須臾用大艾炷灸臍中預將蒜搗汁擦臍上後放艾多灸之其臍上下左右各開八分四分用小艾炷灸至五壯為度如玉莖縮入於內速令人捉定急將蘄艾丸如緑豆大在龜頭馬口灸二壯其莖即出仍服附子理中湯即效治陰症方老桑樹皮燒存性牡蠣火煅乾薑胡椒各二錢膽礬一錢麝香少許上為細末用陰陽唾調塗於兩手心內夾腿腋不時遍身汗出即瘥治冷陰方枯白礬百草霜各一錢共為細末煉蜜為丸每服一丸黃酒送下治陰症腹痛面青甚者鴿子糞一大抄研末極熱酒一盞衝入攪勻少澄飲之去渣頓愈三仙散治陰症乾薑大附子炮去皮臍官桂上共為細末每服三錢滾酒調服神效斑疹凡斑既出須得脈洪數有力身溫足溫者易治若脈沉小足冷元氣虛弱者難治發斑紅赤為胃熱若紫不赤為熱甚紫黑為胃爛故赤斑半生半死黑斑者九死一生大抵鮮紅起發稀朗者吉紫黑者難治雜黑斑爛者死也凡斑欲出未出之際且與升麻湯先透其毒脈虛加人參食少而大便不實加白朮斑見已出不宜再發也斑不可汗斑爛不宜下如脈洪數熱甚煩渴者人參化斑湯若消斑毒犀角玄參湯凡發斑疹先將紅紙點燈照看病人面部胸膛背上四肢有紅點起者乃發斑也若大紅點發於皮膚之上謂之斑小紅靨行於皮膚不出起者謂之疹蓋疹輕而斑重也先將薑汁噴於斑上以後照陰陽虛實寒熱而用藥凡丹疹皆是惡毒熱血蘊蓄於命門遇君相二火合起即發也如遇熱時以防風通聖散辛涼之劑解之寒月以升麻葛根湯等辛溫之劑解之凡丹疹先從四肢起而後入腹者死發斑者熱毒蘊於胸中也升麻湯治陽毒赤斑出狂言吐膿血升麻二錢犀角屑射干人參生甘草各一錢上銼一劑水二盞煎至一盞去渣溫服人參化斑湯人參一錢石膏二錢知母三錢甘草五分粳米一撮上銼一劑水煎服斑盛加大青犀角玄參湯犀角一錢升麻二錢香附一錢黃芩一錢半人參五分玄參一錢甘草三分上銼一劑加大青水煎服隱疹者紅點如蚤螫之狀也防風通聖散方見中風升麻葛根湯升麻二錢葛根二錢芍藥二錢甘草三分上銼一劑水煎服犀角消毒湯牛蒡子荊芥穗防風甘草犀角一錢半鎊為細末不入湯煎上銼一劑水二盞煎至一盞調犀角末服發熱脈經曰脈大無力為陽虛脈數無力為陰虛無力曰虛有力曰實夫發熱者謂怫怫然發於皮膚之間則成熱也與潮熱寒熱若同而異潮熱者有時而熱不失其時寒熱者寒已而熱相繼而發至於發熱則無時而發也血虛有汗潮熱者人參養榮湯治積勞虛損四肢倦怠肌肉消瘦而少顏色吸呼氣短飲食無味也人參去蘆當歸陳皮黃耆蜜炙桂心白朮去蘆甘草炙一錢白芍酒炒二錢熟地黃酒浸茯苓去皮五味子各七分半遠志去心炒五分上銼一劑生薑三片棗二枚水二鍾煎至一鍾食遠服氣虛有汗潮熱者補中益氣湯方見內傷烏雞丸治童男室女身發潮熱吐血痰出盜汗飲食少進四肢無力黃耆蜜炙人參去蘆白朮去蘆當當歸酒洗白芍酒炒生地陳皮秦艽柴胡銀柴胡前胡黃芩胡黃連黃柏去粗皮知母去毛貝母去心桑白髮地骨皮麥門冬去心五味子各一兩上銼細片用烏骨白雞一隻耳有緑色腦有金色者佳重一斤者以麻子喂七日縊死去毛並內腸雜納藥於內用緑豆一斗五升浸潤放入小甑內三寸厚又將青蒿四兩襯之放雞在上仍以緑豆蓋之蒸極熟將雞折碎同藥曬乾為末湯浸蒸餅為丸如梧桐子大每服七十丸空心清米湯下血虛無汗潮熱者茯苓補心湯方見婦人虛勞門氣虛無汗潮熱者人參清肌散治男婦氣虛無汗潮熱人參白朮茯苓當歸赤芍柴胡半夏葛粉甘草上銼一劑薑棗煎服女子血虛有汗潮熱者茯苓補心湯方見婦人虛勞門氣血兩虛無汗潮熱者逍遙散方見婦人虛勞門男婦四肢發熱筋骨間如火烙手者郁遏陽氣於脾胃之中也升陽散火湯治男婦四肢發熱肌表熱如火烙捫之烙手此病多因血氣而得之或胃虛過食冷物郁遏陽氣於脾土之中即火鬱則發之即火鬱湯升麻葛根白芍羌活獨活人參各五錢柴胡八錢防風三錢半生甘草二錢炙甘草三錢上銼一劑生薑煎服忌寒涼生冷之物月餘傷寒發熱者是外之寒邪傷衛也九味羌活湯方見傷寒傷暑發熱者是外之熱邪傷榮也清暑益氣湯方見中暑內傷發熱者是陽氣自傷屬脾肺也其脈大而無力補中益氣湯方見內傷陰虛發熱者是陰血自傷屬心腎也其脈數而無力滋陰降火湯方見虛勞夜則靜晝則發熱者此熱在氣分也小柴胡湯加梔子黃連知母地骨皮晝則靜夜則發熱者此熱在血分也四物湯加知母黃柏黃連梔子牡丹皮柴胡晝夜俱發熱者此熱在血氣之分也四物湯合小柴胡湯加黃連梔子子午潮熱者加減逍遙散加黃芩胡黃連麥門冬地骨皮秦艽木通車前子燈芯水煎服一切發熱憎寒者邪在半表半裡也柴苓湯即小柴胡湯合五苓散當歸飲治勞心生熱鼻少見血五心煩熱當歸一錢二分芍藥一錢川芎五分生地黃一錢牡丹皮一錢黃連酒炒七分麥門冬去心二錢地骨皮七分酒黃芩七分炒梔子六分柴胡六分生甘草三分上銼一劑水煎食遠熱服一僕人五月間病熱口渴唇乾譫語診其脈細而遲用四君子加黃耆當歸芍藥熟附子進一服熱愈甚狂言狂走或曰附子差矣診其脈如舊仍增附子進一大服遂汗出而熱退脈還四至矣一婦人夏間病熱初用平調氣血兼清熱和解之劑服二三劑不應熱愈甚舌上焦黑膈間有火漱水不咽診其脈兩手皆虛微而右手微甚六七日內譫語撮空循衣摸床惡症俱見後用四物湯加黃芩人參白朮陳皮麥門冬知母熟附子服之一二時汗出而熱退次日復熱再服仍退又次日復發知其虛汗也遂連進十服皆加附子而安一男子發熱煩渴頭痛誤行發汗喘急腹痛自汗譫語用十全大補湯加附子治之熟睡喚而不醒及覺諸症頓退再劑而痊
