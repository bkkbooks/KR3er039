香臭三年矣余以為肺氣虛用補中益氣加麥門山梔而愈口舌脈口舌生瘡脈洪疾速若見脈虛中氣不足經言舌乃心之苗此以竅言也以部分言之五臟皆有所屬以症言之五臟皆以所主如口舌腫痛或狀如無皮或發熱作渴為中氣虛熱或眼如煙觸體倦少食或午後益甚為陰血虛熱若咽痛舌瘡口乾足熱日晡益甚為腎經虛火若四肢逆冷惡寒飲食或痰甚眼赤為命門火衰若發熱作渴飲冷便閉為腸胃實火若發熱惡寒口乾喜湯食少體倦為脾經虛熱若舌本作強腮頰腫痛為脾經濕熱若痰甚作渴口舌腫痛為上焦有熱若思慮過度口舌生瘡咽喉不利為脾經血傷火動若恚怒過度寒熱口苦而舌腫痛為肝經血傷火動病因多端當臨時制宜凡舌腫脹甚宜先刺舌尖或舌上或邊旁出血泄毒以救其急唯舌下濂泉穴此屬腎經雖宜出血亦當禁針慎之口舌生瘡咽喉腫痛燥渴便閉此三焦實熱也用涼膈散加減頻頻噙咽不可頻服恐上熱未除中寒復生變症莫測也方見火證一口舌生瘡發熱惡寒勞則體倦不思飲食此中焦虛熱也用補中益氣湯加麥門五味方見補益一口舌生瘡口乾飲湯不食乃胃氣虛而不能化生津液也用七味白朮散方見小兒吐瀉一口舌生瘡飲食不思大便不實中氣虛也人參理中湯若手足逆冷腹痛中氣虛寒也加附子方見中寒一口舌生瘡糜爛或晡熱內熱脈數無力此血虛而有火也用四物湯加白朮茯苓麥門五味牡丹黃柏知母方見補益一口舌生瘡食少便滑面黃肢冷火衰土虛也用八味丸方見補益一口舌生瘡日晡發熱作渴唾痰小便頻數腎水虧損下焦陰火也加減八味丸若熱來復去晝見夜伏夜見晝伏不時而動或無定處或從腳下起乃無根之火也亦宜此丸更以附子末唾津調搽湧泉穴若概用寒涼損傷生氣為疾匪輕口臭牙齦赤爛腿肢痿軟或口咸此腎經虛熱用六味丸方見補益口瘡者三焦火盛也口舌腫大或痛裂生瘡者治相同也涼膈散加減治三焦火盛口舌生瘡連翹黃芩山梔桔梗黃連薄荷當歸生地黃枳殼去穰芍藥甘草各等分上銼一劑水煎食遠服一方治口舌瘡亦治赤眼用黃連為末二三錢好酒煎一二沸候冷噙漱或咽下即愈赴宴散治三焦實熱口舌生瘡糜爛痛不可忍者黃連黃柏黃芩梔子細辛乾薑各等分上為細末先用米泔水漱口後搽藥於患處或吐或咽不拘緑袍散治口瘡黃柏一兩青黛三錢上為細末搽患處噙之吐出涎立愈一方加密陀僧一錢二皂散治口舌生瘡牙宣出血大皂角燒灰存性牙皂燒灰存性銅緑膽礬雄黃孩兒茶百草霜枯礬上各等分為細末先將米泔水漱口洗口瘡後搽藥黃白散治口瘡如神並口中疳瘡黃柏孩兒茶枯白礬各等分為細末上研勻一處凡患人先用陳倉小米熬湯候冷漱口潔淨次將藥末摻患處不拘三五年諸治不愈者此藥敷三五次即愈鄭秋官過飲舌本強腫言語不清此脾虛濕熱用補中益氣加神麯麥芽乾葛澤瀉而愈方見補益一膏梁之人患舌痛敷服皆消腫之藥舌腫勢急余刺舌尖及兩旁出紫血杯許腫消一二更服犀角地黃湯一劑翌早復腫脹仍刺出紫血杯許亦消一二仍服前湯良久舌大腫又刺出黑血二杯許腫漸消忽寒熱作嘔頭痛作暈脈洪浮而數此邪雖去而真氣愈傷以補中益氣倍用參耆歸術四劑而安又數劑而愈方見補益口苦者心熱也黃連瀉心湯治心經蘊熱黃連去須為末水調服口甘者脾熱也三黃湯治脾熱口甜黃連黃芩山梔石膏芍藥白朮去蘆減半桔梗陳皮茯苓去皮各等分甘草減半烏梅一個上銼一劑水煎食後服口辣者肺熱也瀉白湯治口辣肺熱桑白皮地骨皮各二錢甘草一錢上銼一劑水煎食遠溫服口咸者腎熱也滋腎丸黃柏二兩用酒拌濕陰乾知母二兩酒浸濕陰乾肉桂一錢上知柏氣味俱陰以固腎氣故能補腎以瀉下焦火也桂與火邪同體故以寒因熱用凡諸病在下焦皆不渴也用三味俱為末以熱水丸百沸湯送下口酸而苦者肝膽有實熱也小柴胡湯依本方加草龍膽甘草青皮並怒則口苦或脅脹或發熱俱可服膽熱而口苦者乃謀慮不決也小柴胡湯依本方加麥門冬酸棗仁遠志地骨皮補遺方清熱如聖散治舌下腫如核大取破出黃痰已愈又復發枳殼五分天花粉五分黃連八分連翹一錢荊芥薄荷五分牛蒡子八分山梔六分柴胡四分甘草三分上銼一劑燈草十根水煎食後稍冷服忌魚腥厚味又方治舌下腫結如核或重舌木舌及滿口生瘡以清火化痰為主陳皮去白八分半夏薑製一錢三分茯苓去皮一錢桔梗去蘆五分黃連酒炒一錢當歸酒洗八分青竹茹一錢生地酒洗一錢五分甘草梢二分上銼一劑生薑三片水煎食後服碧雪膏治一切積熱口舌生瘡心煩喉閉燥渴腫痛碧雪芒硝馬牙硝朴硝各一斤青黛石膏寒水石滑石水飛各六兩上為細末甘草一斤煎水和諸藥勻再入火煎用柳木攪勻入青黛又攪勻傾出盆內候冷結成塊研為細末每用少許噙化如喉閉每用少許吹入喉中牙齒脈齒痛腎虛尺濡而大火炎尺洪疏搖豁壞右寸關數或洪而弦此屬腸胃風熱多涎牙痛者胃火盛也清胃散治上下牙齒疼痛不可忍牽引頭腦滿面發熱大痛此因服補腎熱藥及食辛熱厚味之物所致也當歸身生地黃酒洗黃連夏月倍用牡丹皮各三錢升麻一兩如痛甚加石膏二錢細辛三錢黃芩三錢細茶三錢大黃酒蒸一錢上銼一劑水煎稍冷食後服治胃有實熱齒痛或上牙痛尤甚者用涼膈散以酒蒸大黃為君加知母石膏升麻為佐頻頻噙咽即愈治牙痛乾薑一兩雄黃三錢上為細末搽之立止一方用緑豆十一個胡椒七粒共合一處略搗碎不至成泥用綿裹如黃豆大用一粒咬於疼處牙上即止其疼永絶其根如疼極不可忍者先以燒酒漱口吐去燒酒用藥咬於疼牙上立止瀉胃湯治牙痛如神當歸川芎赤芍生地黃黃連牡丹皮梔子防風荊芥薄荷甘草上銼一劑水煎食遠頻服開口呷風則痛甚者腸胃中有風邪也開口則臭不可聞者腸胃中有積熱也當歸連翹飲當歸生地黃川芎連翹防風荊芥白芷羌活黃芩山梔枳殼甘草各等分細辛減半上銼一劑水煎食遠服蟲食而痛者腸胃中有濕熱也定痛散治蟲牙痛甚當歸生地黃細辛乾薑白芷連翹苦參黃連花椒桔梗烏梅甘草各等分上銼一劑水煎先噙漱後咽下蜂窩散治牙痛或腫風牙蟲牙牙痛牙長痛不可忍馬蜂窩白蒺藜花椒艾葉蔥頭荊芥細辛白芷上等分銼碎醋煎口噙漱良久吐出再噙牙齦宣露者胃中客熱也甘露飲子治男婦胃中客熱口氣齒齦腫悶宣露心中多煩飢不欲食善睡臥及咽中生瘡口瘡腫爛並治良驗天門冬去心麥門冬去心生地黃熟地黃黃芩去朽枳殼去瓤山茵陳石斛枇杷葉甘草各等分一方以上各一兩加犀角三錢有殊效上銼一劑水煎食後溫服若齒齦宣露腫悶煎藥漱之冷熱皆可蘇東坡治熱極齒縫出血成條者人參茯苓麥門冬去心各二錢上銼一劑水一盅煎五分溫服神效護齒膏治牙齦宣露防風獨活槐枝各等分當歸川芎白芷細辛藁本上銼碎入香油半斤浸三日熬焦去渣入後藥白蠟黃蠟各一兩官粉乳香沒藥龍骨白石脂石膏白芷各五錢俱為末麝香五分為末上先將二蠟溶化成膏方下八味藥末攪勻收瓷器內好皮紙攤貼在宣處即愈走馬牙疳者上焦濕熱也當歸連翹飲方見前消疳散花椒細辛硼砂枯礬銅緑黃連青黛各等分上為細末先用涼水漱口後將藥末擦在牙齒縫處蘆薈散治走馬牙疳黃柏五錢人言五分用紅棗破去核每用人言一分燒存性蘆薈一錢上為末先將米泔漱淨疳毒卻摻上此藥即愈蟾蜍散治走馬疳齦潰侵蝕唇鼻干蚵蚾黃泥裹燒焦一分黃連一分青黛一錢上為末入麝香少許摻敷干則油調搽齒動搖者腎元虛也固齒丹生地黃二兩白蒺藜炒去刺二兩香附四兩炒青鹽一兩半破故紙一兩炒沒石子大者四個上為細末早晨擦牙津液咽下久用自然能固齒烏須牢牙固齒明目散用槐枝葉柳枝葉不拘多少切碎水浸三日熬出濃汁去條葉渣梗入青鹽二斤白鹽二斤同汁熬干研末擦牙漱口吐出洗眼神效固齒牢牙散虎骨一兩火煅青鹽用嫩槐枝等分同炒黃色一兩細辛五錢末上三味合勻擦牙擦牙止痛固齒方石膏一斤煅青鹽四兩白芷二兩細辛一兩上為細末擦牙牙宣膏治牙齒動搖不牢疼痛不止齦肉出血麝香一字白龍骨二錢半官粉二錢半另研上先將二味為末後入麝香研勻用黃蠟一兩瓷器化開入藥於內又攪勻用無灰咨呈紙裁作方片於藥內度過剪作條臨臥於齒患處齦肉門封貼一宿治疳蝕去風邪牢牙齒大效鬥齒方點椒五錢天靈蓋紅內銷白芷各二錢上為末齒動摻上即安或已落有血絲未斷者亦可摻藥於齒齦間鬥之即穩擦牙石鹽散用此藥久擦牙永久堅固再無牙疰牙疼之症白軟石膏一斤遼細辛十二兩五錢川升麻二兩五錢川芎一兩白芷三兩饅頭炒成黑炭半斤白鹽十二兩入炭火煅紅半日右為極細末用絹羅篩過擦牙甚妙滋陰清胃丸治陽明經血熱上下牙床紅爛肉縮齒齦露者當歸酒洗生地黃酒洗牡丹皮去骨梔子仁鹽水炒各一兩軟石膏煅醋淬二兩黃連酒炒知母葛粉防風各七錢升麻白芷各五錢生甘草節四錢上為細末湯泡蒸餅攪糊為丸如緑豆大每服百丸臨晚米湯送下灸牙痛百藥不效用艾炷如麥大灸兩耳當三壯立止固齒散鼠骨一付將鼠一個不用毒死只用打死者麵裹炮熟去肉將面身等骨放新瓦上焙乾以黃色為度研為末全用花椒炒二兩乳香二兩以竹葉焙香附一兩炒白蒺藜仁微炒一兩青鹽一兩麵包煅上為末每日擦牙咽吐任意不唯烏鬚髮固牙齒且終身絶無齒痛矣清胃湯治牙床腫痛動搖黑爛脫落皆屬二陽明大腸與胃二經之火山梔炒連翹去心牡丹皮條芩各一錢石膏二匙生地黃酒洗黃連炒各八分升麻白芍煅桔梗各七分藿香五分甘草二分上銼一劑水煎食遠服毛宗伯胃經虛熱齒牙作痛用補中益氣加熟地丹皮茯苓芍藥尋愈方見補益楊考功齒動作痛屬脾胃虛弱陰火熾甚用補中益氣加酒炒黑黃柏四劑又服加減八味丸諸症頓愈又用補中益氣而痊愈王侍御齒搖齦露喜冷飲食此胃經濕熱先用承氣湯以退火又用清胃散以調理而齒固繼用六味丸以補腎而痊方見補益一男子晡熱內熱牙痛齦潰常取小蟲此足三陰虛火足陽明經濕熱先用桃核承氣湯方見傷寒二劑又用六味丸而愈方見補益眼目脈眼本火病心肝數洪右寸關見相火上衝夫人之有兩眼猶天之有日月也視萬物察纖毫何莫而不至日月有一時晦者風雲雷雨之所致也目之失明者四氣七情之所害也大抵眼目為五臟之精華一身之至要也故五臟分五輪八卦名八廓五輪者肝屬木曰風輪在眼為烏睛心屬火曰火輪在眼為二眥脾屬土曰肉輪在眼為上下胞肺屬金曰氣輪在眼為白睛腎屬水曰水輪在眼為瞳子至若八廓無位有名膽之腑為天廓膀胱之腑為地廓命門之腑為水廓小腸之腑為火廓腎之腑為風廓脾之腑為雷廓大腸之腑為山廓三焦之腑為澤廓此雖為眼目之根本而面為包絡五臟或蘊積風熱或七情之氣鬱結不散上攻眼目各隨五臟所屬或腫赤而痛羞明怕日隱澀難開或云翳內障白膜遮睛共症七十有二治之須究其所因風則驅散之熱則清涼之氣結則調順之翳障則點退之腫痛則消止之此治療之大略耳切不可用針刀割取偶得其愈出乎僥幸唯此萬明膏藥該內外之五行合表裡而一致因虛實之異用論新久之淺深分老幼而不拘一定盡變通而隨疾加減目疾之名雖多而藥品之治無遺且不可過用涼劑冰其面目而血不流暢恐成痼疾矣又腎虛者令人眼目昏花當補暖下元以益腎水雖然亦有南北之分北方之人患眼者甚多皆是日冒風沙夜臥熱炕二氣交蒸使然治之宜用涼藥與南方不同故也然小兒痘疹之後毒氣流於心肝二經不能自己以致上攻眼目視物不明常見黑花當風多淚隱澀難開久生翳障或婦人面風時發眼目暴赤或因氣惱傷於心肺二經日久生翳白膜遮睛因循不治雲翳漸厚視物不明而為終身之害矣用此萬明膏一點如風吹雲散日顯光明何物不照也世人諺語以為動土者有犯鬼神作祟甘心禱祝此乃愚人之謬非明醫之至論也所以自納於盲瞽之地有由然也高明者宜詳辨之豫著點服二藥諸列於後方親試屢有奇效廣傳與人以為人濟世之寶也得之者最宜珍重眼者五臟六腑之精華也大眥赤紅肉堆起者心經實熱也小眥赤紅絲血脹者心經虛熱也烏睛紅白翳障者肝病也白珠紅筋翳膜者肺病也上下眼胞如桃者脾病也迎風出淚坐起生花者腎病也赤而痛者肝實熱也羞明怕日者脾實也視物不真者脾虛也眵多結硬者肺實也眵稀不結者肺虛也拳毛倒睫者脾風也攀睛胬肉者心熱也雀目者晝則明而夜則不見也青盲者瞳子黑白分明直物而不見也眼科祕傳經驗者天下第一方也千金不易萬明膏黃連瀉心火當歸活血明目木賊治拳毛倒睫羌活治攀睛而發散防風去風氣天麻治羞明怕日白蒺藜治隱澀難開甘菊花治內障風明目青葙子治內障氣荊芥治血注瞳人楮實子治攀睛補虛赤芍藥養血止痛龍膽草瀉肝火大黃瀉胃火蟬蛻除風去翳枸杞子去風明目草決明治雲翳密蒙花退翳除昏知母滋腎水而明目防己治風邪而去熱白芍藥生血退熱而理肝經茯苓和中養心血桑白皮瀉肺火牛蒡子明目去翳麥門冬去翳而除心肺之熱貝母理肺經而消痰苦葶藶通肺經消腫痛明目青鹽滋腎水而明目旋覆花治膀胱之水亦能除風蕤仁除赤熱槐花消腫毒而去熱五味子滋腎補虛生津明目連翹除心火瀉諸經熱消腫艾葉去風石菖蒲開心竅而明目白芷去面風夜明砂去昏花而明目赤石脂有理胃之功亦能止痛車前子明目退翳以上各一兩黃芩除濕熱枯則瀉肝火黃柏降火滋陰梔子三味去目膜消熱獨活治眼黑花川芎治障風頭痛白附子治迎風冷淚生地黃清血熟地黃養血藁本去濕治目中生瘡遠志明目退昏薄荷去邪清風消毒細辛去風明目柴胡發散而治目內諸疾桔梗下氣亦理肺經胡黃連降火去熱穀精草去雲翳益目蒼朮平胃而去風濕天門冬止血而補虛石膏去風熱清胃火百部去肺火杏仁通腸潤肺枳殼消滯氣而理腸胃朴硝降火而開鬱玄參去胃火黃耆益元氣而理肺經青藤去熱大楓子去諸風以上各五錢淨檳榔殺蟲去翳蔓荊子治弦爛赤紅石決明瀉肝火亦去肺經風苦參去大腸風以上各七錢木通瀉小腸之邪火六錢甘草解諸藥之毒調和衆味一兩上七十二味俱切為細片用童便一桶將水澄盛瓷盆中入爐甘石三斤浸之一日夜澄清再浸澄出將爐甘石入混元球內煅紅入藥水浸如此十數次冷定取出爐甘石入陽城罐內封固打火每罐打三炷香升盞輕清者合後藥可治瞎目墜底者可治火眼諸藥加減於後如不入罐打火將甘石研細用水飛過分清濁兩用亦可如制甘石十兩加琥珀五錢珍珠八錢俱各用混元球煅過為極細冰片三錢官硼三兩銅器上飛過海螵蛸六錢生用膽礬二兩用銅瓦片煅過白翠二兩煅紅入童便內不拘遍數以成膩粉為止鷹糞三錢用竹葉上焙過研細熊膽三錢用缸瓦上煅過存性為末真正者人退一兩洗淨炒黃色存性為細末木賊一兩焙過為細末枯礬五錢輕粉三錢神砂三錢皮硝三錢此乃全料分兩亦當隨其目疾而治之無不取效矣一眼害日久有宿沙翳者加螵蛸珊瑚曾青珍珠各研極細加入一病瘡抱住黑睛者加飛過靈砂少許與白丁香研一處用烏鴉翎攪勻一血灌瞳人加官硼曾青即膽礬是也琥珀朴硝少許研細入一束睛雲翳者加白翠螵蛸珊瑚珍珠一有青紅筋者加輕粉枯礬一內障氣加曾青熊膽珊瑚琥珀珍珠神砂少許一胬肉攀睛者加硇砂少許鷹糞人退一多年老眼雲翳遮睛至厚者全料點之一迎風冷淚眼昏花者用主方治之自愈不必加別藥唯少加冰片一拳毛倒睫加珍珠冰片琥珀一赤爛風弦者加硼砂珍珠再用銅緑一兩用天茄汁和艾熏透洗之妙外用點藥因疾加減已盡而內服湯藥亦隨症用藥所謂表裡互治之補其母以及其子也暴發赤腫者肝經風熱之甚也如暴赤失明昏澀翳膜眵淚入眼者皆風熱也洗肝明目散治一切風熱赤腫疼痛當歸尾川芎赤芍生地黃黃連黃芩梔子石膏連翹防風荊芥薄荷羌活蔓荊子菊花白蒺藜草決明桔梗甘草各等分上銼一劑水煎食後服如痛不可忍加光圓小川烏火煨痛不甚不用如有翳障加蒺藜木賊去芍藥風熱肝火甚加膽草柴胡去薄荷大便實加大黃川芎桔梗清上明目丸治一切腫痛風熱眼疾歸尾川芎各六錢生地黃黃連黃芩大黃黃柏酒炒連翹桔梗薄荷防風荊芥羌活獨活白芷菊花草決明木賊甘草各五錢上為末煉蜜為丸如緑豆大每服三十五丸白湯早晚服久病昏暗者腎經真陰之微也如昏弱不欲視物內障見黑花瞳子散皆血少勞神腎虛也滋腎明目湯治勞神腎虛血少眼痛當歸川芎白芍生地熟地桔梗人參山梔黃連白芷蔓荊子菊花甘草以上減半上銼劑細茶一撮燈芯一團水煎食後服熱甚加龍膽草柴胡腎虛加黃柏知母風熱壅盛加防風荊芥風熱紅腫加連翹黃芩明目散薄荷甘草共天麻荊芥防風甘菊花當歸連翹枸杞子川芎白芷密蒙花等分各研為細末每服三錢只用茶勸君每日進一服瞳人咫尺見天涯明目地黃丸生精養血補腎益肝退翳膜遮睛除羞澀多淚並治暴赤熱眼祛風明目懷生地酒洗熟地各四兩知母鹽水炒黃柏酒炒各二兩菟絲子酒製獨活一兩甘枸杞二兩川牛膝酒洗三兩沙苑蒺藜三兩炒上為細末煉蜜為丸如梧桐子大每服八十丸夏月用淡鹽湯下余月酒下內障者肝病也保肝散當歸川芎枸杞蒼朮米泔制白朮去蘆密蒙花羌活天麻薄荷柴胡藁本石膏木賊連翹細辛桔梗防風荊芥各一錢梔子白芷各五分甘草一錢上銼一劑水煎先食乾飯後服藥撥雲退翳還睛丸此藥常服終身眼不昏花密蒙花木賊白蒺藜蟬蛻青鹽各一兩薄荷香白芷防風生甘草川芎雀腦者知母荊芥穗枸杞子白芍各五錢黑芝麻五兩當歸酒洗曬乾三錢甘菊花六錢上為細末煉蜜為丸如彈子大每飯後細嚼一丸苦茶送下外障者肺病也四明飲治一切眼目腫大黃葛花澤瀉石決明各等分上銼一劑水煎服退雲散治翳蒙瞳子當歸生地白菊花穀精草木賊羌活石決明大黃酒炒蔓荊子白芷黃柏連翹龍膽草以上各一錢蟬蛻上銼一劑水煎食遠服退翳丸治眼疾諸般翳障昏暗如神當歸川芎白蒺藜各一兩地骨皮川椒去子七錢菊花羌活密蒙花蔓荊子荊芥各一兩薄荷蛇蛻栝蔞根楮實子黃連甘草各三錢木賊二兩童便浸一宿上十七味共為末用蜜為丸每一兩作十丸食後服日服二次有翳者米泔水下睛暗當歸湯下氣障者木香湯下婦人血暈當歸薄荷湯下忌葷腥麵食等物目能遠視不能近視者火盛而水虧也六味地黃丸加牡蠣方見補益目能近視不能遠視者有水而無火也定志丸遠志甘草水泡去心人參去蘆白茯苓去皮木各一兩石菖蒲二兩上為細末煉蜜為丸硃砂為衣每服二三十丸臨臥白湯下家傳大明膏專治翳膜攀睛爛弦赤障胬肉血貫瞳人迎風冷淚怕日羞明視物昏花疼痛不止不動刀針用藥點眼三日見效十日痊愈大黃蒼朮柴胡龍膽草藁本細辛赤芍菊花倍紅花黃柏黃芩連翹梔子荊芥防風木賊黃連蒺藜薄荷羌活獨活麻黃川芎白芷天府蔓荊子元參苦參歸尾木通生地黃桑白皮車前子枳殼皮硝甘草上銼十大帖用童便五碗煎熟用爐甘石一斤淨入炭火燒紅淬入藥中十次研爛去粗滓將藥入水銅盆內重湯煮乾成餅曬乾研千餘下每一兩入焰硝八錢黃丹五分又研千餘下收入瓷罐內點眼如胬肉雲翳昏蒙爛弦風眼入冰片少許點之撥雲散治一切眼目風熱腫痛昏暗不明生花障翳或熱極紅赤痛不可忍治之最效爐甘石火煅童便淬五錢珍珠膽礬各五分大片腦半分石蟹一錢石燕醋煅琥珀瑪瑙各五分宮硼砂飛過辰砂黃連各一錢乳香血竭各五分上為極細末用瓷器盛貯先將涼水洗淨眼後用銀簪挑藥點眼良久則效如作膏子用蜜調和點之一眼病之後尚有微熱白睛紅多眵淚無疼痛而隱澀難開此苦寒藥太過而真氣不能通九竅也故眼目昏花不明用補中益氣湯去陳皮人參白朮加防風白芷蔓荊子方見補益一眼目昏暗用六味丸加枸杞子當歸甘菊花方見補益一儒者日晡兩目緊澀不能瞻視此元氣下陷用補中益氣倍加參耆數劑痊愈方見補益給事張禹功目赤不明服祛風散熱藥反畏明重聽脈大而虛此因勞心過度飲食失節以補中益氣湯加茯神酸棗仁山藥山茱萸五味頓愈又勞役復甚用十全大補湯兼以前藥漸愈卻用補中益氣湯加前藥而痊方俱見補益凡醫者不理脾胃及養血安神治標不治本是不明正理也若概用辛涼苦寒之劑損傷血氣促成內障之症矣人兩眼角出煙霧此肝火也以柴胡黃連等分大劑水煎臨臥頻頻服之數劑乃瘥咽喉脈咽喉之脈兩寸洪溢上盛下虛脈忌微伏咽喉腫痛者或喉痛生瘡者或咽痛閉塞者或紅腫結核脹痛者或喉閉塞不能言語者俱是風熱痰火皆用清涼散加減或喉閉急症急刺少商穴在大指甲外側用三稜針放出毒血並豁吐痰涎為要若遲緩不救即死速用吹喉散或用好醋噙漱吐痰要緊大抵咽喉之症俱屬風痰火明者治之喉痹者火分虛實也實火宜清涼散治一切實火咽喉腫痛山梔連翹黃芩防風枳殼黃連當歸生地甘草各等分桔梗薄荷減半白芷減半或不用亦可上銼一劑燈芯一團細茶一撮水煎磨山豆根調服咽喉乾燥加人參麥門冬天花粉去白芷咽喉發熱加柴胡咽喉腫痛加牛蒡子玄參去白芷痰火盛加射干栝蔞竹瀝去白芷喉痛生瘡加牛蒡子玄參去白芷極熱大便實加大黃去桔梗虛火泛上咽喉生瘡喉不清者加黃柏知母去白芷開關神應散治一切喉風有起死回生之功蜈蚣焙存性二錢膽礬全蠍去毒焙存性殭蠶去絲嘴各一錢蟬蛻焙存性一錢蟾酥三錢穿山甲麩炒三錢川烏尖一錢乳香五分上為末每服一錢半或三錢小兒每服一分或七釐同蔥頭搗爛和酒藥送下出汗為度如口不能開灌服忌豬羊雞魚油面諸般熱毒等物二七日冰梅丸治喉痹十八種俱效大南星鮮者三十五個大半夏鮮者三十五個皂角去弦淨四兩白礬四兩好白鹽四兩桔梗二兩去蘆防風朴硝四兩甘草一兩上揀七分熟大梅子一百個先將硝鹽水浸一周時然後將各藥碾碎入水拌勻方將梅子置於水中其水淹過梅子三指為度浸七日後取出曬乾又入水中浸透曬乾俟藥水干為度方將梅子入瓷罐內封密如霜衣白愈佳如要用時薄綿裹噙在口中令津液徐徐咽下痰出即愈每一梅足可治三人不可輕棄吹喉散治一切咽喉腫痛並喉舌垂下腫痛者膽礬白礬朴硝片腦山豆根辰砂先將雞䐜內黃皮焙燥共前藥研為極細末用鵝毛管吹藥入喉即效大凡咽喉腫痛或喉閉急症用山豆根磨水噙漱立愈治喉痹雙乳蛾用壁上蜘蛛白窩取下患者腦後發拔一根纏定蛛窩燈上以銀簪挑而燒之存性為末吹入患處立消乳鵝喉閉方急將病人面朝上睡於地下兩手採住頭髮腳踏肩其毒自散或打破鼻血出毒亦散之救急方治喉風口噤不語死在須臾膽礬五分半生半枯熊膽木香各三分上為細末用番木鱉磨井水調和以雞翎蘸掃患處如勢急口噤以箸啓之用藥掃下即消喉痹方並治口瘡牙疳喉痹牙關緊急如神效火硝五錢片腦一分半硼砂一錢半蒲黃一錢孩兒茶一錢二分半上共為細末用筆管撥開蘆管吹入大吐其痰不數次立愈治乳鵝喉痹孔弘周傳蠶蛾末三錢兒茶一錢生白礬三分辰砂一錢上為細末吹入喉口即愈破棺丹治咽喉腫痛水穀不下青鹽白礬硇砂各等分上為末吹患處有痰吐出立效陳藏器每治臟寒吞吐不利用附子去皮臍炮裂以蜜塗炙蜜入內含之勿咽虛火宜加味四物湯治虛火上升喉痛並生喉瘡喉痹熱毒最能降火甚效當歸川芎黃柏鹽水浸知母去毛天花粉各一錢熟地白芍各一錢二分桔梗甘草各三錢上銼一劑水煎入竹瀝一鍾同服噙化丸治咽喉腫痛或聲不清或聲啞咽喉乾燥或生瘡者並治南薄荷葉楝參五錢懷生地一兩生甘草二兩白桔梗三錢山豆根八錢片腦三分上為細末煉蜜為丸如龍眼大每一丸分三次臨臥將丸噙入口中津液漸漸化下痄腮者腫痛風熱也驅風解毒散治痄腮腫痛者防風荊芥羌活連翹牛蒡子甘草各等分上銼一劑水煎食後服又方治痄腮腫痛者用此敷上用赤小豆研為細末釅醋調敷腫處即消又方用礦石灰不拘數炒七次地上窨七次釅醋調敷腫處立愈謳歌失音者火動也響聲破笛丸連翹二兩半桔梗二兩半川芎一兩半砂仁一兩訶子一兩炒百藥二兩薄荷四兩大黃一兩甘草二兩半上為細末雞子清為丸如彈子大每服一丸臨臥時噙化徐徐咽下聲音不出者腎虛也滋腎湯夫心為聲音之主肺為聲音之門腎為聲音之根風寒暑濕氣血痰熱邪氣有干於心肺病在上脘隨症解之邪氣散則天籟鳴矣唯夫腎虛不能納諸氣以歸元故氣奔而上升咳嗽痰壅或喘或脹髓虛多唾足冷骨痿胸腹百骸俱為之牽制其嗽愈重其氣愈乏其保身君子必當於受病之處圖之可也按錢氏方小兒吐瀉利其小便過多以致脾虛不食錢用益黃散作效數日以後忽爾不語錢知其脾氣已復腎氣尚虛投以地黃丸益腎相繼數劑見於能言子益信聲音之根出於腎也不誣矣當歸川芎白芍熟地人參各五錢白朮二錢半茯苓去皮陳皮半夏薑製各五錢牛膝酒洗二錢半杜仲菟絲子酒洗制五味子各五錢益智仁二錢半破故紙二錢半胡蘆巴炒二錢半石菖蒲一錢半甘草炙二錢半巴戟去心五錢上銼作劑生薑三片棗一枚水煎於五更初腎氣開時不許咳唾言語默默服之奏效嘹亮丸治久失音聲啞人乳四兩白蜜四兩梨汁四兩香椿芽汁四兩如無用淺香椿芽為末四兩入放上三味內上共一處和勻重湯煮熱不拘時服白滾水送下治聲啞方甘草桔梗烏梅烏藥上各等分水煎食後頻頻服孫押班治都知潘元從喉閉孫以藥半錢吹入喉中少頃吐出膿血立愈潘詣孫謝曰大急之患非明公不能救救人之急非藥不能療贈金百兩願求方以濟非常之急曰用豬牙皂角白礬黃連各等分置新瓦上焙乾為末即授以方不受所贈一儒者三場畢忽咽喉腫閉不省人事喘促痰湧汗出如水肢體痿軟脈浮大而數此飲食勞役無根虛火上炎用補中益氣加肉桂一劑頓蘇方見補益李判府咽喉腫痛口舌生瘡此上焦風熱先用荊防敗毒散二劑喉痛漸愈又以玄參升麻湯口舌遂愈方見傷寒結核結核或生項側在頸在臂在身如腫痛者多在皮裡膜外多是痰注不散問其平日好食何物吐下後用藥散核又云結核火氣熱甚則鬱結核硬如果中核也不須潰發但熱氣散則自消矣結核者風痰鬱結也又云火因痰注而不散也消風化痰湯南星半夏赤芍連翹天麻青藤殭蠶洗去絲蒼耳子金銀花天門冬桔梗各七分白芷防風羌活皂角各五分全蠍去毒陳皮各四分白附子淮木通各一錢甘草二分上銼一劑生薑五片水煎食後服忌煎炒熱物消毒散治咽喉結核腫塊如桃堅硬疼痛頸項不回轉四腋下或有塊硬如石南星薑製半夏薑製陳皮枳實桔梗柴胡前胡黃連連翹赤芍防風獨活白附子蘇子莪朮蔓荊子木通甘草上銼一劑生薑二片燈草一團水煎服化鳳膏治咽喉頸項結核成形及瘰癧用萆麻子七枚去殼捻爛用薄紙卷於中插入雞子內紙封固水浸濕火煨熟去殼去內紙條只食雞子以酒一杯送下每早晨服一枚十日奏效內消散治梅核痰核馬刀瘰癧歸尾連翹羌活獨活薄荷桂枝赤芍白芷梢各一兩防風一兩半荊芥細辛各八錢藁本七錢半小川芎甘草節各六錢上為細末每服二錢食後酒調下內托白蘞散治腋下痰核因酒怒氣發腫痛潰膿久不合口當歸一錢赤芍一錢川芎七分白芷八分連翹一錢白蒺藜四分白蘞八分片芩酒炒八分防風桔梗各五分天花粉七分栝蔞仁八分另研柴胡五分乳香七分另研生甘草節四分上銼一劑水煎晚間熱服忌一切發物並怒氣房勞消核丸治頸項耳後結核三五成簇不紅不腫不痛不成膿者橘紅鹽水洗略去白一兩赤茯苓一兩去皮生甘草節去皮四錢半夏曲薑汁拌焙七錢片芩酒拌炒八錢殭蠶水洗炒黃六錢玄參酒拌焙七錢牡蠣粉火煨童便淬另研七錢山梔仁連殼炒焦八錢天花粉七錢栝蔞仁七錢另研大黃煨一兩桔梗去蘆七錢連翹去枝梗一兩上為末湯泡蒸餅為丸如緑豆大曬乾每服八九十丸白湯送下一婦人項結核寒熱頭痛脅乳脹痛內熱口苦小便頻數證屬肝火血虛用四物加柴胡山梔膽草而愈又用加味逍遙散而安梅核氣梅核為病大抵因七情之氣鬱結而成或因飲食之時觸犯惱怒遂成此症唯婦人女子患此最多治宜開鬱順氣利膈化痰清肺為主加味四七湯治七情之氣結成痰氣狀如梅核或如破絮在咽喉之間咯不出咽不下或中脘痞滿氣不舒快或痰涎壅盛上氣喘急或因痰飲噁心嘔吐此藥最妙功不盡述白茯苓去皮川厚朴去皮薑炒蘇梗半夏薑汁炒廣橘紅青皮枳實砂仁南星薑汁炒神麯炒各一錢白豆蔻檳榔益智仁各五分上銼一劑生薑五片水煎臨臥服癭瘤癭多著於肩項瘤則隨氣凝結此等年數深遠侵大侵長堅硬不可移者名曰石癭皮色不變者名曰肉癭筋脈露結者名曰筋癭赤脈交結者名曰血癭隨憂愁消長者名曰氣癭五癭者不可決破決破則膿血崩潰多致夭枉難治瘤則有六種骨瘤脂瘤肉瘤膿瘤血瘤筋瘤亦不可決破決破則亦難醫肉瘤尤不可治治則殺人唯脂瘤破而去其脂粉則愈癭瘤氣血凝滯也消瘤五海散海帶海藻海布海蛤海螵蛸各二兩半木香二兩三稜莪朮桔梗細辛香附米豬琰子七個陳壁土炒去油焙乾上為末每服七分半食遠米湯下消腫潰堅湯方見瘰癧治癭瘤結核通用內府祕傳方治癭氣神效海藻熱水洗淨昆布洗淨海帶海螵蛸海粉飛過海螺醋炙甘草少許如頸下搖者用長螺頸不搖用圓螺上各等分為末煉蜜為丸如圓眼大每夜臨臥口中噙化一丸功效不可言也肺癰脈寸口脈數而實者肺癰也若脈微緊而數者未有膿也若緊甚而數者已有膿也又脈短而澀者自痊浮大者難治肺癰之候口乾喘滿咽燥而渴甚則四肢浮腫咳唾膿血或腥臭濁味胸中隱隱而微痛者肺癰也大凡肺癰當咳嗽短氣胸滿時唾膿血久久如粳米粥者難治若嘔膿而不止者亦不可治也其嘔而膿自止者自愈其面色當白而反赤者此火剋金不可治也肺癰者咳唾有膿血也桔梗湯治肺癰咳唾膿血咽喉多渴大小便不利桔梗貝母當歸栝蔞仁桑白皮防風杏仁去皮尖百合黃耆蜜炒枳殼麩炒薏苡仁甘草各等分上銼劑生薑煎食後服大便閉加大黃小便閉加木通喘急加葶藶口燥加片芩一方加玄參地骨皮治肺癰方用薏苡仁略炒為末糯米飲調服或入粥煮吃亦可或水煎服當下膿血自安焊肺丹凡治肺癰必以此藥間而服之以護膈膜不致潰透心肺最為切當即蠟礬丸用蜜水送下方見癰疽一男子咳吐痰膿胸腹膨脹兩寸及右關脈皆洪數此火不能生土而土不能生金也用桔梗湯為主佐以補中益氣湯而愈方見補益肺痿脈寸口脈數而虛肺痿也肺痿之候久嗽不已汗出過度重亡津液便如爛瓜下如豕脂小便數而不渴渴者自愈欲飲水者欲瘥此由肺多唾涎沫而無膿血者肺痿也有汗出惡風咳嗽短氣鼻塞項強胸脹脅滿久而不瘥已成肺痿也肺痿者久嗽不已無膿血也薏苡散治肺痿咳嗽其症辟辟燥咳胸隱隱而痛肺弱無力當歸白芍酒炒黃芩人參去蘆五味子黃耆蜜炙麥門冬去心桑白皮百部薏苡仁各等分上銼一劑生薑三片水煎服胸前有孔常出血水者謂之心漏也鹿子丸治胸前有孔兼治腰痛嫩鹿茸去毛酥炙微黃大附子泡去皮臍鹽花各等分上為末棗肉為丸每服三十丸空心好酒送下心痛即胃脘痛脈心痛微急痛甚伏入陽微陰弦或短又數緊實便難滑實痰積心痹引背脈微而大寸沉而遲關緊數鋭心痛初起者胃中有寒也薑桂湯治初起胃脘寒痛乾薑良薑官桂各七分藿香蒼朮米泔制厚朴薑汁炒陳皮甘草炙木香茴香酒炒枳殼麩炒砂仁香附炒各等分上銼一劑薑三片水煎磨木香服痛甚加乳香手足厥冷脈沉伏加附子去良薑心痛稍久者胃中有鬱熱也清熱解鬱湯梔子炒黑二錢枳殼麩炒西芎黃連炒香附炒各一錢陳皮乾薑炒黑各五分蒼朮米泔浸七分甘草三分上銼一劑生薑三片水煎熱服服後戒飲食半日渣再煎服清膈散治心胃刺痛憎寒壯熱口乾煩躁不臥時痛時止柴胡二錢黃芩一錢半黃連枳實梔子酒炒竹茹赤芍各一錢甘草三分上銼一劑生薑一片水煎服痛甚加薑汁三匙心痛大便實者宜利則痛隨利減也枳實大黃湯治大便結實不通胃中痛者方見腹痛利氣丸方見諸氣心痛因素喜食熱物者死血留於胃口也活血湯治熱傷胃口死血作痛方見腹痛症韭菜丸治胸膈背後死血積滯疼痛或吐血後或勞後飲酒怒氣過多俱胸背作痛當歸川芎人參牡丹皮桃仁大黃黃芩薑黃三稜莪朮桔梗枳殼半夏防風羌活各等分俱要生用上用韭菜根共一處酒浸曬乾又浸如此三五次共為末水丸緑豆大每服三五十丸或百丸茶清下心膈大痛攻走腰背厥冷嘔吐者是痰涎在心膈也以先用鵝管探吐痰涎出後用枳縮二陳湯治痰涎在心膈上攻走腰背嘔噦大痛枳實麩炒砂仁半夏薑汁製陳皮香附各二錢木香草豆蔻乾薑炒各五分厚朴薑汁炒茴香酒炒玄胡索各八分甘草三分上銼一劑薑三片水煎入竹瀝磨木香同服心痛胃口有蟲作痛者時痛時止面白唇紅是也椒梅湯方見腹痛證治蟲咬心痛鳳眼草即椿樹枯用子乳香各等分上為末麵糊丸如櫻桃大每服一丸黃酒送下苦楝湯治蟲咬心痛用苦楝根皮煎湯服之灸心痛神法兩手肘後陷處痠痛是穴先用香油半鍾重湯煮溫服即用艾入水粉揉爛為炷每處灸五壯其痛立止補遺祕方九氣湯治膈氣風氣寒氣憂氣驚氣喜氣怒氣山嵐瘴氣積聚痞氣心腹刺痛不能飲食時止時發攻則欲死並治神效香附米鬱金甘草上銼生薑三片煎服紅白散治心疼神效官粉二錢紅鹼一錢半上二味為極細末用極辣蔥搗汁和一處燒酒調下立止神效散治心痛作酸又治水停心下作聲如雷又治口眼喎斜不省人事用膽礬一分為末溫黃酒調下以吐痰盡為度桃靈丹治心腹痛疼及陰症或絞腸痧等症玄胡索一兩桃仁去皮五錢另研五靈脂五錢乳香五錢沒藥七錢上各為細末醋糊為丸每服二三十丸心疼淡醋湯下腹痛乾薑湯下或用黃酒下三仙丹治心疼至危將此即起白信煨巴豆去皮油黃蠟各等分上共為末熔黃蠟為丸如黍米大每服三丸燒酒下忌醋芎術薑梔二陳湯治素有痰火胃脘急痛不可忍者食不能消川芎一錢乾薑炮一錢蒼朮米泔制一錢梔子炒一錢陳皮去白二錢二分半夏薑汁炒一錢茯苓去皮一錢甘草五分上銼一劑生薑五片水煎正痛時溫服痛止待半日方可飲食沉香化滯定痛丸專治胃脘痛胸中滿悶停痰積塊滯氣壅塞不拘遠年心胃痛服之即效屢屢有驗沉香三錢沒藥五錢大黃五錢炒瓦瓏子一個火煅紅醋一日莪朮三錢玄胡索二錢酒炒乳香二錢上為細末醋糊為丸如緑豆大每服九丸壯實者十一丸白滾水送下行二次米湯補之即安心疼肚腹痛小腸氣積塊冷氣等症屬虛寒者宜服當歸川芎陳皮茯苓砂仁官桂玄胡索各一錢丁香五分三稜一錢半莪朮二錢檳榔二錢甘草五分上銼一劑水煎溫服神效忌房勞破積散治心氣痛食積肚腹痛飲熱積塊痛症屬實熱者宜服香附米四兩酷浸煮乾梔子仁炒黑二兩三稜莪朮鬱金枳殼黃連大黃各一兩上共為細末水丸如梧桐子大每服三二十丸淡薑湯送下進士中寰何公夫人患經行胃口作痛憎寒發熱一醫以四物湯加官桂香附服之即吐血而痛愈甚余見六脈洪數乃鬱火也以山梔二兩薑汁炒黑色一服立愈一教諭年五十一歲因酒食過飽胃脘作痛每食後其氣自兩肩下及胸次至胃口痛不可忍令人將手重按痛處逾時忽響動一聲痛遂止如此八年肌瘦如柴余診六脈微數氣口稍大有力以神祐丸一服下之其痛如失後以參苓白朮散調理復原腹痛脈腹痛關脈緊小急速或動而弦甚則沉伏弦實滑痰尺緊臍腹心腹痛脈沉細是福浮大弦長命不可復腹痛者有寒熱食血濕痰蟲虛實九般也開鬱導氣湯治一切腹痛之總司也蒼朮米泔浸香附童便浸川芎白芷茯苓去皮滑石梔子炒黑神麯炒各一錢陳皮五分乾薑炒黑五分甘草少許上銼一劑水煎溫服綿綿痛無增減脈沉遲者寒痛也薑桂湯治寒腹痛乾薑肉桂良薑各七分枳殼去穰麩炒陳皮砂仁厚朴薑汁炒吳茱萸炒各一錢香附一錢半木香五分另研入服甘草二分上銼一劑薑一片水煎服痛不止加玄胡索茴香乳香寒極手足冷加附子去茱萸良薑泄瀉去枳殼乍痛乍止脈數者火痛也即熱痛散火湯治熱痛黃連炒芍藥炒梔子炒枳殼去穰陳皮厚朴去皮香附撫芎各一錢木香另研砂仁茴香各五分甘草三分上銼一劑生薑一片水煎服痛甚不止加玄胡索乳香腹痛而瀉瀉後痛減者食積也香砂平胃散治食積痛香附炒砂仁厚朴薑汁炒蒼朮米泔浸陳皮枳殼去穰麵炒山楂去子神麯炒各三錢木香另研調入乾薑甘草各三分上銼一劑生薑三片水煎服痛不移處者是死血也活血湯治死血痛並治血結痛歸尾赤芍桃仁去皮官桂五分玄胡索烏藥香附枳殼去穰各一錢紅花五分牡丹皮川芎七分木香五分另磨甘草二分上銼一劑薑一片水煎服小便不利而痛者是濕痰也腹中引釣脅下有聲是痰飲也二陳湯加減方見痰飲時痛時止面白唇紅者是蟲痛也椒梅湯治蟲痛烏梅花椒檳榔枳實木香另研香附砂仁川楝子去核肉桂厚朴乾薑甘草各等分上銼一劑生薑一片水煎服退蟲丸方見諸蟲積痛怒氣傷肝脅刺痛者是刺風痛也木香順氣散方見諸氣治氣痛以手按之腹軟痛止者虛痛也溫中湯治虛痛良薑官桂益智仁砂仁木香另研香附厚朴陳皮茴香當歸玄胡索甘草各等分上銼一劑生薑一片水煎服腹滿硬手不敢按者是實痛也腹中積熱病久不止大便實脈數煩渴者枳實大黃湯下之痛隨利減之法枳實大黃湯治食積痛並積熱痛大便不通者枳實大黃檳榔厚朴各二錢木香五分另研甘草三分上銼一劑水煎服祕方治一切腹痛不論虛實寒熱皆效用小麥稈燒灰地上去火毒將麻布包了滾水淋汁一服立止一肚腹作痛或大便不通按之痛甚瘀血在內也加味承氣湯下之既下而痛不止按之仍痛瘀血未盡也加味四物湯補而行之方見補益加味承氣湯治瘀血內停胸腹脹痛或大便不通等症大黃朴硝各二錢枳實厚朴當歸紅花各一錢甘草五分病急者不用上銼一劑酒水各二鍾煎至一鍾溫服仍量虛實加減腰痛脈腰痛之脈必沉而弦沉微氣滯弦損腎元或浮而緊風寒所纏濕傷濡細實閃挫然澀為瘀血滑痰火煎或引背痛沉滑等症大抵腰痛新久總屬腎虛新痛宜疏外邪清濕熱久則補腎兼補氣血常常腰痛者腎虛也補陰湯治腎虛腰痛當歸白芍酒炒生地黃熟地黃陳皮茴香鹽酒炒故紙酒炒牛膝去蘆酒洗杜仲去粗皮酒炒茯苓去皮各一錢人參五分黃柏去粗皮酒炒知母酒炒各七分甘草炙三分上銼一劑棗二枚水煎不拘時服痛甚大者加乳香砂仁沉香去芍藥生地陳皮如常服合丸藥俱為細末煉蜜為丸如梧桐子大每服五十丸清心米湯下酒亦可養血湯治腰痛腿痛筋骨疼痛當歸生地黃秦艽肉桂牛膝去蘆酒洗杜仲鹽酒炒茯苓去皮防風去蘆各一錢土茯苓一錢半川芎五分甘草三分上銼一劑水煎臨熟入酒少許同服青娥丸治腎虛腰痛大茴香杜仲酒炒破故紙酒炒各一兩加熟地黃二兩酒洗用胡桃去殼取肉四兩湯泡去皮紙包捶去油共五味為末煉蜜為丸如梧桐子大每服五十丸空心酒下或木香湯下亦可日輕夜重者瘀血也治瘀血腰痛方見鬱症依本方加木香沉香茴香乳香牛膝去烏藥官桂青皮牡丹皮調榮活絡湯治失力腰閃或跌撲瘀血凝滯及大便不通而腰痛者當歸桃仁大黃牛膝各二錢川芎一錢赤芍紅花生地黃羌活各一錢桂枝三分上銼一劑水煎服過街笑治閃腰痛木香一錢麝香三釐上為末吹鼻右邊吹左鼻左邊吹右鼻令病人手上下和之遇陰雨久坐而發者是濕也滲濕湯治濕傷腰痛方見濕症依本方加破故紙杜仲茴香木香乳香去厚朴撫芎腰背重注走串痛者是痰也二陳湯治濕痰腰痛方見痰症依本方加木香茴香乳香玄胡索砂仁蒼朮羌活酒芩當歸杜仲酒炒腎虛腰痛補遺方續斷丸治腰痛並腳痠腿軟續斷二兩破故紙酒炒牛膝去蘆酒洗木瓜酒洗杜仲去粗皮酒洗萆薢酒浸各一兩上為細末煉蜜為丸如梧桐子大空心無灰酒送下五六十丸又方大胡桃二個炮焦去殼細嚼燒酒送下腰痛立止滋陰補腎丸滋腎養血除濕熱止腰疼腿痠痛熟地黃酒洗一兩五錢白芍酒炒一兩當歸酒洗一兩五錢川芎八錢破故紙鹽酒炒二錢杜仲薑汁炒一兩五錢小茴香鹽酒浸炒六錢甘枸杞鹽酒浸炒一兩黃柏鹽酒浸炒一兩二錢桃仁去皮炒五錢川楝子一兩二錢上為細末煉蜜為丸如梧桐子大每服八九十丸空心熱酒送下胡桃丸治腰痛乳香沉香木香母丁香大茴香乾薑杜仲薑汁炒去絲沒藥菟絲子酒製破故紙酒炒各等分胡桃四個去殼上為細末煉蜜為丸如緑豆大黃酒送下一腎虛腰痛用六味丸加鹿茸當歸木瓜續斷方見補益一人跌腰作痛用定痛等藥不愈氣血日衰面耳黎色余曰腰為腎之府雖曰閃傷實腎經虛弱所致遂用杜仲補骨脂五味山茱蓯蓉山藥空心服又以六君當歸白朮神麯各二錢食遠服不月而瘥方見補益脅痛脈兩脅疼痛脈必雙弦緊細弦者多怒氣偏沉澀而急痰瘀之愆左脅痛者肝經受邪也疏肝散治左脅下痛肝積屬血或因怒氣所傷或跌撲閃挫所致或為痛黃連吳茱萸煎汁炒二錢柴胡當歸各一錢青皮桃仁研如泥枳殼麩炒各一錢川芎白芍各七分紅花五分上銼一劑水煎食遠服右脅痛者肝邪入肺也推氣散治肝邪入肺右脅痛甚脹滿不食片薑黃枳殼麩炒各二錢桂心少許炙甘草五分一方加陳皮一錢半半夏一錢上銼一劑生薑三片水煎食遠服左右脅俱痛者肝火盛而木氣實也柴胡芎歸湯治肝火盛而木氣實脅下痛柴胡川芎白芍青皮去穰枳殼麩炒各一錢半香附當歸龍膽草木香另研砂仁甘草各五分上銼一劑薑一片水煎不拘時服當歸龍薈丸瀉肝火盛之要藥因內有濕熱兩脅痛甚伐肝木之氣當歸龍膽草山梔仁黃連大黃酒浸濕火煅蘆薈加柴胡五錢青黛各五錢木香二錢半麝香五分另研青皮一兩去穰醋炒上為細末神麯糊為丸如梧桐子大每服二十丸薑湯送下兩脅走注痛而有聲者是痰飲也二陳湯治痰飲脅下痛方見痰症依本方加枳殼砂仁木香川芎青皮蒼朮香附茴香去甘草勞傷身熱脅痛者脈必虛也補中益氣湯治內傷勞役脅下痛方見內傷依本方加川芎白芍青皮木香砂仁枳殼茴香去黃耆白朮升麻咳嗽氣急作熱脈滑數者是痰結痛也久而不治成脅癰栝蔞枳實湯治痰結脅下痛方見痰症依本方加白芥子青皮茴香去桔梗片芩發熱加柴胡左脅下有塊作痛不移者是死血也活血湯治死血脅下痛方見腹痛依本方加青皮去烏藥右脅下有塊作痛飽悶者是食積也香砂平胃散治食積脅痛方見傷食依本方加青皮木香山楂肉麥芽乾薑檳榔去藿香蒼朮發熱加柴胡去半夏補遺方平肝流氣飲治脅痛及小腹至繞臍並疝氣內外疼者當歸酒洗一錢白芍酒炒四分川芎六分橘皮鹽湯洗一錢茯苓去皮一錢半夏薑製青皮醋炒六分黃連酒炒八分柴胡七分香附童便浸炒八分厚朴薑汁炒七分梔子鹽水拌炒八分甘草炙去皮四分吳茱萸煮三次去水炒四分上銼一劑薑三片水煎空心熱服一脅肋脹痛若大便通和喘咳吐痰者肝火侮肺也用小柴胡湯加青皮山梔清之方見傷寒一男子房勞兼怒風府脹悶兩脅脹痛余作色欲損腎怒氣傷肝用六味丸料加柴胡當歸一劑而安方見補益臂痛臂痛者因濕痰橫行經絡也二術湯治痰飲雙臂痛者又治手臂痛是上焦濕痰橫行經絡中作痛也蒼朮米泔浸炒一錢半白朮去蘆南星陳皮茯苓去皮香附酒芩威靈仙羌活甘草各一錢半夏薑製二錢上銼一劑生薑煎服臂痛者因風寒濕所搏也或睡後手在被外為寒邪所襲遂令臂痛及婦人以臂枕而傷於風寒而致臂痛悉依後三方選用五積散治臂痛因於寒者方見中寒烏藥順氣散治臂痛因於風者方見中風蠲痹湯治臂痛因於濕者兼治風濕相搏身體煩疼手足冷痹四肢沉重當歸赤芍黃耆羌活薑黃防風甘草炙各等分上銼一劑生薑三片水煎服滋榮調中湯治臂痛及腰痠或有時作疼陳皮鹽水洗去白八分白茯苓去皮白朮去蘆各一錢半夏白芍酒芩酒柏牛膝酒洗去蘆各七分木瓜鹽水炒七分當歸酒洗一錢川芎鹽湯浸五分羌活六分知母酒炒六分桂枝三分防風去蘆五分上銼一劑生薑三片水煎食遠服背痛脈經云洪而大脈促上緊者肩背痛沉而滑者痰痛方見後豁痰湯背痛者痰氣之所聚也參合湯治背心一點痛陳皮半夏薑汁炒茯苓去皮烏藥枳殼麩炒殭蠶炒川芎白芷麻黃桔梗去蘆乾薑減半紫蘇香附蒼朮米泔浸羌活各等分甘草減半上銼劑生薑煎服肩背痛不能回顧者太陽氣鬱而不行也通氣防風湯治肩背痛用風藥以散之藁本一錢防風羌活二錢獨活二錢川芎一錢蔓荊子六分甘草六分上銼一劑水煎服如身重腰沉經中有寒濕加酒浸防己一錢輕者炮附子重者炮川烏各五分豁痰湯治肩背疼痛半夏制梔子炒各一錢陳皮海桐皮枳殼各八分桔梗赤芍蒼朮制香附各七分茯苓去皮六分川芎薑黃各五分甘草二分上銼生薑煎食遠熱服如痛甚頭劑加朴硝二錢痛風脈痛風沉弦肝腎被濕少陰弱浮風血掣急或澀而小酒後風襲風寒濕氣合而為痹浮澀而緊三脈乃備痛風者遍身骨節走注疼痛也謂之白虎歷節風都是血氣風濕痰火皆令作痛或勞力寒水相搏或酒色醉臥當風取涼或臥卑濕之地或雨汗濕衣蒸體而成痛風在上者多屬風在下者多屬濕治用活血疏風消痰去濕羌活湯加減凡治痛風用蒼朮羌活酒芩三味散風行濕之妙藥耳遍身骨節疼痛者皆是血氣風濕痰火也羌活湯治痛風症羌活蒼朮米泔浸黃芩酒炒當歸芍藥炒茯苓去皮半夏薑汁炒香附各一錢半木香另研陳皮各七分甘草三分上銼一劑薑三片水煎服風痛加防風濕痛加蒼朮熱痰痛倍酒芩栝蔞枳實竹瀝血虛痛加生地黃上痛加白芷威靈仙下痛加黃柏牛膝痛甚加乳香發熱加柴胡小水短澀加木通手臂痛加薄桂凡骨節疼痛如寒熱發腫塊者是濕痰流注經絡與痛風同治法若醫遲不散則成膿矣外用敷藥一切痛風肢節痛者痛屬火腫屬濕不可食肉肉屬陽火能助火食則下有遺溺內有痞塊雖油炒熱物魚面切以戒之所以膏粱之人多食煎炒炙爆酒肉熱物蒸臟腑所以患痛風惡毒癰疽者最多肥人多是濕痰瘦人多是痰火遍身壯熱骨節疼痛者是風寒也解表升麻湯治遍身壯熱骨節疼痛柴胡升麻藁本羌活防風麻黃蒼朮陳皮甘草當歸上銼一劑薑蔥水煎熱服出微汗遍身疼痛屬虛寒者宜溫散也加味五積散治四肢骨節痛因虛寒者宜之當歸川芎白芍酒炒陳皮半夏薑炒蒼朮米泔浸茯苓去皮厚朴薑汁炒羌活獨活枳殼麩炒桔梗白芷各八分乾薑肉桂麻黃甘草各五分穿山甲隨所痛取甲燒灰一錢上銼一劑生薑三片棗一枚麝香少許水煎溫服乳香定痛丸治諸風遍身骨節疼痛或腿膝痛及筋骨風蒼朮米泔浸二兩川烏泡去皮當歸川芎各一兩乳香沒藥各三錢丁香五分上為細末棗肉為丸如梧桐子大每服五六十丸黃酒送下遍身疼痛屬濕痰者宜除濕化痰也清濕化痰湯治周身四肢骨節走注疼痛牽引胸背亦作寒熱喘咳煩悶或作腫塊痛難轉側或四肢麻痹不仁或背心一點如冰冷脈滑乃是濕痰流注經絡關節不利故也南星薑製半夏薑製陳皮茯苓去皮蒼朮米泔浸羌活片芩酒炒白芷白芥子各一錢甘草三分木香五分另研上銼一劑入竹瀝薑汁同服骨體痛甚及有腫塊作痛者名曰痰塊加乳香沒藥海石朴硝頭項痛加川芎威靈仙手臂痛加薄桂引南星等藥至痛處腳痛加牛膝黃柏防己龍膽草木瓜遍身走痛日輕夜重者是血虛也硫經活血湯治遍身走痛如刺左足痛尤甚左屬血多因酒色損傷筋脈虛空被風寒濕熱感於內熱包於寒則痛傷筋絡是以晝輕夜重宜以疏經活血行濕此非白虎歷節風也當歸酒洗一錢二分白芍酒炒錢半生地酒洗蒼朮米泔浸牛膝去蘆酒洗陳皮去白桃仁去皮煎炒威靈仙酒洗各一錢川芎草六分漢防己酒洗羌活防風去蘆白芷各六分龍膽草六分茯苓去皮七分甘草四分上銼一劑生薑三片水煎空心溫服忌生冷濕物有痰加南星半夏各一錢如身上及臂痛加薄桂三分如下身並足痛加木瓜木通鹽炒黃柏薏苡仁各一錢如氣虛加人參白朮龜板各七分如血虛倍四物湯以薑汁酒浸炒用紅花一錢肢節腫痛者腫是濕痛是火也靈仙除痛飲治諸節腫痛痛屬火腫屬濕兼受風寒而發動於經絡之中濕熱流注於肢節之間而無已也麻黃赤芍各一錢防風荊芥羌活獨活白芷蒼朮威靈仙片黃芩枳實桔梗葛根川芎各五錢歸尾升麻甘草各三分上銼一劑水煎服在下焦加酒炒黃柏婦人加紅花腫多加檳榔大腹皮澤瀉沒藥一云脈澀數者有瘀血宜桃仁紅花芍歸及酒大黃微利之四肢百節痛如虎咬者名白虎歷節風也舒筋立安散治四肢百節疼痛防風羌活獨活茯苓去皮川芎白芷生地蒼朮米泔浸紅花桃仁去皮南星薑炒陳皮半夏薑炒白芍去蘆威靈仙牛膝去蘆木瓜防己酒芩連翹木通龍膽草附子少許甘草上銼劑水煎入薑汁竹瀝腹痛甚加乳香沒藥為末調服獨活寄生湯治白虎歷節風神效方見中濕門兩手疼痛麻痹者是風痰也治兩手疼痛麻木當歸川芎白芷片芩酒炒黃連羌活蒼朮米泔制防風桔梗南星薑製半夏薑汁炒桂枝甘草上銼生薑煎服兩足疼痛麻木者是濕熱也治兩足疼痛麻木當歸白芍酒炒白朮去蘆蒼朮米泔浸半夏薑炒陳皮茯苓去皮黃柏酒炒威靈仙川牛膝去蘆酒洗桃仁去皮紅花甘草上銼劑生薑五片水煎入竹瀝服加味二妙丸治兩足麻木疼痛如火之熱方見腳氣一切筋骨疼痛者宜外貼也神應膏治骨節疼痛乳香沒藥各一兩為末皮膠三兩生薑二斤取自然汁先將生薑汁以砂鍋內煎數沸入皮膠化開將鍋取下坐灰上方入乳沒末攪勻成膏用不見煙的狗皮攤膏藥貼患處仍用鞋底炙熱時時在膏藥上運動尉之神效勿犯鐵器一婦人遍身作痛筋骨尤甚不能屈伸口乾目赤頭眩痰壅胸膈不利小便赤短夜間殊甚遍身作癢如蟲行此屬肝腎氣虛而熱也用六味丸料加山梔柴胡而愈方見補益一風濕相搏一身盡痛者補中益氣湯加羌活升麻防風藁本蒼朮治之如病去再服以消風藥損人元氣而益其病也方見補益太僕睛岩張公每患天陰則遍身痛如錐刺已經數年豫診左脈微數右脈洪數乃血虛有濕熱也以當歸拈痛湯加生地黃白芍黃柏去人參數劑而痊腳氣脈脈弦者風濡弱者濕洪數者熱遲澀者寒微滑者虛牢堅者實結則因氣散則因優緊則因怒細則因悲麻是風痛是寒腫是濕足內踝骨紅腫痛者名曰繞蹕風足外踝骨紅腫痛者名曰穿踭外兩膝紅腫痛者名曰鶴膝鳳兩腿胯痛者名曰腿肞風腫者名濕腳氣濕者筋脈弛長而軟或浮腫或生臁瘡之類謂之濕腳氣宜利濕疏風不腫者名乾腳氣干即熱也筋脈蜷縮攣痛枯細不腫謂之乾腳氣宜潤血清燥無汗走注為風勝風者脈浮汗而愈也拘急掣痛為寒勝寒者脈遲溫而愈也腫滿重痛為濕勝濕者脈細滲而愈也燥渴便實為熱勝熱者脈數下而愈也腳氣腫痛初發者宜先導其滯也羌活導滯湯治腳氣初發一身盡痛或肢節腫痛便溺阻隔用此導引後服當歸拈痛湯以徹其邪羌活獨活當歸各二錢防己一錢半大黃酒炒四錢枳實炒一錢上銼一劑水煎空心服腳氣腫屬濕熱者宜徹其邪也當歸拈痛湯治濕熱腳氣為病四肢骨節煩疼肩背沉重胸脅不利遍身疼痛下注足脛腫痛生瘡赤腫膿水不絶或癢或痛並宜服之羌活當歸酒洗豬苓澤瀉知母酒炒白朮去蘆各五分人參苦參升麻葛根防風蒼朮各四分黃芩酒炒茵陳酒洗甘草炙各五分上銼一劑水煎空心服腳氣熱痛如火燎者此濕熱盛也加味二妙丸治兩足濕痹疼痛或如火燎從足胕熱起漸至腹胯或麻痹痿軟皆是濕熱為病此藥神效蒼朮米泔浸一宿切片曬乾四兩黃柏酒浸一宿曬乾二兩川牛膝去蘆酒洗漢防己酒洗當歸酒洗川萆薢酒洗各一兩敗龜板酥炙一兩要自斃者佳多難得市貨多以不效不然以懷熟地一兩代之可也上為末酒煮麵糊為丸如梧桐子大空心鹽湯送下三妙丸治濕熱腳氣或腫痛俱可服蒼朮冬月用四兩夏月用二兩米泔浸一宿切片曬乾黃柏冬月用三兩夏月用四兩切片酒浸一宿曬乾川牛膝去蘆酒洗曬乾二兩上為末煉蜜為丸如梧桐子大每服五十丸空心鹽湯下酒亦可腳氣屬血虛濕熱者宜除濕潤燥也滋榮舒筋健步丸治痰濕手足小便血虛注下筋軟不能行步兼痛者當歸酒洗一兩白朮去蘆二兩熟地黃酒洗一兩二錢川芎七錢白芍酒炒一兩茅山蒼朮米泔浸二兩羌活七錢防風七錢牛膝去蘆酒洗一兩獨活酒浸一宿焙七錢桑寄生酒炒六錢木瓜酒浸焙七錢防己酒浸焙七錢肉桂厚者四錢一方加虎脛骨一兩酥炙杜仲酒炒一兩上為細末酒打糊為丸如梧桐子大每服百丸空心淡鹽湯送下天陰薑湯下酒亦可神仙飛步丸治腳膝疼痛當歸酒洗一兩川芎八錢白芍酒炒錢半黃柏酒洗生地酒洗知母酒洗炒蒼朮米泔浸牛膝去蘆酒洗木瓜酒洗杜仲去粗皮薑酒炒薏苡仁黃連酒炒黃芩酒炒陳皮半夏薑汁炒茯苓去皮各一兩防己酒炒防風去蘆威靈仙酒洗桃仁去皮紅花各七錢肉桂甘草各三錢上為末酒糊為丸如梧子大每服五七十丸空心鹽湯下若肝腎虛損而足無力者用六味丸加牛膝杜仲木瓜蒼朮黃柏酒炒方見補益腳氣焮熱紅腫痛者此風熱也人參敗毒散治三陽經腳氣流注腳踝上焮熱赤腫寒熱如瘧自汗惡風依本方各一錢加蒼朮大黃酒蒸各二錢生薑五片煎服皮膚搔癢加蟬蛻腳氣屬虛寒濕者宜溫下元也五積散治風濕流注兩腳痠疼方見中寒依本方加羌活獨活檳榔烏藥木香二十四味飛步散治下元虛損腳膝痠軟疼痛並寒濕風氣麻木不仁及打傷跌損行步艱辛當歸白芷赤芍牛膝酒洗杜仲薑汁炒木瓜茯苓去皮骨碎補烏梅何首烏川續斷破故紙小茴香鹽水炒獨活桑寄生五加皮蒼朮米泔浸陳皮防風去蘆天麻各一兩川芎檳榔半夏薑汁炒各五錢甘草三錢上銼生薑三片水煎熱入酒一半空心服或用好酒五壺煮前藥服之亦可忌生冷青囊藥酒治男婦風濕相搏腰膝疼痛或因坐臥濕地雨露新襲遍身骨節疼痛寒濕氣宜服蒼朮米泔浸炒烏藥牛膝去蘆杜仲薑汁炒各二兩陳皮厚朴薑汁炒當歸枳殼去瓤麩炒獨活檳榔木瓜各一兩川芎白芍桔梗去蘆白芷茯苓去皮半夏薑汁炒麻黃肉桂防己甘草各一兩上銼以麻布袋盛之用酒三斗將藥懸壇內密封壇口鍋內煮一時久然後取出過三日後去藥隨量飲之渣曬乾為末酒糊為丸如梧桐子大每服七八十丸空心酒送下追風丹治腰腿腳膝疼痛蒼朮米泔浸炒草烏炮白芷羌活當歸赤芍虎脛骨各等分上為末每服五七分酒調服為丸亦可二術散治腳氣痛蒼朮米泔浸炒白朮去蘆牛膝酒洗各三錢上銼一劑黃酒二鍾煎至一鍾空心服出汗即愈腳氣腫痛屬風濕者宜外治也除濕湯治腳氣疼痛多是風濕凝注用人言二兩水煮滾熱再入氈片剪如底樣五六片入內同煮令汁干為度取出氈片曬乾或焙乾裹腳板上出汗如氈濕透再換一片出令汗盡即已洗足湯川椒一兩獨活羌活木瓜各五錢白芷三錢荊芥穗一兩上銼劑用水一壺煎至半壺傾出去渣於避風處溫浴洗後拭乾仍用花椒炒熱絹包裹尉患處或炒鹽亦可尉之腳氣衝心者最為惡候也四物湯治腳氣衝心依本方加炒黃柏更於湧泉穴用附子末津唾調捏作餅子貼穴上腳氣轉筋者屬血熱也四物湯治腳氣轉筋依本方加酒炒黃芩紅花又方治腿轉筋用油松節醞酒煎服一方加乳香少許腳跟腫者有痰有血熱也腳跟熱者四物湯加黃柏知母牛膝之類有痰唾者五積散加木瓜兩膝痛腫腳脛枯細者名鶴膝風也四物湯加黃耆人參白朮附子牛膝杜仲防風羌活甘草又宜五積散加松節杉節灸法治兩腳俱是青疙瘩腫毒骨痛用獨蒜切片鋪放患處每處一片用艾灸二壯去蒜再換再灸至愈補遺方一粒金專治風寒暑濕腳氣不問遠年近日一切走注疼痛不可忍臨發時空心服一丸趕到腳面上赤腫痛不散再服一丸趕至腳心中出黑汗乃除根如病在上食後臨臥酒下自然出汗定痛為驗及中風癱瘓麻痹不仁手足不能屈伸偏枯酒下二丸日進二服初中風不省人事牙關不開研一丸酒調灌下一醒是驗白膠香另研草烏去皮臍五靈脂地龍去土木鱉子捶去油各二兩五錢乳香沒藥當歸各七錢五分麝香二錢二分京墨炙煙盡一錢五分上為細末糯米粉糊為丸如芡實大溫酒研化一丸神效膝風陳艾菊花二味作護膝內久自除患立患丹治濕氣兩腿作痛艾葉二兩蔥頭一根搗爛生薑一兩五錢搗爛上用布共為一包蘸極熱燒酒擦患處以痛止為度寒濕腳氣腫痛花椒陳皮各四兩同炒熱用絹袋裝在火箱上以腳底踏袋熏之最效不可水洗一婦人兩足發熱兩腿作痛日晡熱甚余以為肝腎血虛用加味逍遙散六味丸五十餘劑諸症悉愈加味逍遙散見婦人虛勞六味丸方見補益陳大尹兩腿痠軟或赤或白足跟患腫或痛或癢後痛而或如無皮或如皺裂日晡至夜脹痛焮熱用補中益氣湯加八味丸料補其肝腎而愈二方俱見補益一儒者腳心發熱作癢以滾湯浸漬潰而出水肌體骨立作渴吐痰此脾腎虛而水泛為痰也服補中益氣湯六味丸年餘元氣復而諸症愈方見補益㿗疝脈疝脈弦急積聚所釀察其何部肝為本臟心滑肺沉風疝易蕩關浮而遲風虛之恙陽急為瘕陰急疝狀沉遲浮澀疝瘕寒痛痛甚則伏或細或動牢急者生弱急者喪疝氣者疝本肝經宜通勿塞絶與腎經無干或無形有聲或有形如瓜有聲似蛙是疝氣病也始初濕熱在經郁久後感寒氣外束不得疏散所以作痛不可執作寒論須用寒熱相兼用神效湯加減川烏以散寒氣山梔以清濕熱皆是下焦主藥其效速腸中走氣作聲或痛者是盤腸氣也小腸陰囊手按作響聲痛者是膀胱氣也小腸臍旁一梗升上釣痛者是小腸氣也小腹下注上奔心腹急痛者是腎虛也陰子偏大偏小者是偏墜也陰子雖硬大而不痛者是水腎氣也一切疝氣者多因熱鬱於中而寒束於外也以上俱宜後方神效湯治一切疝氣木香另磨吳茱萸各七分茴香酒炒玄胡索益智仁蒼朮米泔浸香附當歸川烏炮去皮減半山梔炒各一錢砂仁七分甘草三分上銼一劑薑三片燈芯一團水磨廣木香調服脹悶如痛加乳香枳實有瘀血脹痛加桃仁川芎去益智山梔腎氣注上心痛悶欲絶者加沉香枳實去益智山梔烏苓通氣散治一切疝氣無問遠近寒熱風濕寒氣烏藥當歸芍藥香附糖球陳皮各一錢茯苓白朮去蘆檳榔玄胡索澤瀉各五分木香甘草各三分上銼一劑生薑三片水煎服如惡寒脈沉細加吳茱萸木香金鈴丸治疝氣外腎腫痛如神木香乳香沒藥大附子炮去皮臍小茴香鹽水炒全蠍去毒玄胡索川楝子去核人參去蘆各等分上為細末好酒打糊為丸如梧桐子大每服百丸空心黃酒送下一服即止神妙丸治小腸氣膀胱氣疝氣盤腸氣水腎氣偏墜硫黃熔化傾入水中撈起研細末二分荔枝核一錢五分砍碎炒黃色川芎鹽水煮撈起切片五分吳茱萸鹽酒炒一錢大茴香一錢半木香沉香乳香橘核各一錢上為末酒糊為丸每服五十丸空心米湯下酒亦可疝氣因氣惱而起者宜順氣也行氣香蘇散治偏墜氣疼痛初發憎寒壯熱甚效方見傷食依本方加茴香青木香三稜莪朮木通香楝酒治偏墜氣南木香小茴香大茴香川楝肉各三錢上合作一服鍋內炒至香入蔥白連須五根用水一碗淬入鍋內以碗罩住候煎至半碗取出去滓加好酒半碗合和入炒鹽一茶匙空心熱服極痛者一服立愈疝氣因勞役而發者此夾虛也每遇勞役即發其脈沉緊豁大無力是夾虛也其痛亦輕但重墜牽引耳和氣益榮湯治夾虛疝痛人參五分當歸川芎青皮去瓤茴香鹽酒炒玄胡索蒼朮米泔浸各一錢木香另磨沉香另磨川烏炮去皮各五分山梔砂仁吳茱萸各七分炒甘草二分上銼一劑薑一片水煎磨沉木香調服發熱加柴胡去吳茱萸腹痛加枳實沉香去人參疝氣發於寒月者多是寒邪入膀胱也加減五積散方見中寒疝氣發於暑月者多是暑入膀胱也加減香苓散治偏墜氣初起憎寒壯熱發表藥輕者一服而愈枳殼陳皮香附蒼朮麻黃香薷豬苓澤瀉木通滑石車前子三稜莪朮川楝子玄胡索甘草上銼劑薑蔥煎熱服一切疝氣年久不愈者宜攻補兼施也川楝湯治一切疝氣川楝子去核小茴香酒炒破故紙酒炒青鹽三稜煨山茱萸酒蒸去核莪朮煨通草橘核荔枝核各等分甘草減半上銼一劑水煎空心服立效收功加馬藺花蒼朮如夏秋之月暑入膀胱疝氣作痛加黃連香薷扁豆木通滑石車前子大小茴香丸治疝氣如神大茴香小茴香吳茱萸川楝子去核川椒各一兩上共為末連須蔥白八兩同藥搗成餅子曬乾用黏米半升同藥餅搗碎微火炒黃為末酒糊為丸如梧桐子大每服八九十丸空心鹽湯或酒送下忌發氣物茱萸內消丸治腎經虛弱膀胱為邪氣所襲結成寒疝陰囊偏墜痛牽引臍腹或生瘡瘍時出水吳茱萸半酒半醋浸一宿焙乾山茱萸蒸去核馬藺花醋浸焙黑醜炒取頂末玄胡索炒川楝子蒸去核海藻鹽水洗焙青皮官桂舶上茴香鹽水炒陳皮各一兩桃仁去皮尖木香白蒺藜炒各五錢上為末酒煮稀糊為丸如梧桐子大每服四十丸空心溫酒或鹽湯下四炒楝實丸治疝氣一切下部之疾腫痛縮小雖多年服此除根川楝子肉一斤淨肉分作四分一分用巴戟一兩麩一合同炒黃色去麩巴戟不用一分用斑蝥四十九個同麩一合炒黃色去麩蝥不用一分用巴豆仁四十九個同麩炒黃色去豆麩不用一分用茴香一合鹽一兩同炒黃色去茴香鹽不用木香破故紙各一兩上為末酒糊為丸如梧桐子大每服五十丸空心鹽湯下甚者日進三服灸法治偏墜氣痛用萆麻子一歲一粒去皮研爛貼頭頂囟門上卻令病入仰臥將兩腳掌相對以帶子綁住二中指於兩指合縫處艾炷如麥粒大灸七壯即時止立效補遺方治疝氣偏墜腫痛不可忍槐子一錢炒褐色為末入鹽三分空心黃酒送下立效祕方治偏墜疝氣神效五去風即五倍子用五六個焙存性為末以好酒調服以醉為度雄黃湯治陰腫大如斗核痛雄黃一兩白礬二兩甘草五分共煎水洗治偏墜疝氣小腸氣荔枝內子焙黃色為細末每服三分黃酒調下治疝氣方用乾絲瓜穰火燒存性每服二錢熱黃酒下治疝氣及心痛方荔枝核四十九粒陳皮連白九錢硫黃四錢上為細末鹽面打糊為丸如緑豆大遇痛黃酒下九丸良久再服九丸遇痛則可長服如冷氣心痛可服熱心痛不可服治外腎著驚縮上者麝香三錢潮腦三錢萵苣子一茶鍾用萵苣葉搗為膏貼臍上下治氣胞木腎水胞偏墜淨沙土炒紅待溫時入花椒小茴艾葉拌勻放一盆內中按一窩上蓋布一片將病胞坐在上遍身汗出胞內冷血冷水冷氣盡化汗而出將沙土濕透再炒如此數遍除根一船家患小腸疝氣腫痛不可忍又病兩眼腫痛眵淚癮澀兩寸脈洪數兩尺脈微此上盛下虛之症用涼藥治眼則疝痛愈增用熱藥治疝則眼痛愈盛諸醫措手莫之能愈豫以木香金鈴丸空心頓服以治下焦之虛寒以退血散臥時服以治上焦之風熱各三服均愈趙雪山患因房勞後五更起早忽感其寒作疝氣腫痛不可忍憎寒戰栗豫診六脈微而無力以五積散加吳茱萸小茴香又以蟠蔥散俱不效後以艾灸之將患人兩腳掌相對以帶子綁住兩中指合縫處以艾炷麥粒大灸七壯完痛止神效痿躄脈痿因肺燥脈多浮弱寸口若沉發汗則錯足痛或軟專審於尺滑痰而緩或沉而弱痿者上盛下虛能食不能行也痿主內傷血氣虛損治用參歸養榮湯加減虎潛丸消痰降火不可誤作風治且風為外感痿為內傷人若足常熱者後必痿也多年不得起者有之矣參歸養榮湯治痿症人參當歸熟地黃白朮去蘆茯苓去皮白芍酒炒陳皮黃柏酒炒知母酒炒牛膝去蘆酒洗杜仲薑酒炒破故紙酒炒各等分甘草減半上銼水煎服肥人屬氣虛有痰加半夏去白芍瘦人屬血虛有火倍加當歸熟地黃症屬虛熱者宜此虎潛丸人參去蘆當歸酒洗黃耆蜜炙白朮去蘆白茯苓去皮熟地黃山藥杜仲薑酒炒牛膝酒洗破故紙酒洗虎脛骨酒炒知母酥炙龜板酥炙各等分上為細末煉蜜為丸如梧子大每服五十丸空心好酒送下清米湯亦可若夢遺加鎖陽酒洗症屬虛寒者宜此鹿角霜丸治四時虛弱兩足痿軟不能行動久臥床褥之症方見中風蒸法治腎氣虛弱脾腎府三經受風寒濕停於腿膝使經脈凝滯而不行變成腳痹故發疼痛此能和榮衛通經絡川椒一把蔥三大莖切鹽一把小麥麩約四五升酒一錢上用醋和濕潤得所於銀器炒令極熱攤臥褥上將所患腳腿就臥熏蒸薄衣被蓋將汗出勻遍約半個時辰撤去炒麩止就熏褥中臥兩個時辰覺汗稍解勿令見風立效補遺方清燥湯六七月間濕令大行子能令母實而熱旺濕熱相合而刑傷太陽故寒涼以救之燥金受濕熱之邪絶寒水生化之源源絶則腎虧痿厥之病大作腰下痿軟癱瘓不能動黃耆蜜炙一錢半蒼朮米泔炒一錢白朮去蘆陳皮澤瀉各五分人參去蘆白茯苓升麻各三分麥門冬去心當歸生地黃神麯豬苓各二分黃柏酒炒柴胡黃連各一分五味子九個甘草炙二分上銼一劑水煎空心服消渴脈消渴肝病心滑而微或緊洪數陽盛陰憊血虛濡散勞則浮遲短浮莫治數大難醫消渴者口常渴也小便不利而渴者知內有濕也濕宜瀉之小便自利而渴者知內有燥也燥宜潤之大抵三消者俱屬內虛有熱也繅絲湯治三焦渴如神如無繅絲湯卻以原蠶繭殼絲煎湯皆可代之無時飲之大效蓋此物屬火有陰之用大能瀉膀胱中伏火引陰水上潮於口而不渴也黃連地黃湯黃連去須生地黃天花粉五味子去梗川當歸人參去蘆乾葛白茯苓去皮麥門冬去心甘草各一錢上銼一劑生薑一片棗一枚竹葉十片水二盞煎去渣溫服若上焦渴者加山梔桔梗中焦渴者加黃芩頭眩渴不止者加石膏下焦渴者加黃柏知母若作丸加薄荷煉蜜為丸如彈子大每服一丸噙化咽下玉泉丸黃連乾葛天花粉知母麥門冬去心人參五味子生地汁蓮肉烏梅肉當歸甘草各等分加人乳汁牛乳汁甘蔗汁梨汁藕汁上先將各汁入蜜一斤半煎熬成膏後將各藥為末和前膏蒸熱汁數沸每服五茶匙食前清米湯調下忌一切辛熱之物上消者肺火飲水多而食少也黃芩湯治上焦渴症黃芩山梔桔梗麥門冬去心當歸生地黃乾葛人參天花粉白芍各等分烏梅一個上銼一劑食遠頻服中消者胃火消穀易飢不生肌肉小水赤黃是也用人參白虎湯治之滋陰降火湯治下焦渴症方見虛怯依本方加白朮天花粉山梔葛粉烏梅焙炒黃連知母去白芍六味地黃丸治心腎不交消渴引飲方見虛怯依本方加麥門冬五味子丹溪曰三消者多屬血虛不生津液俱宜四物湯為主治之方見補益上消者加人參五味麥門冬天花粉煎熟入生藕汁生地黃汁人乳飲酒之人加生葛根汁中消者加知母石膏滑石寒水石以降胃火下消者加黃柏知母熟地黃五味子以滋腎水又當間飲繅絲湯為上策祕方總治三消兼治吐血黃連天花粉二味為末藕汁人乳汁生地黃汁上以薑蜜和二味為膏每次一指頭大放在舌上徐徐白湯送下痓病脈痓病弦直或沉細些汗後欲解脈潑如蛇伏堅尚可伏弦傷嗟痓病是難治也多是血氣內虛者風痰而成痓病頭項強直身熱足寒頭面赤獨頭搖卒口噤目脈赤背反張手攣急腳如弓脈弦緊是痓病也開目無汗是剛痓屬陽閉目有汗為柔痓屬陰凡治傷寒雜症汗吐後入風亦成痓病大發濕家汗亦成痓病發瘡家汗亦成痓産後去血過多亦成痓有跌磕打傷瘡口未合貫風者亦成痓此名破傷風也若身涼手足冷脈沉細者名陰痓若是眼牽嘴扯手足戰搖伸縮者是風痰痓俱宜參歸養榮湯加減若發熱喘嗽生痰脈滑數者名痰火痓用栝蔞枳實湯加減不可全用風藥以風藥散氣死之速矣若是目瞪口開真氣昏冒不知人者斷死無醫若小兒吐瀉驚風發痓者謂之角弓反張病與痓病用藥同法也參歸養榮湯治一切痓病人參當歸川芎白芍熟地黃白朮白茯苓陳皮甘草上銼一劑生薑一片棗一枚水煎溫服剛痓身熱面赤脈緊加防風羌活柴胡黃芩乾葛去白朮身熱煩渴脈數加麥門冬知母柴胡黃芩葛粉去川芎白朮身熱飽悶氣急生痰加蘇子栝蔞枳實黃芩桔梗柴胡砂仁竹瀝薑汁去人參熟地白芍川芎身熱煩渴口噤咬牙手足攣急臥不著席大便不通脈數者加枳實大黃柴胡黃芩厚朴去白朮人參川芎茯苓柔痓身不熱手足冷脈沉細加熟附子羌活汗多加黃芩去川芎風痰痓加羌活防風栝蔞枳實桔梗片黃芩竹瀝薑汁去人參白朮熟地黃破傷風痓加殭蠶全蠍防風羌活南星栝蔞枳實黃芩桔梗竹瀝薑汁去白朮人參熟地黃汗吐瀉多發痓者本方倍人參黃耆當歸生地荊芥羌活白朮栝蔞枳實湯治痰火發痓栝蔞仁枳實貝母桔梗片芩陳皮山梔麥門冬去心茯苓去皮人參當歸蘇子各等分甘草三分上銼一劑薑一片入竹瀝薑汁少許水煎同服
