body:
  text: 卷之五頭痛脈頭痛陽弦浮風緊寒熱必洪數濕細而堅氣虛頭痛雖弦帶數痰厥則滑腎厥堅實頭者諸陽之首也其痛有各經之不同因而治法亦有異也氣虛頭痛者耳鳴九竅不利也濕熱頭痛者頭重如石屬濕也風寒頭痛者身重惡寒寒邪從外入宜汗之也偏頭痛者手少陽陽明經受症左半邊屬火屬風屬血虛右半邊屬痰屬熱也真頭痛者腦盡而疼手足冷至節者不治也少陽頭痛者往來寒熱也陽明頭痛者自汗發熱惡寒也太陽頭痛者有痰重或腹痛為之痰癖也少陰經痛者三陰三陽經不流行而足寒氣逆為寒也厥陰頭痛者或痰多厥冷也血虛頭痛者夜作苦者是也眉輪骨痛痰火之徵也又云風熱與痰也有汗虛羞明眉眶痛者亦痰火之徵也肥人頭痛者多是氣虛濕痰也二陳湯方見痰飲依本方加人參白朮川芎白芷細辛羌活桔梗荊芥瘦人頭痛者多是血虛痰火也二陳湯方見痰飲依本方加生地黃當歸片芩川芎細辛羌活桔梗遇風寒噁心嘔吐者乃頭風也二陳湯方見痰飲頭痛偏左者屬風與血虛也當歸補血湯治血虛與風頭痛當歸川芎白芍藥生地黃枯芩酒炒香附酒炒各一錢防風蔓荊子柴胡各五分荊芥藁本各四分上銼一劑水煎服加味四物湯治血虛陰火衝上頭痛當歸川芎生地黃黃柏酒炒知母酒炒蔓荊子黃芩酒炒黃連酒炒梔子炒各等分上銼一劑水煎服頭痛偏右者屬痰與氣虛也黃耆益氣湯治氣虛頭痛黃耆一錢蜜炒人參白朮陳皮半夏薑汁炒當歸酒炒川芎藁本甘草炙各五分升麻黃柏酒炒細辛各三分上銼一劑薑三片水煎服頭痛左右俱疼者氣血兩虛也調中益氣湯治氣血兩虛頭痛黃耆人參甘草炙蒼朮米泔浸炒川芎各六分升麻柴胡陳皮黃柏酒炒蔓荊子各三分當歸六分細辛二分上銼一劑水煎服頭旋眼黑噁心者痰厥頭痛也半夏白朮天麻湯治痰厥頭痛眼黑頭旋噁心煩悶氣短促上喘無力語言心神顛倒目不敢開如在風雲之中頭苦痛如裂身重如山四肢厥冷不得安臥此乃胃氣虛損停痰而致也半夏薑汁製陳皮去白麥芽各七分半白茯苓去皮黃耆蜜水炒人參澤瀉蒼朮米泔浸天麻各三分半神麯五分炒黃柏酒炒乾薑炒各二分上銼一劑生薑三片水煎食前熱服偏正頭痛者風氣上攻也川芎茶調散治諸風上攻頭目昏沉偏正頭痛鼻塞聲重傷風壯熱肢體痠疼肌肉蠕動膈熱痰盛婦人血氣攻疰太陽穴痛俱是外感風氣並效川芎荊芥穗各二兩薄荷香附各四兩羌活白芷甘草炙各一兩防風七錢半上為細末每服二錢食後茶清調下薑蔥煎湯亦可一方加菊花一兩細辛五錢殭蠶蟬蛻各二錢半名菊花茶調散熱厥頭痛者見寒暫止也清上瀉火湯治熱厥頭痛雖冬天嚴寒猶喜風寒其痛暫止來暖處或見煙火則痛復作當歸蔓荊子蒼朮米泔浸羌活柴胡各二錢川芎生地黃黃連酒炒荊芥穗藁本各五錢防風升麻細辛黃耆黃柏酒炒知母酒炒紅花黃芩炙甘草各一錢生甘草五錢上銼每劑一兩二錢水煎食遠稍熱服頸項強痛者風所幹也回首散治頸攻強急筋痛或挫頸轉項不得者烏藥順氣散加羌活獨活木瓜方見中風眉稜骨痛者風熱並痰也選奇方羌活防風各二錢酒片芩一錢半冬月不用或少者炒用半夏薑汁炒二錢甘草一錢夏月生冬月炙上銼一劑水煎食後服雷頭風者頭痛而起核塊也升麻湯治失麵疙瘩憎寒拘急發熱狀如傷寒升麻蒼朮薄荷葉各等分上銼水煎服或茶調散亦效一切頭痛總治之藥也六聖散即是赤火金針治頭風牙痛赤眼腦瀉耳鳴偏正頭風頭疼鼻塞聲重及蜈蚣蛇蠍所傷用時口噙涼水以藥搐鼻此藥名為六聖乳香沒藥川芎雄黃白芷二錢停半兩盆硝共用右件研為細末專治眼淚頭風耳鳴鼻塞腦不寧一搐牙痛便定七生丸治男婦八般頭痛及一切頭痛痰厥腎厥傷寒傷風頭痛並皆治之川芎川烏去皮草烏去皮南星去皮半夏冷水洗去滑白芷石膏俱生各等分加細辛全蠍各減半上為細末研韭菜自然汁為丸如梧桐子大每服七丸或十丸嚼生蔥茶送下治六經頭痛諸藥不效者梔子炒條芩炒連翹三味為君川芎白芷知母黃柏酒炒薄荷生地黃酒洗六味俱為臣柴胡桔梗二味為佐香附米甘草二味為使石膏二匙細茶一撮上銼水煎食後頻熱服侍御西泉杜公患頭痛如刀劈不敢動移懼風怕言語耳鳴目中溜火六脈緊數有力余以酒九蒸九曬大黃為末三錢茶調服一劑而愈劉毅齋但怒則兩太陽作痛先用小柴胡湯方見傷寒加茯苓山梔後用六味丸方見補益以生腎水而不再發談侍御每頭痛必吐清水不拘冬夏吃薑便止余作中氣虛寒用六君子湯加當歸黃耆木香炮薑而瘥方見補益商儀部勞則頭痛余作陽虛不能上升以補中益氣湯加蔓荊子而痊方見補益鬚髮須屬腎稟水氣故下生也發屬心稟火氣故上生也中山還童酒人間處處有善緣得遇者便是蓬萊叟馬藺花一升土埋三日取出馬藺根洗切片一升用黃米二斗水煮成糜陳曲二塊為末酒酵子二碗並前馬藺子共和一處做酒待熟另用馬藺子並根一升用水煮十沸入酒內三日每日攪勻去根隨量飲醉酒飲盡其鬚髮盡黑其酒之色如漆之黑烏須酒方黃米三斗淮曲十塊麥門冬去心八兩天門冬去心二兩人參去蘆一兩生地四兩熟地二兩枸杞子二兩何首烏四兩牛膝去蘆一兩當歸二兩上各為末和入曲糜內封缸待酒熟照常榨出每日清晨飲三杯忌白酒蘿蔔蔥蒜經驗烏須方能變白為黑身輕體健其功不能盡述每年冬十月壬癸日面東採摘紅肥大枸杞十二升搗破同好無灰細酒二斤同盛於瓷瓶內浸二十一日足開封添生地黃汁三升攪勻卻以紙三層封其口俱至立春前三十日開瓶空心熱飲一杯至立春後髭鬚都黑勿食蕪菁蔥蒜服之見效若年年服之耐老身輕無比也五老還童丹堪嗟須鬢白如霜要黑原來有異方不用擦牙並染髮都來五味配陰陽赤石脂與川椒炒辰砂一味最為良茯神能養心中血乳香分量要相當棗肉為丸梧子大空心溫酒十五雙十服之後君休摘管教華髮黑如光兼能明目並延壽老翁變作少年郎上方合一料每味各一兩為末煮紅棗去皮核用肉為丸空心酒下旱蓮丸旱蓮汁用汁曬半斤生薑二斤取汁曬半斤生地黃二斤酒泡取汁曬半斤細辛一兩破故紙一斤麵炒杜仲半斤炒五加皮酒浸半斤赤茯苓去皮切片乳汁浸半斤枸杞子四兩川芎四兩沒藥二兩上為細末核桃仁半斤去皮棗肉同和為丸如梧桐子大每服五十丸黃酒送下彭真人還壽丹補心生血滋腎壯陽黑鬚發潤肌膚返老還童延年益壽種子大辰砂研細水飛過一兩補骨脂酒浸炒二兩核桃仁去皮炒四兩捶去油杜仲薑酒炒二兩牛膝去蘆酒洗一兩天門冬去心一兩麥門冬去心一兩生地黃酒洗二兩熟地黃二兩當歸酒洗一兩白茯苓去皮為末水飛曬乾人乳浸再曬川芎一兩遠志甘草水泡去心一兩石菖蒲去毛鹽水浸巴戟酒浸去梗一兩白茯神去皮木同煎茯苓一樣制青鹽一兩黃柏鹽水炒二兩小茴香鹽水炒一兩知母酒炒去毛二兩川椒四兩微炒去子去白隔乳香箬炙一兩楝參一兩黃精米泔水煮一沸揀去爛的竹刀切片曬乾卻用旱蓮十四兩生薑汁二兩各取自然汁並酒三味停兌熬膏浸黃精半日炒蒼色四兩何首烏瓜瓣形內無花者足赤白二種停以捶碎煮於黑豆水上九蒸九曬再用人乳浸透曬乾四兩上二十六味為末煉蜜為丸如梧桐子大每服七十丸空心鹽湯或酒送下一方加山茱萸枸杞子菟絲子山藥柏子仁各一兩尤效烏須還少丹首生童子發四兩酒煮成膏川烏何首烏草烏乾漆辰砂針砂以上各一兩半川椒四兩半陽起石二兩胡椒五錢以上九味共為細末與童子發膏拌勻入陽城罐內封固桑柴火燒以罐子紅為度埋在陰地之中七日足取出聽用枸杞子三兩生地黃三兩酒浸柏子仁三兩核桃仁三兩麩炒黃色麝香三分麵包煨甘草火煨面熟為度上為細末共前藥合一處每服一錢好酒送下百日後鬚髮如漆面若童顏以後三日或七日服一次久久服之其功難以盡述加味八寶丹李滄溪傳旱蓮膏四兩何首烏半斤生用沒石子四兩天門冬去心搗膏四兩麥門冬去心搗膏四兩蓮芯二兩𦯶麻子新瓦上炒香四兩胡桃仁四兩去皮魚螵四兩切斷炒鍋內炒成珠鮮生地黃半斤搗汁熟地黃四兩搗成泥槐角豆四兩黑牛膽浸透瓦上焙乾上為細末煉蜜為丸如梧桐子大每服七八十丸空心鹽水黃酒化下外染烏雲膏五倍子炒黑一錢銅末醋炒五次白礬生研鹽各三分研上各勻用煎釅茶汁和成稀糊重湯煮數沸再入燒酒少許先將皂角水洗淨須鬢然後塗藥包裹一夜甚效次早以茶汁輕輕洗去藥其黑如漆連染三夜以後或十日半月染一次烏須方官粉一兩二錢半白礬三錢水銀一錢先將黑鉛一錢熔化後入水銀共研細樟腦二分麝香一分百草霜八分輕粉三分石灰二錢上八味為細末用鹹水調和熬滾後塗須上燒半炷香時即洗去金毛獅子倒上樹烏須捻藥方用打錫灰羅細末一錢入汞一錢研不見星將酸石榴一個切去頂將瓤並子攪勻前末藥再攪勻以原頂封固外用紙封嚴密三七內俱成汁用胞皮裹指以汁捻之未捻之先將鬚髮洗淨拭乾上藥擦牙烏須方青鹽一兩沒石子一錢細辛二錢破故紙一兩炒芳香地骨皮一兩熟地黃一兩酒浸三日砂鍋焙乾為末槐角子一兩百藥煎一錢上俱為細末共八味每早擦牙藥咽下定要一月莫間一日一日常擦不拘白鬚發每月按日摘去再生必黑永不白又能明目固齒神效正月初四十四十七日二月初八十四二十一日三月初八初十十一十三日四月初二十六十八十九日五月十六二十日六月初四十七二十四二十九日七月初三初四十八二十八日八月十五十九日九月初二初四十五二十五日十月初七初十十三二十二日十一月初十十五十七三十日十二月初七初十十六二十日梳頭方百藥煎訶子針砂各一錢石榴皮核桃青皮垂楊柳葉白礬各一錢上共為細末先用鹽醋茶熬水二大碗將藥同入瓶內封十日梳髮染須通黑油核桃油潤之明淨烏須祕方用香油一瓶油核桃二三十個去殼取肉古銅錢一二十個浸油內埋土二尺深一周年足取出搽須鬢上即黑一儒者因飲食勞役及惱怒眉發脫落余以為勞傷精血陰火上炎所致用補中益氣加麥門五味及六味地黃丸加五味眉發頓生如故一男子年二十頂發脫盡用六味地黃丸不數日發生寸許兩月復舊以上方俱見補益面病面生瘡者上焦火也清上防風湯清上焦火治頭面生瘡癤風熱之毒防風一錢荊芥五分連翹八分梔子五分黃連五分黃芩酒炒七分薄荷五分川芎七分白芷八分桔梗八分枳殼五分甘草二分上銼一劑水煎食後服入竹瀝一小盅尤效面紫黑者陽明病也升麻白芷湯治面唇紫黑乃陽明經不足也升麻防風白芷各一錢芍藥蒼朮各三分黃耆人參各七分葛根一錢半甘草四分上銼一劑薑棗煎服宜早後午前取天氣上升於中使陽達於面也面生粉刺者肺火也清肺散治面上生谷嘴瘡俗名粉刺連翹川芎白芷黃連苦參荊芥桑白皮黃芩山梔貝母甘草各等分上銼一劑水煎臨臥服面熱者陽明經風熱也升麻黃連湯治面熱升麻葛根各一錢半白芷七分川芎四分薄荷荊芥各二分蒼朮八分半黃連酒洗五分酒芩六分犀角四分半白芷二分甘草五分上銼一劑水煎食後服面寒者陽明經虛寒也升麻附子湯治面寒升麻葛根白芷黃耆各七分黑附子炮七分人參草豆蔻各五分益智仁三分甘草炙五分上銼一劑